          const units = [...new Set(activeEmployees.map(e => e.unit).filter(Boolean))].sort();
          const sectors = [...new Set(activeEmployees.map(e => e.workSector).filter(Boolean))].sort();

          // Calcula os tipos de dias no mês com matemática UTC imutável
          const monthData = useMemo(() => {
            const y = parseInt(filterYear);
            const m = parseInt(filterMonth) - 1;
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            
            let baseMonToFri = 0;
            let allSats = 0;
            let escala1Sats = 0;
            let escala2Sats = 0;

            // Âncora matemática segura usando UTC para evitar qualquer distorção de fuso horário
            // 07/03/2026 foi um sábado garantido da Escala 1
            const anchorSat = Date.UTC(2026, 2, 7); 

            for (let d = 1; d <= daysInMonth; d++) {
              const date = new Date(y, m, d);
              date.setHours(0,0,0,0);
              const dayOfWeek = date.getDay();
              
              if (!isHoliday(date)) {
                if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                  baseMonToFri++;
                } else if (dayOfWeek === 6) {
                  allSats++;
                  
                  // Usa o UTC para contar a exata diferença de dias matemáticos
                  const currentDateUTC = Date.UTC(y, m, d);
                  const diffDays = Math.round((currentDateUTC - anchorSat) / 86400000);
                  
                  // Se a diferença de dias for um múltiplo exato de 14 (0, 14, -14, 28...), é Escala 1
                  if (diffDays % 14 === 0) {
                    escala1Sats++;
                  } else {
                    escala2Sats++;
                  }
                }
              }
            }
            return { baseMonToFri, allSats, escala1Sats, escala2Sats };
          }, [filterYear, filterMonth]);

          // Aplicação dos Filtros
          let filteredEmps = activeEmployees;
          if (searchTerm) filteredEmps = filteredEmps.filter(e => (e.name || '').toLowerCase().includes(searchTerm.toLowerCase()));
          if (filterCompany) filteredEmps = filteredEmps.filter(e => e.company === filterCompany);
          if (filterRole) filteredEmps = filteredEmps.filter(e => e.role === filterRole);
          if (filterUnit) filteredEmps = filteredEmps.filter(e => e.unit === filterUnit);
          if (filterSector) filteredEmps = filteredEmps.filter(e => e.workSector === filterSector);

          let currentList = [];
          let totalValue = 0;

          if (activeSubTab === 'transport') {
            currentList = filteredEmps.filter(e => e.transportVoucher === 'Sim').map(e => {
              let empBusinessDays = monthData.baseMonToFri;
              if (e.saturdayShift === 'Todos os sábados') empBusinessDays += monthData.allSats;
              else if (e.saturdayShift === 'Sábados alternados') {
                  if (e.saturdayShiftTeam && e.saturdayShiftTeam.includes('Escala 1')) empBusinessDays += monthData.escala1Sats;
                  else if (e.saturdayShiftTeam && e.saturdayShiftTeam.includes('Escala 2')) empBusinessDays += monthData.escala2Sats;
              }

              let dailyTotal = (e.transportCards || []).reduce((acc, c) => acc + (Number(c.valuePerDay) || 0), 0);
              const empAbsences = Number(localAbsences[e.id]) || 0;
              const payableDays = Math.max(0, empBusinessDays - empAbsences);
              
              let parsedCards = (e.transportCards || []).map((c, i) => {
                  const cardTotal = (Number(c.valuePerDay) || 0) * payableDays;
                  return { name: c.name || `Cartão ${i+1}`, valuePerDay: Number(c.valuePerDay) || 0, total: cardTotal };
              });

              let cardDetails = parsedCards.map(c => `${c.name}: ${formatCurrency(c.valuePerDay)}/dia`).join(' | ');
              
              const monthPaymentInfo = e.transportPayments?.[monthKey];
              const paidAmount = (monthPaymentInfo?.details || []).reduce((sum, item) => sum + Number(item.amount || 0), 0);
              
              let calcTotal = 0;

              if (monthPaymentInfo && monthPaymentInfo.lockedTotal !== undefined) {
                 calcTotal = monthPaymentInfo.lockedTotal;
                 dailyTotal = monthPaymentInfo.lockedDailyTotal;
                 cardDetails = monthPaymentInfo.lockedCardDetails || cardDetails;
                 empBusinessDays = monthPaymentInfo.lockedBusinessDays || empBusinessDays;
                 parsedCards = monthPaymentInfo.lockedParsedCards || parsedCards;
              } else if (monthPaymentInfo && monthPaymentInfo.status === 'Pago') {
                 calcTotal = paidAmount > 0 ? paidAmount : (dailyTotal * payableDays);
              } else {
                 calcTotal = dailyTotal * payableDays;
              }

              totalValue += calcTotal;
              
              const remainingAmount = Math.max(0, calcTotal - paidAmount);
              let isPaid = false; let isPartial = false;

              if (monthPaymentInfo) {
                  if (paidAmount >= (calcTotal - 0.01) && calcTotal > 0) isPaid = true;
                  else if (paidAmount > 0 && paidAmount < calcTotal) isPartial = true;
                  else if (monthPaymentInfo.status === 'Pago') isPaid = true; 
              }

              return { 
                ...e, 
                _benefitValue: calcTotal, 
                _dailyTotal: dailyTotal, 
                _cardDetails: cardDetails, 
                _parsedCards: parsedCards,
                _empAbsences: empAbsences, 
                _empBusinessDays: empBusinessDays,
                _isPaid: isPaid,
                _isPartial: isPartial,
                _paidAmount: paidAmount,
                _remainingAmount: remainingAmount,
                _paymentDetails: monthPaymentInfo
              };
            });
          } else if (activeSubTab === 'health') {
            currentList = filteredEmps.filter(e => e.healthInsurance === 'Sim').map(e => {
              const val = (Number(e.healthInsuranceValue) || 0) + (e.hasDependents === 'Sim' ? (Number(e.dependentsValue) || 0) : 0);
              totalValue += val;
              return { ...e, _benefitValue: val, _details: e.hasDependents === 'Sim' ? `${e.dependentsCount || 0} dependente(s)` : 'Sem dependentes' };
            });
          } else if (activeSubTab === 'fuel') {
            currentList = filteredEmps.filter(e => e.fuelAllowance === 'Sim').map(e => {
              let empBusinessDays = monthData.baseMonToFri;
              if (e.saturdayShift === 'Todos os sábados') empBusinessDays += monthData.allSats;
              else if (e.saturdayShift === 'Sábados alternados') {
                  if (e.saturdayShiftTeam && e.saturdayShiftTeam.includes('Escala 1')) empBusinessDays += monthData.escala1Sats;
                  else if (e.saturdayShiftTeam && e.saturdayShiftTeam.includes('Escala 2')) empBusinessDays += monthData.escala2Sats;
              }

              let dailyTotal = Number(e.fuelAllowanceValue) || 0;
              const empAbsences = Number(localFuelAbsences[e.id]) || 0;
              const payableDays = Math.max(0, empBusinessDays - empAbsences);
              
              const monthPaymentInfo = e.fuelPayments?.[monthKey];
              let calcTotal = 0;

              if (monthPaymentInfo && monthPaymentInfo.lockedTotal !== undefined) {
                 calcTotal = monthPaymentInfo.lockedTotal;
                 dailyTotal = monthPaymentInfo.lockedDailyTotal;
                 empBusinessDays = monthPaymentInfo.lockedBusinessDays || empBusinessDays;
              } else {
                 calcTotal = dailyTotal * payableDays;
              }

              totalValue += calcTotal;
              const isPaid = monthPaymentInfo?.status === 'Pago';

              return { 
                ...e, 
                _benefitValue: calcTotal, 
                _dailyTotal: dailyTotal, 
                _empAbsences: empAbsences, 
                _empBusinessDays: empBusinessDays,
                _isPaid: isPaid,
                _paymentDetails: monthPaymentInfo
              };
            });
          } else if (activeSubTab === 'food') {
            currentList = filteredEmps.filter(e => e.foodVoucher === 'Sim').map(e => {
              let empBusinessDays = monthData.baseMonToFri;
              if (e.saturdayShift === 'Todos os sábados') empBusinessDays += monthData.allSats;
              else if (e.saturdayShift === 'Sábados alternados') {
                  if (e.saturdayShiftTeam && e.saturdayShiftTeam.includes('Escala 1')) empBusinessDays += monthData.escala1Sats;
                  else if (e.saturdayShiftTeam && e.saturdayShiftTeam.includes('Escala 2')) empBusinessDays += monthData.escala2Sats;
              }

              let dailyTotal = Number(e.foodVoucherValue) || 0;
              const empAbsences = Number(localFoodAbsences[e.id]) || 0;
              const payableDays = Math.max(0, empBusinessDays - empAbsences);
              
              const empRewardEnabled = localFoodRewardEnabled[e.id] || false;
              const empRewardValue = Number(localFoodRewardValue[e.id]) || 0;
              let rewardTotal = empRewardEnabled ? empRewardValue : 0;
              let vaTotal = dailyTotal * payableDays;

              const monthPaymentInfo = e.foodPayments?.[monthKey];
              let calcTotal = 0;

              if (monthPaymentInfo && monthPaymentInfo.lockedTotal !== undefined) {
                 calcTotal = monthPaymentInfo.lockedTotal;
                 dailyTotal = monthPaymentInfo.lockedDailyTotal;
                 empBusinessDays = monthPaymentInfo.lockedBusinessDays || empBusinessDays;
                 vaTotal = monthPaymentInfo.lockedVaTotal !== undefined ? monthPaymentInfo.lockedVaTotal : calcTotal;
                 rewardTotal = monthPaymentInfo.lockedRewardTotal !== undefined ? monthPaymentInfo.lockedRewardTotal : 0;
              } else {
                 calcTotal = vaTotal + rewardTotal;
              }

              totalValue += calcTotal;
              const isPaid = monthPaymentInfo?.status === 'Pago';

              return { 
                ...e, 
                _benefitValue: calcTotal, 
                _vaTotal: vaTotal,
                _rewardTotal: rewardTotal,
                _dailyTotal: dailyTotal, 
                _empAbsences: empAbsences, 
                _empBusinessDays: empBusinessDays,
                _isPaid: isPaid,
                _paymentDetails: monthPaymentInfo
              };
            });
          }

          if (filterStatus) {
            currentList = currentList.filter(e => {
                const status = e._isPaid ? 'Pago' : (e._isPartial ? 'Parcial' : 'Pendente');
                return status === filterStatus;
            });
          }

          // ====== CÁLCULO DE TOTAIS POR MÉTODO DE PAGAMENTO ======
          let paymentMethodTotals = {};
          if (activeSubTab === 'transport') {
             currentList.forEach(emp => {
                if (emp._paymentDetails && emp._paymentDetails.details) {
                   emp._paymentDetails.details.forEach(payment => {
                      const method = payment.method || 'Outro';
                      const amount = Number(payment.amount) || 0;
                      if (!paymentMethodTotals[method]) {
                         paymentMethodTotals[method] = 0;
                      }
                      paymentMethodTotals[method] += amount;
                   });
                }
             });
          }

          // Salvar Faltas de VT, Combustível e Alimentação
          const handleAbsenceBlur = async (empId, empName) => {
            if (!canWrite || !db) return;
            const val = Number(localAbsences[empId]) || 0;
            const origVal = Number(originalAbsences[empId]) || 0;
            if (val === origVal) return;

            try {
              const docRef = doc(db, `${basePath}/employees/${empId}`);
              await setDoc(docRef, { transportAbsences: { [monthKey]: val }, transportVerified: { [monthKey]: false }, lastModifiedByTransport: appUser.username }, { merge: true });
              setOriginalAbsences(prev => ({ ...prev, [empId]: val }));
              logAction('Atualização', 'Benefícios', `Lançou ${val} falta(s) para ${empName} no VT (${filterMonth}/${filterYear})`);
            } catch (err) { showToast('Erro ao guardar faltas.', 'error'); }
          };

          const handleFuelAbsenceBlur = async (empId, empName) => {
            if (!canWrite || !db) return;
            const val = Number(localFuelAbsences[empId]) || 0;
            const origVal = Number(originalFuelAbsences[empId]) || 0;
            if (val === origVal) return;

            try {
              const docRef = doc(db, `${basePath}/employees/${empId}`);
              await setDoc(docRef, { fuelAbsences: { [monthKey]: val }, fuelVerified: { [monthKey]: false }, lastModifiedByFuel: appUser.username }, { merge: true });
              setOriginalFuelAbsences(prev => ({ ...prev, [empId]: val }));
              logAction('Atualização', 'Benefícios', `Lançou ${val} falta(s) para ${empName} no Combustível (${filterMonth}/${filterYear})`);
            } catch (err) { showToast('Erro ao guardar faltas.', 'error'); }
          };

          const handleFoodAbsenceBlur = async (empId, empName) => {
            if (!canWrite || !db) return;
            const val = Number(localFoodAbsences[empId]) || 0;
            const origVal = Number(originalFoodAbsences[empId]) || 0;
            if (val === origVal) return;

            try {
              const docRef = doc(db, `${basePath}/employees/${empId}`);
              await setDoc(docRef, { foodAbsences: { [monthKey]: val }, foodVerified: { [monthKey]: false }, lastModifiedByFood: appUser.username }, { merge: true });
              setOriginalFoodAbsences(prev => ({ ...prev, [empId]: val }));
              logAction('Atualização', 'Benefícios', `Lançou ${val} falta(s) para ${empName} no Vale Alimentação (${filterMonth}/${filterYear})`);
            } catch (err) { showToast('Erro ao guardar faltas.', 'error'); }
          };

          // Salvar Premiação do Vale Alimentação
          const handleFoodRewardSave = async (empId, empName, isEnabled, value) => {
            if (!canWrite || !db) return;
            
            const newValObj = { enabled: isEnabled, value: value || '' };
            const origValObj = originalFoodRewards[empId] || { enabled: false, value: '' };

            if (newValObj.enabled === origValObj.enabled && newValObj.value === origValObj.value) return;

            try {
                const docRef = doc(db, `${basePath}/employees/${empId}`);
                await setDoc(docRef, { 
                  foodRewards: { [monthKey]: newValObj },
                  foodVerified: { [monthKey]: false },
                  lastModifiedByFood: appUser.username
                }, { merge: true });
                setOriginalFoodRewards(prev => ({ ...prev, [empId]: newValObj }));
                logAction('Atualização', 'Benefícios', `Atualizou premiação para ${empName} no Vale Alimentação (${filterMonth}/${filterYear})`);
            } catch (err) {
                showToast('Erro ao guardar premiação.', 'error');
            }
          };

          const handleVerifyBenefit = async (id, name, lastModifiedBy) => {
            if (lastModifiedBy === appUser.username) {
               showToast("A conferência de segurança deve ser realizada por outro utilizador.", "error"); return;
            }
            try {
              let updateData = {};
              if (activeSubTab === 'transport') updateData = { [`transportVerified.${monthKey}`]: true };
              else if (activeSubTab === 'fuel') updateData = { [`fuelVerified.${monthKey}`]: true };
              else if (activeSubTab === 'food') updateData = { [`foodVerified.${monthKey}`]: true };

              await updateDoc(doc(db, `${basePath}/employees/${id}`), updateData);
              logAction('Conferência', 'Benefícios', `Realizou a conferência do benefício (${activeSubTab}) de ${name} para ${filterMonth}/${filterYear}`);
              showToast('Dados conferidos com sucesso!');
            } catch (error) { showToast('Erro ao conferir dados.', 'error'); }
          };

          // ====== LÓGICA DE PAGAMENTO DO VT ======
          const openVtPayModal = (emp) => {
             setVtEmployeeToPay(emp);
             setVtPayForm([{ method: 'Site SpTrans', date: new Date().toLocaleDateString('pt-BR'), amount: (emp._remainingAmount || 0).toFixed(2) }]);
             setVtPayModalOpen(true);
          };

          const handleVtPayChange = (index, field, value) => {
             const newForm = [...vtPayForm]; newForm[index][field] = value; setVtPayForm(newForm);
          };

          const addVtPayMethod = () => setVtPayForm([...vtPayForm, { method: 'Site SpTrans', date: new Date().toLocaleDateString('pt-BR'), amount: '' }]);
          const removeVtPayMethod = (index) => setVtPayForm(vtPayForm.filter((_, i) => i !== index));

          const confirmVtPayment = async (e) => {
             e.preventDefault();
             if (!canWrite || !db || !vtEmployeeToPay) return;

             const hasEmpty = vtPayForm.some(p => !p.date || !p.amount || Number(p.amount) <= 0);
             if (hasEmpty) return showToast("Preencha a data e o valor corretamente.", "error");

             const currentDetails = vtEmployeeToPay._paymentDetails?.details || [];
             const newDetails = [...currentDetails, ...vtPayForm];
             const newPaidTotal = newDetails.reduce((a,b) => a + Number(b.amount || 0), 0);
             
             const isFullyPaid = newPaidTotal >= (vtEmployeeToPay._benefitValue - 0.01);
             const newStatus = isFullyPaid ? 'Pago' : 'Parcial';

             const lockedTotal = vtEmployeeToPay._paymentDetails?.lockedTotal !== undefined ? vtEmployeeToPay._paymentDetails.lockedTotal : vtEmployeeToPay._benefitValue;
             const lockedDailyTotal = vtEmployeeToPay._paymentDetails?.lockedDailyTotal !== undefined ? vtEmployeeToPay._paymentDetails.lockedDailyTotal : vtEmployeeToPay._dailyTotal;
             const lockedBusinessDays = vtEmployeeToPay._paymentDetails?.lockedBusinessDays !== undefined ? vtEmployeeToPay._paymentDetails.lockedBusinessDays : vtEmployeeToPay._empBusinessDays;
             const lockedCardDetails = vtEmployeeToPay._paymentDetails?.lockedCardDetails !== undefined ? vtEmployeeToPay._paymentDetails.lockedCardDetails : vtEmployeeToPay._cardDetails;
             const lockedParsedCards = vtEmployeeToPay._paymentDetails?.lockedParsedCards !== undefined ? vtEmployeeToPay._paymentDetails.lockedParsedCards : vtEmployeeToPay._parsedCards;

             try {
               await setDoc(doc(db, `${basePath}/employees/${vtEmployeeToPay.id}`), {
                  transportPayments: { [monthKey]: { status: newStatus, details: newDetails, lastPaidAt: new Date().toISOString(), lastPaidBy: appUser.name, lockedTotal, lockedDailyTotal, lockedBusinessDays, lockedCardDetails, lockedParsedCards } }
               }, { merge: true });
               logAction('Pagamento', 'Benefícios', `Registou pagamento ${newStatus === 'Pago' ? 'Integral' : 'Parcial'} de VT para ${vtEmployeeToPay.name} (${filterMonth}/${filterYear})`);
               showToast(newStatus === 'Pago' ? 'Pagamento de Vale Transporte concluído com sucesso!' : 'Pagamento parcial registado com sucesso.');
               setVtPayModalOpen(false);
             } catch(err) { showToast('Erro ao registar o pagamento.', 'error'); }
          };

          // ====== LÓGICA DE PAGAMENTO DE COMBUSTÍVEL (INDIVIDUAL E MASSA) ======
          const openFuelPayModal = (emp) => { setFuelEmployeeToPay(emp); setFuelPayDate(new Date().toLocaleDateString('pt-BR')); setFuelPayModalOpen(true); };
          const confirmFuelPayment = async (e) => {
             e.preventDefault();
             if (!canWrite || !db || !fuelEmployeeToPay) return;
             try {
               await setDoc(doc(db, `${basePath}/employees/${fuelEmployeeToPay.id}`), {
                  fuelPayments: { [monthKey]: { status: 'Pago', date: fuelPayDate, paidAt: new Date().toISOString(), paidBy: appUser.name, lockedTotal: fuelEmployeeToPay._benefitValue, lockedDailyTotal: fuelEmployeeToPay._dailyTotal, lockedBusinessDays: fuelEmployeeToPay._empBusinessDays } }
               }, { merge: true });
               logAction('Pagamento', 'Benefícios', `Registou pagamento de Combustível para ${fuelEmployeeToPay.name}`);
               showToast('Pagamento de Vale Combustível concluído!'); setFuelPayModalOpen(false);
             } catch(err) { showToast('Erro ao registar pagamento.', 'error'); }
          };

          const openFuelBulkModal = () => {
              setFuelBulkSelected(currentList.filter(e => !e._isPaid && e._benefitValue > 0 && e.fuelVerified?.[monthKey] !== false).map(e => e.id));
              setFuelBulkDate(new Date().toLocaleDateString('pt-BR')); setFuelBulkModalOpen(true);
          };
          const toggleFuelBulkSelect = (id) => setFuelBulkSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
          const confirmFuelBulkPayment = async (e) => {
              e.preventDefault(); if (!canWrite || !db || fuelBulkSelected.length === 0) return;
              try {
                  const promises = fuelBulkSelected.map(empId => {
                      const emp = currentList.find(x => x.id === empId);
                      return setDoc(doc(db, `${basePath}/employees/${empId}`), { fuelPayments: { [monthKey]: { status: 'Pago', date: fuelBulkDate, paidAt: new Date().toISOString(), paidBy: appUser.name, lockedTotal: emp._benefitValue, lockedDailyTotal: emp._dailyTotal, lockedBusinessDays: emp._empBusinessDays } } }, { merge: true });
                  });
                  await Promise.all(promises);
                  logAction('Pagamento', 'Benefícios', `Pagamento em massa de Combustível para ${fuelBulkSelected.length} colaborador(es)`);
                  showToast('Pagamentos em massa concluídos!'); setFuelBulkModalOpen(false);
              } catch(err) { showToast('Erro ao processar pagamentos.', 'error'); }
          };

          // ====== LÓGICA DE PAGAMENTO DE ALIMENTAÇÃO (INDIVIDUAL E MASSA) ======
          const openFoodPayModal = (emp) => { setFoodEmployeeToPay(emp); setFoodPayDate(new Date().toLocaleDateString('pt-BR')); setFoodPayModalOpen(true); };
          const confirmFoodPayment = async (e) => {
             e.preventDefault(); if (!canWrite || !db || !foodEmployeeToPay) return;
             try {
               await setDoc(doc(db, `${basePath}/employees/${foodEmployeeToPay.id}`), {
                  foodPayments: { [monthKey]: { status: 'Pago', date: foodPayDate, paidAt: new Date().toISOString(), paidBy: appUser.name, lockedTotal: foodEmployeeToPay._benefitValue, lockedVaTotal: foodEmployeeToPay._vaTotal, lockedRewardTotal: foodEmployeeToPay._rewardTotal, lockedDailyTotal: foodEmployeeToPay._dailyTotal, lockedBusinessDays: foodEmployeeToPay._empBusinessDays } }
               }, { merge: true });
               logAction('Pagamento', 'Benefícios', `Registou pagamento de Alimentação para ${foodEmployeeToPay.name}`);
               showToast('Pagamento de Vale Alimentação concluído!'); setFoodPayModalOpen(false);
             } catch(err) { showToast('Erro ao registar pagamento.', 'error'); }
          };

          const openFoodBulkModal = () => {
              setFoodBulkSelected(currentList.filter(e => !e._isPaid && e._benefitValue > 0 && e.foodVerified?.[monthKey] !== false).map(e => e.id));
              setFoodBulkDate(new Date().toLocaleDateString('pt-BR')); setFoodBulkModalOpen(true);
          };
          const toggleFoodBulkSelect = (id) => setFoodBulkSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
          const confirmFoodBulkPayment = async (e) => {
              e.preventDefault(); if (!canWrite || !db || foodBulkSelected.length === 0) return;
              try {
                  const promises = foodBulkSelected.map(empId => {
                      const emp = currentList.find(x => x.id === empId);
                      return setDoc(doc(db, `${basePath}/employees/${empId}`), { foodPayments: { [monthKey]: { status: 'Pago', date: foodBulkDate, paidAt: new Date().toISOString(), paidBy: appUser.name, lockedTotal: emp._benefitValue, lockedVaTotal: emp._vaTotal, lockedRewardTotal: emp._rewardTotal, lockedDailyTotal: emp._dailyTotal, lockedBusinessDays: emp._empBusinessDays } } }, { merge: true });
                  });
                  await Promise.all(promises);
                  logAction('Pagamento', 'Benefícios', `Pagamento em massa de Alimentação para ${foodBulkSelected.length} colaborador(es)`);
                  showToast('Pagamentos em massa concluídos!'); setFoodBulkModalOpen(false);
              } catch(err) { showToast('Erro ao processar pagamentos.', 'error'); }
          };

          // ====== LÓGICA DE PREMIAÇÃO EM MASSA (ALIMENTAÇÃO) ======
          const confirmFoodRewardBulk = async (e) => {
              e.preventDefault();
              if (!canWrite || !db) return;
              if (!foodRewardBulkValue || Number(foodRewardBulkValue) <= 0) {
                  showToast('Digite um valor válido para a premiação.', 'error');
                  return;
              }

              const empsToUpdate = currentList.filter(emp => !emp._isPaid);
              if (empsToUpdate.length === 0) {
                  showToast('Nenhum colaborador elegível (não pago) na listagem atual.', 'error');
                  return;
              }

              const newValObj = { enabled: true, value: foodRewardBulkValue };
              
              try {
                  const promises = empsToUpdate.map(emp => {
                      const docRef = doc(db, `${basePath}/employees/${emp.id}`);
                      return setDoc(docRef, {
                          foodRewards: { [monthKey]: newValObj },
                          foodVerified: { [monthKey]: false },
                          lastModifiedByFood: appUser.username
                      }, { merge: true });
                  });

                  await Promise.all(promises);

                  const newEnabled = { ...localFoodRewardEnabled };
                  const newValue = { ...localFoodRewardValue };
                  const newOriginal = { ...originalFoodRewards };

                  empsToUpdate.forEach(emp => {
                      newEnabled[emp.id] = true;
                      newValue[emp.id] = foodRewardBulkValue;
                      newOriginal[emp.id] = newValObj;
                  });

                  setLocalFoodRewardEnabled(newEnabled);
                  setLocalFoodRewardValue(newValue);
                  setOriginalFoodRewards(newOriginal);

                  logAction('Atualização', 'Benefícios', `Aplicou premiação em massa de R$ ${foodRewardBulkValue} para ${empsToUpdate.length} colaborador(es) no Vale Alimentação (${filterMonth}/${filterYear})`);
                  showToast(`Premiação aplicada para ${empsToUpdate.length} colaborador(es)!`);
                  setFoodRewardBulkModalOpen(false);
                  setFoodRewardBulkValue('');
              } catch (err) {
                  showToast('Erro ao aplicar premiação em massa.', 'error');
              }
          };

          // ====== IMPRESSÃO DE RECIBOS EM MASSA ======
          const handlePrint = async () => {
            const empsToPrint = currentList.filter(e => e._benefitValue > 0).sort((a,b) => (a.name || '').localeCompare(b.name || ''));
            if (empsToPrint.length === 0) {
              showToast('Nenhum colaborador na listagem atual possui valor para emissão de recibo.', 'error'); return;
            }

            const receiptsToPrint = [];
            empsToPrint.forEach(emp => {
                if (activeSubTab === 'food') {
                    if (emp._vaTotal > 0) {
