        function ReportsView({ theme, employees, payments }) {
          const todayDate = new Date();
          
          // Ajustado para iniciar sempre mostrando o dia atual
          const [filterType, setFilterType] = useState('dia');
          const [filterDay, setFilterDay] = useState(todayDate.toLocaleDateString('pt-BR'));
          const [filterMonth, setFilterMonth] = useState(String(todayDate.getMonth() + 1).padStart(2, '0'));
          const [filterYear, setFilterYear] = useState(String(todayDate.getFullYear()));
          const [activeDetailTab, setActiveDetailTab] = useState('payments');

          const getPartsFromISO = (iso) => {
            if (!iso) return null;
            const d = new Date(iso);
            if (isNaN(d.getTime())) return null;
            return {
              d: String(d.getDate()).padStart(2, '0'),
              m: String(d.getMonth() + 1).padStart(2, '0'),
              y: String(d.getFullYear())
            };
          };

          const getPartsFromBRStr = (str) => {
            if (!str || str.length < 10) return null;
            const [d, m, y] = str.split('/');
            if (!d || !m || !y) return null;
            return { d, m, y };
          };

          const yearOptions = useMemo(() => {
            const years = new Set([String(todayDate.getFullYear())]);
            employees.forEach(e => {
              if (e.createdAt) years.add(getPartsFromISO(e.createdAt)?.y);
              if (e.terminationDate) years.add(getPartsFromBRStr(e.terminationDate)?.y);
            });
            payments.forEach(p => {
              if (p.paidAt) years.add(getPartsFromISO(p.paidAt)?.y);
            });
            return Array.from(years).filter(Boolean).sort((a,b) => b.localeCompare(a)).map(y => ({value: y, label: y}));
          }, [employees, payments]);

          const monthOptions = [
            { value: '01', label: 'Janeiro' }, { value: '02', label: 'Fevereiro' }, { value: '03', label: 'Março' },
            { value: '04', label: 'Abril' }, { value: '05', label: 'Maio' }, { value: '06', label: 'Junho' },
            { value: '07', label: 'Julho' }, { value: '08', label: 'Agosto' }, { value: '09', label: 'Setembro' },
            { value: '10', label: 'Outubro' }, { value: '11', label: 'Novembro' }, { value: '12', label: 'Dezembro' }
          ];

          const matchesFilter = (dateParts) => {
            if (!dateParts) return false;
            if (filterType === 'dia') {
              return `${dateParts.d}/${dateParts.m}/${dateParts.y}` === filterDay;
            } else if (filterType === 'mes') {
              return dateParts.m === filterMonth && dateParts.y === filterYear;
            } else if (filterType === 'ano') {
              return dateParts.y === filterYear;
            }
            return false;
          };

          const filteredPayments = payments.filter(p => p.status === 'Pago' && matchesFilter(getPartsFromISO(p.paidAt)));
          const filteredHires = employees.filter(e => matchesFilter(getPartsFromISO(e.createdAt)));
          const filteredFired = employees.filter(e => e.status === 'Desligado' && matchesFilter(getPartsFromBRStr(e.terminationDate)));

          const totalPaymentsAmount = filteredPayments.reduce((acc, p) => acc + Number(p.amount), 0);

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <header className="mb-8">
                <h2 className="text-3xl font-bold tracking-tight">Relatórios & Métricas</h2>
                <p className="text-slate-500 dark:text-slate-400 mt-1">Análise os registros e as saídas financeiras por período.</p>
              </header>

              <Card className="p-4 md:p-6 relative z-30">
                <div className="flex flex-col md:flex-row items-end gap-4">
                  <Select 
                    label="Visualizar por" theme={theme} className="w-full md:w-48"
                    value={filterType} 
                    onChange={e => {
                      const val = e.target.value;
                      setFilterType(val);
                      
                      // Restaura sempre para a data atual ao trocar de filtro
                      const now = new Date();
                      if (val === 'mes') {
                        setFilterMonth(String(now.getMonth() + 1).padStart(2, '0'));
                        setFilterYear(String(now.getFullYear()));
                      } else if (val === 'ano') {
                        setFilterYear(String(now.getFullYear()));
                      } else if (val === 'dia') {
                        setFilterDay(now.toLocaleDateString('pt-BR'));
                      }
                    }}
                    options={[ {value: 'dia', label: 'Dia Específico'}, {value: 'mes', label: 'Mês'}, {value: 'ano', label: 'Ano'} ]} 
                  />
                  
                  {filterType === 'dia' && (
                    <Input 
                      label="Data Desejada" placeholder="DD/MM/AAAA" theme={theme} className="w-full md:w-48"
                      value={filterDay} onChange={e => setFilterDay(formatDateInput(e.target.value))} 
                    />
                  )}

                  {filterType === 'mes' && (
                    <Select 
                      label="Selecione o Mês" theme={theme} className="w-full md:w-48"
                      value={filterMonth} onChange={e => setFilterMonth(e.target.value)}
                      options={monthOptions} 
                    />
                  )}

                  {(filterType === 'mes' || filterType === 'ano') && (
                    <Select 
                      label="Selecione o Ano" theme={theme} className="w-full md:w-48"
                      value={filterYear} onChange={e => setFilterYear(e.target.value)}
                      options={yearOptions} 
                    />
                  )}
                </div>
              </Card>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10">
                <Card className="p-6 flex flex-col justify-center gap-2 border-l-4 border-emerald-500 transition-transform hover:-translate-y-1">
                  <div className="flex items-center gap-3 text-emerald-600 dark:text-emerald-400 mb-2">
                    <div className="p-3 bg-emerald-100 dark:bg-emerald-900/30 rounded-xl"><DollarSign size={24} /></div>
                    <span className="font-bold text-sm uppercase tracking-wider">Pagamentos Efetuados</span>
                  </div>
                  <h3 className="text-4xl font-black text-slate-800 dark:text-white">{filteredPayments.length}</h3>
                  <p className="text-sm font-medium text-slate-500 mt-1">Total: {formatCurrency(totalPaymentsAmount)}</p>
                </Card>

                <Card className="p-6 flex flex-col justify-center gap-2 border-l-4 border-blue-500 transition-transform hover:-translate-y-1">
                  <div className="flex items-center gap-3 text-blue-600 dark:text-blue-400 mb-2">
                    <div className="p-3 bg-blue-100 dark:bg-blue-900/30 rounded-xl"><UserPlus size={24} /></div>
                    <span className="font-bold text-sm uppercase tracking-wider">Novos Colaboradores</span>
                  </div>
                  <h3 className="text-4xl font-black text-slate-800 dark:text-white">{filteredHires.length}</h3>
                  <p className="text-sm font-medium text-slate-500 mt-1">Registros efetuados no sistema</p>
                </Card>

                <Card className="p-6 flex flex-col justify-center gap-2 border-l-4 border-rose-500 transition-transform hover:-translate-y-1">
                  <div className="flex items-center gap-3 text-rose-600 dark:text-rose-400 mb-2">
                    <div className="p-3 bg-rose-100 dark:bg-rose-900/30 rounded-xl"><UserMinus size={24} /></div>
                    <span className="font-bold text-sm uppercase tracking-wider">Desligamentos</span>
                  </div>
                  <h3 className="text-4xl font-black text-slate-800 dark:text-white">{filteredFired.length}</h3>
                  <p className="text-sm font-medium text-slate-500 mt-1">Processos de rescisão no período</p>
                </Card>
              </div>

              <Card className="p-2 mt-8 relative z-10">
                <div className="flex gap-2 p-2 bg-slate-100/50 dark:bg-slate-800/30 border-b border-slate-200 dark:border-slate-700 overflow-x-auto custom-scrollbar">
                  <button onClick={() => setActiveDetailTab('payments')} className={`whitespace-nowrap px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeDetailTab === 'payments' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Listagem de Pagamentos</button>
                  <button onClick={() => setActiveDetailTab('hires')} className={`whitespace-nowrap px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeDetailTab === 'hires' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Listagem de Admissões</button>
                  <button onClick={() => setActiveDetailTab('fired')} className={`whitespace-nowrap px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeDetailTab === 'fired' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Listagem de Desligamentos</button>
                </div>
                
                <div className="overflow-x-auto custom-scrollbar p-2 max-h-[500px]">
                  {activeDetailTab === 'payments' && (
                    <table className="w-full text-left border-collapse min-w-[600px]">
                      <thead>
                        <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                          <th className="p-4 font-medium">Data do Pagto.</th>
                          <th className="p-4 font-medium">Destinatário</th>
                          <th className="p-4 font-medium">Tipo</th>
                          <th className="p-4 font-medium text-right">Valor</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredPayments.sort((a, b) => new Date(b.paidAt) - new Date(a.paidAt)).map(pay => {
                          const emp = pay.category === 'other' ? null : employees.find(e => e.id === pay.employeeId);
                          const isRec = pay.isRecurring;
                          return (
                            <tr key={pay.id} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
                              <td className="p-4 text-sm">{new Date(pay.paidAt).toLocaleDateString('pt-BR')}</td>
                              <td className="p-4 font-medium">
                                <div className="flex items-center gap-1.5">
                                  {pay.category === 'other' ? pay.payeeName : (emp?.name || 'Desconhecido')}
                                  {isRec && <RefreshCw size={12} className="text-blue-500" title="Pagamento Recorrente" />}
                                </div>
                              </td>
                              <td className="p-4 text-sm text-slate-600 dark:text-slate-400">{pay.type}</td>
                              <td className="p-4 text-right font-bold text-emerald-600 dark:text-emerald-400">{formatCurrency(pay.amount)}</td>
                            </tr>
                          )
                        })}
                        {filteredPayments.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-500 italic">Nenhum pagamento efetuado no período selecionado.</td></tr>}
                      </tbody>
                    </table>
                  )}

                  {activeDetailTab === 'hires' && (
                    <table className="w-full text-left border-collapse min-w-[600px]">
                      <thead>
                        <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                          <th className="p-4 font-medium">Data de Registro</th>
                          <th className="p-4 font-medium">Nome do Colaborador</th>
                          <th className="p-4 font-medium">Cargo</th>
                          <th className="p-4 font-medium">Unidade / Setor</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredHires.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(emp => (
                          <tr key={emp.id} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
                            <td className="p-4 text-sm">{new Date(emp.createdAt).toLocaleDateString('pt-BR')}</td>
                            <td className="p-4 font-medium">{emp.name}</td>
                            <td className="p-4 text-sm text-slate-600 dark:text-slate-400">{emp.role}</td>
                            <td className="p-4 text-sm text-slate-600 dark:text-slate-400">{emp.unit} - {emp.workSector}</td>
                          </tr>
                        ))}
                        {filteredHires.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-500 italic">Nenhum novo colaborador registrado no período selecionado.</td></tr>}
                      </tbody>
                    </table>
                  )}

                  {activeDetailTab === 'fired' && (
                    <table className="w-full text-left border-collapse min-w-[600px]">
                      <thead>
                        <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                          <th className="p-4 font-medium">Data do Desligamento</th>
                          <th className="p-4 font-medium">Nome do Colaborador</th>
                          <th className="p-4 font-medium">Motivo</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredFired.map(emp => (
                          <tr key={emp.id} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
                            <td className="p-4 text-sm text-rose-600 dark:text-rose-400 font-medium">{emp.terminationDate}</td>
                            <td className="p-4 font-medium">{emp.name}</td>
                            <td className="p-4 text-sm text-slate-600 dark:text-slate-400">{emp.terminationReason}</td>
                          </tr>
                        ))}
                        {filteredFired.length === 0 && <tr><td colSpan="3" className="p-8 text-center text-slate-500 italic">Nenhum desligamento ocorreu no período selecionado.</td></tr>}
                      </tbody>
                    </table>
                  )}
                </div>
              </Card>
            </div>
          );
        }

        function CalendarView({ theme, appUser, events, showToast, logAction, requestConfirm }) {
          const [currentDate, setCurrentDate] = useState(new Date());
          const [selectedDateStr, setSelectedDateStr] = useState(null);
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [formData, setFormData] = useState({ title: '', time: '', type: 'Lembrete', description: '' });

          const canWrite = appUser?.permissions?.calendar?.write;
          const canDelete = appUser?.permissions?.calendar?.delete;

          const EVENT_TYPES = {
            'Pagamento': { bg: 'bg-emerald-100 dark:bg-emerald-900/40', text: 'text-emerald-700 dark:text-emerald-400', border: 'border-emerald-200 dark:border-emerald-800' },
            'Fechamento': { bg: 'bg-blue-100 dark:bg-blue-900/40', text: 'text-blue-700 dark:text-blue-400', border: 'border-blue-200 dark:border-blue-800' },
            'Reunião': { bg: 'bg-purple-100 dark:bg-purple-900/40', text: 'text-purple-700 dark:text-purple-400', border: 'border-purple-200 dark:border-purple-800' },
            'Lembrete': { bg: 'bg-amber-100 dark:bg-amber-900/40', text: 'text-amber-700 dark:text-amber-400', border: 'border-amber-200 dark:border-amber-800' },
            'Feriado': { bg: 'bg-rose-100 dark:bg-rose-900/40', text: 'text-rose-700 dark:text-rose-400', border: 'border-rose-200 dark:border-rose-800' },
          };

          const TIME_OPTIONS = [
            { value: '', label: 'Sem horário definido' },
            { value: '08:30', label: '08:30' },
            { value: '09:00', label: '09:00' },
            { value: '09:30', label: '09:30' },
            { value: '10:00', label: '10:00' },
            { value: '10:30', label: '10:30' },
            { value: '11:00', label: '11:00' },
            { value: '11:30', label: '11:30' },
            { value: '12:00', label: '12:00' },
            { value: '12:30', label: '12:30' },
            { value: '13:00', label: '13:00' },
            { value: '13:30', label: '13:30' },
            { value: '14:00', label: '14:00' },
            { value: '14:30', label: '14:30' },
            { value: '15:00', label: '15:00' },
            { value: '15:30', label: '15:30' },
            { value: '16:00', label: '16:00' },
            { value: '16:30', label: '16:30' },
            { value: '17:00', label: '17:00' },
            { value: '17:30', label: '17:30' }
          ];

          const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
          const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

          const year = currentDate.getFullYear();
          const month = currentDate.getMonth();
          const daysInMonth = getDaysInMonth(year, month);
          const firstDay = getFirstDayOfMonth(year, month);

          const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
          const dayNames = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

          const blanks = Array(firstDay).fill(null);
          const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);

          const formatStr = (y, m, d) => `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

          const today = new Date();
          const todayStr = formatStr(today.getFullYear(), today.getMonth() + 1, today.getDate());

          const handleNextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
          const handlePrevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
          
          const openDayModal = (d) => {
            setSelectedDateStr(formatStr(year, month + 1, d));
            setFormData({ title: '', time: '', type: 'Lembrete', description: '' });
            setIsModalOpen(true);
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite) return;
            try {
              await addDoc(collection(db, `${basePath}/events`), {
                date: selectedDateStr,
                title: formData.title,
                time: formData.time,
                type: formData.type,
                description: formData.description
              });
              logAction('Cadastro', 'Agenda', `Adicionou evento: ${formData.title} para ${selectedDateStr}`);
              showToast('Evento adicionado!');
              setFormData({ title: '', time: '', type: 'Lembrete', description: '' });
            } catch (err) {
              showToast('Erro ao salvar evento.', 'error');
            }
          };

          const handleDelete = (id, title) => {
            if (!canDelete) return;
            requestConfirm('Excluir este evento?', async () => {
              try {
                await deleteDoc(doc(db, `${basePath}/events/${id}`));
                logAction('Exclusão', 'Agenda', `Removeu o evento: ${title}`);
                showToast('Evento removido.');
              } catch (err) {
                showToast('Erro ao remover.', 'error');
              }
            });
          };

          const selectedDayEvents = events.filter(e => e.date === selectedDateStr).sort((a,b) => (a.time || '').localeCompare(b.time || ''));
          const selectedDateFormatted = selectedDateStr ? selectedDateStr.split('-').reverse().join('/') : '';

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Agenda Corporativa</h2>
                  <p className="text-slate-500 mt-1">Acompanhe pagamentos, fechamentos e datas importantes.</p>
                </div>
                <div className="flex items-center gap-3 bg-white/70 dark:bg-slate-800/70 p-1.5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                  <button onClick={handlePrevMonth} className="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                    <ChevronLeft size={20} />
                  </button>
                  <div className="w-40 text-center font-bold text-slate-800 dark:text-slate-100 uppercase tracking-wide text-sm">
                    {monthNames[month]} {year}
                  </div>
                  <button onClick={handleNextMonth} className="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                    <ChevronRight size={20} />
                  </button>
                </div>
              </div>

              <Card className="p-2 sm:p-4 md:p-6 w-full relative z-10">
                <div className="w-full pb-2">
                  <div className="grid grid-cols-7 gap-1 sm:gap-2 md:gap-4">
                    {dayNames.map(d => (
                      <div key={d} className="text-center text-[10px] sm:text-xs md:text-sm font-bold text-slate-500 uppercase tracking-wider pb-1">{d}</div>
                    ))}
                    {blanks.map((_, i) => (
                      <div key={`blank-${i}`} className="min-w-0 min-h-[60px] sm:min-h-[80px] md:min-h-[120px] rounded-xl sm:rounded-2xl bg-slate-50/50 dark:bg-slate-900/20 border border-transparent"></div>
                    ))}
                    {days.map(d => {
                      const dateStr = formatStr(year, month + 1, d);
                      const dayEvents = events.filter(e => e.date === dateStr).sort((a,b) => (a.time || '').localeCompare(b.time || ''));
                      const isToday = dateStr === todayStr;

                      return (
                        <div 
                          key={d} 
                          onClick={() => openDayModal(d)}
                          className={`min-w-0 min-h-[60px] sm:min-h-[80px] md:min-h-[120px] p-1 sm:p-1.5 md:p-3 rounded-xl sm:rounded-2xl border transition-all cursor-pointer flex flex-col group
                            ${isToday ? `border-${theme.main}-500 bg-${theme.main}-50 dark:bg-${theme.main}-900/20 shadow-md transform scale-[1.02]` : 'border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/30 hover:border-slate-300 dark:hover:border-slate-500 hover:bg-white dark:hover:bg-slate-800'}
                          `}
                        >
                          <div className={`text-right text-[10px] sm:text-sm md:text-base font-bold mb-0.5 sm:mb-1 md:mb-2 ${isToday ? `text-${theme.main}-600 dark:text-${theme.main}-400` : 'text-slate-700 dark:text-slate-300'}`}>
                            {d}
                          </div>
                          <div className="flex-1 flex flex-col gap-0.5 sm:gap-1 overflow-hidden min-w-0 w-full">
                            {dayEvents.slice(0, 3).map(ev => (
                              <div key={ev.id} className={`w-full text-[9px] sm:text-[10px] md:text-xs px-1 sm:px-1.5 py-0.5 rounded truncate font-medium border ${EVENT_TYPES[ev.type]?.bg} ${EVENT_TYPES[ev.type]?.text} ${EVENT_TYPES[ev.type]?.border}`} title={ev.title}>
                                {ev.time && <span className="hidden sm:inline mr-1 opacity-70">{ev.time}</span>}{ev.title}
                              </div>
                            ))}
                            {dayEvents.length > 3 && (
                              <div className="text-[9px] sm:text-[10px] text-center text-slate-500 font-medium pt-0.5">
                                +{dayEvents.length - 3} mais
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </Card>

              <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={`Agenda - ${selectedDateFormatted}`}>
                <div className="flex flex-col gap-6">
                  
                  <div className="space-y-3">
                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Eventos do Dia</h3>
                    {selectedDayEvents.length === 0 ? (
                      <p className="text-sm text-slate-500 italic p-4 text-center bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700">Nenhum compromisso marcado para este dia.</p>
                    ) : (
                      selectedDayEvents.map(ev => (
                        <div key={ev.id} className="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-sm flex items-start justify-between gap-4">
                          <div className="flex-1">
                            <div className="flex items-center gap-2 mb-1.5">
                              <span className={`text-[10px] px-2 py-0.5 rounded-md font-bold uppercase border ${EVENT_TYPES[ev.type]?.bg} ${EVENT_TYPES[ev.type]?.text} ${EVENT_TYPES[ev.type]?.border}`}>
                                {ev.type}
                              </span>
                              {ev.time && (
                                <span className="text-xs font-semibold text-slate-500 dark:text-slate-400 flex items-center gap-1">
                                  <Clock size={12} /> {ev.time}
                                </span>
                              )}
                            </div>
                            <h4 className="font-bold text-slate-800 dark:text-slate-100 text-base leading-tight">{ev.title}</h4>
                            {ev.description && <p className="text-sm text-slate-600 dark:text-slate-400 mt-1 whitespace-pre-wrap">{ev.description}</p>}
                          </div>
                          {canDelete && (
                            <button onClick={() => handleDelete(ev.id, ev.title)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-xl transition-colors">
                              <Trash2 size={18} />
                            </button>
                          )}
                        </div>
                      ))
                    )}
                  </div>

                  {canWrite && (
                    <form onSubmit={handleSave} className="p-5 rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 space-y-4">
                      <h3 className="text-sm font-bold text-slate-600 dark:text-slate-300 flex items-center gap-2 mb-2">
                        <Plus size={16} className={theme.text} /> Adicionar Novo Evento
                      </h3>
                      
                      <Input label="Título do Evento" theme={theme} required placeholder="Ex: Pagamento de Salários, Reunião Mensal..." value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                      
                      <div className="grid grid-cols-2 gap-4">
                        <Select 
                          label="Horário (Opcional)" 
                          theme={theme} 
                          value={formData.time} 
                          onChange={e => setFormData({...formData, time: e.target.value})}
                          options={TIME_OPTIONS}
                        />
                        <Select 
                          label="Tipo de Evento" theme={theme} required value={formData.type} 
                          onChange={e => setFormData({...formData, type: e.target.value})}
                          options={Object.keys(EVENT_TYPES).map(k => ({ value: k, label: k }))} 
                        />
                      </div>

                      <div className="flex flex-col gap-1">
                        <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Observações / Detalhes</label>
                        <textarea 
                          rows="2"
                          className={`w-full px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm custom-scrollbar`}
                          value={formData.description}
                          onChange={e => setFormData({...formData, description: e.target.value})}
                        />
                      </div>

                      <div className="flex justify-end pt-2">
                        <Button variant="primary" theme={theme} type="submit" className="w-full sm:w-auto">Salvar na Agenda</Button>
                      </div>
                    </form>
                  )}
                </div>
              </Modal>
            </div>
          );
        }

        function CompaniesView({ theme, basePath, appUser, companies, showToast, logAction, requestConfirm }) {
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingId, setEditingId] = useState(null);
          
          const initialFormState = {
            name: '', cnpj: '', stateRegistration: '', openingDate: '', regime: 'Simples Nacional',
            cep: '', street: '', number: '', complement: '', neighborhood: '', city: '', state: '',
            partners: [{ name: '', cpf: '' }]
          };
          
          const [formData, setFormData] = useState(initialFormState);

          const canWrite = appUser?.permissions?.companies?.write;
          const canDelete = appUser?.permissions?.companies?.delete;

          const openModal = (comp = null) => {
            if (!canWrite) return;
            if (comp) {
              setEditingId(comp.id);
              setFormData({ ...initialFormState, ...comp, partners: comp.partners || [{ name: '', cpf: '' }] });
            } else {
              setEditingId(null);
              setFormData(initialFormState);
            }
            setIsModalOpen(true);
          };

          const handleCepBlur = async () => {
            const cepNumber = formData.cep.replace(/\D/g, '');
            if (cepNumber.length === 8) {
              try {
                const res = await fetch(`https://viacep.com.br/ws/${cepNumber}/json/`);
                const data = await res.json();
                if (!data.erro) {
                  setFormData(prev => ({
                    ...prev,
                    street: data.logradouro || prev.street,
                    neighborhood: data.bairro || prev.neighborhood,
                    city: data.localidade || prev.city,
                    state: data.uf || prev.state
                  }));
                  showToast('Endereço preenchido via CEP!', 'success');
                }
              } catch (err) {
                console.error("Erro ao buscar CEP:", err);
              }
            }
          };

          const handlePartnerChange = (index, field, value) => {
            const newPartners = [...formData.partners];
            newPartners[index][field] = value;
            setFormData({ ...formData, partners: newPartners });
          };

          const addPartner = () => setFormData({...formData, partners: [...formData.partners, {name: '', cpf: ''}]});
          
          const removePartner = (index) => {
            requestConfirm('Tem certeza que deseja remover este sócio do quadro societário?', () => {
              setFormData(prev => ({...prev, partners: prev.partners.filter((_, i) => i !== index)}));
            });
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite) return;
            try {
              if (editingId) {
                await updateDoc(doc(db, `${basePath}/companies/${editingId}`), formData);
                logAction('Atualização', 'Empresas', `Atualizou a empresa ${formData.name}`);
                showToast('Empresa atualizada com sucesso!');
              } else {
                await addDoc(collection(db, `${basePath}/companies`), formData);
                logAction('Cadastro', 'Empresas', `Cadastrou a empresa ${formData.name}`);
                showToast('Empresa cadastrada com sucesso!');
              }
              setIsModalOpen(false);
            } catch (err) {
              showToast('Erro ao salvar dados.', 'error');
            }
          };

          const handleDelete = (id, name) => {
            if (!canDelete) return;
            requestConfirm(`Excluir a empresa ${name} do sistema?`, async () => {
              try {
                await deleteDoc(doc(db, `${basePath}/companies/${id}`));
                logAction('Exclusão', 'Empresas', `Removeu a empresa ${name}`);
                showToast('Empresa removida.');
              } catch (err) {
                showToast('Erro ao remover.', 'error');
              }
            });
          };

          // Ordena as empresas em ordem alfabética
          const sortedCompanies = [...companies].sort((a, b) => (a.name || '').localeCompare(b.name || ''));

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Empresas (CNPJs)</h2>
                  <p className="text-slate-500 mt-1">Gerencie os CNPJs para os quais os funcionários são registrados.</p>
                </div>
                {canWrite && <Button theme={theme} icon={Plus} onClick={() => openModal()}>Nova Empresa</Button>}
              </div>

              <Card className="overflow-hidden">
                <div className="overflow-x-auto custom-scrollbar">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                        <th className="p-4 font-medium">Nome da Empresa</th>
                        <th className="p-4 font-medium">CNPJ</th>
                        <th className="p-4 font-medium">Regime</th>
                        <th className="p-4 font-medium">Localização</th>
                        {(canWrite || canDelete) && <th className="p-4 font-medium text-right">Ações</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {sortedCompanies.map(comp => (
                        <tr key={comp.id} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                          <td className="p-4 font-medium text-slate-900 dark:text-white">{comp.name}</td>
                          <td className="p-4 text-slate-600 dark:text-slate-300">{comp.cnpj}</td>
                          <td className="p-4 text-slate-600 dark:text-slate-300">{comp.regime || '-'}</td>
                          <td className="p-4 text-slate-600 dark:text-slate-300">{comp.city ? `${comp.city}/${comp.state}` : '-'}</td>
                          {(canWrite || canDelete) && (
                            <td className="p-4 text-right space-x-2">
                              {canWrite && <button onClick={() => openModal(comp)} className="p-2 rounded-lg text-slate-500 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors"><Edit2 size={18} /></button>}
                              {canDelete && <button onClick={() => handleDelete(comp.id, comp.name)} className="p-2 rounded-lg text-slate-500 hover:text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-colors"><Trash2 size={18} /></button>}
                            </td>
                          )}
                        </tr>
                      ))}
                      {sortedCompanies.length === 0 && (
                        <tr><td colSpan={(canWrite || canDelete) ? "5" : "4"} className="p-8 text-center text-slate-500">Nenhuma empresa registrada. Registre sua primeira empresa.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </Card>

              <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={editingId ? 'Editar Empresa' : 'Nova Empresa'}>
                <form onSubmit={handleSave} className="space-y-6">
                  <div className="space-y-4">
                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Dados Básicos</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <Input label="Razão Social / Nome da Empresa" theme={theme} required value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                      <Input label="CNPJ" placeholder="00.000.000/0000-00" theme={theme} required value={formData.cnpj} onChange={e => setFormData({...formData, cnpj: formatCNPJMask(e.target.value)})} />
                      <Input label="Inscrição Estadual" theme={theme} value={formData.stateRegistration} onChange={e => setFormData({...formData, stateRegistration: e.target.value.replace(/\D/g, '')})} />
                      <Input label="Data de Abertura" placeholder="DD/MM/AAAA" theme={theme} required value={formData.openingDate} onChange={e => setFormData({...formData, openingDate: formatDateInput(e.target.value)})} />
                      <Select 
                        label="Regime Tributário" theme={theme} required value={formData.regime} 
                        onChange={e => setFormData({...formData, regime: e.target.value})}
                        options={[ {value: 'Simples Nacional', label: 'Simples Nacional'}, {value: 'Lucro Presumido', label: 'Lucro Presumido'}, {value: 'Lucro Real', label: 'Lucro Real'}, {value: 'MEI', label: 'MEI'}, {value: 'Outro', label: 'Outro'} ]} 
                      />
                    </div>
                  </div>

                  <div className="space-y-4 pt-4 border-t border-slate-200 dark:border-slate-700">
                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Endereço</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <Input label="CEP" placeholder="00000-000" theme={theme} required value={formData.cep} onChange={e => setFormData({...formData, cep: formatCEPMask(e.target.value)})} onBlur={handleCepBlur} />
                      <Input label="Rua / Logradouro" theme={theme} required className="md:col-span-2" value={formData.street} onChange={e => setFormData({...formData, street: e.target.value})} />
                      <Input label="Número" theme={theme} required value={formData.number} onChange={e => setFormData({...formData, number: e.target.value})} />
                      <Input label="Complemento" theme={theme} value={formData.complement} onChange={e => setFormData({...formData, complement: e.target.value})} />
                      <Input label="Bairro" theme={theme} required value={formData.neighborhood} onChange={e => setFormData({...formData, neighborhood: e.target.value})} />
                      <Input label="Cidade" theme={theme} required value={formData.city} onChange={e => setFormData({...formData, city: e.target.value})} />
                      <Input label="Estado (UF)" theme={theme} required value={formData.state} onChange={e => setFormData({...formData, state: e.target.value})} />
                    </div>
                  </div>

                  <div className="space-y-4 pt-4 border-t border-slate-200 dark:border-slate-700">
                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Quadro Societário</h3>
                    <div className="space-y-3 p-4 bg-slate-50/50 dark:bg-slate-800/30 rounded-2xl border border-slate-200 dark:border-slate-700">
                      {formData.partners.map((partner, index) => (
                        <div key={index} className="flex flex-col md:flex-row gap-4 items-end relative pb-4 mb-4 border-b border-slate-200/50 dark:border-slate-700/50 last:border-0 last:mb-0 last:pb-0">
                          <Input label={`Nome do Sócio ${index + 1}`} theme={theme} required className="flex-[2]" value={partner.name} onChange={e => handlePartnerChange(index, 'name', e.target.value)} />
                          <Input label="CPF" placeholder="000.000.000-00" theme={theme} required className="w-full md:w-48" value={partner.cpf} onChange={e => handlePartnerChange(index, 'cpf', formatCPFMask(e.target.value))} />
                          {formData.partners.length > 1 && (
                            <button type="button" onClick={() => removePartner(index)} className="p-2.5 mb-[2px] bg-red-100 text-red-600 rounded-xl hover:bg-red-200 transition-colors" title="Remover Sócio">
                              <X size={18} />
                            </button>
                          )}
                        </div>
                      ))}
                      <Button type="button" variant="ghost" theme={theme} icon={Plus} onClick={addPartner} className="w-full border border-dashed border-slate-300 dark:border-slate-600">
                        Adicionar outro sócio
                      </Button>
                    </div>
                  </div>

                  <div className="pt-6 flex justify-end gap-3 border-t border-slate-200 dark:border-slate-700">
                    <Button variant="ghost" theme={theme} type="button" onClick={() => setIsModalOpen(false)}>Cancelar</Button>
                    <Button variant="primary" theme={theme} type="submit">Salvar Empresa</Button>
                  </div>
                </form>
              </Modal>
            </div>
          );
        }

        function EmployeesView({ theme, basePath, appUser, employees, companies, showToast, logAction, requestConfirm }) {
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isImportModalOpen, setIsImportModalOpen] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [activeSubTab, setActiveSubTab] = useState('ativos');
          
          const SHIFT_TIME_OPTIONS = [
            { value: '08:00', label: '08:00' }, { value: '08:30', label: '08:30' },
            { value: '09:00', label: '09:00' }, { value: '09:30', label: '09:30' },
            { value: '10:00', label: '10:00' }, { value: '10:30', label: '10:30' },
            { value: '11:00', label: '11:00' }, { value: '11:30', label: '11:30' },
            { value: '12:00', label: '12:00' }, { value: '12:30', label: '12:30' },
            { value: '13:00', label: '13:00' }, { value: '13:30', label: '13:30' },
            { value: '14:00', label: '14:00' }, { value: '14:30', label: '14:30' },
            { value: '15:00', label: '15:00' }, { value: '15:30', label: '15:30' },
            { value: '16:00', label: '16:00' }, { value: '16:30', label: '16:30' },
            { value: '17:00', label: '17:00' }, { value: '17:30', label: '17:30' },
            { value: '18:00', label: '18:00' }, { value: '18:30', label: '18:30' },
            { value: '19:00', label: '19:00' }, { value: '19:30', label: '19:30' },
            { value: '20:00', label: '20:00' }, { value: '20:30', label: '20:30' },
            { value: '21:00', label: '21:00' }
          ];

          const initialFormState = {
            employeeType: 'Efetivo', freelanceStartDate: '', referredBy: '', observations: '', callFreelancer: 'Sim',
            name: '', birthDate: '', gender: 'Feminino', isMarried: 'Não', cpf: '', rg: '', contact: '', email: '',
            role: '', department: '', baseSalary: '', company: '', cnpj: '', unit: '', workSector: '',
            workShiftStart: '', workShiftEnd: '', admissionExamDate: '', probation45: '', probation90: '',
            saturdayShift: 'Não trabalha', saturdayShiftTeam: '',
            cep: '', street: '', number: '', complement: '', neighborhood: '', state: '',
            bankName: '', agency: '', account: '', pixType: 'CPF', pixKey: '',
            healthInsurance: 'Não', healthInsuranceValue: '', hasDependents: 'Não', dependentsCount: '', dependentsValue: '', fuelAllowance: 'Não', fuelAllowanceValue: '',
            foodVoucher: 'Não', foodVoucherValue: '',
            transportVoucher: 'Não', transportCards: [{ name: '', valuePerDay: '' }],
            hasChildren: 'Não', children: [{ name: '', birthDate: '' }],
            hasLoans: 'Não', loans: [{ loanMonth: '', deadlineMonth: '', totalAmount: '', installmentsCount: '', installmentValue: '' }],
            documents: [],
            status: 'Ativo', terminationDate: '', terminationReason: '',
            isContract: 'Não', contractStartDate: '', contractEndDate: ''
          };
          
          const [formData, setFormData] = useState(initialFormState);
          const [searchTerm, setSearchTerm] = useState('');
          const [visibleCount, setVisibleCount] = useState(50);

          useEffect(() => {
            setVisibleCount(50);
          }, [activeSubTab, searchTerm]);

          const canWrite = appUser?.permissions?.employees?.write;
          const canDelete = appUser?.permissions?.employees?.delete;
          
          const activeEmployees = employees.filter(e => e.status !== 'Desligado' && e.isContract !== 'Sim' && e.employeeType !== 'Freelancer');
          const contractEmployees = employees.filter(e => e.status !== 'Desligado' && e.isContract === 'Sim' && e.employeeType !== 'Freelancer');
          const freelanceEmployees = employees.filter(e => e.status !== 'Desligado' && e.employeeType === 'Freelancer');
          const terminatedEmployees = employees.filter(e => e.status === 'Desligado');
          const loanEmployees = employees.filter(e => e.status !== 'Desligado' && e.hasLoans === 'Sim' && e.loans && e.loans.length > 0);
          
          let currentList = activeEmployees;
          if (activeSubTab === 'contratos') currentList = contractEmployees;
          if (activeSubTab === 'freelancers') currentList = freelanceEmployees;
          if (activeSubTab === 'desligados') currentList = terminatedEmployees;
          if (activeSubTab === 'emprestimos') currentList = loanEmployees;

          const filtered = currentList.filter(e => e.name.toLowerCase().includes(searchTerm.toLowerCase()) || e.cpf.includes(searchTerm));
          const sortedFiltered = [...filtered].sort((a, b) => a.name.localeCompare(b.name));
          const displayedEmployees = sortedFiltered.slice(0, visibleCount);

          const openModal = (emp = null) => {
            if (!canWrite) return;
            if (emp) {
              setEditingId(emp.id);
              setFormData({ ...initialFormState, ...emp }); 
            } else {
              setEditingId(null);
              setFormData(initialFormState);
            }
            setIsModalOpen(true);
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite) return;

            const payload = {
              ...formData,
              isVerifiedProfile: false, // FLAG ISOLADA DE PERFIL
              lastModifiedBy: appUser.username
            };

            try {
              if (editingId) {
                await updateDoc(doc(db, `${basePath}/employees/${editingId}`), payload);
                logAction('Atualização', 'Colaboradores', `Atualizou os dados de ${formData.name}`);
                showToast('Funcionário atualizado com sucesso!');
              } else {
                await addDoc(collection(db, `${basePath}/employees`), { ...payload, createdAt: new Date().toISOString() });
                logAction('Cadastro', 'Colaboradores', `Cadastrou o colaborador ${formData.name}`);
                showToast('Funcionário adicionado com sucesso!');
              }
              setIsModalOpen(false);
            } catch (err) {
              showToast('Erro ao salvar dados.', 'error');
            }
          };

          const handleVerify = async (id, name, lastModifiedBy) => {
            if (lastModifiedBy === appUser.username) {
               showToast("A conferência de segurança deve ser realizada por outro usuário.", "error");
               return;
            }
            try {
              await updateDoc(doc(db, `${basePath}/employees/${id}`), {
                isVerifiedProfile: true, // FLAG ISOLADA DE PERFIL
                profileVerifiedBy: appUser.name,
                profileVerifiedAt: new Date().toISOString()
              });
              logAction('Conferência', 'Colaboradores', `Realizou a conferência do cadastro de ${name}`);
              showToast('Cadastro conferido com sucesso!');
            } catch (error) {
              showToast('Erro ao conferir cadastro.', 'error');
            }
          };

          const handleDelete = (id) => {
            if (!canDelete) return;
            requestConfirm('Excluir este funcionário e todos os seus dados?', async () => {
              const emp = employees.find(e => e.id === id);
              try {
                await deleteDoc(doc(db, `${basePath}/employees/${id}`));
                logAction('Exclusão', 'Colaboradores', `Removeu o colaborador ${emp?.name || id}`);
                showToast('Funcionário removido.');
              } catch (err) {
                showToast('Erro ao remover.', 'error');
              }
            });
          };

          const handleCepBlur = async () => {
            const cepNumber = formData.cep.replace(/\D/g, '');
            if (cepNumber.length === 8) {
              try {
                const res = await fetch(`https://viacep.com.br/ws/${cepNumber}/json/`);
                const data = await res.json();
                if (!data.erro) {
                  setFormData(prev => ({
                    ...prev,
                    street: data.logradouro || prev.street,
                    neighborhood: data.bairro || prev.neighborhood,
                    state: data.uf || prev.state
                  }));
                  showToast('Endereço preenchido via CEP!', 'success');
                }
              } catch (err) {
                console.error("Erro ao buscar CEP:", err);
              }
            }
          };

          const handleChildChange = (index, field, value) => {
            const newChildren = [...formData.children];
            newChildren[index][field] = value;
            setFormData({ ...formData, children: newChildren });
          };

          const addChild = () => setFormData({...formData, children: [...formData.children, {name: '', birthDate: ''}]});
          
          const removeChild = (index) => {
            requestConfirm('Tem certeza que deseja remover este dependente?', () => {
              setFormData(prev => ({...prev, children: prev.children.filter((_, i) => i !== index)}));
            });
          };

          const handleLoanChange = (index, field, value) => {
            const newLoans = [...(formData.loans || [])];
            newLoans[index][field] = value;
            setFormData({ ...formData, loans: newLoans });
          };

          const addLoan = () => setFormData({...formData, loans: [...(formData.loans || []), { loanMonth: '', deadlineMonth: '', totalAmount: '', installmentsCount: '', installmentValue: '' }]});
          
          const removeLoan = (index) => {
            requestConfirm('Tem certeza que deseja remover este empréstimo?', () => {
              setFormData(prev => ({...prev, loans: (prev.loans || []).filter((_, i) => i !== index)}));
            });
          };

          const handleTransportCardChange = (index, field, value) => {
            const newCards = [...(formData.transportCards || [])];
            newCards[index][field] = value;
            setFormData({ ...formData, transportCards: newCards });
          };

          const addTransportCard = () => {
            setFormData({...formData, transportCards: [...(formData.transportCards || []), { name: '', valuePerDay: '' }]});
          };
          
          const removeTransportCard = (index) => {
            requestConfirm('Tem certeza que deseja remover este cartão de transporte?', () => {
              setFormData(prev => ({...prev, transportCards: (prev.transportCards || []).filter((_, i) => i !== index)}));
            });
          };

          const handleDocumentUpload = async (e) => {
            const files = Array.from(e.target.files);
            const newDocs = [];

            for (const file of files) {
              if (file.size > 5 * 1024 * 1024) { 
                showToast(`O arquivo ${file.name} excede o limite de 5MB.`, 'error');
                continue;
              }
              try {
                const fileId = generateId();
                const fileRef = ref(storage, `documents/${fileId}_${file.name}`);
                await uploadBytes(fileRef, file);
                const url = await getDownloadURL(fileRef);
                newDocs.push({
                  id: fileId,
                  name: file.name,
                  type: file.type,
                  url: url
                });
              } catch (err) {
                showToast(`Erro ao processar ${file.name}`, 'error');
              }
            }

            if (newDocs.length > 0) {
              setFormData(prev => ({
                ...prev,
                documents: [...(prev.documents || []), ...newDocs]
              }));
              const docNames = newDocs.map(d => d.name).join(', ');
              logAction('Anexo', 'Colaboradores', `Anexou documento(s): ${docNames}`);
              showToast(`${newDocs.length} documento(s) anexado(s) com sucesso!`);
            }
            
            e.target.value = ''; 
          };

          const removeDocument = (docId) => {
            requestConfirm('Tem certeza que deseja excluir este anexo?', () => {
              const docToRemove = formData.documents?.find(d => d.id === docId);
              setFormData(prev => ({
                ...prev,
                documents: (prev.documents || []).filter(d => d.id !== docId)
              }));
              if (docToRemove) {
                logAction('Exclusão', 'Colaboradores', `Removeu o anexo: ${docToRemove.name}`);
              }
            });
          };

          // ====== FUNÇÕES DE IMPORTAÇÃO E EXPORTAÇÃO ======
          const handleExportCSV = () => {
            const headers = ['Nome', 'CPF', 'RG', 'Email', 'Contato', 'Data Nascimento', 'Genero', 'Estado Civil', 'Cargo', 'Departamento', 'Empresa', 'CNPJ', 'Unidade', 'Setor', 'Salario Base', 'Tipo', 'Status', 'Data Admissao', 'CEP', 'Rua', 'Numero', 'Bairro', 'Estado', 'Banco', 'Agencia', 'Conta', 'Tipo Pix', 'Chave Pix'];
            const rows = currentList.map(e => [
              `"${e.name || ''}"`, `"${e.cpf || ''}"`, `"${e.rg || ''}"`, `"${e.email || ''}"`, `"${e.contact || ''}"`,
              `"${e.birthDate || ''}"`, `"${e.gender || ''}"`, `"${e.isMarried || ''}"`, `"${e.role || ''}"`, `"${e.department || ''}"`,
              `"${e.company || ''}"`, `"${e.cnpj || ''}"`, `"${e.unit || ''}"`, `"${e.workSector || ''}"`, `"${e.baseSalary || ''}"`,
              `"${e.employeeType || ''}"`, `"${e.status || ''}"`, `"${e.startDate || ''}"`, `"${e.cep || ''}"`, `"${e.street || ''}"`,
              `"${e.number || ''}"`, `"${e.neighborhood || ''}"`, `"${e.state || ''}"`, `"${e.bankName || ''}"`,
              `"${e.agency || ''}"`, `"${e.account || ''}"`, `"${e.pixType || ''}"`, `"${e.pixKey || ''}"`
            ]);
            const csvContent = [headers.join(';'), ...rows.map(r => r.join(';'))].join('\n');
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a'); 
            link.href = URL.createObjectURL(blob); 
            link.download = `colaboradores_${activeSubTab}.csv`; 
            link.click();
          };

          const handleDownloadTemplate = () => {
            const headers = ['Nome Completo', 'CPF', 'RG', 'Email', 'Contato', 'Data Nascimento', 'Genero', 'Estado Civil', 'Cargo', 'Departamento', 'Empresa (Igual Cadastrada)', 'Unidade', 'Setor', 'Salario Base', 'Tipo (Efetivo/Freelancer)', 'Data Admissao', 'CEP', 'Rua', 'Numero', 'Bairro', 'Estado', 'Banco', 'Agencia', 'Conta', 'Tipo Pix', 'Chave Pix'];
            const sampleRow = ['João Silva', '123.456.789-00', '12.345.678-9', 'joao@email.com', '(11) 99999-9999', '01/01/1990', 'Masculino', 'Não', 'Vendedor', 'Vendas', 'Minha Empresa LTDA', 'Matriz', 'Comercial', '2500,00', 'Efetivo', '15/03/2026', '01001-000', 'Praça da Sé', '1', 'Sé', 'SP', 'Itaú', '0001', '12345-6', 'CPF', '12345678900'];
            const csvContent = [headers.join(';'), sampleRow.map(v => `"${v}"`).join(';')].join('\n');
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a'); 
            link.href = URL.createObjectURL(blob); 
            link.download = `modelo_importacao_colaboradores.csv`; 
            link.click();
          };

          const handleImportCSV = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (event) => {
              try {
                const text = event.target.result;
                const rows = text.split(/\r?\n/).map(row => row.split(';').map(cell => cell.replace(/^"|"$/g, '').trim()));
                
                if (rows.length <= 1) {
                  showToast('O arquivo CSV está vazio ou é inválido.', 'error');
                  return;
                }

                let importedCount = 0;
                const promises = [];
                showToast('Importando colaboradores, aguarde...', 'success');

                for (let i = 1; i < rows.length; i++) {
                  const row = rows[i];
                  if (row.length < 5 || !row[0]) continue; // Pula linhas vazias

                  const empData = { ...initialFormState, isVerifiedProfile: false, lastModifiedBy: appUser.username, createdAt: new Date().toISOString() };
                  
                  // Mapeamento das colunas (baseado no template)
                  empData.name = row[0] || '';
                  empData.cpf = formatCPFMask(row[1] || '');
                  empData.rg = formatRGMask(row[2] || '');
                  empData.email = row[3] || '';
                  empData.contact = formatPhoneMask(row[4] || '');
                  empData.birthDate = formatDateInput(row[5] || '');
                  empData.gender = row[6] || 'Outro';
                  empData.isMarried = row[7] || 'Não';
                  empData.role = row[8] || '';
                  empData.department = row[9] || '';
                  empData.company = row[10] || '';
                  
                  // Busca o CNPJ correspondente à empresa digitada
                  const comp = companies.find(c => c.name.toLowerCase() === (row[10] || '').toLowerCase());
                  empData.cnpj = comp ? comp.cnpj : '';
                  
                  empData.unit = row[11] || '';
                  empData.workSector = row[12] || '';
                  empData.baseSalary = row[13] ? formatCurrencyInput(row[13]) : ''; 
                  empData.employeeType = row[14] || 'Efetivo';
                  empData.startDate = formatDateInput(row[15] || '');
                  empData.cep = formatCEPMask(row[16] || '');
                  empData.street = row[17] || '';
                  empData.number = row[18] || '';
                  empData.neighborhood = row[19] || '';
                  empData.state = row[20] || '';
                  empData.bankName = row[21] || '';
                  empData.agency = row[22] || '';
                  empData.account = row[23] || '';
                  empData.pixType = row[24] || 'CPF';
                  empData.pixKey = row[25] || '';
                  
                  promises.push(addDoc(collection(db, `${basePath}/employees`), empData));
                  importedCount++;
                }

                await Promise.all(promises);
                logAction('Importação', 'Colaboradores', `Importou ${importedCount} colaboradores via Planilha`);
                showToast(`${importedCount} colaboradores importados com sucesso!`);
                setIsImportModalOpen(false);
              } catch (err) {
                console.error(err);
                showToast('Erro ao importar CSV. Verifique a formatação do arquivo.', 'error');
              }
            };
            reader.readAsText(file);
            e.target.value = ''; 
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Colaboradores</h2>
                  <p className="text-slate-500 mt-1">Gerencie a equipe e dados bancários.</p>
                </div>
                <div className="flex flex-wrap gap-3">
                  <Button theme={theme} variant="secondary" icon={Download} onClick={handleExportCSV}>Exportar Planilha</Button>
                  {canWrite && <Button theme={theme} variant="secondary" icon={FileText} onClick={() => setIsImportModalOpen(true)}>Importar</Button>}
                  {canWrite && <Button theme={theme} icon={Plus} onClick={() => openModal()}>Novo Funcionário</Button>}
                </div>
              </div>

              <div className="flex gap-2 p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl w-fit mb-6 overflow-x-auto">
                <button onClick={() => setActiveSubTab('ativos')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'ativos' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Efetivos <span className="ml-1 opacity-60">({activeEmployees.length})</span></button>
                <button onClick={() => setActiveSubTab('contratos')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'contratos' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Contratos <span className="ml-1 opacity-60">({contractEmployees.length})</span></button>
                <button onClick={() => setActiveSubTab('freelancers')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'freelancers' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Freelancers <span className="ml-1 opacity-60">({freelanceEmployees.length})</span></button>
                <button onClick={() => setActiveSubTab('emprestimos')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'emprestimos' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Empréstimos <span className="ml-1 opacity-60">({loanEmployees.length})</span></button>
                <button onClick={() => setActiveSubTab('desligados')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'desligados' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Desligados <span className="ml-1 opacity-60">({terminatedEmployees.length})</span></button>
              </div>

              <Card className="p-2">
                <div className="p-4 border-b border-slate-200 dark:border-slate-700 flex items-center">
                  <div className="relative flex-1 max-w-md">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 z-10 pointer-events-none" size={18} />
                    <input 
                      type="text" 
                      placeholder="Buscar por nome ou CPF..." 
                      className="w-full pl-10 pr-4 py-2 bg-slate-100 dark:bg-slate-900/50 rounded-lg outline-none focus:ring-2 transition-all dark:text-white"
                      style={{ '--tw-ring-color': theme.ring.split('-')[2] }}
                      value={searchTerm}
                      onChange={e => setSearchTerm(e.target.value)}
                    />
                  </div>
                </div>
                <div className="overflow-x-auto custom-scrollbar">
                  {activeSubTab === 'emprestimos' ? (
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                          <th className="p-4 font-medium">Colaborador</th>
                          <th className="p-4 font-medium">Mês Inicial</th>
                          <th className="p-4 font-medium">Prazo Final</th>
                          <th className="p-4 font-medium text-right">Valor Total</th>
                          <th className="p-4 font-medium text-center">Parcelas</th>
                          <th className="p-4 font-medium text-right">Valor Parcela</th>
                          {(canWrite || canDelete) && <th className="p-4 font-medium text-right">Ações</th>}
                        </tr>
                      </thead>
                      <tbody>
                        {filtered.flatMap(emp => 
                          (emp.loans || []).map((loan, idx) => (
                            <tr key={`${emp.id}-${idx}`} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                              <td className="p-4">
                                <div className="font-medium text-slate-900 dark:text-white">{emp.name}</div>
                                <div className="text-xs text-slate-500">{emp.role}</div>

          const [editFormData, setEditFormData] = useState({
            id: '', category: 'employee', employeeId: '', payeeName: '', amount: '', date: '', type: 'Salário', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não', bankName: '', agency: '', account: '', pixKey: ''

          const [bulkFormData, setBulkFormData] = useState({
            employeeIds: [], employeeAmounts: {}, date: '', type: 'Salário', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não'
          });

          const [visibleCount, setVisibleCount] = useState(50);

          // Repõe a contagem visível sempre que o utilizador muda de aba ou altera os filtros
          useEffect(() => {
            setVisibleCount(50);
          }, [activeSubTab, historySearchTerm, historyMonthFilter, historyYearFilter, scheduledMonthFilter, scheduledYearFilter]);

          const canWrite = appUser?.permissions?.payments?.write;
          const canDelete = appUser?.permissions?.payments?.delete;

          const EMP_TYPES = [ 
            {value: 'Salário', label: 'Salário'}, {value: 'Adiantamento', label: 'Adiantamento'}, {value: 'Férias', label: 'Férias'}, 
            {value: 'Rescisão', label: 'Rescisão'}, {value: 'Premiação', label: 'Premiação'}, {value: 'Vale Alimentação', label: 'Vale Alimentação'},

          ];

          const OTHER_TYPES = [
            {value: 'Boleto', label: 'Boleto'}, {value: 'Pagamento', label: 'Pagamento'}
          ];

          const yearOptions = useMemo(() => {
            const years = new Set();
            payments.forEach(pay => {
              if (pay.date && pay.date.includes('/')) {
                const [, , y] = pay.date.split('/');
                if (y) years.add(y);
              }
            });
            const currentYear = new Date().getFullYear().toString();
            years.add(currentYear); 
            
            const sortedYears = Array.from(years).sort((a, b) => b.localeCompare(a));
            return [
              { value: 'all', label: 'Todos os Anos' },
              ...sortedYears.map(y => ({ value: y, label: y }))
            ];
          }, [payments]);

          const monthOptions = [
            { value: 'all', label: 'Todos os Meses' },
            { value: '01', label: 'Janeiro' },
            { value: '02', label: 'Fevereiro' },
            { value: '03', label: 'Março' },
            { value: '04', label: 'Abril' },
            { value: '05', label: 'Maio' },
            { value: '06', label: 'Junho' },

            { value: '08', label: 'Agosto' },
            { value: '09', label: 'Setembro' },
            { value: '10', label: 'Outubro' },
            { value: '11', label: 'Novembro' },
            { value: '12', label: 'Dezembro' }
          ];

          const parseDate = (d) => {
            if (!d) return 0;
            if (d.includes('/')) {
              const [day, month, year] = d.split('/');
              return new Date(`${year}-${month}-${day}T00:00:00`).getTime();
            }
            return new Date(`${d}T00:00:00`).getTime();
          };

          const todayStr = new Date().toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit', year: 'numeric'});
          const todayTime = parseDate(todayStr);

          const categorizedPayments = { today: [], future: [], recurring: [], history: [] };

          payments.forEach(pay => {
            const payTime = parseDate(pay.date);
            const isPaid = pay.status === 'Pago';

            // Histórico global para a aba de Histórico
            if (isPaid) {
              categorizedPayments.history.push(pay);
            } else {
              if (payTime <= todayTime) { 
                categorizedPayments.today.push(pay);
              }
            }

            // Inclusão nas abas Programados e Recorrentes para visualização de histórico do mês
            if (pay.isRecurring) {
              categorizedPayments.recurring.push(pay);
            } else {
              categorizedPayments.future.push(pay);
            }
          });

          // Filtro para o Histórico Geral
          let displayedHistory = categorizedPayments.history.filter(pay => {
            const empName = pay.category === 'other' ? pay.payeeName : (employees.find(e => e.id === pay.employeeId)?.name || '');
            const searchMatch = empName.toLowerCase().includes(historySearchTerm.toLowerCase()) || 
                                (pay.description || '').toLowerCase().includes(historySearchTerm.toLowerCase()) ||
                                (pay.type || '').toLowerCase().includes(historySearchTerm.toLowerCase());
            
            let monthMatch = true;
            let yearMatch = true;
            
            if (pay.date && pay.date.includes('/')) {
              const [, m, y] = pay.date.split('/');
              if (historyMonthFilter !== 'all') monthMatch = m === historyMonthFilter;
              if (historyYearFilter !== 'all') yearMatch = y === historyYearFilter;
            }

            return searchMatch && monthMatch && yearMatch;
          });

          // Filtro para Programados (Inclui Pagos e Pendentes daquele mês)
          let displayedFuture = categorizedPayments.future.filter(pay => {
            let monthMatch = true;
            let yearMatch = true;
            if (pay.date && pay.date.includes('/')) {
              const [, m, y] = pay.date.split('/');
              if (scheduledMonthFilter !== 'all') monthMatch = m === scheduledMonthFilter;
              if (scheduledYearFilter !== 'all') yearMatch = y === scheduledYearFilter;
            }
            return monthMatch && yearMatch;
          });

          // Filtro para Recorrentes (Inclui Pagos e Pendentes daquele mês)
          let displayedRecurring = categorizedPayments.recurring.filter(pay => {
            let monthMatch = true;
            let yearMatch = true;
            if (pay.date && pay.date.includes('/')) {
              const [, m, y] = pay.date.split('/');
              if (scheduledMonthFilter !== 'all') monthMatch = m === scheduledMonthFilter;
              if (scheduledYearFilter !== 'all') yearMatch = y === scheduledYearFilter;
            }
            return monthMatch && yearMatch;
          });

          // Ordenações
          categorizedPayments.today.sort((a,b) => parseDate(a.date) - parseDate(b.date)); 
          displayedFuture.sort((a,b) => parseDate(a.date) - parseDate(b.date)); 
          displayedRecurring.sort((a,b) => parseDate(a.date) - parseDate(b.date)); 
          displayedHistory.sort((a,b) => parseDate(b.date) - parseDate(a.date));

          // Seleciona a lista a ser exibida de acordo com a aba
          const displayedPayments = activeSubTab === 'history' ? displayedHistory :

                                    activeSubTab === 'recurring' ? displayedRecurring : 
                                    categorizedPayments[activeSubTab];
