                        <Plus size={16} className={theme.text} /> Adicionar Novo Evento
                      </h3>
                      
                      <Input label="Título do Evento" theme={theme} required placeholder="Ex: Pagamento de Salários, Reunião Mensal..." value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                      
                      <div className="grid grid-cols-2 gap-4">
                        <Select 
                          label="Horário (Opcional)" 
                          theme={theme} 
                          value={formData.time} 
                          onChange={e => setFormData({...formData, time: e.target.value})}
                          options={TIME_OPTIONS}
                        />
                        <Select 
                          label="Tipo de Evento" theme={theme} required value={formData.type} 
                          onChange={e => setFormData({...formData, type: e.target.value})}
                          options={Object.keys(EVENT_TYPES).filter(k => k !== 'Especial').map(k => ({ value: k, label: k }))} 
                        />
                      </div>

                      <div className="flex flex-col gap-1">
                        <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Observações / Detalhes</label>
                        <textarea 
                          rows="2"
                          className={`w-full px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm custom-scrollbar`}
                          value={formData.description}
                          onChange={e => setFormData({...formData, description: e.target.value})}
                        />
                      </div>

                      <div className="flex justify-end pt-2 gap-3">
                        <Button variant="ghost" theme={theme} type="button" onClick={() => setIsModalOpen(false)} disabled={isProcessing}>Cancelar</Button>
                        <Button variant="primary" theme={theme} type="submit" className="w-full sm:w-auto" loading={isProcessing}>Salvar na Agenda</Button>
                      </div>
                    </form>
                  )}
                </div>
              </Modal>
            </div>
          );
        }

        function CompaniesView({ theme, basePath, appUser, companies, commercialRooms = [], showToast, logAction, requestConfirm, handleMaskedView }) {
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [activeSubTab, setActiveSubTab] = useState('empresas');
          const [isProcessing, setIsProcessing] = useState(false);
          
          // Novos estados para Busca e Filtro de Certificados
          const [certSearchTerm, setCertSearchTerm] = useState('');
          const [certModelFilter, setCertModelFilter] = useState('');
          
          // Estados para Salas Comerciais
          const [isRoomModalOpen, setIsRoomModalOpen] = useState(false);
          const [editingRoomId, setEditingRoomId] = useState(null);
          const initialRoomState = {
            localName: '', roomNumber: '', tenantType: '', tenantCompanyId: '', tenantCustomName: '', 
            linkedCnpjCompanyId: '', email: '', broker: '', contactPhone: '', contactName: '', 
            buildingContactType: 'telefone', buildingContactValue: '', buildingContactName: '',
            cep: '', street: '', number: '', complement: '', neighborhood: '', city: '', state: '',
            rentContractName: '', rentContractUrl: '', rentExpirationDate: ''
          };
          const [roomFormData, setRoomFormData] = useState(initialRoomState);
          
          const initialFormState = {
            name: '', cnpj: '', stateRegistration: '', openingDate: '', regime: 'Simples Nacional',
            cep: '', street: '', number: '', complement: '', neighborhood: '', city: '', state: '',
            partners: [{ name: '', cpf: '' }],
            socialContractName: '', socialContractUrl: '',
            certificates: [] // Nova estrutura de Array para múltiplos certificados
          };
          
          const [formData, setFormData] = useState(initialFormState);
          const [showCertPassword, setShowCertPassword] = useState({});
          const [showTablePasswords, setShowTablePasswords] = useState({});

          const canWrite = appUser?.permissions?.companies?.write;
          const canDelete = appUser?.permissions?.companies?.delete;

          const openModal = (comp = null) => {
            if (!canWrite) return;
            if (comp) {
              setEditingId(comp.id);
              // Migração e carregamento inteligente dos certificados
              let certs = comp.certificates ? [...comp.certificates] : [];
              if (comp.certModel && certs.length === 0) {
                 certs.push({
                   model: comp.certModel,
                   expirationDate: comp.certExpirationDate || '',
                   password: comp.certPassword || '',
                   fileName: comp.certFileName || '',
                   fileUrl: comp.certFileUrl || ''
                 });
              }
              setFormData({ ...initialFormState, ...comp, partners: comp.partners || [{ name: '', cpf: '' }], certificates: certs });
            } else {
              setEditingId(null);
              setFormData(initialFormState);
            }
            setShowCertPassword({});
            setIsModalOpen(true);
          };

          const handleCepBlur = async () => {
            const cepNumber = formData.cep.replace(/\D/g, '');
            if (cepNumber.length === 8) {
              try {
                const res = await fetch(`https://viacep.com.br/ws/${cepNumber}/json/`);
                const data = await res.json();
                if (!data.erro) {
                  setFormData(prev => ({
                    ...prev,
                    street: data.logradouro || prev.street,
                    neighborhood: data.bairro || prev.neighborhood,
                    city: data.localidade || prev.city,
                    state: data.uf || prev.state
                  }));
                  showToast('Endereço preenchido via CEP!', 'success');
                }
              } catch (err) {
                console.error("Erro ao buscar CEP:", err);
              }
            }
          };

          const handleRoomCepBlur = async () => {
            const cepNumber = roomFormData.cep.replace(/\D/g, '');
            if (cepNumber.length === 8) {
              try {
                const res = await fetch(`https://viacep.com.br/ws/${cepNumber}/json/`);
                const data = await res.json();
                if (!data.erro) {
                  setRoomFormData(prev => ({
                    ...prev,
                    street: data.logradouro || prev.street,
                    neighborhood: data.bairro || prev.neighborhood,
                    city: data.localidade || prev.city,
                    state: data.uf || prev.state
                  }));
                  showToast('Endereço da sala preenchido via CEP!', 'success');
                }
              } catch (err) {
                console.error("Erro ao buscar CEP:", err);
              }
            }
          };

          const handlePartnerChange = (index, field, value) => {
            const newPartners = [...formData.partners];
            newPartners[index][field] = value;
            setFormData({ ...formData, partners: newPartners });
          };

          const addPartner = () => setFormData({...formData, partners: [...formData.partners, {name: '', cpf: ''}]});
          
          const removePartner = (index) => {
            requestConfirm('Tem certeza que deseja remover este sócio do quadro societário?', () => {
              setFormData(prev => ({...prev, partners: prev.partners.filter((_, i) => i !== index)}));
            });
          };

          const handleSocialContractUpload = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) { 
              showToast(`O arquivo excede o limite de 5MB.`, 'error');
              e.target.value = '';
              return;
            }
            if (file.type !== 'application/pdf') {
              showToast(`Apenas arquivos PDF são permitidos para o contrato social.`, 'error');
              e.target.value = '';
              return;
            }

            try {
              showToast('Enviando contrato social, aguarde...', 'success');
              const fileId = generateId();
              const fileRef = ref(storage, `companies/${fileId}_${file.name}`);
              await uploadBytes(fileRef, file);
              const url = await getDownloadURL(fileRef);
              
              setFormData(prev => ({
                ...prev,
                socialContractName: file.name,
                socialContractUrl: url
              }));
              logAction('Anexo', 'Empresas', `Anexou Contrato Social da empresa ${formData.name || 'Nova Empresa'}`);
              showToast('Contrato Social anexado com sucesso!');
            } catch (err) {
              showToast(`Erro ao processar o arquivo. Verifique sua conexão.`, 'error');
            }
            e.target.value = ''; 
          };

          const removeSocialContract = () => {
            requestConfirm('Tem certeza que deseja remover o Contrato Social anexado?', () => {
              setFormData(prev => ({
                ...prev,
                socialContractName: '',
                socialContractUrl: ''
              }));
              logAction('Exclusão', 'Empresas', `Removeu o Contrato Social da empresa ${formData.name}`);
            });
          };

          const handleRentContractUpload = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) { 
              showToast(`O arquivo excede o limite de 5MB.`, 'error');
              e.target.value = '';
              return;
            }
            if (file.type !== 'application/pdf') {
              showToast(`Apenas arquivos PDF são permitidos para o contrato de locação.`, 'error');
              e.target.value = '';
              return;
            }

            try {
              showToast('Enviando contrato de locação, aguarde...', 'success');
              const fileId = generateId();
              const fileRef = ref(storage, `commercialRooms/${fileId}_${file.name}`);
              await uploadBytes(fileRef, file);
              const url = await getDownloadURL(fileRef);
              
              setRoomFormData(prev => ({
                ...prev,
                rentContractName: file.name,
                rentContractUrl: url
              }));
              logAction('Anexo', 'Salas Comerciais', `Anexou Contrato de Locação da sala ${roomFormData.localName || 'Nova Sala'}`);
              showToast('Contrato de Locação anexado com sucesso!');
            } catch (err) {
              showToast(`Erro ao processar o arquivo. Verifique sua conexão.`, 'error');
            }
            e.target.value = ''; 
          };

          const removeRentContract = () => {
            requestConfirm('Tem certeza que deseja remover o Contrato de Locação anexado?', () => {
              setRoomFormData(prev => ({ ...prev, rentContractName: '', rentContractUrl: '' }));
              logAction('Exclusão', 'Salas Comerciais', `Removeu o Contrato de Locação da sala ${roomFormData.localName || 'Nova Sala'}`);
            });
          };

          // --- UPLOAD E GESTÃO DE MÚLTIPLOS CERTIFICADOS ---
          const handleCertUpload = async (e, index) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 10 * 1024 * 1024) { 
              showToast(`O arquivo excede o limite de 10MB.`, 'error');
              e.target.value = '';
              return;
            }

            try {
              showToast('Enviando certificado digital, aguarde...', 'success');
              const fileId = generateId();
              const fileRef = ref(storage, `certificates/${fileId}_${file.name}`);
              await uploadBytes(fileRef, file);
              const url = await getDownloadURL(fileRef);
              
              setFormData(prev => {
                 const newCerts = [...prev.certificates];
                 newCerts[index].fileName = file.name;
                 newCerts[index].fileUrl = url;
                 return { ...prev, certificates: newCerts };
              });
              logAction('Anexo', 'Empresas', `Anexou arquivo do Certificado A1 da empresa ${formData.name || 'Nova Empresa'}`);
              showToast('Certificado anexado com sucesso!');
            } catch (err) {
              showToast(`Erro ao processar o arquivo do certificado. Verifique sua conexão.`, 'error');
            }
            e.target.value = ''; 
          };

          const removeCertificateFile = (index) => {
            requestConfirm('Tem certeza que deseja remover e substituir o arquivo A1 anexado?', () => {
              setFormData(prev => {
                 const newCerts = [...prev.certificates];
                 newCerts[index].fileName = '';
                 newCerts[index].fileUrl = '';
                 return { ...prev, certificates: newCerts };
              });
              logAction('Exclusão', 'Empresas', `Removeu o arquivo do Certificado A1 da empresa ${formData.name}`);
            });
          };

          const removeCertificateBlock = (index) => {
            requestConfirm('Tem certeza que deseja excluir este certificado digital completamente?', () => {
              setFormData(prev => {
                 const newCerts = prev.certificates.filter((_, i) => i !== index);
                 return { ...prev, certificates: newCerts };
              });
            });
          };

          const addCert = (model) => {
            setFormData(prev => ({
               ...prev,
               certificates: [...(prev.certificates || []), { model, expirationDate: '', password: '', fileName: '', fileUrl: '' }]
            }));
          };
          // ----------------------------------------------

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite || isProcessing) return;
            setIsProcessing(true);
            try {
              const payload = { ...formData };
              
              // Garante retrocompatibilidade pro Dashboard continuar funcionando sem ser alterado
              if (payload.certificates && payload.certificates.length > 0) {
                  // Ordena para que o Dashboard veja na raiz o certificado que vence primeiro
                  const sortedCerts = [...payload.certificates].sort((a,b) => {
                      const getT = (d) => {
                          if(!d || d.length < 10) return 9999999999999;
                          const [day, m, y] = d.split('/');
                          return new Date(y, m-1, day).getTime();
                      };
                      return getT(a.expirationDate) - getT(b.expirationDate);
                  });
                  const primary = sortedCerts[0];
                  payload.certModel = primary.model;
                  payload.certExpirationDate = primary.expirationDate;
                  payload.certPassword = primary.password;
                  payload.certFileName = primary.fileName;
                  payload.certFileUrl = primary.fileUrl;
              } else {
                  payload.certModel = '';
                  payload.certExpirationDate = '';
                  payload.certPassword = '';
                  payload.certFileName = '';
                  payload.certFileUrl = '';
              }

              if (editingId) {
                await updateDoc(doc(db, `${basePath}/companies/${editingId}`), payload);
                logAction('Atualização', 'Empresas', `Atualizou a empresa ${formData.name}`);
                showToast('Empresa atualizada com sucesso!');
              } else {
                await addDoc(collection(db, `${basePath}/companies`), payload);
                logAction('Cadastro', 'Empresas', `Cadastrou a empresa ${formData.name}`);
                showToast('Empresa cadastrada com sucesso!');
              }
              setIsModalOpen(false);
            } catch (err) {
              showToast('Erro ao salvar dados.', 'error');
            } finally {
              setIsProcessing(false);
            }
          };

          const handleDelete = (id, name) => {
            if (!canDelete) return;
            requestConfirm(`Excluir a empresa ${name} do sistema?`, async () => {
              try {
                await deleteDoc(doc(db, `${basePath}/companies/${id}`));
                logAction('Exclusão', 'Empresas', `Removeu a empresa ${name}`);
                showToast('Empresa removida.');
              } catch (err) {
                showToast('Erro ao remover.', 'error');
              }
            });
          };

          const openRoomModal = (room = null) => {
            if (!canWrite) return;
            if (room) {
              setEditingRoomId(room.id);
              setRoomFormData({ ...initialRoomState, ...room });
            } else {
              setEditingRoomId(null);
              setRoomFormData(initialRoomState);
            }
            setIsRoomModalOpen(true);
          };

          const handleRoomSave = async (e) => {
            e.preventDefault();
            if (!canWrite || isProcessing) return;
            setIsProcessing(true);
            try {
              if (editingRoomId) {
                await updateDoc(doc(db, `${basePath}/commercialRooms/${editingRoomId}`), roomFormData);
                logAction('Atualização', 'Empresas', `Atualizou a sala ${roomFormData.localName} - ${roomFormData.roomNumber}`);
                showToast('Sala Comercial atualizada com sucesso!');
              } else {
                await addDoc(collection(db, `${basePath}/commercialRooms`), roomFormData);
                logAction('Cadastro', 'Empresas', `Cadastrou a sala ${roomFormData.localName} - ${roomFormData.roomNumber}`);
                showToast('Sala Comercial cadastrada com sucesso!');
              }
              setIsRoomModalOpen(false);
            } catch (err) {
              showToast('Erro ao salvar sala.', 'error');
            } finally {
              setIsProcessing(false);
            }
          };

          const handleRoomDelete = (id, name) => {
            if (!canDelete) return;
            requestConfirm(`Excluir a sala ${name} do sistema?`, async () => {
              try {
                await deleteDoc(doc(db, `${basePath}/commercialRooms/${id}`));
                logAction('Exclusão', 'Empresas', `Removeu a sala ${name}`);
                showToast('Sala removida.');
              } catch (err) {
                showToast('Erro ao remover sala.', 'error');
              }
            });
          };

          const toggleTablePassword = (certId) => {
             setShowTablePasswords(prev => ({ ...prev, [certId]: !prev[certId] }));
          };

          const sortedCompanies = [...companies].sort((a, b) => (a.name || '').localeCompare(b.name || ''));

          // Transformação para listar múltiplos certificados na tabela
          const certRows = [];
          sortedCompanies.forEach(comp => {
            let certs = comp.certificates || [];
            if (comp.certModel && certs.length === 0) {
                certs = [{ model: comp.certModel, expirationDate: comp.certExpirationDate, password: comp.certPassword, fileName: comp.certFileName, fileUrl: comp.certFileUrl }];
            }
            certs.forEach((cert, idx) => {
                certRows.push({
                   ...comp,
                   certModel: cert.model,
                   certExpirationDate: cert.expirationDate,
                   certPassword: cert.password,
                   certFileName: cert.fileName,
                   certFileUrl: cert.fileUrl,
                   certId: `${comp.id}-cert-${idx}`,
                   originalComp: comp
                });
            });
          });

          // Lógica de Filtragem dos Certificados
          const filteredCertRows = certRows.filter(comp => {
            const searchLower = certSearchTerm.toLowerCase();
            const matchSearch = (comp.name || '').toLowerCase().includes(searchLower) || 
                                (comp.cnpj || '').toLowerCase().includes(searchLower);
            const matchModel = certModelFilter ? comp.certModel === certModelFilter : true;
            return matchSearch && matchModel;
          });

          // Lógica dos botões de adicionar no modal
          const hasA1 = (formData.certificates || []).some(c => c.model === 'A1');
          const hasA3 = (formData.certificates || []).some(c => c.model === 'A3');




          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Empresas (CNPJs)</h2>
                  <p className="text-slate-500 mt-1">Gerencie os CNPJs para os quais os funcionários são registrados e Salas Comerciais.</p>
                </div>
                <div className="flex gap-2">
                  {canWrite && activeSubTab !== 'certificados' && (
                    <Button theme={theme} icon={Plus} onClick={() => activeSubTab === 'salas' ? openRoomModal() : openModal()}>
                      {activeSubTab === 'salas' ? 'Nova Sala Comercial' : 'Nova Empresa'}
                    </Button>
                  )}

                </div>
              </div>

              <div className="flex gap-2 p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl w-fit max-w-full mb-6 overflow-x-auto custom-scrollbar">
                <button onClick={() => setActiveSubTab('empresas')} className={`whitespace-nowrap px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'empresas' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Cadastro de Empresas</button>
                <button onClick={() => setActiveSubTab('certificados')} className={`whitespace-nowrap px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'certificados' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Gestão de Certificados</button>
                <button onClick={() => setActiveSubTab('salas')} className={`whitespace-nowrap px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'salas' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Gestão de Salas Comerciais</button>
              </div>

              {/* Filtros da Aba de Certificados */}
              {activeSubTab === 'certificados' && (
                <Card className="p-4 mb-6 relative z-30">
                  <div className="flex flex-col sm:flex-row gap-4 items-end">
                    <div className="relative w-full md:w-1/3">
                      <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1 mb-1 block">Buscar Empresa</label>
                      <div className="relative">
                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 z-10 pointer-events-none" size={18} />
                        <input 
                          type="text" 
                          placeholder="Nome ou CNPJ..." 
                          className={`w-full pl-10 pr-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm`}
                          value={certSearchTerm}
                          onChange={e => setCertSearchTerm(e.target.value)}
                        />
                      </div>
                    </div>
                    <Select 
                      label="Modelo" theme={theme} className="w-full md:w-40"
                      value={certModelFilter} onChange={e => setCertModelFilter(e.target.value)}
                      options={[ {value: '', label: 'Todos'}, {value: 'A1', label: 'A1'}, {value: 'A3', label: 'A3'} ]} 
                    />
                  </div>
                </Card>
              )}

              <Card className="overflow-hidden">
                <div className="overflow-x-auto custom-scrollbar">
                  {activeSubTab === 'salas' ? (
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                          <th className="p-4 font-medium">Localização/Ref</th>
                          <th className="p-4 font-medium">Sala</th>
                          <th className="p-4 font-medium">Locatário / CNPJ</th>
                          <th className="p-4 font-medium">Corretora</th>
                          {(canWrite || canDelete) && <th className="p-4 font-medium text-right">Ações</th>}
                        </tr>
                      </thead>
                      <tbody>
                        {(commercialRooms || []).map(room => {
                           const tenantCnpjComp = companies.find(c => c.id === room.linkedCnpjCompanyId);
                           const linkedName = tenantCnpjComp ? tenantCnpjComp.name : '-';
                           const tenantName = room.tenantType === 'outro' ? room.tenantCustomName : (companies.find(c => c.id === room.tenantCompanyId)?.name || '-');
                           
                           return (
                              <tr key={room.id} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                                <td className="p-4 font-medium text-slate-900 dark:text-white">{room.localName || '-'}</td>
                                <td className="p-4 text-slate-600 dark:text-slate-300">{room.roomNumber || '-'}</td>
                                <td className="p-4 text-slate-600 dark:text-slate-300 text-sm">
                                   <div className="font-semibold text-slate-700 dark:text-slate-200">{tenantName}</div>
                                   <div className="text-xs text-slate-400">Vinculado a: {linkedName}</div>
                                </td>
                                <td className="p-4 text-slate-600 dark:text-slate-300">{room.broker || '-'}</td>
                                {(canWrite || canDelete) && (
                                  <td className="p-4 text-right space-x-2 whitespace-nowrap">
                                    {canWrite && <button onClick={() => openRoomModal(room)} className="p-2 rounded-lg text-slate-500 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors" title="Editar Sala"><Edit2 size={18} /></button>}
                                    {canDelete && <button onClick={() => handleRoomDelete(room.id, `${room.localName} - ${room.roomNumber}`)} className="p-2 rounded-lg text-slate-500 hover:text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-colors" title="Excluir Sala"><Trash2 size={18} /></button>}
                                  </td>
                                )}
                              </tr>
                           );
                        })}

                     <div className="pt-6 flex justify-end gap-3 border-t border-slate-200 dark:border-slate-700">
                        <Button variant="ghost" theme={theme} type="button" onClick={() => setIsRoomModalOpen(false)} disabled={isProcessing}>Cancelar</Button>
                        <Button variant="primary" theme={theme} type="submit" loading={isProcessing}>Salvar Sala</Button>
                     </div>
                  </form>
              </Modal>

            </div>
          );
        }

        function EmployeesView({ theme, basePath, appUser, employees, companies, showToast, logAction, requestConfirm, handleMaskedView }) {
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isProcessing, setIsProcessing] = useState(false);
          const [isImportModalOpen, setIsImportModalOpen] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [activeSubTab, setActiveSubTab] = useState('ativos');
          
          const [searchTerm, setSearchTerm] = useState('');
          const [filterCompany, setFilterCompany] = useState('');
          const [filterUnit, setFilterUnit] = useState('');
          const [filterSector, setFilterSector] = useState('');
          const [visibleCount, setVisibleCount] = useState(50);

          const SHIFT_TIME_OPTIONS = [
            { value: '08:00', label: '08:00' }, { value: '08:30', label: '08:30' },
            { value: '09:00', label: '09:00' }, { value: '09:30', label: '09:30' },
            { value: '10:00', label: '10:00' }, { value: '10:30', label: '10:30' },
            { value: '11:00', label: '11:00' }, { value: '11:30', label: '11:30' },
            { value: '12:00', label: '12:00' }, { value: '12:30', label: '12:30' },

            { value: '14:00', label: '14:00' }, { value: '14:30', label: '14:30' },
            { value: '15:00', label: '15:00' }, { value: '15:30', label: '15:30' },
            { value: '16:00', label: '16:00' }, { value: '16:30', label: '16:30' },
            { value: '17:00', label: '17:00' }, { value: '17:30', label: '17:30' },
            { value: '18:00', label: '18:00' }, { value: '18:30', label: '18:30' },
            { value: '19:00', label: '19:00' }, { value: '19:30', label: '19:30' },
            { value: '20:00', label: '20:00' }, { value: '20:30', label: '20:30' },
            { value: '21:00', label: '21:00' }
          ];

          const initialFormState = {
            employeeType: 'Efetivo', freelanceStartDate: '', referredBy: '', observations: '', callFreelancer: 'Sim',
            name: '', birthDate: '', gender: 'Feminino', isMarried: 'Não', cpf: '', rg: '', contact: '', email: '',
            role: '', department: '', baseSalary: '', company: '', cnpj: '', unit: '', workSector: '',
            workShiftStart: '', workShiftEnd: '', admissionExamDate: '', probation45: '', probation90: '',
            saturdayShift: 'Não trabalha', saturdayShiftTeam: '',
            cep: '', street: '', number: '', complement: '', neighborhood: '', state: '',
            bankName: '', accountType: 'Corrente', agency: '', account: '', pixType: 'CPF', pixKey: '', pixDifferentBank: 'Não', pixBankName: '',
            healthInsurance: 'Não', healthInsuranceValue: '', hasDependents: 'Não', dependentsCount: '', dependentsValue: '', fuelAllowance: 'Não', fuelAllowanceValue: '',
            foodVoucher: 'Não', foodVoucherValue: '',
            transportVoucher: 'Não', transportCards: [{ name: '', valuePerDay: '' }],
            hasChildren: 'Não', children: [{ name: '', birthDate: '' }],
            hasLoans: 'Não', loans: [{ loanMonth: '', deadlineMonth: '', totalAmount: '', installmentsCount: '', installmentValue: '' }],
            documents: [],
            status: 'Ativo', terminationDate: '', terminationReason: '',
            isContract: 'Não', contractStartDate: '', contractEndDate: '',
            isInternship: 'Não', internshipStartDate: '', internshipEndDate: ''
          };
          
          const [formData, setFormData] = useState(initialFormState);

          useEffect(() => {
            setVisibleCount(50);
          }, [activeSubTab, searchTerm, filterCompany, filterUnit, filterSector]);

          const canWrite = appUser?.permissions?.employees?.write;
          const canDelete = appUser?.permissions?.employees?.delete;
          
          // Lógica de separação das abas
          const activeEmployees = employees.filter(e => e.status !== 'Desligado' && e.isContract !== 'Sim' && e.isInternship !== 'Sim' && e.employeeType !== 'Freelancer');
          const internEmployees = employees.filter(e => e.status !== 'Desligado' && e.isInternship === 'Sim' && e.employeeType !== 'Freelancer');
          const contractEmployees = employees.filter(e => e.status !== 'Desligado' && e.isContract === 'Sim' && e.employeeType !== 'Freelancer');
          const freelanceEmployees = employees.filter(e => e.status !== 'Desligado' && e.employeeType === 'Freelancer');
          const terminatedEmployees = employees.filter(e => e.status === 'Desligado');
          const loanEmployees = employees.filter(e => e.status !== 'Desligado' && e.hasLoans === 'Sim' && e.loans && e.loans.length > 0);
          
          let currentList = activeEmployees;
          if (activeSubTab === 'estagios') currentList = internEmployees;
          if (activeSubTab === 'contratos') currentList = contractEmployees;
          if (activeSubTab === 'freelancers') currentList = freelanceEmployees;
          if (activeSubTab === 'desligados') currentList = terminatedEmployees;
          if (activeSubTab === 'emprestimos') currentList = loanEmployees;

          // Extração das opções únicas de filtros com base nos funcionários cadastrados
          const companiesList = [...new Set(employees.map(e => e.company).filter(Boolean))].sort();
          const unitsList = [...new Set(employees.map(e => e.unit).filter(Boolean))].sort();
          const sectorsList = [...new Set(employees.map(e => e.workSector).filter(Boolean))].sort();

          const filtered = currentList.filter(e => {
            const matchSearch = (e.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || (e.cpf && e.cpf.includes(searchTerm));
            const matchCompany = filterCompany ? e.company === filterCompany : true;
            const matchUnit = filterUnit ? e.unit === filterUnit : true;
            const matchSector = filterSector ? e.workSector === filterSector : true;
            
            return matchSearch && matchCompany && matchUnit && matchSector;
          });
          
          const sortedFiltered = [...filtered].sort((a, b) => a.name.localeCompare(b.name));
          const displayedEmployees = sortedFiltered.slice(0, visibleCount);

          const openModal = (emp = null) => {
            if (!canWrite) return;
            if (emp) {
              setEditingId(emp.id);
              setFormData({ ...initialFormState, ...emp }); 
            } else {
              setEditingId(null);
              setFormData(initialFormState);
            }
            setIsModalOpen(true);
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite || isProcessing) return;

            setIsProcessing(true);
            const payload = {
              ...formData,
              isVerifiedProfile: false, 
              lastModifiedBy: appUser.username
            };

            try {
              if (editingId) {
                await updateDoc(doc(db, `${basePath}/employees/${editingId}`), payload);
                logAction('Atualização', 'Colaboradores', `Atualizou os dados de ${formData.name}`);
                showToast('Funcionário atualizado com sucesso!');
              } else {
                await addDoc(collection(db, `${basePath}/employees`), { ...payload, createdAt: new Date().toISOString() });
                logAction('Cadastro', 'Colaboradores', `Cadastrou o colaborador ${formData.name}`);
                showToast('Funcionário adicionado com sucesso!');
              }
              setIsModalOpen(false);
            } catch (err) {
              showToast('Erro ao salvar dados.', 'error');
            } finally {
              setIsProcessing(false);
            }
          };

          const handleVerify = async (id, name, lastModifiedBy) => {
            if (lastModifiedBy === appUser.username) {
               showToast("A conferência de segurança deve ser realizada por outro usuário.", "error");
               return;
            }
            try {
              await updateDoc(doc(db, `${basePath}/employees/${id}`), {
                isVerifiedProfile: true, 
                profileVerifiedBy: appUser.name,
                profileVerifiedAt: new Date().toISOString()
              });
              logAction('Conferência', 'Colaboradores', `Realizou a conferência do cadastro de ${name}`);
              showToast('Cadastro conferido com sucesso!');
            } catch (error) {
              showToast('Erro ao conferir cadastro.', 'error');
            }
          };

          const handleDelete = (id) => {
            if (!canDelete) return;
            requestConfirm('Excluir este funcionário e todos os seus dados?', async () => {
              const emp = employees.find(e => e.id === id);
              try {
                await deleteDoc(doc(db, `${basePath}/employees/${id}`));
                logAction('Exclusão', 'Colaboradores', `Removeu o colaborador ${emp?.name || id}`);
                showToast('Funcionário removido.');
              } catch (err) {
                showToast('Erro ao remover.', 'error');
              }
            });
          };

          const handleCepBlur = async () => {
            const cepNumber = formData.cep.replace(/\D/g, '');
            if (cepNumber.length === 8) {
              try {
                const res = await fetch(`https://viacep.com.br/ws/${cepNumber}/json/`);
                const data = await res.json();
                if (!data.erro) {
                  setFormData(prev => ({
                    ...prev,
                    street: data.logradouro || prev.street,
                    neighborhood: data.bairro || prev.neighborhood,
                    state: data.uf || prev.state
                  }));
                  showToast('Endereço preenchido via CEP!', 'success');
                }
              } catch (err) {
                console.error("Erro ao buscar CEP:", err);
              }
            }
          };

          const handleChildChange = (index, field, value) => {
            const newChildren = [...formData.children];
            newChildren[index][field] = value;
            setFormData({ ...formData, children: newChildren });
          };

          const addChild = () => setFormData({...formData, children: [...formData.children, {name: '', birthDate: ''}]});
          
          const removeChild = (index) => {
            requestConfirm('Tem certeza que deseja remover este dependente?', () => {
              setFormData(prev => ({...prev, children: prev.children.filter((_, i) => i !== index)}));
            });
          };

          const handleLoanChange = (index, field, value) => {
            const newLoans = [...(formData.loans || [])];
            newLoans[index][field] = value;
            setFormData({ ...formData, loans: newLoans });
          };

          const addLoan = () => setFormData({...formData, loans: [...(formData.loans || []), { loanMonth: '', deadlineMonth: '', totalAmount: '', installmentsCount: '', installmentValue: '' }]});
          
          const removeLoan = (index) => {
            requestConfirm('Tem certeza que deseja remover este empréstimo?', () => {
              setFormData(prev => ({...prev, loans: (prev.loans || []).filter((_, i) => i !== index)}));
            });
          };

          const handleTransportCardChange = (index, field, value) => {
            const newCards = [...(formData.transportCards || [])];
            newCards[index][field] = value;
            setFormData({ ...formData, transportCards: newCards });
          };

          const addTransportCard = () => {
            setFormData({...formData, transportCards: [...(formData.transportCards || []), { name: '', valuePerDay: '' }]});
          };
          
          const removeTransportCard = (index) => {
            requestConfirm('Tem certeza que deseja remover este cartão de transporte?', () => {
              setFormData(prev => ({...prev, transportCards: (prev.transportCards || []).filter((_, i) => i !== index)}));
            });
          };

          const handleDocumentUpload = async (e) => {
            const files = Array.from(e.target.files);
            const newDocs = [];

            for (const file of files) {
              const allowedTypes = ['application/pdf', 'image/jpeg', 'image/png', 'image/gif', 'image/webp', 'text/plain'];
              if (!allowedTypes.includes(file.type)) {
                showToast(`Tipo de arquivo inválido: ${file.name}. Use PDF ou imagens.`, 'error');
                continue;
              }
              if (file.size > 5 * 1024 * 1024) { 
                showToast(`O arquivo ${file.name} excede o limite de 5MB.`, 'error');
                continue;
              }
              try {
                const fileId = generateId();
                const fileRef = ref(storage, `documents/${fileId}_${file.name}`);
                await uploadBytes(fileRef, file);
                const url = await getDownloadURL(fileRef);
                newDocs.push({
                  id: fileId,
                  name: file.name,
                  type: file.type,
                  url: url
                });
              } catch (err) {
                showToast(`Erro ao processar ${file.name}`, 'error');
              }
            }

            if (newDocs.length > 0) {
              setFormData(prev => ({
                ...prev,
                documents: [...(prev.documents || []), ...newDocs]
              }));
              const docNames = newDocs.map(d => d.name).join(', ');
              logAction('Anexo', 'Colaboradores', `Anexou documento(s): ${docNames}`);
              showToast(`${newDocs.length} documento(s) anexado(s) com sucesso!`);
            }
            
            e.target.value = ''; 
          };

          const removeDocument = (docId) => {
            requestConfirm('Tem certeza que deseja excluir este anexo?', () => {
              const docToRemove = formData.documents?.find(d => d.id === docId);
              setFormData(prev => ({
                ...prev,
                documents: (prev.documents || []).filter(d => d.id !== docId)
              }));
              if (docToRemove) {
                logAction('Exclusão', 'Colaboradores', `Removeu o anexo: ${docToRemove.name}`);
              }
            });
          };

          // ====== FUNÇÕES DE IMPORTAÇÃO E EXPORTAÇÃO ======
          const handleExportCSV = () => {
            const headers = ['Nome', 'CPF', 'RG', 'Email', 'Contato', 'Data Nascimento', 'Genero', 'Estado Civil', 'Cargo', 'Departamento', 'Empresa', 'CNPJ', 'Unidade', 'Setor', 'Salario Base', 'Tipo', 'Status', 'Data Admissao', 'CEP', 'Rua', 'Numero', 'Bairro', 'Estado', 'Banco', 'Tipo Conta', 'Agencia', 'Conta', 'Tipo Pix', 'Chave Pix', 'Banco Diferente (Pix)', 'Banco do Pix', 'É Estágio', 'Início Estágio', 'Fim Estágio', 'É Contrato', 'Início Contrato', 'Fim Contrato'];
            const rows = currentList.map(e => [
              `"${e.name || ''}"`, `"${e.cpf || ''}"`, `"${e.rg || ''}"`, `"${e.email || ''}"`, `"${e.contact || ''}"`,
              `"${e.birthDate || ''}"`, `"${e.gender || ''}"`, `"${e.isMarried || ''}"`, `"${e.role || ''}"`, `"${e.department || ''}"`,
              `"${e.company || ''}"`, `"${e.cnpj || ''}"`, `"${e.unit || ''}"`, `"${e.workSector || ''}"`, `"${e.baseSalary || ''}"`,
              `"${e.employeeType || ''}"`, `"${e.status || ''}"`, `"${e.startDate || ''}"`, `"${e.cep || ''}"`, `"${e.street || ''}"`,
              `"${e.number || ''}"`, `"${e.neighborhood || ''}"`, `"${e.state || ''}"`, `"${e.bankName || ''}"`, `"${e.accountType || 'Corrente'}"`,
              `"${e.agency || ''}"`, `"${e.account || ''}"`, `"${e.pixType || ''}"`, `"${e.pixKey || ''}"`, `"${e.pixDifferentBank || 'Não'}"`, `"${e.pixBankName || ''}"`,
              `"${e.isInternship || 'Não'}"`, `"${e.internshipStartDate || ''}"`, `"${e.internshipEndDate || ''}"`,
              `"${e.isContract || 'Não'}"`, `"${e.contractStartDate || ''}"`, `"${e.contractEndDate || ''}"`
            ]);
            const csvContent = [headers.join(';'), ...rows.map(r => r.join(';'))].join('\n');
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a'); 
            link.href = URL.createObjectURL(blob); 
            link.download = `colaboradores_${activeSubTab}.csv`; 
            link.click();
          };

          const handleDownloadTemplate = () => {
            const headers = ['Nome Completo', 'CPF', 'RG', 'Email', 'Contato', 'Data Nascimento', 'Genero', 'Estado Civil', 'Cargo', 'Departamento', 'Empresa (Igual Cadastrada)', 'Unidade', 'Setor', 'Salario Base', 'Tipo (Efetivo/Freelancer)', 'Data Admissao', 'CEP', 'Rua', 'Numero', 'Bairro', 'Estado', 'Banco', 'Tipo Conta', 'Agencia', 'Conta', 'Tipo Pix', 'Chave Pix', 'Banco Diferente (Pix)', 'Banco do Pix', 'É Estágio', 'Início Estágio', 'Fim Estágio', 'É Contrato', 'Início Contrato', 'Fim Contrato'];
            const sampleRow = ['João Silva', '123.456.789-00', '12.345.678-9', 'joao@email.com', '(11) 99999-9999', '01/01/1990', 'Masculino', 'Não', 'Vendedor', 'Vendas', 'Minha Empresa LTDA', 'Matriz', 'Comercial', '2500,00', 'Efetivo', '15/03/2026', '01001-000', 'Praça da Sé', '1', 'Sé', 'SP', 'Itaú', 'Corrente', '0001', '12345-6', 'CPF', '12345678900', 'Não', '', 'Não', '', '', 'Não', '', ''];
            const csvContent = [headers.join(';'), sampleRow.map(v => `"${v}"`).join(';')].join('\n');
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a'); 
            link.href = URL.createObjectURL(blob); 
            link.download = `modelo_importacao_colaboradores.csv`; 
            link.click();
          };

          const handleImportCSV = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (event) => {
              try {
                const text = event.target.result;
                const rows = text.split(/\r?\n/).map(row => row.split(';').map(cell => cell.replace(/^"|"$/g, '').trim()));
                
                if (rows.length <= 1) {
                  showToast('O arquivo CSV está vazio ou é inválido.', 'error');
                  return;
                }

                let importedCount = 0;
                const promises = [];
                showToast('Importando colaboradores, aguarde...', 'success');

                for (let i = 1; i < rows.length; i++) {
                  const row = rows[i];
                  if (row.length < 5 || !row[0]) continue; // Pula linhas vazias

                  const empData = { ...initialFormState, isVerifiedProfile: false, lastModifiedBy: appUser.username, createdAt: new Date().toISOString() };
                  
                  // Mapeamento das colunas (baseado no template)
                  empData.name = row[0] || '';
                  empData.cpf = formatCPFMask(row[1] || '');
                  empData.rg = formatRGMask(row[2] || '');
                  empData.email = row[3] || '';
                  empData.contact = formatPhoneMask(row[4] || '');
                  empData.birthDate = formatDateInput(row[5] || '');
                  empData.gender = row[6] || 'Outro';
                  empData.isMarried = row[7] || 'Não';
                  empData.role = row[8] || '';
                  empData.department = row[9] || '';
                  empData.company = row[10] || '';

                  promises.push(addDoc(collection(db, `${basePath}/employees`), empData));

                      <div className="space-y-4 pt-4 border-t border-slate-200 dark:border-slate-700">
                        <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Status na Empresa</h3>
                        <div className="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-700">
                          <Select 
                            label="Situação Atual" theme={theme} value={formData.status} 
                            onChange={e => setFormData({...formData, status: e.target.value})}
                            options={[ {value: 'Ativo', label: 'Ativo / Trabalhando'}, {value: 'Desligado', label: formData.employeeType === 'Freelancer' ? 'Desligado / Inativo' : 'Desligado (Ex-funcionário)'} ]}

                          {formData.status === 'Desligado' && (
