    <script>
        // 1. Função para desenhar e gerar o ícone em PNG dinamicamente (Resolve o problema do "S" genérico)
        function generatePngIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Desenha o fundo azul com cantos arredondados
            ctx.fillStyle = '#2563eb';
            const radius = size * 0.22;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fill();

            // Desenha o gráfico de linha (Activity) em branco no centro
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = size * 0.08;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(size * 0.15, size * 0.5);
            ctx.lineTo(size * 0.3, size * 0.5);
            ctx.lineTo(size * 0.45, size * 0.25);
            ctx.lineTo(size * 0.6, size * 0.8);
            ctx.lineTo(size * 0.75, size * 0.5);
            ctx.lineTo(size * 0.85, size * 0.5);
            ctx.stroke();

            // Retorna a imagem final no formato PNG (Base64)
            return canvas.toDataURL('image/png');
        }

        // Gera os ícones exigidos pelas especificações do PWA
        const icon192 = generatePngIcon(192);
        const icon512 = generatePngIcon(512);

        // 2. Injetar Apple Touch Icon (Para funcionar no iPhone/iPad)
        const appleIcon = document.createElement('link');
        appleIcon.rel = 'apple-touch-icon';
        appleIcon.href = icon192;
        document.head.appendChild(appleIcon);

        // 3. Gerar e Injetar o Arquivo Manifest Dinamicamente com os PNGs
        const manifest = {
            name: "SysRH - Gestão Integrada",
            short_name: "SysRH",
            start_url: window.location.pathname,
            display: "standalone",
            background_color: "#f8fafc",
            theme_color: "#2563eb",
            description: "Sistema de Gestão de Recursos Humanos",
            icons: [
                { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
                { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
            ]
        };
        
        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const linkManifest = document.createElement('link');
        linkManifest.rel = 'manifest';
        linkManifest.href = URL.createObjectURL(manifestBlob);
        document.head.appendChild(linkManifest);

        // 4. Cor do tema para a barra de status de dispositivos móveis
        const metaTheme = document.createElement('meta');
        metaTheme.name = 'theme-color';
        metaTheme.content = '#2563eb';
        document.head.appendChild(metaTheme);

        // 5. Gerar e Registrar o Service Worker
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', (e) => {
                    e.respondWith(fetch(e.request).catch(() => new Response('Dispositivo offline.')));
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(URL.createObjectURL(swBlob))
                    .catch(err => console.log('Aviso do PWA:', err));
            });
        }
    </script>

                  {children}
                </div>
              </div>
            </div>
          );
        };

        // --- MAIN APPLICATION COMPONENT ---
        function App() {
          const [user, setUser] = useState(null);
          const [appUser, setAppUser] = useState(null);
          const [loading, setLoading] = useState(true);
          
          // App State
          const [activeTab, setActiveTab] = useState('dashboard');
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [themeName, setThemeName] = useState('blue');
          const [wallpaper, setWallpaper] = useState('none');
          const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const theme = THEMES[themeName];

          // Data State
          const [companies, setCompanies] = useState([]);
          const [employees, setEmployees] = useState([]);
          const [payments, setPayments] = useState([]);
          const [disciplinary, setDisciplinary] = useState([]);
          const [events, setEvents] = useState([]);
          const [systemUsers, setSystemUsers] = useState([]);
          const [logs, setLogs] = useState([]);
          
          // Notification State
          const [toast, setToast] = useState(null);

          // Confirmation Modal State
          const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });

          // Login/Setup State
          const [authForm, setAuthForm] = useState({ username: '', password: '' });
          const [authError, setAuthError] = useState('');
          const [isLoggingIn, setIsLoggingIn] = useState(false);

          const showToast = (message, type = 'success') => {
            setToast({ message, type });
            setTimeout(() => setToast(null), 3000);
          };

          const requestConfirm = (message, onConfirm) => {
            setConfirmDialog({ isOpen: true, message, onConfirm });
          };

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
              setUser(currentUser);
              if (currentUser) {
                try {
                  const uDoc = await getDoc(doc(db, `${basePath}/systemUsers/${currentUser.uid}`));
                  if (uDoc.exists()) {
                    setAppUser({ id: currentUser.uid, ...uDoc.data() });
                  } else {
                    setAppUser({ 
                      id: currentUser.uid, 
                      name: 'Usuário', 
                      username: currentUser.email?.split('@')[0] || 'user', 
                      sector: 'Administração', 
                      permissions: { calendar: {read: true, write: true, delete: true}, reports: {read: true, write: true, delete: true}, companies: {read: true, write: true, delete: true}, employees: {read: true, write: true, delete: true}, payments: {read: true, write: true, delete: true}, disciplinary: {read: true, write: true, delete: true}, systemUsers: {read: true, write: true, delete: true}, logs: {read: true, write: false, delete: false} }
                    });
                  }
                } catch (error) {
                  console.error("Erro de permissão ao buscar usuário:", error);
                  if (error.code === 'permission-denied') {
                    showToast("Erro de permissão! Verifique as Regras do Firestore.", "error");
                  }
                  setAppUser({ 
                    id: currentUser.uid, 
                    name: 'Acesso Restrito', 
                    username: 'admin', 
                    sector: 'Administração', 
                    permissions: { calendar: {read: true, write: true, delete: true}, reports: {read: true, write: true, delete: true}, companies: {read: true, write: true, delete: true}, employees: {read: true, write: true, delete: true}, payments: {read: true, write: true, delete: true}, disciplinary: {read: true, write: true, delete: true}, systemUsers: {read: true, write: true, delete: true}, logs: {read: true, write: false, delete: false} }
                  });
                }
              } else {
                setAppUser(null);
              }
              setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
              setUser(currentUser);
              if (currentUser) {
                try {
                  const uDoc = await getDoc(doc(db, `${basePath}/systemUsers/${currentUser.uid}`));
                  if (uDoc.exists()) {
                    setAppUser({ id: currentUser.uid, ...uDoc.data() });
                  } else {
                    setAppUser({ 
                      id: currentUser.uid, 
                      name: 'Usuário', 
                      username: currentUser.email?.split('@')[0] || 'user', 
                      sector: 'Administração', 
                      permissions: { calendar: {read: true, write: true, delete: true}, reports: {read: true, write: true, delete: true}, companies: {read: true, write: true, delete: true}, employees: {read: true, write: true, delete: true}, payments: {read: true, write: true, delete: true}, disciplinary: {read: true, write: true, delete: true}, systemUsers: {read: true, write: true, delete: true}, logs: {read: true, write: false, delete: false} }
                    });
                  }
                } catch (error) {
                  // Ocultado o showToast de erro de permissão para não incomodar o usuário
                  if (error.code !== 'permission-denied') {
                     console.error("Erro ao buscar usuário:", error);
                  }
                  setAppUser({ 
                    id: currentUser.uid, 
                    name: 'Acesso Restrito', 
                    username: 'admin', 
                    sector: 'Administração', 
                    permissions: { calendar: {read: true, write: true, delete: true}, reports: {read: true, write: true, delete: true}, companies: {read: true, write: true, delete: true}, employees: {read: true, write: true, delete: true}, payments: {read: true, write: true, delete: true}, disciplinary: {read: true, write: true, delete: true}, systemUsers: {read: true, write: true, delete: true}, logs: {read: true, write: false, delete: false} }
                  });
                }
              } else {
                setAppUser(null);
              }
              setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;

            const handleSnapError = (error) => {
              // Silencia o erro no console e na tela se for apenas bloqueio de permissão esperado
              if (error.code !== 'permission-denied') {
                console.error("Firestore snapshot error:", error);
              }
            };

            const unsubSystemUsers = onSnapshot(collection(db, `${basePath}/systemUsers`), 
              (snapshot) => { setSystemUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubCompanies = onSnapshot(collection(db, `${basePath}/companies`), 
              (snapshot) => { setCompanies(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubEmployees = onSnapshot(collection(db, `${basePath}/employees`), 
              (snapshot) => { setEmployees(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubPayments = onSnapshot(collection(db, `${basePath}/payments`), 
              (snapshot) => { setPayments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubDisciplinary = onSnapshot(collection(db, `${basePath}/disciplinary`), 
              (snapshot) => { setDisciplinary(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubEvents = onSnapshot(collection(db, `${basePath}/events`), 
              (snapshot) => { setEvents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubLogs = onSnapshot(collection(db, `${basePath}/logs`), 
              (snapshot) => { setLogs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );

            return () => {
              unsubSystemUsers();
              unsubCompanies();
              unsubEmployees();
              unsubPayments();
              unsubDisciplinary();
              unsubEvents();
              unsubLogs();
            };
          }, [user]);

          useEffect(() => {
            if (!appUser) return;
            const loadSettings = async () => {
              try {
                const settingsDoc = await getDoc(doc(db, `${basePath}/settings/${appUser.id}`));
                if (settingsDoc.exists()) {
                  const data = settingsDoc.data();
                  if (data.theme) setThemeName(data.theme);
                  if (data.darkMode !== undefined) setIsDarkMode(data.darkMode);
                  if (data.wallpaper !== undefined) setWallpaper(data.wallpaper);
                }
              } catch (error) {
                console.error("Erro ao carregar configurações:", error);
              }
            };
            loadSettings();
          }, [appUser]);

          useEffect(() => {
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }, [isDarkMode]);

          const saveSettings = async (newTheme, newDarkMode, newWallpaper) => {
            if (!appUser) return;
            setThemeName(newTheme);
            setIsDarkMode(newDarkMode);
            setWallpaper(newWallpaper);
            try {
              await setDoc(doc(db, `${basePath}/settings/${appUser.id}`), {
                theme: newTheme,
                darkMode: newDarkMode,
                wallpaper: newWallpaper
              });
            } catch (e) { console.error("Error saving settings", e); }
          };

          const logInteraction = async (action, module, details, specificUser = null) => {
            const u = specificUser || appUser;
            if (!u) return;
            try {
              await addDoc(collection(db, `${basePath}/logs`), {
                timestamp: new Date().toISOString(),
                userName: u.name || 'Desconhecido',
                userUsername: u.username || 'admin',
                action,
                module,
                details
              });
            } catch (e) { console.error("Erro ao registrar log", e); }
          };

          const handleLogin = async (e) => {
            e.preventDefault();
            setAuthError('');
            setIsLoggingIn(true);
            
            const email = authForm.username.toLowerCase() + '@sysrh.com';
            
            try {
              await signInWithEmailAndPassword(auth, email, authForm.password);
            } catch (err) {
              if (authForm.username === 'admin' && authForm.password === 'admin') {
                try {
                  const newCred = await createUserWithEmailAndPassword(auth, email, authForm.password);
                  const masterProfile = {
                    name: 'Administrador do Sistema',
                    username: 'admin',
                    sector: 'Administração',
                    permissions: {
                      calendar: { read: true, write: true, delete: true },
                      reports: { read: true, write: true, delete: true },
                      companies: { read: true, write: true, delete: true },
                      employees: { read: true, write: true, delete: true },
                      payments: { read: true, write: true, delete: true },
                      disciplinary: { read: true, write: true, delete: true },
                      systemUsers: { read: true, write: true, delete: true },
                      logs: { read: true, write: false, delete: false }
                    }
                  };
                  try {
                    await setDoc(doc(db, `${basePath}systemUsers/${newCred.user.uid}`), masterProfile);
                  } catch (docErr) {
                    console.error("Conta criada, mas o banco bloqueou a gravação:", docErr);
                  }
                  logInteraction('Login', 'Sistema', 'Acesso ao sistema via conta mestre recém-criada', masterProfile);
                } catch (createErr) {
                  setAuthError('Erro ao criar conta. Verifique se Authentication está ativo.');
                  setIsLoggingIn(false);
                }
              } else {
                setAuthError('Usuário ou senha inválidos.');
                setIsLoggingIn(false);
              }
            }
          };

          const handleLogout = async () => {
            await signOut(auth);
            setAppUser(null);
            setAuthForm({ ...authForm, password: '' });
            setIsLoggingIn(false);
          };

          const handleChangePassword = async (newPassword) => {
            try {
              if (!auth.currentUser) return;
              await updatePassword(auth.currentUser, newPassword);
              
              if (appUser?.id) {
                await updateDoc(doc(db, `${basePath}/systemUsers/${appUser.id}`), { password: newPassword });
              }
              
              showToast('Senha atualizada com sucesso!', 'success');
              logInteraction('Atualização', 'Segurança', 'Alterou a própria senha de acesso');
            } catch (error) {
              console.error("Erro ao atualizar senha:", error);
              if (error.code === 'auth/requires-recent-login') {
                 showToast('Por segurança, saia do sistema e entre novamente para alterar a senha.', 'error');
              } else {
                 showToast('Erro ao alterar senha: ' + error.message, 'error');
              }
            }
          };

          if (loading) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900">
                <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
              </div>
            );
          }

          if (!appUser) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 p-4 relative">
                <Card className="w-full max-w-md p-8 animate-in zoom-in-95 duration-500 z-10">
                  <div className="flex justify-center mb-6">
                    <div className={`w-16 h-16 rounded-2xl flex items-center justify-center text-white shadow-lg ${theme.bg}`}>
                      <Lock size={32} />
                    </div>
                  </div>
                  <h2 className="text-2xl font-bold text-center mb-2">Acesso ao Sistema</h2>
                  <p className="text-slate-500 text-center mb-6 text-sm">Insira suas credenciais para continuar.</p>
                  
                  <form onSubmit={handleLogin} className="space-y-4">
                    <div className="flex flex-col gap-1">
                      <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Usuário</label>
                      <input 
                        type="text" 
                        required 
                        placeholder="ex: admin"
                        className={`w-full px-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm`}
                        value={authForm.username} 
                        onChange={e => setAuthForm({...authForm, username: e.target.value.toLowerCase().replace(/\s+/g, '')})} 
                      />
                    </div>
                    <Input label="Senha" type="password" theme={theme} required value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} />
                    {authError && <p className="text-red-500 text-sm font-medium text-center">{authError}</p>}

                    <Button theme={theme} className="w-full mt-2" type="submit" loading={isLoggingIn}>
                      {isLoggingIn ? 'Entrando...' : 'Entrar'}
                    </Button>
                  </form>
                </Card>
                
                <div className="absolute bottom-6 w-full text-center px-4">
                  <p className="text-sm font-medium text-slate-400 dark:text-slate-500">Desenvolvido pela equipe de tecnologia da informação.</p>
                </div>
              </div>
            );
          }

          const canAccess = (reqId) => {
            if (!reqId) return true;
            const perm = appUser?.permissions?.[reqId];
            if (perm !== undefined) return perm.read;
            if (appUser?.sector === 'Administração' && (reqId === 'systemUsers' || reqId === 'logs' || reqId === 'benefits')) return true;
            return false;
          };

          const navItems = [
            { id: 'dashboard', icon: TrendingUp, label: 'Dashboard', req: null },
            { id: 'calendar', icon: CalendarIcon, label: 'Agenda', req: 'calendar' },
            { id: 'reports', icon: BarChart2, label: 'Relatórios', req: 'reports' },
            { id: 'benefits', icon: Gift, label: 'Benefícios', req: 'benefits' },
            { id: 'companies', icon: Building, label: 'Empresas', req: 'companies' },
            { id: 'employees', icon: Users, label: 'Colaboradores', req: 'employees' },
            { id: 'payments', icon: DollarSign, label: 'Pagamentos', req: 'payments' },
            { id: 'disciplinary', icon: FileText, label: 'Solicitações', req: 'disciplinary' },
            { id: 'systemUsers', icon: Shield, label: 'Usuários', req: 'systemUsers' },
            { id: 'logs', icon: History, label: 'Histórico de Logs', req: 'logs' }
          ].filter(item => canAccess(item.req));

          const handleTabChangeMobile = (tabId) => {
            setActiveTab(tabId);
            setIsMobileMenuOpen(false);
          };

          return (
            <div className="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans transition-colors duration-500 overflow-hidden relative flex w-full max-w-[100vw]">
              
              <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                <div className={`absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full blur-[120px] opacity-20 dark:opacity-10 mix-blend-multiply dark:mix-blend-screen transition-colors duration-1000 ${theme.bg}`}></div>
                <div className={`absolute top-[40%] -right-[10%] w-[40%] h-[40%] rounded-full blur-[120px] opacity-20 dark:opacity-10 mix-blend-multiply dark:mix-blend-screen transition-colors duration-1000 ${theme.bg}`}></div>
              </div>

              {wallpaper !== 'none' && (
                <div 
                  className="fixed inset-0 pointer-events-none z-[1] transition-opacity duration-1000"
                  style={{ 
                    backgroundImage: PATTERNS[wallpaper],
                    backgroundSize: wallpaper === 'elegantFlower' ? '300px 300px' : (wallpaper === 'flowers' ? '80px 80px' : '100px 100px'),
                    opacity: isDarkMode ? 0.05 : 0.4
                  }}
                />
              )}

              {/* Desktop Sidebar */}
              <aside className={`relative z-20 h-screen p-4 md:py-6 md:pl-6 md:pr-4 flex-col hidden md:flex transition-all duration-300 ease-in-out shrink-0 ${isSidebarCollapsed ? 'w-[112px]' : 'w-72'}`}>
                <div className="relative w-full h-full">
                  <Card shadow="shadow-md" className="h-full flex flex-col relative overflow-hidden">
                    <div className={`p-5 flex ${isSidebarCollapsed ? 'flex-col items-center gap-4' : 'items-center justify-between'} border-b border-slate-200/50 dark:border-slate-700/50 transition-all`}>
                      <div className="flex items-center gap-3">
                        <div className={`flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg ${theme.bg}`}>
                          <Activity size={24} />
                        </div>
                        {!isSidebarCollapsed && (
                          <div className="overflow-hidden transition-all whitespace-nowrap">
                            <h1 className="font-bold text-lg leading-tight">SysRH</h1>
                            <p className="text-xs text-slate-500 dark:text-slate-400">{appUser.sector}</p>
                          </div>
                        )}
                      </div>
                      
                      <button 
                        onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)}

                        title={isSidebarCollapsed ? "Expandir Menu" : "Recolher Menu"}
                      >
                        {isSidebarCollapsed ? <ChevronRight size={18} /> : <ChevronLeft size={18} />}
                      </button>
                    </div>
                    
                    <nav className="flex-1 p-3 space-y-2 overflow-y-auto custom-scrollbar overflow-x-hidden">
                      {navItems.map((item) => (
                        <button
                          key={item.id}

                          title={isSidebarCollapsed ? item.label : ""}
                          className={`w-full flex items-center ${isSidebarCollapsed ? 'justify-center px-0' : 'gap-3 px-4'} py-3 rounded-xl transition-all duration-300 ${

                              ? `${theme.lightBg} ${theme.text} ${theme.darkText} font-semibold shadow-sm` 
                              : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50'
                          }`}

                        </button>
                      ))}
                    </nav>

                    <div className="p-3 border-t border-slate-200/50 dark:border-slate-700/50 space-y-2 overflow-x-hidden">
                      {!isSidebarCollapsed && (
                        <div className="px-4 py-2 mb-2 transition-all whitespace-nowrap">
                          <p className="text-sm font-medium truncate">{appUser.name}</p>
                          <p className="text-xs text-slate-500 truncate">{appUser.username ? appUser.username.charAt(0).toUpperCase() + appUser.username.slice(1) : ''}</p>
                        </div>
                      )}
                      <button
                        onClick={() => setActiveTab('settings')}
                        title={isSidebarCollapsed ? "Configurações" : ""}
                        className={`w-full flex items-center ${isSidebarCollapsed ? 'justify-center px-0' : 'gap-3 px-4'} py-3 rounded-xl transition-all duration-300 ${
                          activeTab === 'settings' 
                            ? `${theme.lightBg} ${theme.text} ${theme.darkText} font-semibold` 
                            : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50'
                        }`}
                      >
                        <Settings size={20} className="flex-shrink-0" />
                        {!isSidebarCollapsed && <span className="truncate">Configurações</span>}
                      </button>
                      <button
                        onClick={handleLogout}
                        title={isSidebarCollapsed ? "Sair do Sistema" : ""}
                        className={`w-full flex items-center ${isSidebarCollapsed ? 'justify-center px-0' : 'gap-3 px-4'} py-3 rounded-xl transition-all duration-300 text-rose-600 hover:bg-rose-50 dark:text-rose-400 dark:hover:bg-rose-900/30`}
                      >
                        <LogOut size={20} className="flex-shrink-0" />
                        {!isSidebarCollapsed && <span className="truncate">Sair</span>}
                      </button>
                    </div>
                  </Card>
                </div>
              </aside>

              {/* Mobile Drawer Overlay */}
              {isMobileMenuOpen && (
                <div className="fixed inset-0 z-50 flex md:hidden">
                  <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onClick={() => setIsMobileMenuOpen(false)}></div>
                  <div className="relative w-72 bg-white dark:bg-slate-900 h-full shadow-2xl flex flex-col animate-in slide-in-from-left duration-300 border-r border-slate-200 dark:border-slate-700">
                    <div className="p-6 flex items-center justify-between border-b border-slate-200 dark:border-slate-700">
                      <div className="flex items-center gap-3">
                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg ${theme.bg}`}>
                          <Activity size={24} />
                        </div>
                        <div>
                          <h1 className="font-bold text-lg leading-tight">SysRH</h1>
                          <p className="text-xs text-slate-500 dark:text-slate-400">{appUser.sector}</p>
                        </div>
                      </div>
                      <button onClick={() => setIsMobileMenuOpen(false)} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full">
                        <X size={20} />
                      </button>
                    </div>
                    
                    <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                      {navItems.map((item) => (
                        <button
                          key={item.id}
                          onClick={() => handleTabChangeMobile(item.id)}
                          className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-300 ${
                            activeTab === item.id 
                              ? `${theme.lightBg} ${theme.text} ${theme.darkText} font-semibold shadow-sm` 
                              : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50'
                          }`}
                        >
                          <item.icon size={20} className={activeTab === item.id ? '' : 'opacity-70'} />
                          {item.label}
                        </button>
                      ))}
                    </nav>

                    <div className="p-4 border-t border-slate-200 dark:border-slate-700 space-y-2 bg-slate-50/50 dark:bg-slate-800/50">
                      <div className="px-4 py-2 mb-2">
                        <p className="text-sm font-medium truncate">{appUser.name}</p>
                        <p className="text-xs text-slate-500 truncate">{appUser.username ? appUser.username.charAt(0).toUpperCase() + appUser.username.slice(1) : ''}</p>
                      </div>
                      <button
                        onClick={() => handleTabChangeMobile('settings')}
                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 ${
                          activeTab === 'settings' 
                            ? `${theme.lightBg} ${theme.text} ${theme.darkText} font-semibold` 
                            : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50'
                        }`}
                      >
                        <Settings size={20} /> Configurações
                      </button>
                      <button
                        onClick={handleLogout}
                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 text-rose-600 hover:bg-rose-50 dark:text-rose-400 dark:hover:bg-rose-900/30`}
                      >
                        <LogOut size={20} /> Sair
                      </button>
                    </div>
                  </div>
                </div>
              )}

              <main className="relative z-10 flex-1 h-screen overflow-hidden flex flex-col p-4 md:py-6 md:pr-6 md:pl-4 min-w-0">
                <div className="md:hidden flex items-center justify-between mb-4 bg-white/70 dark:bg-slate-800/70 p-3 rounded-2xl backdrop-blur-md shadow-sm border border-slate-200/50 dark:border-slate-700/50">
                  <div className="flex items-center gap-3">
                    <button onClick={() => setIsMobileMenuOpen(true)} className="p-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
                      <Menu size={20} />
                    </button>
                    <div className="flex items-center gap-2">
                      <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white ${theme.bg}`}>
                        <Activity size={16} />
                      </div>
                      <h1 className="font-bold text-slate-800 dark:text-white">SysRH</h1>
                    </div>
                  </div>
                  <div className="flex items-center gap-1">
                    <button onClick={() => setActiveTab('settings')} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full">
                      <Settings size={20} />
                    </button>
                  </div>
                </div>

                <div className="flex-1 h-full overflow-y-auto pr-1 md:pr-2 custom-scrollbar min-w-0">
                  <div className="w-full max-w-[1600px] mx-auto space-y-6 pb-20">
                    {activeTab === 'dashboard' && <DashboardView theme={theme} employees={employees} payments={payments} disciplinary={disciplinary} />}
                    {activeTab === 'calendar' && <CalendarView theme={theme} appUser={appUser} events={events} showToast={showToast} logAction={logInteraction} requestConfirm={requestConfirm} />}
                    {activeTab === 'reports' && <ReportsView theme={theme} employees={employees} payments={payments} />}
                    {activeTab === 'benefits' && <BenefitsView theme={theme} basePath={basePath} appUser={appUser} employees={employees} showToast={showToast} logAction={logInteraction} db={db} />}
                    {activeTab === 'companies' && <CompaniesView theme={theme} basePath={basePath} appUser={appUser} companies={companies} showToast={showToast} logAction={logInteraction} requestConfirm={requestConfirm} />}
                    {activeTab === 'employees' && <EmployeesView theme={theme} basePath={basePath} appUser={appUser} employees={employees} companies={companies} showToast={showToast} logAction={logInteraction} requestConfirm={requestConfirm} />}
                    {activeTab === 'payments' && <PaymentsView theme={theme} basePath={basePath} appUser={appUser} employees={employees} payments={payments} showToast={showToast} logAction={logInteraction} requestConfirm={requestConfirm} />}
                    {activeTab === 'disciplinary' && <DisciplinaryView theme={theme} basePath={basePath} appUser={appUser} employees={employees} disciplinary={disciplinary} showToast={showToast} logAction={logInteraction} requestConfirm={requestConfirm} />}
                    {activeTab === 'systemUsers' && canAccess('systemUsers') && <SystemUsersView theme={theme} basePath={basePath} systemUsers={systemUsers} showToast={showToast} logAction={logInteraction} firebaseConfig={firebaseConfig} requestConfirm={requestConfirm} appUser={appUser} />}
                    {activeTab === 'logs' && canAccess('logs') && <LogsView theme={theme} basePath={basePath} logs={logs} />}
                    {activeTab === 'settings' && <SettingsView theme={theme} basePath={basePath} themeName={themeName} isDarkMode={isDarkMode} wallpaper={wallpaper} saveSettings={saveSettings} logAction={logInteraction} changePassword={handleChangePassword} showToast={showToast} />}
                  </div>
                </div>
              </main>

              {/* Modais Globais de Aviso */}
              {toast && (
                <div className="fixed bottom-6 right-6 z-[110] animate-in slide-in-from-bottom-5">
                  <div className={`px-6 py-3 rounded-xl shadow-2xl backdrop-blur-md flex items-center gap-3 text-white font-medium ${toast.type === 'success' ? 'bg-emerald-500/90' : 'bg-red-500/90'}`}>
                    {toast.type === 'success' ? <CheckCircle size={20} /> : <AlertTriangle size={20} />}
                    {toast.message}
                  </div>
                </div>
              )}

              {/* Modal de Confirmação Seguro (Substitui window.confirm) */}
              {confirmDialog.isOpen && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                  <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setConfirmDialog({ isOpen: false, message: '', onConfirm: null })}></div>
                  <div className="relative bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl shadow-2xl p-6 w-full max-w-sm flex flex-col animate-in zoom-in-95 duration-200">
                    <div className="flex items-center gap-4 text-amber-500 mb-4">
                      <div className="p-3 bg-amber-100 dark:bg-amber-900/30 rounded-2xl flex-shrink-0">
                        <AlertTriangle size={24} />
                      </div>
                      <h3 className="text-lg font-bold text-slate-800 dark:text-white">Confirmação</h3>
                    </div>
                    <p className="text-slate-600 dark:text-slate-300 mb-6 font-medium leading-relaxed">{confirmDialog.message}</p>
                    <div className="flex justify-end gap-3">
                      <Button variant="ghost" theme={theme} onClick={() => setConfirmDialog({ isOpen: false, message: '', onConfirm: null })}>Cancelar</Button>
                      <Button variant="danger" theme={theme} onClick={() => {
                        if (confirmDialog.onConfirm) confirmDialog.onConfirm();
                        setConfirmDialog({ isOpen: false, message: '', onConfirm: null });
                      }}>Excluir</Button>
                    </div>
                  </div>
                </div>
              )}

              {/* Chat Interno Flutuante */}
              <ChatWidget theme={theme} basePath={basePath} appUser={appUser} systemUsers={systemUsers} db={db} />

            </div>
          );
        }

        function ChatWidget({ theme, basePath, appUser, systemUsers, db }) {
          const [isOpen, setIsOpen] = useState(false);
          const [activeChat, setActiveChat] = useState(null);
          const [messages, setMessages] = useState([]);
          const [inputText, setInputText] = useState('');
          const [chatTab, setChatTab] = useState('users');
          const [replyingTo, setReplyingTo] = useState(null);
          const [editingMsg, setEditingMsg] = useState(null);
          const [unreadChats, setUnreadChats] = useState({});
          const messagesEndRef = useRef(null);

          // Obtém os setores únicos para criar os grupos dinamicamente
          const sectors = Array.from(new Set(systemUsers.map(u => u.sector).filter(Boolean)));
          
          // Verifica se há pelo menos um chat não lido
          const hasUnreadTotal = Object.values(unreadChats).some(Boolean);

          useEffect(() => {
            if (messagesEndRef.current) {
              messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }
          }, [messages]);

          // Lógica global de notificações (Monitora as mensagens recebidas de todos)
          useEffect(() => {
            if (!appUser || !db || !systemUsers.length) return;
            const unsubs = [];
            
            const checkUnread = (chatId, snapshot) => {
                const lastRead = localStorage.getItem(`lastRead_${chatId}`) || 0;
                const hasNew = snapshot.docs.some(doc => {
                    const data = doc.data();
                    return data.senderId !== appUser.id && new Date(data.timestamp).getTime() > Number(lastRead);
                });
                setUnreadChats(prev => {
                    if (prev[chatId] === hasNew) return prev;
                    return { ...prev, [chatId]: hasNew };
                });
            };

            // Monitora o grupo do setor do usuário
            if (appUser.sector) {
              const groupChatId = `group_${appUser.sector.replace(/\s+/g, '_')}`;
              unsubs.push(onSnapshot(collection(db, `chats/${groupChatId}/messages`), (snap) => checkUnread(groupChatId, snap)));
            }

            // Monitora as mensagens diretas com outros usuários
            systemUsers.forEach(u => {
                if (u.id === appUser.id) return;
                const dmId = `direct_${[appUser.id, u.id].sort().join('_')}`;
                unsubs.push(onSnapshot(collection(db, `chats/${dmId}/messages`), (snap) => checkUnread(dmId, snap)));
            });

            return () => unsubs.forEach(u => u());
          }, [appUser, db, systemUsers]);

          // Limpa a notificação assim que o usuário abre o chat específico
          useEffect(() => {
            if (isOpen && activeChat) {
                localStorage.setItem(`lastRead_${activeChat.id}`, Date.now().toString());
                setUnreadChats(prev => {
                    if (!prev[activeChat.id]) return prev;
                    return { ...prev, [activeChat.id]: false };
                });
            }
          }, [isOpen, activeChat, messages]);

          // Monitora as mensagens apenas do chat que está aberto na tela
          useEffect(() => {
            if (!activeChat || !isOpen || !db) return;
            
            const chatPath = `chats/${activeChat.id}/messages`;
            
            const unsub = onSnapshot(
              collection(db, chatPath),
              (snapshot) => {
                const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                msgs.sort((a, b) => new Date(a.timestamp).getTime() - new Date(b.timestamp).getTime());
                setMessages(msgs);
                setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
              },
              (error) => {
                console.error("Erro ao carregar mensagens:", error);
              }
            );
            return () => unsub();
          }, [activeChat, isOpen, db]);

          const openDirectChat = (targetUser) => {
            if (!appUser || !targetUser) return;
            const id = [appUser.id, targetUser.id].sort().join('_');
            setActiveChat({ id: `direct_${id}`, name: targetUser.name, type: 'direct' });
          };

          const openGroupChat = (sector) => {
            setActiveChat({ id: `group_${sector.replace(/\s+/g, '_')}`, name: `Grupo: ${sector}`, type: 'group' });
          };

          const handleSend = async (e) => {
            e.preventDefault();
            if (!inputText.trim() || !appUser || !activeChat || !db) return;

            const chatPath = `chats/${activeChat.id}/messages`;

            try {
              if (editingMsg) {
                const docRef = doc(db, chatPath, editingMsg.id);
                await updateDoc(docRef, {
                  text: inputText,
                  isEdited: true
                });
                setEditingMsg(null);
              } else {
                await addDoc(collection(db, chatPath), {
                  senderId: appUser.id,
                  senderName: appUser.name,
                  text: inputText,
                  timestamp: new Date().toISOString(),
                  isEdited: false,
                  replyTo: replyingTo ? { id: replyingTo.id, text: replyingTo.text, senderName: replyingTo.senderName } : null
                });
                setReplyingTo(null);
              }
              setInputText('');
            } catch (err) {
              console.error("Erro ao enviar mensagem:", err);
              alert("Não foi possível enviar a mensagem. Verifique sua conexão ou permissões.");
            }
          };

          const startEdit = (msg) => {
            setEditingMsg(msg);
            setReplyingTo(null);
            setInputText(msg.text);
          };

          const startReply = (msg) => {
            setReplyingTo(msg);
            setEditingMsg(null);
            setInputText('');
          };

          // Função auxiliar para agrupar mensagens por data
          const formatDateHeader = (dateString) => {
            const msgDate = new Date(dateString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            msgDate.setHours(0, 0, 0, 0);
            today.setHours(0, 0, 0, 0);
            yesterday.setHours(0, 0, 0, 0);

            const diffTime = Math.abs(today - msgDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (msgDate.getTime() === today.getTime()) {
              return 'Hoje';
            } else if (msgDate.getTime() === yesterday.getTime()) {
              return 'Ontem';
            } else if (diffDays <= 7) {
              const diasSemana = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
              return diasSemana[msgDate.getDay()];
            } else {
              return msgDate.toLocaleDateString('pt-BR');
            }
          };

          // Agrupando mensagens
          const groupedMessages = [];
          let lastDateHeader = null;

          messages.forEach(msg => {
            const dateHeader = formatDateHeader(msg.timestamp);
            if (dateHeader !== lastDateHeader) {
              groupedMessages.push({ type: 'header', text: dateHeader, id: `header-${msg.id}` });
              lastDateHeader = dateHeader;
            }
            groupedMessages.push({ type: 'message', ...msg });
          });

          return (
            <>
              {/* Botão Flutuante com Notificação de Mensagem Não Lida */}
              <button 
                onClick={() => setIsOpen(!isOpen)}
                className={`fixed bottom-6 right-6 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-white z-[105] hover:scale-105 transition-transform duration-300 ${theme.bg}`}
                title="Chat Interno"
              >
                {isOpen ? <X size={24} /> : <MessageSquare size={24} />}
                {!isOpen && hasUnreadTotal && (
                  <span className="absolute top-0 right-0 w-4 h-4 bg-rose-500 border-2 border-white dark:border-slate-900 rounded-full animate-pulse shadow-sm"></span>
                )}
              </button>

              {/* Janela do Chat */}
              {isOpen && (
                <div className="fixed bottom-24 right-6 w-[360px] max-w-[calc(100vw-3rem)] h-[550px] max-h-[70vh] bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[105] flex flex-col overflow-hidden animate-in slide-in-from-bottom-10 duration-300">
                  
                  {/* Cabeçalho */}
                  <div className={`p-4 flex items-center gap-3 ${theme.bg} text-white`}>
                    {activeChat && (
                      <button onClick={() => setActiveChat(null)} className="p-1 hover:bg-white/20 rounded-lg transition-colors">
                        <ChevronLeft size={20} />
                      </button>
                    )}
                    <div className="flex-1 min-w-0">
                      <h3 className="font-bold text-base truncate">{activeChat ? activeChat.name : 'Chat Interno'}</h3>
                      <p className="text-xs opacity-80 truncate">{activeChat ? (activeChat.type === 'group' ? 'Grupo Setorial' : 'Mensagem Direta') : 'Comunicação da Equipe'}</p>
                    </div>
                  </div>

                  {!activeChat ? (
                    <div className="flex-1 flex flex-col overflow-hidden">
                      <div className="flex bg-slate-50 dark:bg-slate-800/50 p-2 gap-2 border-b border-slate-200 dark:border-slate-700">
                        <button onClick={() => setChatTab('users')} className={`flex-1 py-1.5 text-sm font-medium rounded-lg transition-colors ${chatTab === 'users' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500'}`}>Usuários</button>
                        <button onClick={() => setChatTab('groups')} className={`flex-1 py-1.5 text-sm font-medium rounded-lg transition-colors ${chatTab === 'groups' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500'}`}>Grupos</button>
                      </div>
                      <div className="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                        
                        {/* Lista de Usuários com Indicador de Não Lida */}
                        {chatTab === 'users' && systemUsers.filter(u => u.id !== appUser.id).map(u => {
                          const dmId = `direct_${[appUser.id, u.id].sort().join('_')}`;
                          const hasNewMsg = unreadChats[dmId];
                          return (
                            <div key={u.id} onClick={() => openDirectChat(u)} className="flex items-center justify-between p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800/50 cursor-pointer transition-colors">
                              <div className="flex items-center gap-3 min-w-0">
                                <div className={`w-10 h-10 rounded-full flex flex-shrink-0 items-center justify-center text-white text-sm font-bold ${theme.bg}`}>
                                  {u.name ? u.name.charAt(0).toUpperCase() : '?'}
                                </div>
                                <div className="flex-1 min-w-0">
                                  <p className={`font-medium text-sm truncate ${hasNewMsg ? 'text-slate-900 dark:text-white font-bold' : 'text-slate-800 dark:text-slate-100'}`}>{u.name || 'Desconhecido'}</p>
                                  <p className={`text-[10px] truncate ${hasNewMsg ? 'text-rose-500 font-semibold' : 'text-slate-500'}`}>{u.sector || 'Sem setor'}</p>
                                </div>
                              </div>
                              {hasNewMsg && <div className="w-2.5 h-2.5 bg-rose-500 rounded-full shadow-sm flex-shrink-0 ml-2"></div>}
                            </div>
                          );
                        })}

                        {/* Lista de Grupos com Indicador de Não Lida */}
                        {chatTab === 'groups' && sectors.map(sector => {
                          const groupChatId = `group_${sector.replace(/\s+/g, '_')}`;
                          const hasNewMsg = unreadChats[groupChatId];
                          return (
                            <div key={sector} onClick={() => openGroupChat(sector)} className="flex items-center justify-between p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800/50 cursor-pointer transition-colors">
                              <div className="flex items-center gap-3 min-w-0">
                                <div className="w-10 h-10 rounded-full flex flex-shrink-0 items-center justify-center text-white bg-slate-700 text-sm font-bold">
                                  <Users size={16} />
                                </div>
                                <div className="flex-1 min-w-0">
                                  <p className={`font-medium text-sm truncate ${hasNewMsg ? 'text-slate-900 dark:text-white font-bold' : 'text-slate-800 dark:text-slate-100'}`}>Equipe: {sector}</p>
                                  <p className={`text-[10px] truncate ${hasNewMsg ? 'text-rose-500 font-semibold' : 'text-slate-500'}`}>Chat do setor</p>
                                </div>
                              </div>
                              {hasNewMsg && <div className="w-2.5 h-2.5 bg-rose-500 rounded-full shadow-sm flex-shrink-0 ml-2"></div>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ) : (
                    <div className="flex-1 flex flex-col bg-slate-50/50 dark:bg-slate-900 overflow-hidden relative">
                      
                      {/* Lista de Mensagens */}
                      <div className="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4">
                        {groupedMessages.length === 0 && <p className="text-center text-xs text-slate-400 mt-10">Inicie a conversa!</p>}
                        {groupedMessages.map((item, index) => {
                          if (item.type === 'header') {
                            return (
                              <div key={item.id} className="flex justify-center my-4">
                                <span className="px-3 py-1 bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-medium rounded-full shadow-sm">
                                  {item.text}
                                </span>
                              </div>
                            );
                          }

                          const msg = item;
                          const isMe = msg.senderId === appUser.id;
                          return (
                            <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} group w-full mb-1`}>
                              
                              {/* Nome de quem enviou acima do balão (apenas em grupos e se não for você) */}
                              {!isMe && activeChat?.type === 'group' && (
                                <span className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 ml-1.5">
                                  {msg.senderName}
                                </span>
                              )}

                              <div className="flex items-center gap-2 max-w-[85%]">
                                {/* Ações lado Esquerdo (se for Minha mensagem) */}
                                {isMe && (
                                  <div className="opacity-0 group-hover:opacity-100 transition-opacity flex flex-col gap-1 shrink-0">
                                    <button type="button" onClick={() => startEdit(msg)} className="p-1.5 bg-white dark:bg-slate-800 rounded-full shadow-sm text-slate-500 hover:text-amber-500" title="Editar"><Edit2 size={12} /></button>
                                    <button type="button" onClick={() => startReply(msg)} className="p-1.5 bg-white dark:bg-slate-800 rounded-full shadow-sm text-slate-500 hover:text-blue-500" title="Responder"><Reply size={12} /></button>
                                  </div>
                                )}

                                {/* Balão da Mensagem */}
                                <div className={`relative p-3 rounded-2xl shadow-sm ${isMe ? `${theme.bg} text-white rounded-tr-sm` : 'bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 border border-slate-100 dark:border-slate-700 rounded-tl-sm'}`}>

                                  {msg.replyTo && (
                                    <div className={`mb-2 p-2 rounded-lg text-[11px] opacity-90 border-l-2 ${isMe ? 'bg-white/20 border-white' : 'bg-slate-100 dark:bg-slate-700/50 border-slate-400'}`}>
                                      <span className="font-bold block mb-0.5">{msg.replyTo.senderName}</span>
                                      <span className="truncate block max-w-full">{msg.replyTo.text}</span>
                                    </div>
                                  )}
                                  
                                  <p className="text-sm whitespace-pre-wrap break-words">{msg.text}</p>
                                  
                                  <div className={`text-[9px] mt-1.5 text-right ${isMe ? 'text-white/70' : 'text-slate-400 dark:text-slate-500'}`}>
                                    {new Date(msg.timestamp).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}
                                    {msg.isEdited && ' (editado)'}
                                  </div>
                                </div>

                                {/* Ações lado Direito (se NÃO for minha mensagem) */}
                                {!isMe && (
                                  <div className="opacity-0 group-hover:opacity-100 transition-opacity flex flex-col gap-1 shrink-0">
                                    <button type="button" onClick={() => startReply(msg)} className="p-1.5 bg-white dark:bg-slate-800 rounded-full shadow-sm text-slate-500 hover:text-blue-500" title="Responder"><Reply size={12} /></button>
                                  </div>
                                )}
                              </div>
                            </div>
                          );
                        })}
                        <div ref={messagesEndRef} />
                      </div>

                      {/* Rodapé: Input de Texto */}
                      <div className="p-3 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700">
                        {(replyingTo || editingMsg) && (
                          <div className="flex items-center justify-between bg-slate-100 dark:bg-slate-700/50 p-2 rounded-lg mb-2">
                            <div className="text-xs text-slate-600 dark:text-slate-300 truncate pr-2">
                              {replyingTo ? (
                                <><span className="font-bold">Respondendo {replyingTo.senderName}:</span> {replyingTo.text}</>
                              ) : (
                                <><span className="font-bold">Editando:</span> {editingMsg.text}</>
                              )}
                            </div>
                            <button type="button" onClick={() => { setReplyingTo(null); setEditingMsg(null); setInputText(''); }} className="text-slate-400 hover:text-rose-500">
                              <XCircle size={14} />
                            </button>
                          </div>
                        )}
                        
                        <form onSubmit={(e) => {
                          e.preventDefault();
                          handleSend(e);
                          const textarea = e.target.querySelector('textarea');
                          if (textarea) {
                            textarea.style.height = '44px'; // Reseta a altura após o envio
                          }
                        }} className="flex items-end gap-2 relative">
                          <textarea 
                            rows="1"
                            placeholder="Digite sua mensagem..." 
                            className={`flex-1 px-4 py-2.5 text-sm bg-slate-100 dark:bg-slate-900 border border-transparent rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 dark:text-white resize-none custom-scrollbar`}
                            style={{ 
                              minHeight: '44px', // Altura inicial (1 linha)
                              maxHeight: '120px', // Altura máxima (~5 linhas dependendo do font-size e padding)
                              height: '44px' // Força iniciar com a altura mínima
                            }}
                            value={inputText}
                            onChange={e => {
                              setInputText(e.target.value);
                              // A mágica acontece aqui: zera a altura, e depois define para o scrollHeight
                              e.target.style.height = '44px'; 
                              const newHeight = Math.min(e.target.scrollHeight, 120); // 120px é o limite
                              e.target.style.height = newHeight + 'px';
                              
                              // Se ficou vazio, garante que volte pra 1 linha
                              if (e.target.value === '') {
                                 e.target.style.height = '44px';
                              }
                            }}
                            onKeyDown={e => {
                              if (e.key === 'Enter' && !e.shiftKey) {
                                e.preventDefault();
                                handleSend(e);

        // --- FUNÇÕES DE CÁLCULO DE FERIADOS (Nacionais e SP) ---
        const getEasterDate = (year) => {
            const f = Math.floor, G = year % 19, C = f(year / 100),
                H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
                I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
                J = (year + f(year / 4) + I + 2 - C + f(C / 4)) % 7,
                L = I - J, month = 3 + f((L + 40) / 44), day = L + 28 - 31 * f(month / 4);
            return new Date(year, month - 1, day);
        };

        const isHoliday = (dateObj) => {
            const d = dateObj.getDate();
            const m = dateObj.getMonth() + 1;
            const y = dateObj.getFullYear();
            
            // Feriados Fixos (Nacionais + SP)
            const fixed = ['1/1', '25/1', '21/4', '1/5', '9/7', '7/9', '12/10', '2/11', '15/11', '20/11', '25/12'];
            if (fixed.includes(`${d}/${m}`)) return true;

            // Feriados Móveis
            const easter = getEasterDate(y);
            const checkMobile = (offset) => {
                const temp = new Date(easter);
                temp.setDate(temp.getDate() + offset);
                return temp.getDate() === d && (temp.getMonth() + 1) === m;
            };
            
            // Carnaval (-47 dias), Sexta Santa (-2 dias), Corpus Christi (+60 dias)
            if (checkMobile(-47) || checkMobile(-2) || checkMobile(60)) return true;

            return false;
        };
