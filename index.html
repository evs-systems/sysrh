                  )}

                  <div className="pt-6 flex justify-end gap-3 border-t border-slate-200 dark:border-slate-700">
                    <Button variant="ghost" theme={theme} type="button" onClick={() => setIsModalOpen(false)} disabled={isProcessing}>Cancelar</Button>
                    <Button variant="primary" theme={theme} type="submit" loading={isProcessing}>{editingId ? 'Atualizar' : 'Salvar Funcionário'}</Button>
                  </div>
                </form>
              </Modal>
            </div>
          );
        }

        function PaymentsView({ theme, basePath, appUser, employees, payments, companies = [], showToast, logAction, requestConfirm, handleMaskedView }) {
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isProcessing, setIsProcessing] = useState(false);
          const [isEditModalOpen, setIsEditModalOpen] = useState(false);
          const [isBulkModalOpen, setIsBulkModalOpen] = useState(false);
          const [activeSubTab, setActiveSubTab] = useState('today');
          
          const [payModalOpen, setPayModalOpen] = useState(false);
          const [paymentToProcess, setPaymentToProcess] = useState(null);
          const [payData, setPayData] = useState({ bank: '', url: '', fileName: '' });

          const [printSelections, setPrintSelections] = useState({});
          const [isPrinting, setIsPrinting] = useState(false);

          // Configuração Inicial de Mês e Ano Atual
          const currentMonthVal = String(new Date().getMonth() + 1).padStart(2, '0');
          const currentYearVal = String(new Date().getFullYear());

          // Novos estados de filtro do Histórico
          const [historySearchTerm, setHistorySearchTerm] = useState('');
          const [historyMonthFilter, setHistoryMonthFilter] = useState(currentMonthVal);
          const [historyYearFilter, setHistoryYearFilter] = useState(currentYearVal);
          const [historyCompanyFilter, setHistoryCompanyFilter] = useState('');
          const [historyCategoryFilter, setHistoryCategoryFilter] = useState('');
          const [historyTypeFilter, setHistoryTypeFilter] = useState('');
          
          const [scheduledMonthFilter, setScheduledMonthFilter] = useState(currentMonthVal);
          const [scheduledYearFilter, setScheduledYearFilter] = useState(currentYearVal);
          
          const [bulkSearchTerm, setBulkSearchTerm] = useState('');
          
          const [formData, setFormData] = useState({
            category: 'employee',
            employeeId: '',
            payeeName: '',
            company: '',
            items: [{ amount: '', date: '', type: 'Salário', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não', bankName: '', agency: '', account: '', pixKey: '' }]
          });

          const [editFormData, setEditFormData] = useState({
            id: '', category: 'employee', employeeId: '', payeeName: '', company: '', amount: '', date: '', type: 'Salário', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não', bankName: '', agency: '', account: '', pixKey: ''
          });

          const [bulkFormData, setBulkFormData] = useState({
            employeeIds: [], employeeAmounts: {}, date: '', type: 'Salário', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não'
          });

          const [visibleCount, setVisibleCount] = useState(50);

          // Repõe a contagem visível sempre que o utilizador muda de aba ou altera os filtros
          useEffect(() => {
            setVisibleCount(50);
          }, [activeSubTab, historySearchTerm, historyMonthFilter, historyYearFilter, scheduledMonthFilter, scheduledYearFilter, historyCompanyFilter, historyCategoryFilter, historyTypeFilter]);

          const canWrite = appUser?.permissions?.payments?.write;
          const canDelete = appUser?.permissions?.payments?.delete;

          const EMP_TYPES = [ 
            {value: 'Salário', label: 'Salário'}, {value: 'Adiantamento', label: 'Adiantamento'}, {value: 'Férias', label: 'Férias'}, 
            {value: 'Rescisão', label: 'Rescisão'}, {value: 'Premiação', label: 'Premiação'}, {value: 'Vale Alimentação', label: 'Vale Alimentação'},
            {value: 'Vale Combustível', label: 'Vale Combustível'}, {value: 'Extra', label: 'Extra'}, {value: 'Bonificação', label: 'Bonificação'}
          ];

          const OTHER_TYPES = [
            {value: 'Boleto', label: 'Boleto'}, {value: 'Pagamento', label: 'Pagamento'}
          ];

          // COMBINAÇÃO DE TODOS OS TIPOS PARA O FILTRO
          const ALL_TYPES = [ ...EMP_TYPES, ...OTHER_TYPES ].sort((a,b) => a.label.localeCompare(b.label));

          // MATRIZ DE CATEGORIAS
          const CATEGORY_OPTIONS = [
            {value: 'employee', label: 'Funcionários'},
            {value: 'Funcionários / Outras Despesas', label: 'Funcionários / Outras Despesas'},
            {value: 'Pós Vendas', label: 'Pós Vendas'},
            {value: 'Compras', label: 'Compras'},
            {value: 'Não Contabilizar', label: 'Não Contabilizar'},
            {value: 'Contas Fixas', label: 'Contas Fixas'},
            {value: 'Honorários Contabilidade', label: 'Honorários Contabilidade'},
            {value: 'Imposto sem Nota de Serviço', label: 'Imposto sem Nota de Serviço'},
            {value: 'Imposto Simples Nacional', label: 'Imposto Simples Nacional'},
            {value: 'Sistemas', label: 'Sistemas'},
            {value: 'Tarifas', label: 'Tarifas'},
            {value: 'Veículos', label: 'Veículos'},
            {value: 'other', label: 'Outras Contas / Despesas'}
          ];

          const yearOptions = useMemo(() => {
            const years = new Set();
            payments.forEach(pay => {
              if (pay.date && pay.date.includes('/')) {
                const [, , y] = pay.date.split('/');
                if (y) years.add(y);
              }
            });
            const currentYear = new Date().getFullYear().toString();
            years.add(currentYear); 
            
            const sortedYears = Array.from(years).sort((a, b) => b.localeCompare(a));
            return [
              { value: 'all', label: 'Todos os Anos' },
              ...sortedYears.map(y => ({ value: y, label: y }))
            ];
          }, [payments]);

          const monthOptions = [
            { value: 'all', label: 'Todos os Meses' },
            { value: '01', label: 'Janeiro' },
            { value: '02', label: 'Fevereiro' },
            { value: '03', label: 'Março' },
            { value: '04', label: 'Abril' },
            { value: '05', label: 'Maio' },
            { value: '06', label: 'Junho' },
            { value: '07', label: 'Julho' },
            { value: '08', label: 'Agosto' },
            { value: '09', label: 'Setembro' },
            { value: '10', label: 'Outubro' },
            { value: '11', label: 'Novembro' },
            { value: '12', label: 'Dezembro' }
          ];

          const parseDate = (d) => {
            if (!d) return 0;
            if (d.includes('/')) {
              const [day, month, year] = d.split('/');
              return new Date(`${year}-${month}-${day}T00:00:00`).getTime();
            }
            return new Date(`${d}T00:00:00`).getTime();
          };

          const todayStr = new Date().toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit', year: 'numeric'});
          const todayTime = parseDate(todayStr);

          const categorizedPayments = { today: [], future: [], recurring: [], history: [] };

          payments.forEach(pay => {
            const payTime = parseDate(pay.date);
            const isPaid = pay.status === 'Pago';

            if (isPaid) {
              // Pagamentos confirmados vão APENAS para o Histórico
              categorizedPayments.history.push(pay);
            } else {
              // Pendentes (Até Hoje)
              if (payTime <= todayTime) { 
                categorizedPayments.today.push(pay);
              }

              // Mantém APENAS os não confirmados nas áreas de Programados e Recorrentes
              if (pay.isRecurring) {
                categorizedPayments.recurring.push(pay);
              } else {
                categorizedPayments.future.push(pay);
              }
            }
          });

          // Filtro para o Histórico Geral
          let displayedHistory = categorizedPayments.history.filter(pay => {
            const empName = pay.category !== 'employee' ? pay.payeeName : (employees.find(e => e.id === pay.employeeId)?.name || '');
            const searchMatch = empName.toLowerCase().includes(historySearchTerm.toLowerCase()) || 
                                (pay.description || '').toLowerCase().includes(historySearchTerm.toLowerCase()) ||
                                (pay.type || '').toLowerCase().includes(historySearchTerm.toLowerCase());
            
            let monthMatch = true;
            let yearMatch = true;
            
            if (pay.date && pay.date.includes('/')) {
              const [, m, y] = pay.date.split('/');
              if (historyMonthFilter !== 'all') monthMatch = m === historyMonthFilter;
              if (historyYearFilter !== 'all') yearMatch = y === historyYearFilter;
            }

            const comp = pay.category === 'employee' ? (employees.find(e => e.id === pay.employeeId)?.company || '') : (pay.company || '');
            const companyMatch = historyCompanyFilter ? comp === historyCompanyFilter : true;
            const categoryMatch = historyCategoryFilter ? pay.category === historyCategoryFilter : true;
            const typeMatch = historyTypeFilter ? pay.type === historyTypeFilter : true;

            return searchMatch && monthMatch && yearMatch && companyMatch && categoryMatch && typeMatch;
          });

          // Filtro para Programados (Inclui Pagos e Pendentes daquele mês)
          let displayedFuture = categorizedPayments.future.filter(pay => {
            let monthMatch = true;
            let yearMatch = true;
            if (pay.date && pay.date.includes('/')) {
              const [, m, y] = pay.date.split('/');
              if (scheduledMonthFilter !== 'all') monthMatch = m === scheduledMonthFilter;
              if (scheduledYearFilter !== 'all') yearMatch = y === scheduledYearFilter;
            }
            return monthMatch && yearMatch;
          });

          // Filtro para Recorrentes (Inclui Pagos e Pendentes daquele mês)
          let displayedRecurring = categorizedPayments.recurring.filter(pay => {
            let monthMatch = true;
            let yearMatch = true;
            if (pay.date && pay.date.includes('/')) {
              const [, m, y] = pay.date.split('/');
              if (scheduledMonthFilter !== 'all') monthMatch = m === scheduledMonthFilter;
              if (scheduledYearFilter !== 'all') yearMatch = y === scheduledYearFilter;
            }
            return monthMatch && yearMatch;
          });

          // Ordenações
          categorizedPayments.today.sort((a,b) => parseDate(a.date) - parseDate(b.date)); 
          displayedFuture.sort((a,b) => parseDate(a.date) - parseDate(b.date)); 
          displayedRecurring.sort((a,b) => parseDate(a.date) - parseDate(b.date)); 
          displayedHistory.sort((a,b) => parseDate(b.date) - parseDate(a.date));

          // Cálculo do Mini-Dashboard de Histórico
          const historyTotalAmount = displayedHistory.reduce((acc, pay) => acc + Number(pay.amount || 0), 0);

          // Seleciona a lista a ser exibida de acordo com a aba
          const displayedPayments = activeSubTab === 'history' ? displayedHistory : 
                                    activeSubTab === 'future' ? displayedFuture : 
                                    activeSubTab === 'recurring' ? displayedRecurring : 
                                    categorizedPayments[activeSubTab];

          const paginatedPayments = displayedPayments.slice(0, visibleCount);

          const selectedPrintCount = Object.values(printSelections).filter(Boolean).length;

          const togglePrintSelection = (payId) => {
            setPrintSelections(prev => ({ ...prev, [payId]: !prev[payId] }));
          };

          const toggleAllPrintSelection = () => {
            const allSelected = paginatedPayments.length > 0 && paginatedPayments.every(p => printSelections[p.id]);
            const newState = { ...printSelections };
            paginatedPayments.forEach(p => {
              newState[p.id] = !allSelected;
            });
            setPrintSelections(newState);
          };

          const handleExportHistoryCSV = () => {
            const headers = ['Data Pagto.', 'Data Realizado', 'Categoria', 'Destinatário', 'Empresa', 'Tipo', 'Descrição', 'Banco Origem', 'Valor Total Liquido'];
            const rows = displayedHistory.map(pay => {
              const emp = pay.category !== 'employee' ? null : employees.find(e => e.id === pay.employeeId);
              const payeeName = pay.category !== 'employee' ? pay.payeeName : (emp?.name || 'Desconhecido');
              const paymentDate = pay.paidAt ? new Date(pay.paidAt).toLocaleDateString('pt-BR') : pay.date;
              const catLabel = CATEGORY_OPTIONS.find(o => o.value === pay.category)?.label || 'Funcionários';
              const companyName = pay.category === 'employee' ? (emp?.company || '') : (pay.company || '');

              return [
                `"${formatDate(pay.date)}"`,
                `"${paymentDate}"`,
                `"${catLabel}"`,
                `"${payeeName}"`,
                `"${companyName}"`,
                `"${pay.type}"`,
                `"${pay.description || ''}"`,
                `"${pay.paymentBank || ''}"`,
                `"${formatCurrency(pay.amount).replace('R$', '').trim()}"`
              ];
            });
            
            const csvContent = [headers.join(';'), ...rows.map(r => r.join(';'))].join('\n');
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a'); 
            link.href = URL.createObjectURL(blob); 
            link.download = `historico_pagamentos_${historyMonthFilter}_${historyYearFilter}.csv`; 
            link.click();
            showToast('Histórico exportado para Excel com sucesso!');
          };

          const handlePrint = async () => {
            setIsPrinting(true);
            
            try {
              showToast('Gerando comprovantes, aguarde...', 'success');
              
              const jspdfModule = await import('https://esm.sh/jspdf@4.2.1');
              const jsPDF = jspdfModule.jsPDF;
              
              const docPdf = new jsPDF({ orientation: 'landscape', format: 'a4' });
              const paymentsToPrint = payments.filter(p => printSelections[p.id]);
              
              for (let i = 0; i < paymentsToPrint.length; i++) {
                if (i > 0 && i % 2 === 0) {
                  docPdf.addPage();
                }
                
                const pay = paymentsToPrint[i];
                const isLeft = i % 2 === 0; 
                const startX = isLeft ? 15 : 158; 
                const startY = 15;
                const w = 124; 
                const h = 180; 
                
                docPdf.setDrawColor(150, 150, 150);
                docPdf.setLineWidth(0.5);
                docPdf.setLineDashPattern([3, 3], 0);
                docPdf.rect(startX, startY, w, h);
                docPdf.setLineDashPattern([], 0); 
                
                docPdf.setFont("helvetica", "bold");
                docPdf.setFontSize(14);
                docPdf.text("RECIBO DE PAGAMENTO", startX + w/2, startY + 15, { align: "center" });
                
                docPdf.setFont("helvetica", "normal");
                docPdf.setFontSize(12);
                docPdf.text((pay.type || '').toUpperCase(), startX + w/2, startY + 22, { align: "center" });
                
                docPdf.setDrawColor(200, 200, 200);
                docPdf.line(startX + 10, startY + 28, startX + w - 10, startY + 28);
                
                const emp = pay.category !== 'employee' ? null : employees.find(e => e.id === pay.employeeId);
                const payeeName = pay.category !== 'employee' ? pay.payeeName : (emp?.name || 'Desconhecido');
                const refMonth = pay.date && pay.date.includes('/') ? pay.date.substring(3) : pay.date; 
                const paymentDate = pay.paidAt ? new Date(pay.paidAt).toLocaleDateString('pt-BR') : pay.date;
                
                let currentY = startY + 40;
                docPdf.setFontSize(10);
                
                docPdf.setFont("helvetica", "bold");
                docPdf.text(pay.category !== 'employee' ? 'Beneficiário:' : 'Colaborador:', startX + 10, currentY);
                docPdf.setFont("helvetica", "normal");
                docPdf.text(payeeName || "-", startX + 40, currentY);
                currentY += 8;
                
                if (pay.category === 'employee') {
                  docPdf.setFont("helvetica", "bold");
                  docPdf.text("CPF:", startX + 10, currentY);
                  docPdf.setFont("helvetica", "normal");
                  docPdf.text(formatCPF(emp?.cpf) || "-", startX + 40, currentY);
                  currentY += 8;
                  
                  docPdf.setFont("helvetica", "bold");
                  docPdf.text("Cargo:", startX + 10, currentY);
                  docPdf.setFont("helvetica", "normal");
                  docPdf.text(emp?.role || "-", startX + 40, currentY);
                  currentY += 8;
                }
                
                docPdf.setFont("helvetica", "bold");
                docPdf.text("Valor:", startX + 10, currentY);
                docPdf.setFont("helvetica", "normal");
                docPdf.text(formatCurrency(pay.amount), startX + 40, currentY);
                currentY += 8;
                
                docPdf.setFont("helvetica", "bold");
                docPdf.text("Referência:", startX + 10, currentY);
                docPdf.setFont("helvetica", "normal");
                docPdf.text(refMonth || "-", startX + 40, currentY);
                currentY += 8;
                
                docPdf.setFont("helvetica", "bold");
                docPdf.text("Data Pagto:", startX + 10, currentY);
                docPdf.setFont("helvetica", "normal");
                docPdf.text(paymentDate || "-", startX + 40, currentY);
                currentY += 15;
                
                docPdf.setFillColor(245, 245, 245);
                docPdf.rect(startX + 10, currentY, w - 20, 35, "F");
                
                docPdf.setFontSize(9);
                const entity = pay.category === 'employee' ? (emp?.company || 'Empresa não informada') : pay.description || pay.type;
                
                const richTextParts = [
                  { text: `Declaro ter recebido ${pay.category === 'employee' ? 'da empresa ' : 'o valor referente a '}`, bold: false },
                  { text: entity, bold: true },
                  { text: `, o valor de `, bold: false },
                  { text: formatCurrency(pay.amount), bold: true },
                  { text: `, referente a `, bold: false },
                  { text: `${pay.type}.`, bold: true }
                ];
                
                let curX = startX + 13;
                let curY = currentY + 7;
                const maxW = w - 26;
                
                richTextParts.forEach(part => {
                  docPdf.setFont("helvetica", part.bold ? "bolditalic" : "italic");
                  const words = part.text.split(/(\s+)/); 
                  words.forEach(word => {
                    if (!word) return;
                    const wordW = docPdf.getTextWidth(word);
                    if (word.trim() !== "" && curX + wordW > startX + 13 + maxW && curX > startX + 13) {
                      curX = startX + 13;
                      curY += 5; 
                    }
                    if (!(word.trim() === "" && curX === startX + 13)) {
                      docPdf.text(word, curX, curY);
                      curX += wordW;
                    }
                  });
                });
                
                const sigY = startY + h - 25;
                docPdf.setDrawColor(0);
                docPdf.setLineWidth(0.5);
                docPdf.line(startX + 20, sigY, startX + w - 20, sigY);
                
                docPdf.setFont("helvetica", "normal");
                docPdf.setFontSize(9);
                docPdf.text("Assinatura do Recebedor", startX + w/2, sigY + 5, { align: "center" });
                docPdf.setFont("helvetica", "bold");
                docPdf.text(payeeName || "-", startX + w/2, sigY + 10, { align: "center" });
              }
              
              handleMaskedView(docPdf.output('bloburl'), 'Folha de Ponto');
              setPrintSelections({});
              
            } catch (err) {
              console.error("Erro ao gerar PDF:", err);
              showToast('Erro ao gerar PDF de recibos. Tente novamente.', 'error');
            } finally {
              setIsPrinting(false);
            }
          };

          const handleCategoryChange = (val) => {
            setFormData(prev => ({
                ...prev, 
                category: val,
                company: '',
                items: prev.items.map(i => ({...i, type: val === 'employee' ? 'Salário' : 'Boleto'}))
            }));
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite || isProcessing) return;
            setIsProcessing(true);
            const emp = formData.category === 'employee' ? employees.find(e => e.id === formData.employeeId) : null;
            const targetName = formData.category === 'employee' ? (emp?.name || 'Desconhecido') : formData.payeeName;

            try {
              await Promise.all(formData.items.map(item => {
                return addDoc(collection(db, `${basePath}/payments`), {
                  category: formData.category,
                  employeeId: formData.category === 'employee' ? formData.employeeId : null,
                  payeeName: formData.category !== 'employee' ? formData.payeeName : null,
                  company: formData.category !== 'employee' ? formData.company : null,
                  amount: item.amount,
                  date: item.date,
                  type: item.type,
                  description: item.description,
                  mandatoryCompanyAccount: item.mandatoryCompanyAccount,
                  isRecurring: item.isRecurring === 'Sim',
                  bankName: item.bankName || '',
                  agency: item.agency || '',
                  account: item.account || '',
                  pixKey: item.pixKey || '',
                  status: 'Pendente',
                  isVerified: false,
                  lastModifiedBy: appUser.username
                });
              }));

              const totalAmount = formData.items.reduce((acc, item) => acc + Number(item.amount), 0);

              logAction('Cadastro', 'Pagamentos', `Programou ${formData.items.length} pagamento(s) para ${targetName} (Total: R$ ${totalAmount.toFixed(2)})`);
              showToast('Pagamentos registrados e programados!');
              setIsModalOpen(false);
              setFormData({ category: 'employee', employeeId: '', payeeName: '', company: '', items: [{ amount: '', date: '', type: 'Salário', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não', bankName: '', agency: '', account: '', pixKey: '' }] });
            } catch (err) {
              showToast('Erro ao programar pagamentos.', 'error');
            } finally {
              setIsProcessing(false);
            }
          };

          const handleItemChange = (index, field, value) => {
            const newItems = [...formData.items];
            newItems[index][field] = value;
            setFormData({ ...formData, items: newItems });
          };

          const handleBulkSave = async (e) => {
            e.preventDefault();
            if (!canWrite || isProcessing) return;
            if (bulkFormData.employeeIds.length === 0) {
               showToast('Selecione pelo menos um colaborador para programar o pagamento.', 'error');
               return;
            }
            setIsProcessing(true);

            const missingAmounts = bulkFormData.employeeIds.some(id => !bulkFormData.employeeAmounts[id] || Number(bulkFormData.employeeAmounts[id]) <= 0);
            if (missingAmounts) {
               showToast('Preencha o valor para todos os colaboradores selecionados.', 'error');
               return;
            }

            try {
              const promises = bulkFormData.employeeIds.map(empId => {
                return addDoc(collection(db, `${basePath}/payments`), {
                  category: 'employee',
                  employeeId: empId,
                  payeeName: null,
                  company: null,
                  amount: bulkFormData.employeeAmounts[empId],
                  date: bulkFormData.date,
                  type: bulkFormData.type,
                  description: bulkFormData.description,
                  mandatoryCompanyAccount: bulkFormData.mandatoryCompanyAccount,
                  isRecurring: bulkFormData.isRecurring === 'Sim',
                  bankName: '',
                  agency: '',
                  account: '',
                  pixKey: '',
                  status: 'Pendente',
                  isVerified: false,
                  lastModifiedBy: appUser.username
                });
              });

              await Promise.all(promises);

              const totalAmount = bulkFormData.employeeIds.reduce((acc, id) => acc + Number(bulkFormData.employeeAmounts[id]), 0);
              logAction('Cadastro', 'Pagamentos', `Programou pagamento em massa (${bulkFormData.type}) no valor total de R$ ${totalAmount.toFixed(2)} para ${bulkFormData.employeeIds.length} colaborador(es).`);
              showToast(`Sucesso! ${bulkFormData.employeeIds.length} pagamentos foram programados.`);
              setIsBulkModalOpen(false);
              setBulkFormData({ employeeIds: [], employeeAmounts: {}, date: '', type: 'Salário', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não' });
              setBulkSearchTerm('');
            } catch (err) {
              showToast('Erro ao programar pagamentos em massa.', 'error');
            } finally {
              setIsProcessing(false);
            }
          };

          const toggleBulkEmployee = (empId) => {
            setBulkFormData(prev => {
              if (prev.employeeIds.includes(empId)) {
                const newAmounts = { ...prev.employeeAmounts };
                delete newAmounts[empId];
                return { ...prev, employeeIds: prev.employeeIds.filter(id => id !== empId), employeeAmounts: newAmounts };
              } else {
                return { ...prev, employeeIds: [...prev.employeeIds, empId] };
              }
            });
          };

          const toggleAllBulkEmployees = (filteredEmps) => {
            setBulkFormData(prev => {
              const allFilteredIds = filteredEmps.map(e => e.id);
              const isAllSelected = allFilteredIds.every(id => prev.employeeIds.includes(id));
              if (isAllSelected) {
                 const newAmounts = { ...prev.employeeAmounts };
                 allFilteredIds.forEach(id => delete newAmounts[id]);
                 return { ...prev, employeeIds: prev.employeeIds.filter(id => !allFilteredIds.includes(id)), employeeAmounts: newAmounts };
              } else {
                 const newIds = new Set([...prev.employeeIds, ...allFilteredIds]);
                 return { ...prev, employeeIds: Array.from(newIds) };
              }
            });
          };

          const handleBulkAmountChange = (empId, value) => {
            setBulkFormData(prev => ({
                ...prev,
                employeeAmounts: {
                    ...prev.employeeAmounts,
                    [empId]: value
                }
            }));
          };

          const addItem = () => setFormData({ ...formData, items: [...formData.items, { amount: '', date: '', type: formData.category === 'employee' ? 'Salário' : 'Boleto', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não', bankName: '', agency: '', account: '', pixKey: '' }] });
          
          const removeItem = (index) => {
            requestConfirm('Tem certeza que deseja remover este lançamento?', () => {
              setFormData(prev => ({ ...prev, items: prev.items.filter((_, i) => i !== index) }));
            });
          };

          const openEditModal = (pay) => {
            setEditFormData({
              id: pay.id,
              category: pay.category || 'employee',
              employeeId: pay.employeeId || '',
              payeeName: pay.payeeName || '',
              company: pay.company || '',
              amount: (Number(pay.amount)).toFixed(2),
              date: pay.date,
              type: pay.type,
              description: pay.description || '',
              mandatoryCompanyAccount: pay.mandatoryCompanyAccount || 'Sim',
              isRecurring: pay.isRecurring ? 'Sim' : 'Não',
              bankName: pay.bankName || '',
              agency: pay.agency || '',
              account: pay.account || '',
              pixKey: pay.pixKey || ''
            });
            setIsEditModalOpen(true);
          };

          const handleEditSave = async (e) => {
            e.preventDefault();
            if (!canWrite) return;
            try {
              await updateDoc(doc(db, `${basePath}/payments/${editFormData.id}`), {
                category: editFormData.category,
                employeeId: editFormData.category === 'employee' ? editFormData.employeeId : null,
                payeeName: editFormData.category !== 'employee' ? editFormData.payeeName : null,
                company: editFormData.category !== 'employee' ? editFormData.company : null,
                amount: editFormData.amount,
                date: editFormData.date,
                type: editFormData.type,
                description: editFormData.description,
                mandatoryCompanyAccount: editFormData.mandatoryCompanyAccount,
                isRecurring: editFormData.isRecurring === 'Sim',
                bankName: editFormData.bankName || '',
                agency: editFormData.agency || '',
                account: editFormData.account || '',
                pixKey: editFormData.pixKey || '',
                isVerified: false,
                lastModifiedBy: appUser.username
              });
              logAction('Atualização', 'Pagamentos', `Editou informações do pagamento programado (${editFormData.type})`);
              showToast('Pagamento atualizado com sucesso!');
              setIsEditModalOpen(false);
            } catch (err) {
              showToast('Erro ao atualizar pagamento.', 'error');
            }
          };

          const handleDeletePayment = (id, type) => {
            if (!canDelete) return;
            requestConfirm(`Tem certeza que deseja excluir este pagamento (${type}) programado?`, async () => {
              try {
                await deleteDoc(doc(db, `${basePath}/payments/${id}`));
                logAction('Exclusão', 'Pagamentos', `Removeu o pagamento programado: ${type}`);
                showToast('Pagamento removido com sucesso.');
              } catch (err) {
                showToast('Erro ao remover pagamento.', 'error');
              }
            });
          };

          const openPayModal = (pay) => {
            setPaymentToProcess(pay);
            setPayData({ bank: '', url: '', fileName: '' });
            setPayModalOpen(true);
          };

          const handleAttachToHistory = async (payId, e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) { 
              showToast('O comprovante deve ter no máximo 5MB.', 'error');
              e.target.value = ''; 
              return;
            }

            try {
              showToast('Enviando comprovante...', 'success');
              const fileRef = ref(storage, `receipts/${generateId()}_${file.name}`);
              await uploadBytes(fileRef, file);
              const url = await getDownloadURL(fileRef);

              await updateDoc(doc(db, `${basePath}/payments/${payId}`), {
                receiptUrl: url,
                receiptName: file.name,
                isVerified: false,
                lastModifiedBy: appUser.username
              });

              const payObj = payments.find(p => p.id === payId);
              const targetName = payObj?.category !== 'employee' ? payObj.payeeName : employees.find(emp => emp.id === payObj?.employeeId)?.name;
              logAction('Anexo', 'Pagamentos', `Anexou comprovante no histórico para ${targetName || 'Desconhecido'}: ${file.name}`);
              
              showToast('Comprovante anexado ao histórico com sucesso!');
            } catch (err) {
              showToast('Erro ao anexar arquivo no histórico.', 'error');
            }
            e.target.value = '';
          };

          const handleFileUpload = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const allowedPayTypes = ['application/pdf', 'image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            if (!allowedPayTypes.includes(file.type)) {
              showToast('Tipo de arquivo inválido. Use apenas PDF ou imagem.', 'error');
              e.target.value = '';
              return;
            }
            if (file.size > 5 * 1024 * 1024) { 
              showToast('O comprovante deve ter no máximo 5MB.', 'error');
              e.target.value = ''; 
              return;
            }

            try {
              const fileRef = ref(storage, `receipts/${generateId()}_${file.name}`);
              await uploadBytes(fileRef, file);
              const url = await getDownloadURL(fileRef);
              setPayData({ ...payData, url: url, fileName: file.name });
              logAction('Anexo', 'Pagamentos', `Anexou comprovante bancário: ${file.name}`);
            } catch (err) {
              showToast('Erro ao processar o arquivo no Storage.', 'error');
            }
          };

          const confirmPayment = async (e) => {
            e.preventDefault();
            if (!canWrite) return;

            try {
              await updateDoc(doc(db, `${basePath}/payments/${paymentToProcess.id}`), {
                status: 'Pago',
                paymentBank: payData.bank,
                receiptUrl: payData.url,
                receiptName: payData.fileName,
                paidAt: new Date().toISOString(),
                isVerified: true, 
                verifiedBy: appUser.name,
                verifiedAt: new Date().toISOString(),
                lastModifiedBy: appUser.username
              });
              
              const targetName = paymentToProcess.category !== 'employee' ? paymentToProcess.payeeName : employees.find(emp => emp.id === paymentToProcess.employeeId)?.name;
              logAction('Atualização', 'Pagamentos', `Efetuou o pagamento de ${paymentToProcess.type} para ${targetName} via ${payData.bank}`);
              
              if (paymentToProcess.isRecurring) {
                const nextDate = calculateNextMonthDate(paymentToProcess.date);
                await addDoc(collection(db, `${basePath}/payments`), {
                  category: paymentToProcess.category || 'employee',
                  employeeId: paymentToProcess.employeeId || null,
                  payeeName: paymentToProcess.payeeName || null,
                  company: paymentToProcess.company || null,
                  amount: paymentToProcess.amount,
                  date: nextDate,
                  type: paymentToProcess.type,
                  description: paymentToProcess.description || '',
                  mandatoryCompanyAccount: paymentToProcess.mandatoryCompanyAccount || 'Sim',
                  isRecurring: true,
                  bankName: paymentToProcess.bankName || '',
                  agency: paymentToProcess.agency || '',
                  account: paymentToProcess.account || '',
                  pixKey: paymentToProcess.pixKey || '',
                  status: 'Pendente',
                  isVerified: false,
                  lastModifiedBy: 'Sistema (Recorrência)'
                });
                showToast(`Pagamento realizado! A cobrança do próximo mês (${nextDate}) foi gerada automaticamente.`, 'success');
              } else {
                showToast('Pagamento efetivado com sucesso! Movido para o Histórico.');
              }

              setPayModalOpen(false);
            } catch (err) {
              showToast('Erro ao efetivar o pagamento.', 'error');
            }
          };

          const handleVerifyPayment = async (id, type, targetName, lastModifiedBy) => {
            if (lastModifiedBy === appUser.username) {
               showToast("A conferência de segurança deve ser realizada por outro usuário.", "error");
               return;
            }
            try {
              await updateDoc(doc(db, `${basePath}/payments/${id}`), {
                isVerified: true,
                verifiedBy: appUser.name,
                verifiedAt: new Date().toISOString()
              });
              logAction('Conferência', 'Pagamentos', `Realizou a conferência do lançamento/comprovante: ${type} para ${targetName}`);
              showToast('Lançamento conferido com sucesso!');
            } catch (err) {
              showToast('Erro ao conferir lançamento.', 'error');
            }
          };

          const activeEmployeeToPay = paymentToProcess?.category === 'employee' && paymentToProcess ? employees.find(e => e.id === paymentToProcess.employeeId) : null;

          const activeEmpsForBulk = employees.filter(e => e.status !== 'Desligado' && (e.name.toLowerCase().includes(bulkSearchTerm.toLowerCase()) || (e.cpf && e.cpf.includes(bulkSearchTerm))));

          return (
            <div className="space-y-6 animate-in fade-in duration-500 no-print">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Pagamentos & Recibos</h2>
                  <p className="text-slate-500 mt-1">Controle os valores, finalize pagamentos e gere recibos de forma inteligente.</p>
                </div>
                <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                  {canWrite && <Button theme={theme} variant="secondary" icon={Users} onClick={() => setIsBulkModalOpen(true)}>Pagamento em Massa</Button>}
                  {canWrite && <Button theme={theme} icon={Plus} onClick={() => setIsModalOpen(true)}>Programar Pagamento</Button>}
                </div>
              </div>

              <div className="flex flex-col md:flex-row justify-between gap-4 mb-6">
                <div className="flex gap-2 p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl w-fit max-w-full overflow-x-auto custom-scrollbar">
                  <button onClick={() => setActiveSubTab('today')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'today' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Pendentes (Até Hoje) <span className="ml-1 opacity-60">({categorizedPayments.today.length})</span></button>
                  <button onClick={() => setActiveSubTab('future')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'future' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Programados <span className="ml-1 opacity-60">({displayedFuture.length})</span></button>
                  <button onClick={() => setActiveSubTab('recurring')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'recurring' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Recorrentes <span className="ml-1 opacity-60">({displayedRecurring.length})</span></button>
                  <button onClick={() => setActiveSubTab('history')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'history' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Histórico <span className="ml-1 opacity-60">({displayedHistory.length})</span></button>
                </div>

                <div className="flex items-center gap-3">
                  {selectedPrintCount > 0 && (
                    <Button theme={theme} icon={Printer} onClick={handlePrint} className="whitespace-nowrap shadow-xl animate-in zoom-in-95 duration-200">
                      Imprimir {selectedPrintCount} Recibo{selectedPrintCount > 1 ? 's' : ''}
                    </Button>
                  )}

                  {(activeSubTab === 'future' || activeSubTab === 'recurring') && (
                    <div className="flex flex-col sm:flex-row gap-3 animate-in fade-in duration-300 items-end">
                      <Select 
                        label="Mês" 
                        theme={theme} 
                        className="w-full sm:w-32"
                        value={scheduledMonthFilter} 
                        onChange={e => setScheduledMonthFilter(e.target.value)} 
                        options={monthOptions}
                      />
                      <Select 
                        label="Ano" 
                        theme={theme} 
                        className="w-full sm:w-32"
                        value={scheduledYearFilter} 
                        onChange={e => setScheduledYearFilter(e.target.value)} 
                        options={yearOptions}
                      />
                    </div>
                  )}
                </div>
              </div>

              {/* Filtros Avançados do Histórico */}
              {activeSubTab === 'history' && (
                <Card className="p-4 mb-6 relative z-30 animate-in fade-in duration-300">
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-7 gap-4 items-end">
                    <div className="xl:col-span-2">
                        <div className="flex flex-col gap-1">
                          <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Buscar</label>
                          <div className="relative">
                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 z-10 pointer-events-none" size={18} />
                            <input 
                              type="text" 
                              placeholder="Nome, descrição..." 
                              className={`w-full pl-10 pr-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm`}
                              value={historySearchTerm}
                              onChange={e => setHistorySearchTerm(e.target.value)}
                            />
                          </div>
                        </div>
                    </div>
                    <Select label="Mês" theme={theme} value={historyMonthFilter} onChange={e => setHistoryMonthFilter(e.target.value)} options={monthOptions} />
                    <Select label="Ano" theme={theme} value={historyYearFilter} onChange={e => setHistoryYearFilter(e.target.value)} options={yearOptions} />
                    <Select label="Empresa" theme={theme} value={historyCompanyFilter} onChange={e => setHistoryCompanyFilter(e.target.value)} options={[{value: '', label: 'Todas as Empresas'}, ...[...companies].sort((a,b) => (a.name||'').localeCompare(b.name||'')).map(c => ({ value: c.name, label: c.name }))]} />
                    <Select label="Categoria" theme={theme} value={historyCategoryFilter} onChange={e => setHistoryCategoryFilter(e.target.value)} options={[{value: '', label: 'Todas as Categorias'}, ...CATEGORY_OPTIONS]} />
                    <Select label="Tipo" theme={theme} value={historyTypeFilter} onChange={e => setHistoryTypeFilter(e.target.value)} options={[{value: '', label: 'Todos os Tipos'}, ...ALL_TYPES]} />
                  </div>
                  <div className="flex justify-end mt-4 pt-4 border-t border-slate-200 dark:border-slate-700">
                     <Button theme={theme} icon={Download} onClick={handleExportHistoryCSV} className="w-full sm:w-auto whitespace-nowrap shadow-sm">Exportar para Planilha</Button>
                  </div>
                </Card>
              )}

              {/* MINI-DASHBOARD DE HISTÓRICO */}
              {activeSubTab === 'history' && (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 animate-in slide-in-from-bottom-2 duration-500 relative z-10">
                  <Card className={`p-6 border-l-4 border-${theme.main}-500 transition-transform hover:-translate-y-1`}>
                    <div className={`flex items-center gap-3 text-${theme.main}-600 dark:text-${theme.main}-400 mb-2`}>
                      <div className={`p-3 bg-${theme.main}-100 dark:bg-${theme.main}-900/30 rounded-xl`}><FileCheck size={24} /></div>
                      <span className="font-bold text-sm uppercase tracking-wider">Pagamentos Efetuados</span>
                    </div>
                    <h3 className="text-4xl font-black text-slate-800 dark:text-white">{displayedHistory.length}</h3>
                    <p className="text-sm font-medium text-slate-500 mt-1">no período selecionado</p>
                  </Card>
                  <Card className={`p-6 border-l-4 border-emerald-500 transition-transform hover:-translate-y-1`}>
                    <div className="flex items-center gap-3 text-emerald-600 dark:text-emerald-400 mb-2">
                      <div className="p-3 bg-emerald-100 dark:bg-emerald-900/30 rounded-xl"><DollarSign size={24} /></div>
                      <span className="font-bold text-sm uppercase tracking-wider">Valor Total Pago</span>
                    </div>
                    <h3 className="text-4xl font-black text-slate-800 dark:text-white">{formatCurrency(historyTotalAmount)}</h3>
                    <p className="text-sm font-medium text-slate-500 mt-1">no período selecionado</p>
                  </Card>
                </div>
              )}

              <Card className="overflow-hidden">
                <div className="overflow-x-auto custom-scrollbar">
                  <table className="w-full text-left border-collapse min-w-max">
                    <thead>
                      <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                        <th className="p-4 w-12 text-center">
                          <button 
                            onClick={toggleAllPrintSelection} 
                            className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors"
                            title="Selecionar todos desta aba para recibo"
                          >
                            {paginatedPayments.length > 0 && paginatedPayments.every(p => printSelections[p.id]) ? <CheckSquare size={18} className={theme.text} /> : <Square size={18} />}
                          </button>
                        </th>
                        <th className="p-4 font-medium">Data Prog.</th>
                        <th className="p-4 font-medium">Destinatário</th>
                        <th className="p-4 font-medium">Detalhes do Lançamento</th>
                        {activeSubTab === 'history' && <th className="p-4 font-medium">Banco Origem</th>}
                        <th className="p-4 font-medium text-right">Valor</th>
                        <th className="p-4 font-medium text-center">Ações</th>
                      </tr>
                    </thead>
                    <tbody>
                      {paginatedPayments.map(pay => {
                        const emp = pay.category !== 'employee' ? null : employees.find(e => e.id === pay.employeeId);
                        const isLate = parseDate(pay.date) < todayTime && pay.status !== 'Pago';
                        const isSelected = !!printSelections[pay.id];
                        
                        return (
                          <tr key={pay.id} className={`border-b border-slate-100 dark:border-slate-800/50 transition-colors ${isSelected ? 'bg-slate-50 dark:bg-slate-800/70' : 'hover:bg-slate-50 dark:hover:bg-slate-800/30'}`}>
                            <td className="p-4 text-center">
                              <button 
                                onClick={() => togglePrintSelection(pay.id)} 
                                className={`transition-colors ${isSelected ? theme.text : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'}`}
                              >
                                {isSelected ? <CheckSquare size={18} /> : <Square size={18} />}
                              </button>
                            </td>
                            <td className="p-4 text-sm font-medium whitespace-nowrap">
                              {formatDate(pay.date)}
                              {isLate && <span className="ml-2 px-2 py-0.5 rounded text-[10px] font-bold bg-rose-100 text-rose-600 dark:bg-rose-900/40 dark:text-rose-400 uppercase">Atrasado</span>}
                              {pay.status === 'Pago' && <span className="ml-2 px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400 uppercase">Pago</span>}
                            </td>
                            <td className="p-4 font-medium">
                              <div className="flex flex-col">
                                <div className="flex items-center gap-1.5">
                                  <span>{pay.category !== 'employee' ? pay.payeeName : (emp?.name || 'Desconhecido')}</span>
                                  {pay.isRecurring && <RefreshCw size={12} className="text-blue-500" title="Pagamento Recorrente" />}
