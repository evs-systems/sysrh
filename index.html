          const togglePrintSelection = (payId) => {
            setPrintSelections(prev => ({ ...prev, [payId]: !prev[payId] }));
          };

          const toggleAllPrintSelection = () => {
            const allSelected = paginatedPayments.length > 0 && paginatedPayments.every(p => printSelections[p.id]);
            const newState = { ...printSelections };
            paginatedPayments.forEach(p => {
              newState[p.id] = !allSelected;
            });
            setPrintSelections(newState);
          };

          const handleExportHistoryCSV = () => {
            const headers = ['Data Pagto.', 'Data Realizado', 'Destinatário', 'Tipo', 'Descrição', 'Banco Origem', 'Valor Total Liquido'];
            const rows = displayedHistory.map(pay => {
              const emp = pay.category === 'other' ? null : employees.find(e => e.id === pay.employeeId);
              const payeeName = pay.category === 'other' ? pay.payeeName : (emp?.name || 'Desconhecido');
              const paymentDate = pay.paidAt ? new Date(pay.paidAt).toLocaleDateString('pt-BR') : pay.date;
              return [
                `"${formatDate(pay.date)}"`,
                `"${paymentDate}"`,
                `"${payeeName}"`,
                `"${pay.type}"`,
                `"${pay.description || ''}"`,
                `"${pay.paymentBank || ''}"`,
                `"${formatCurrency(pay.amount).replace('R$', '').trim()}"`
              ];
            });
            
            const csvContent = [headers.join(';'), ...rows.map(r => r.join(';'))].join('\n');
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a'); 
            link.href = URL.createObjectURL(blob); 
            link.download = `historico_pagamentos_${historyMonthFilter}_${historyYearFilter}.csv`; 
            link.click();
            showToast('Histórico exportado para Excel com sucesso!');
          };

          const handlePrint = async () => {
            setIsPrinting(true);
            
            try {
              showToast('Gerando comprovantes, aguarde...', 'success');
              
              const jspdfModule = await import('https://esm.sh/jspdf@2.5.1');
              const jsPDF = jspdfModule.jsPDF;
              
              const docPdf = new jsPDF({ orientation: 'landscape', format: 'a4' });
              const paymentsToPrint = payments.filter(p => printSelections[p.id]);
              
              for (let i = 0; i < paymentsToPrint.length; i++) {
                if (i > 0 && i % 2 === 0) {
                  docPdf.addPage();
                }
                
                const pay = paymentsToPrint[i];
                const isLeft = i % 2 === 0; 
                const startX = isLeft ? 15 : 158; 
                const startY = 15;
                const w = 124; 
                const h = 180; 
                
                docPdf.setDrawColor(150, 150, 150);
                docPdf.setLineWidth(0.5);
                docPdf.setLineDashPattern([3, 3], 0);
                docPdf.rect(startX, startY, w, h);
                docPdf.setLineDashPattern([], 0); 
                
                docPdf.setFont("helvetica", "bold");
                docPdf.setFontSize(14);
                docPdf.text("RECIBO DE PAGAMENTO", startX + w/2, startY + 15, { align: "center" });
                
                docPdf.setFont("helvetica", "normal");
                docPdf.setFontSize(12);
                docPdf.text((pay.type || '').toUpperCase(), startX + w/2, startY + 22, { align: "center" });
                
                docPdf.setDrawColor(200, 200, 200);
                docPdf.line(startX + 10, startY + 28, startX + w - 10, startY + 28);
                
                const emp = pay.category === 'other' ? null : employees.find(e => e.id === pay.employeeId);
                const payeeName = pay.category === 'other' ? pay.payeeName : (emp?.name || 'Desconhecido');
                const refMonth = pay.date && pay.date.includes('/') ? pay.date.substring(3) : pay.date; 
                const paymentDate = pay.paidAt ? new Date(pay.paidAt).toLocaleDateString('pt-BR') : pay.date;
                
                let currentY = startY + 40;
                docPdf.setFontSize(10);
                
                docPdf.setFont("helvetica", "bold");
                docPdf.text(pay.category === 'other' ? 'Beneficiário:' : 'Colaborador:', startX + 10, currentY);
                docPdf.setFont("helvetica", "normal");
                docPdf.text(payeeName || "-", startX + 40, currentY);
                currentY += 8;
                
                if (pay.category !== 'other') {
                  docPdf.setFont("helvetica", "bold");
                  docPdf.text("CPF:", startX + 10, currentY);
                  docPdf.setFont("helvetica", "normal");
                  docPdf.text(formatCPF(emp?.cpf) || "-", startX + 40, currentY);
                  currentY += 8;
                  
                  docPdf.setFont("helvetica", "bold");
                  docPdf.text("Cargo:", startX + 10, currentY);
                  docPdf.setFont("helvetica", "normal");
                  docPdf.text(emp?.role || "-", startX + 40, currentY);
                  currentY += 8;
                }
                
                docPdf.setFont("helvetica", "bold");
                docPdf.text("Valor:", startX + 10, currentY);
                docPdf.setFont("helvetica", "normal");
                docPdf.text(formatCurrency(pay.amount), startX + 40, currentY);
                currentY += 8;
                
                docPdf.setFont("helvetica", "bold");
                docPdf.text("Referência:", startX + 10, currentY);
                docPdf.setFont("helvetica", "normal");
                docPdf.text(refMonth || "-", startX + 40, currentY);
                currentY += 8;
                
                docPdf.setFont("helvetica", "bold");
                docPdf.text("Data Pagto:", startX + 10, currentY);
                docPdf.setFont("helvetica", "normal");
                docPdf.text(paymentDate || "-", startX + 40, currentY);
                currentY += 15;
                
                docPdf.setFillColor(245, 245, 245);
                docPdf.rect(startX + 10, currentY, w - 20, 35, "F");
                
                docPdf.setFontSize(9);
                const entity = pay.category !== 'other' ? (emp?.company || 'Empresa não informada') : pay.description || pay.type;
                
                const richTextParts = [
                  { text: `Declaro ter recebido ${pay.category !== 'other' ? 'da empresa ' : 'o valor referente a '}`, bold: false },
                  { text: entity, bold: true },
                  { text: `, o valor de `, bold: false },
                  { text: formatCurrency(pay.amount), bold: true },
                  { text: `, referente a `, bold: false },
                  { text: `${pay.type}.`, bold: true }
                ];
                
                let curX = startX + 13;
                let curY = currentY + 7;
                const maxW = w - 26;
                
                richTextParts.forEach(part => {
                  docPdf.setFont("helvetica", part.bold ? "bolditalic" : "italic");
                  const words = part.text.split(/(\s+)/); 
                  words.forEach(word => {
                    if (!word) return;
                    const wordW = docPdf.getTextWidth(word);
                    if (word.trim() !== "" && curX + wordW > startX + 13 + maxW && curX > startX + 13) {
                      curX = startX + 13;
                      curY += 5; 
                    }
                    if (!(word.trim() === "" && curX === startX + 13)) {
                      docPdf.text(word, curX, curY);
                      curX += wordW;
                    }
                  });
                });
                
                const sigY = startY + h - 25;
                docPdf.setDrawColor(0);
                docPdf.setLineWidth(0.5);
                docPdf.line(startX + 20, sigY, startX + w - 20, sigY);
                
                docPdf.setFont("helvetica", "normal");
                docPdf.setFontSize(9);
                docPdf.text("Assinatura do Recebedor", startX + w/2, sigY + 5, { align: "center" });
                docPdf.setFont("helvetica", "bold");
                docPdf.text(payeeName || "-", startX + w/2, sigY + 10, { align: "center" });
              }
              
              window.open(docPdf.output('bloburl'), '_blank');
              setPrintSelections({});
              
            } catch (err) {
              console.error("Erro ao gerar PDF:", err);
              showToast('Erro ao gerar PDF de recibos. Tente novamente.', 'error');
            } finally {
              setIsPrinting(false);
            }
          };

          const handleCategoryChange = (val) => {
            setFormData(prev => ({

              setFormData({ category: 'employee', employeeId: '', payeeName: '', items: [{ amount: '', date: '', type: 'Salário', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não', bankName: '', agency: '', account: '', pixKey: '' }] });
            } catch (err) {
              showToast('Erro ao programar pagamentos.', 'error');
            }
          };

          const handleItemChange = (index, field, value) => {
            const newItems = [...formData.items];
            newItems[index][field] = value;
            setFormData({ ...formData, items: newItems });
          };

          const handleBulkSave = async (e) => {

               showToast('Preencha o valor para todos os colaboradores selecionados.', 'error');

            }

              const promises = bulkFormData.employeeIds.map(empId => {
                return addDoc(collection(db, `${basePath}/payments`), {
                  category: 'employee',
                  employeeId: empId,
                  payeeName: null,
                  amount: bulkFormData.employeeAmounts[empId],
                  date: bulkFormData.date,
                  type: bulkFormData.type,
                  description: bulkFormData.description,
                  mandatoryCompanyAccount: bulkFormData.mandatoryCompanyAccount,
                  isRecurring: bulkFormData.isRecurring === 'Sim',
                  bankName: '',
                  agency: '',
                  account: '',
                  pixKey: '',
                  status: 'Pendente',
                  isVerified: false,
                  lastModifiedBy: appUser.username
                });
              });

              await Promise.all(promises);

              const totalAmount = bulkFormData.employeeIds.reduce((acc, id) => acc + Number(bulkFormData.employeeAmounts[id]), 0);
              logAction('Cadastro', 'Pagamentos', `Programou pagamento em massa (${bulkFormData.type}) no valor total de R$ ${totalAmount.toFixed(2)} para ${bulkFormData.employeeIds.length} colaborador(es).`);
              showToast(`Sucesso! ${bulkFormData.employeeIds.length} pagamentos foram programados.`);
              setIsBulkModalOpen(false);
              setBulkFormData({ employeeIds: [], employeeAmounts: {}, date: '', type: 'Salário', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não' });
              setBulkSearchTerm('');
            } catch (err) {
              showToast('Erro ao programar pagamentos em massa.', 'error');
            }
          };

          const toggleBulkEmployee = (empId) => {
            setBulkFormData(prev => {
              if (prev.employeeIds.includes(empId)) {
                const newAmounts = { ...prev.employeeAmounts };
                delete newAmounts[empId];
                return { ...prev, employeeIds: prev.employeeIds.filter(id => id !== empId), employeeAmounts: newAmounts };
              } else {
                return { ...prev, employeeIds: [...prev.employeeIds, empId] };
              }
            });
          };

          const toggleAllBulkEmployees = (filteredEmps) => {
            setBulkFormData(prev => {
              const allFilteredIds = filteredEmps.map(e => e.id);
              const isAllSelected = allFilteredIds.every(id => prev.employeeIds.includes(id));
              if (isAllSelected) {
                 const newAmounts = { ...prev.employeeAmounts };
                 allFilteredIds.forEach(id => delete newAmounts[id]);
                 return { ...prev, employeeIds: prev.employeeIds.filter(id => !allFilteredIds.includes(id)), employeeAmounts: newAmounts };
              } else {
                 const newIds = new Set([...prev.employeeIds, ...allFilteredIds]);
                 return { ...prev, employeeIds: Array.from(newIds) };
              }
            });
          };

          const handleBulkAmountChange = (empId, value) => {
            setBulkFormData(prev => ({
                ...prev,
                employeeAmounts: {
                    ...prev.employeeAmounts,
                    [empId]: value
                }
            }));
          };

          const addItem = () => setFormData({ ...formData, items: [...formData.items, { amount: '', date: '', type: formData.category === 'employee' ? 'Salário' : 'Boleto', description: '', mandatoryCompanyAccount: 'Sim', isRecurring: 'Não', bankName: '', agency: '', account: '', pixKey: '' }] });
          
          const removeItem = (index) => {

              e.target.value = '';

                      <span className="text-sm text-emerald-700 dark:text-emerald-500">
                        {paymentToProcess.category === 'other' ? paymentToProcess.payeeName : (activeEmployeeToPay?.name || 'Funcionário Deletado')} • {paymentToProcess.type}

                        {paymentToProcess.category === 'other' ? (

                                    <div><span className="text-xs text-slate-500">Ag: </span><span className="font-medium text-slate-800 dark:text-slate-200">{paymentToProcess.agency || '-'}</span> <span className="text-xs text-slate-500 ml-2">Cc: </span><span className="font-medium text-slate-800 dark:text-slate-200">{paymentToProcess.account || '-'}</span></div>

                                  </div>

                                <div><span className="text-xs text-slate-500">Ag: </span><span className="font-medium text-slate-800 dark:text-slate-200">{activeEmployeeToPay.agency || '-'}</span> <span className="text-xs text-slate-500 ml-2">Cc: </span><span className="font-medium text-slate-800 dark:text-slate-200">{activeEmployeeToPay.account || '-'}</span></div>

        function DisciplinaryView({ theme, basePath, appUser, employees, disciplinary, showToast, logAction, requestConfirm }) {
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [activeSubTab, setActiveSubTab] = useState('ativas');
          const [formData, setFormData] = useState({ employeeId: '', type: 'Adiantamento', status: 'A fazer', date: '', description: '' });

          const canWrite = appUser?.permissions?.disciplinary?.write;
          const canDelete = appUser?.permissions?.disciplinary?.delete;

          const STATUS_COLORS = {
            'A fazer': 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300 border-slate-200 dark:border-slate-700',
            'Em andamento': 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400 border-blue-200 dark:border-blue-800',
            'Aguardando Autorização': 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-400 border-amber-200 dark:border-amber-800',
            'Finalizado': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400 border-emerald-200 dark:border-emerald-800'
          };

          const parseDate = (d) => {
            if (!d) return 0;
            if (d.includes('/')) {
              const [day, month, year] = d.split('/');
              return new Date(`${year}-${month}-${day}T00:00:00`).getTime();
            }
            return new Date(`${d}T00:00:00`).getTime();
          };

          const openModal = (disc = null) => {
            if (!canWrite) return;
            if (disc) {
              setEditingId(disc.id);
              setFormData({
                employeeId: disc.employeeId || '',
                type: disc.type || 'Adiantamento',
                status: disc.status || 'A fazer',
                date: disc.date || '',
                description: disc.description || ''
              });
            } else {
              setEditingId(null);
              setFormData({ employeeId: '', type: 'Adiantamento', status: 'A fazer', date: '', description: '' });
            }
            setIsModalOpen(true);
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite) return;
            const emp = employees.find(e => e.id === formData.employeeId);
            try {
              if (editingId) {
                await updateDoc(doc(db, `${basePath}/disciplinary/${editingId}`), formData);
                logAction('Atualização', 'Solicitações', `Atualizou a solicitação de ${formData.type} para ${emp?.name || 'Desconhecido'}`);
                showToast('Solicitação atualizada!');
              } else {
                await addDoc(collection(db, `${basePath}/disciplinary`), formData);
                logAction('Cadastro', 'Solicitações', `Registrou solicitação de ${formData.type} para ${emp?.name || 'Desconhecido'}`);
                showToast('Solicitação registrada!');
              }
              setIsModalOpen(false);
            } catch (err) {
              showToast('Erro ao salvar.', 'error');
            }
          };

          const handleDelete = (id, type) => {
            if (!canDelete) return;
            requestConfirm(`Tem certeza que deseja excluir esta solicitação (${type})?`, async () => {
              try {
                await deleteDoc(doc(db, `${basePath}/disciplinary/${id}`));
                logAction('Exclusão', 'Solicitações', `Removeu a solicitação: ${type}`);
                showToast('Solicitação removida.');
              } catch (err) {
                showToast('Erro ao remover solicitação.', 'error');
              }
            });
          };

          const activeRequests = disciplinary.filter(d => d.status !== 'Finalizado');
          const finishedRequests = disciplinary.filter(d => d.status === 'Finalizado');
          const currentList = activeSubTab === 'ativas' ? activeRequests : finishedRequests;

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Solicitações</h2>
                  <p className="text-slate-500 mt-1">Registro e acompanhamento de solicitações dos colaboradores.</p>
                </div>
                {canWrite && <Button theme={theme} icon={Plus} onClick={() => openModal()}>Nova Solicitação</Button>}
              </div>

              <div className="flex gap-2 p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl w-fit mb-6 overflow-x-auto">
                <button onClick={() => setActiveSubTab('ativas')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'ativas' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Em Andamento <span className="ml-1 opacity-60">({activeRequests.length})</span></button>
                <button onClick={() => setActiveSubTab('finalizadas')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'finalizadas' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Finalizados <span className="ml-1 opacity-60">({finishedRequests.length})</span></button>
              </div>

              <Card className="overflow-hidden">
                <div className="overflow-x-auto custom-scrollbar">
                  <table className="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                      <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                        <th className="p-4 font-medium">Data</th>
                        <th className="p-4 font-medium">Funcionário</th>
                        <th className="p-4 font-medium">Tipo</th>
                        <th className="p-4 font-medium">Status</th>
                        <th className="p-4 font-medium w-1/3">Motivo / Descrição</th>
                        {(canWrite || canDelete) && <th className="p-4 font-medium text-right">Ações</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {currentList.sort((a,b) => parseDate(b.date) - parseDate(a.date)).map(disc => {
                        const emp = employees.find(e => e.id === disc.employeeId);
                        const isHighlight = disc.type === 'Desligamento' || disc.type === 'Adiantamento';
                        const isFinished = disc.status === 'Finalizado';
                        
                        return (
                          <tr key={disc.id} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
                            <td className="p-4 text-sm whitespace-nowrap">{formatDate(disc.date)}</td>
                            <td className="p-4 font-medium">{emp?.name || 'Deletado'}</td>
                            <td className="p-4">
                              <span className={`px-3 py-1 rounded-full text-xs font-medium border whitespace-nowrap ${isHighlight ? 'bg-amber-50 text-amber-600 border-amber-200 dark:bg-amber-900/20 dark:border-amber-800' : 'bg-blue-50 text-blue-600 border-blue-200 dark:bg-blue-900/20 dark:border-blue-800'}`}>
                                {disc.type}
                              </span>
                            </td>
                            <td className="p-4">
                              <span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase border whitespace-nowrap ${STATUS_COLORS[disc.status || 'A fazer']}`}>
                                {disc.status || 'A fazer'}
                              </span>
                            </td>

                                  </button>
                                )}
                              </td>
                            )}
                          </tr>
                        );
                      })}
                      {currentList.length === 0 && <tr><td colSpan={(canWrite || canDelete) ? "6" : "5"} className="p-8 text-center text-slate-500">Nenhuma solicitação encontrada nesta aba.</td></tr>}

              <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={editingId ? 'Editar Solicitação' : 'Registrar Solicitação'}>
                <form onSubmit={handleSave} className="space-y-4">
                  <Select 
                    label="Funcionário" theme={theme} required value={formData.employeeId} 
                    onChange={e => setFormData({...formData, employeeId: e.target.value})}
                    options={employees.map(e => ({ value: e.id, label: e.name }))} 
                  />
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <Select 
                      label="Tipo" theme={theme} required value={formData.type} 
                      onChange={e => setFormData({...formData, type: e.target.value})}
                      options={[ 
                        {value: 'Adiantamento', label: 'Adiantamento'}, 
                        {value: 'Desligamento', label: 'Desligamento'}, 
                        {value: 'Convenio Médico', label: 'Convenio Médico'}, 
                        {value: 'Vale Combustível', label: 'Vale Combustível'}, 
                        {value: 'Vale Transporte', label: 'Vale Transporte'}, 
                        {value: 'Outra', label: 'Outra'} 
                      ]} 
                    />
                    <Select 
                      label="Status" theme={theme} required value={formData.status} 
                      onChange={e => setFormData({...formData, status: e.target.value})}
                      options={[ 
                        {value: 'A fazer', label: 'A fazer'}, 
                        {value: 'Em andamento', label: 'Em andamento'}, 
                        {value: 'Aguardando Autorização', label: 'Aguardando Autorização'}, 
                        {value: 'Finalizado', label: 'Finalizado'} 
                      ]} 
                    />
                    <Input 
                      label="Data" type="text" placeholder="DD/MM/AAAA" theme={theme} required 
                      value={formData.date} 
                      onChange={e => {
                        let val = e.target.value.replace(/\D/g, ''); 
                        if (val.length > 8) val = val.slice(0, 8);
                        let formattedDate = val;
                        if (val.length > 4) formattedDate = `${val.slice(0, 2)}/${val.slice(2, 4)}/${val.slice(4)}`;
                        else if (val.length > 2) formattedDate = `${val.slice(0, 2)}/${val.slice(2)}`;

                    <textarea 
                      required
                      rows="3"
                      className={`w-full px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm`}
                      value={formData.description}
                      onChange={e => setFormData({...formData, description: e.target.value})}
                    />
                  </div>
                  
                  <div className="pt-6 flex justify-end gap-3 border-t border-slate-200 dark:border-slate-700">
                    <Button variant="ghost" theme={theme} type="button" onClick={() => setIsModalOpen(false)}>Cancelar</Button>
                    <Button variant="primary" theme={theme} type="submit">{editingId ? 'Atualizar' : 'Salvar'}</Button>
                  </div>
                </form>
              </Modal>

          );
        }

        function SystemUsersView({ theme, basePath, systemUsers, showToast, logAction, firebaseConfig, requestConfirm, appUser }) {
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingId, setEditingId] = useState(null);

          const canWrite = appUser?.permissions?.systemUsers?.write ?? (appUser?.sector === 'Administração');
          const canDelete = appUser?.permissions?.systemUsers?.delete ?? (appUser?.sector === 'Administração');

          const MODULES = [
            { id: 'calendar', label: 'Agenda' },
            { id: 'reports', label: 'Relatórios' },
            { id: 'benefits', label: 'Benefícios' },
            { id: 'companies', label: 'Empresas' },
            { id: 'employees', label: 'Colaboradores' },
            { id: 'payments', label: 'Pagamentos' },
            { id: 'disciplinary', label: 'Solicitações' },
            { id: 'systemUsers', label: 'Usuários' },
            { id: 'logs', label: 'Histórico de Logs' }
          ];

          const DEFAULT_PERMISSIONS = {
            'Administração': { 
              calendar: { read: true, write: true, delete: true },
              reports: { read: true, write: false, delete: false },
              benefits: { read: true, write: true, delete: true },
              companies: { read: true, write: true, delete: true },
              employees: { read: true, write: true, delete: true }, 
              payments: { read: true, write: true, delete: true }, 
              disciplinary: { read: true, write: true, delete: true },
              systemUsers: { read: true, write: true, delete: true },
              logs: { read: true, write: false, delete: false }
            },
            'RH': { 
              calendar: { read: true, write: true, delete: false },
              reports: { read: true, write: false, delete: false },
              benefits: { read: true, write: true, delete: false },
              companies: { read: true, write: false, delete: false },
              employees: { read: true, write: true, delete: false }, 
              payments: { read: true, write: false, delete: false }, 
              disciplinary: { read: true, write: true, delete: false },
              systemUsers: { read: false, write: false, delete: false },
              logs: { read: false, write: false, delete: false }
            },
            'Financeiro': { 
              calendar: { read: true, write: true, delete: false },
              reports: { read: true, write: false, delete: false },
              benefits: { read: true, write: false, delete: false },
              companies: { read: true, write: false, delete: false },
              employees: { read: true, write: false, delete: false }, 
              payments: { read: true, write: true, delete: false }, 
              disciplinary: { read: true, write: false, delete: false },
              systemUsers: { read: false, write: false, delete: false },
              logs: { read: false, write: false, delete: false }
            },
          };

          const emptyForm = {
            name: '', 
            username: '', 
            password: '',
            sector: 'RH',
            permissions: DEFAULT_PERMISSIONS['RH']
          };

          const [formData, setFormData] = useState(emptyForm);

          const openModal = (u = null) => {
            if (!canWrite) return;
            if (u) {
              setEditingId(u.id);
              setFormData(u);
            } else {
              setEditingId(null);
              setFormData(emptyForm);
            }
            setIsModalOpen(true);
          };

          const handleSectorChange = (newSector) => {
            setFormData(prev => ({
              ...prev,
              sector: newSector,
              permissions: DEFAULT_PERMISSIONS[newSector] || prev.permissions
            }));
          };

          const handlePermissionChange = (modId, type) => {
            setFormData(prev => {
              const currentVal = prev.permissions[modId]?.[type] || false;
              const newPerms = { ...prev.permissions };
              newPerms[modId] = { ...(newPerms[modId] || {}), [type]: !currentVal };

              if (type === 'write' && !currentVal) newPerms[modId].read = true;
              if (type === 'delete' && !currentVal) {
                newPerms[modId].read = true;
                newPerms[modId].write = true;
              }
              
              if (type === 'read' && currentVal) {
                newPerms[modId].write = false;
                newPerms[modId].delete = false;
              }
              if (type === 'write' && currentVal) {
                newPerms[modId].delete = false;
              }

              return { ...prev, permissions: newPerms };
            });
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite) return;
            try {
              if (editingId) {
                await updateDoc(doc(db, `${basePath}/systemUsers/${editingId}`), formData);
                logAction('Atualização', 'Usuários', `Atualizou os acessos de ${formData.username}`);
                showToast('Usuário atualizado com sucesso!');
              } else {
                const secondaryApp = initializeApp(firebaseConfig, `SecondaryApp_${Date.now()}`);
                const secondaryAuth = getAuth(secondaryApp);
                const email = formData.username.toLowerCase() + '@sysrh.com';
                
                const cred = await createUserWithEmailAndPassword(secondaryAuth, email, formData.password);
                await signOut(secondaryAuth);
                await deleteApp(secondaryApp);
                
                await setDoc(doc(db, `${basePath}/systemUsers/${cred.user.uid}`), {
                  name: formData.name,
                  username: formData.username,
                  sector: formData.sector,
                  permissions: formData.permissions
                });
                
                logAction('Cadastro', 'Usuários', `Cadastrou o usuário ${formData.username}`);
                showToast('Usuário cadastrado com sucesso e credenciais criadas!');
              }
              setIsModalOpen(false);
            } catch (err) {
              showToast('Erro ao salvar usuário: ' + err.message, 'error');
            }
          };

          const handleDelete = (id) => {
            if (!canDelete) return;
            requestConfirm('Excluir este usuário do banco de dados do sistema? (A exclusão completa requer remoção no Firebase Auth)', async () => {
              const usr = systemUsers.find(u => u.id === id);
              try {
                await deleteDoc(doc(db, `${basePath}/systemUsers/${id}`));
                logAction('Exclusão', 'Usuários', `Removeu o perfil de ${usr?.username || id}`);
                showToast('Perfil de Usuário removido do sistema.');
              } catch (err) {
                showToast('Erro ao remover.', 'error');
              }
            });
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Usuários</h2>
                  <p className="text-slate-500 mt-1">Controle quem acessa o sistema e suas permissões (Ler/Editar).</p>
                </div>
                {canWrite && <Button theme={theme} icon={Plus} onClick={() => openModal()}>Novo Usuário</Button>}
              </div>

              <Card className="overflow-hidden">
                <div className="overflow-x-auto custom-scrollbar">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                        <th className="p-4 font-medium">Nome / Usuário</th>
                        <th className="p-4 font-medium">Setor</th>
                        <th className="p-4 font-medium">Permissões Especiais</th>
                        {(canWrite || canDelete) && <th className="p-4 font-medium text-right">Ações</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {systemUsers.map(u => (
                        <tr key={u.id} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                          <td className="p-4">
                            <div className="font-medium">{u.name}</div>
                            <div className="text-xs text-slate-500">{u.username}</div>
                          </td>
                          <td className="p-4">
                            <span className={`px-2 py-1 rounded-md text-xs font-medium bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-300`}>
                              {u.sector}
                            </span>
                          </td>
                          <td className="p-4 text-xs text-slate-500">
                            {Object.entries(u.permissions).map(([modId, perms]) => {
                              const modName = MODULES.find(m => m.id === modId)?.label;
                              if (!perms.read || !modName) return null;
                              
                              const permsText = [
                                perms.read && 'Ler', 
                                perms.write && 'Editar', 
                                perms.delete && 'Apagar'
                              ].filter(Boolean).join(', ');

                              return (
                                <span key={modId} className="inline-block mr-2 mb-1 px-2 py-1 rounded border border-slate-200 dark:border-slate-700">
                                  {modName}: {permsText}
                                </span>
                              );
                            })}
                          </td>
                          {(canWrite || canDelete) && (
                            <td className="p-4 text-right space-x-2">
                              {canWrite && <button onClick={() => openModal(u)} className="p-2 rounded-lg text-slate-500 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors"><Edit2 size={18} /></button>}
                              {canDelete && <button onClick={() => handleDelete(u.id)} className="p-2 rounded-lg text-slate-500 hover:text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-colors"><Trash2 size={18} /></button>}
                            </td>
                          )}
                        </tr>
                      ))}
                      {systemUsers.length === 0 && (
                        <tr><td colSpan={(canWrite || canDelete) ? "4" : "3"} className="p-8 text-center text-slate-500">Nenhum usuário de sistema cadastrado.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </Card>

              <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={editingId ? 'Editar Usuário' : 'Novo Usuário de Acesso'}>
                <form onSubmit={handleSave} className="space-y-6">
                  <div className="space-y-4">
                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Dados do Usuário</h3>
                    <Input label="Nome Completo" theme={theme} required value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="flex flex-col gap-1">
                        <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Usuário de Acesso</label>
                        <input 
                          type="text" 
                          required 
                          placeholder="ex: maria.rh"
                          className={`w-full px-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm ${editingId ? 'opacity-50 pointer-events-none' : ''}`}
                          value={formData.username} 
                          onChange={e => setFormData({...formData, username: e.target.value.toLowerCase().replace(/\s+/g, '')})} 
                          readOnly={!!editingId}
                        />
                      </div>
                      <Input 
                        label={editingId ? "Senha (Deixe em branco p/ não alterar)" : "Senha de Acesso"} 
                        type="password" theme={theme} required={!editingId} 
                        value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} 
                        readOnly={!!editingId} className={editingId ? 'opacity-50 pointer-events-none' : ''}
                      />

                      <Select

                        onChange={e => handleSectorChange(e.target.value)}
                        options={[ {value: 'Administração', label: 'Administração'}, {value: 'RH', label: 'Recursos Humanos'}, {value: 'Financeiro', label: 'Financeiro'} ]} 
                      />
                    </div>
                  </div>

                    <div className="border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden">
                      <div className="grid grid-cols-4 bg-slate-50 dark:bg-slate-800/50 p-3 border-b border-slate-200 dark:border-slate-700 text-sm font-medium">
                        <div>Módulo</div>
                        <div className="text-center">Pode Ler?</div>
                        <div className="text-center">Pode Editar/Criar?</div>
                        <div className="text-center">Pode Apagar?</div>
                      </div>
                      
                      {MODULES.map((mod) => {
                        const perms = formData.permissions[mod.id] || { read: false, write: false, delete: false };
                        return (
                          <div key={mod.id} className="grid grid-cols-4 p-3 border-b border-slate-100 dark:border-slate-700/50 last:border-0 items-center">
                            <div className="text-sm font-medium text-slate-700 dark:text-slate-300">{mod.label}</div>
                            
                            <div className="flex justify-center">
                              <button 
                                type="button"
                                onClick={() => handlePermissionChange(mod.id, 'read')}
                                className={`inline-flex items-center justify-center w-8 h-8 rounded-lg transition-all ${perms.read ? `${theme.bg} text-white shadow-md` : 'bg-slate-200 dark:bg-slate-700 text-slate-400 hover:bg-slate-300 dark:hover:bg-slate-600'}`}
                              >
                                {perms.read ? <CheckSquare size={18} /> : <Square size={18} />}
                              </button>
                            </div>

                            <div className="flex justify-center">
                              <button 
                                type="button"
                                onClick={() => handlePermissionChange(mod.id, 'write')}
                                className={`inline-flex items-center justify-center w-8 h-8 rounded-lg transition-all ${perms.write ? `${theme.bg} text-white shadow-md` : 'bg-slate-200 dark:bg-slate-700 text-slate-400 hover:bg-slate-300 dark:hover:bg-slate-600'}`}
                              >
                                {perms.write ? <CheckSquare size={18} /> : <Square size={18} />}
                              </button>
                            </div>

                            <div className="flex justify-center">
                              <button 
                                type="button"
                                onClick={() => handlePermissionChange(mod.id, 'delete')}
                                className={`inline-flex items-center justify-center w-8 h-8 rounded-lg transition-all ${perms.delete ? `${theme.bg} text-white shadow-md` : 'bg-slate-200 dark:bg-slate-700 text-slate-400 hover:bg-slate-300 dark:hover:bg-slate-600'}`}
                              >
                                {perms.delete ? <CheckSquare size={18} /> : <Square size={18} />}
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <p className="text-xs text-slate-500 mt-2">* Alterar a permissão de Editar/Apagar marcará automaticamente as permissões dependentes (Ler/Editar).</p>
                  </div>

                  <div className="pt-6 flex justify-end gap-3 border-t border-slate-200 dark:border-slate-700">
                    <Button variant="ghost" theme={theme} type="button" onClick={() => setIsModalOpen(false)}>Cancelar</Button>
                    <Button variant="primary" theme={theme} type="submit">{editingId ? 'Atualizar' : 'Salvar Usuário'}</Button>
                  </div>
                </form>
              </Modal>
            </div>
          );
        }
        function SettingsView({ theme, basePath, themeName, isDarkMode, wallpaper, saveSettings, logAction, changePassword, showToast }) {

            setLocalTheme(themeName);
            setLocalDark(isDarkMode);
            setLocalWallpaper(wallpaper);

            saveSettings(localTheme, localDark, localWallpaper);
            showToast('Preferências de aparência salvas com sucesso!', 'success');

            e.preventDefault();
            if (passwordForm.newPassword.length < 6) {
              showToast('A senha deve ter no mínimo 6 caracteres.', 'error');
              return;
            }
            if (passwordForm.newPassword !== passwordForm.confirmPassword) {
              showToast('As senhas não coincidem.', 'error');
              return;
            }
            changePassword(passwordForm.newPassword);
            setPasswordForm({ newPassword: '', confirmPassword: '' });
          };

          const colors = [
            { id: 'blue', label: 'Azul', hex: 'bg-blue-500' },
            { id: 'green', label: 'Verde', hex: 'bg-emerald-500' },
            { id: 'red', label: 'Vermelho', hex: 'bg-rose-500' },
            { id: 'yellow', label: 'Amarelo', hex: 'bg-amber-500' },
            { id: 'pink', label: 'Rosa', hex: 'bg-pink-500' },
            { id: 'purple', label: 'Roxo', hex: 'bg-violet-500' }
          ];

          return (
            <div className="space-y-6 animate-in fade-in duration-500 max-w-6xl w-full">

                    <div className="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-700">
                      <div className="flex items-center gap-3">
                        <div className={`p-2 rounded-xl bg-slate-200 dark:bg-slate-700`}>
                          {localDark ? <Moon size={20} className="text-slate-700 dark:text-slate-200" /> : <Sun size={20} className="text-slate-700 dark:text-slate-200" />}
                        </div>
                        <div>
                          <p className="font-medium">Modo Escuro</p>
                          <p className="text-sm text-slate-500">Alternar entre tema claro e noturno</p>
                        </div>

                        className={`w-14 h-8 rounded-full p-1 transition-colors duration-300 ease-in-out flex ${localDark ? THEMES[localTheme].bg : 'bg-slate-300 dark:bg-slate-600'}`}
                      >
                        <div className={`w-6 h-6 rounded-full bg-white shadow-md transform transition-transform duration-300 ${localDark ? 'translate-x-6' : 'translate-x-0'}`}></div>

                      >

                      </button>

                      <button 
                        onClick={() => setLocalWallpaper('butterflies')} 
                        className={`p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-3 ${localWallpaper === 'butterflies' ? `${THEMES[localTheme].border} bg-slate-50 dark:bg-slate-800` : 'border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800'}`}
                      >
                        <div className="h-16 w-full rounded-xl bg-slate-200/50 dark:bg-slate-700/50 flex items-center justify-center opacity-60" style={{ backgroundImage: PATTERNS.butterflies, backgroundSize: '75px 75px' }}></div>
                        <span className="text-sm font-medium text-slate-700 dark:text-slate-300">Borboletas</span>
                      </button>

                      <button 
                        onClick={() => setLocalWallpaper('elegantFlower')} 
                        className={`p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-3 ${localWallpaper === 'elegantFlower' ? `${THEMES[localTheme].border} bg-slate-50 dark:bg-slate-800` : 'border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800'}`}
                      >
                        <div className="h-16 w-full rounded-xl bg-slate-200/50 dark:bg-slate-700/50 flex items-center justify-center opacity-60" style={{ backgroundImage: PATTERNS.elegantFlower, backgroundSize: '120px 120px', backgroundPosition: 'center' }}></div>
                        <span className="text-sm font-medium text-slate-700 dark:text-slate-300">Flor Refinada</span>
                      </button>
                    </div>
                  </div>

                  <div>
                    <h3 className="text-lg font-bold mb-4">Cor de Destaque</h3>
                    <div className="grid grid-cols-3 sm:grid-cols-6 gap-4">
                      {colors.map(c => (
                        <button
                          key={c.id}
                          onClick={() => setLocalTheme(c.id)}
                          className={`flex flex-col items-center gap-2 p-3 rounded-2xl border-2 transition-all ${localTheme === c.id ? `border-${c.id}-500 bg-slate-50 dark:bg-slate-800` : 'border-transparent hover:bg-slate-100 dark:hover:bg-slate-800'}`}
                        >
                          <div className={`w-8 h-8 rounded-full shadow-inner ${c.hex}`}>
                            {localTheme === c.id && <CheckCircle size={16} className="text-white m-auto h-full opacity-80" />}
                          </div>
                          <span className="text-xs font-medium text-slate-600 dark:text-slate-400">{c.label}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="pt-6 border-t border-slate-200 dark:border-slate-700 flex justify-end">
                    <Button theme={THEMES[localTheme]} onClick={handleSave}>Salvar Preferências</Button>
                  </div>
                </Card>

                <Card className="p-6 space-y-6">
                  <div>
                    <h3 className="text-lg font-bold mb-1">Segurança</h3>
                    <p className="text-sm text-slate-500 mb-4">Altere a sua senha de acesso ao sistema.</p>
                    
                    <form onSubmit={handlePasswordSubmit} className="space-y-4">
                      <div className="grid grid-cols-1 gap-4">
                        <Input 
                          label="Nova Senha" 
                          type="password" 
                          theme={theme} 
                          required 
                          value={passwordForm.newPassword} 
                          onChange={e => setPasswordForm({...passwordForm, newPassword: e.target.value})} 
                        />
                        <Input 
                          label="Confirmar Nova Senha" 
                          type="password" 
                          theme={theme} 
                          required 
                          value={passwordForm.confirmPassword} 
                          onChange={e => setPasswordForm({...passwordForm, confirmPassword: e.target.value})} 
                        />
                      </div>
                      <div className="flex justify-end pt-2">
                        <Button theme={theme} type="submit" icon={Key}>Atualizar Senha</Button>
                      </div>
                    </form>
                  </div>
                </Card>
              </div>
            </div>
          );
        }

        function LogsView({ theme, basePath, logs }) {
          const [searchTerm, setSearchTerm] = useState('');
          const [visibleCount, setVisibleCount] = useState(50);

          // Repõe a contagem visível sempre que o utilizador faz uma nova pesquisa
          useEffect(() => {
            setVisibleCount(50);
          }, [searchTerm]);

          const filteredLogs = logs
            .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
            .filter(log => 
              log.userName?.toLowerCase().includes(searchTerm.toLowerCase()) || 
              log.module?.toLowerCase().includes(searchTerm.toLowerCase()) ||
              log.action?.toLowerCase().includes(searchTerm.toLowerCase()) ||
              log.details?.toLowerCase().includes(searchTerm.toLowerCase())
            );

          const displayedLogs = filteredLogs.slice(0, visibleCount);

          const formatLogTime = (isoString) => {
            const d = new Date(isoString);
            return d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <header className="mb-8">
                <h2 className="text-3xl font-bold tracking-tight">Histórico de Logs</h2>
                <p className="text-slate-500 mt-1">Registro de atividades e interações no sistema.</p>
              </header>

              <Card className="p-2 flex flex-col">
                <div className="p-4 border-b border-slate-200 dark:border-slate-700 flex items-center">
                  <div className="relative flex-1 max-w-md">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 z-10 pointer-events-none" size={18} />
                    <input 
                      type="text" 
                      placeholder="Buscar por usuário, ação ou módulo..." 
                      className="w-full pl-10 pr-4 py-2 bg-slate-100 dark:bg-slate-900/50 rounded-lg outline-none focus:ring-2 transition-all dark:text-white"
                      style={{ '--tw-ring-color': theme.ring.split('-')[2] }}
                      value={searchTerm}
                      onChange={e => setSearchTerm(e.target.value)}
                    />
                  </div>
                  <div className="ml-4 text-sm text-slate-500 hidden md:block">
                    A exibir {displayedLogs.length} de {filteredLogs.length} registos
                  </div>
                </div>
                <div className="overflow-x-auto max-h-[600px] custom-scrollbar flex-1">
                  <table className="w-full text-left border-collapse">
                    <thead className="sticky top-0 bg-slate-50/90 dark:bg-slate-800/90 backdrop-blur-sm z-10 shadow-sm">
                      <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500">
                        <th className="p-4 font-medium">Data / Hora</th>
                        <th className="p-4 font-medium">Usuário</th>
                        <th className="p-4 font-medium">Módulo</th>
                        <th className="p-4 font-medium">Ação</th>
                        <th className="p-4 font-medium">Detalhes</th>
                      </tr>
                    </thead>
                    <tbody>
                      {displayedLogs.map(log => (
                        <tr key={log.id} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                          <td className="p-4 text-sm font-medium whitespace-nowrap">{formatLogTime(log.timestamp)}</td>
                          <td className="p-4">
                            <div className="flex flex-col">
                              <span className="font-medium text-sm">{log.userName}</span>
                              <span className="text-xs text-slate-500">@{log.userUsername}</span>
                            </div>
                          </td>
                          <td className="p-4 text-sm font-medium">{log.module}</td>
                          <td className="p-4">
                            <span className={`px-2 py-1 rounded-md text-xs font-medium ${
                              log.action === 'Exclusão' ? 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400' :
                              log.action === 'Atualização' ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400' :
                              log.action === 'Cadastro' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400' :
                              'bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-300'
                            }`}>
                              {log.action}
                            </span>
                          </td>
                          <td className="p-4 text-sm text-slate-600 dark:text-slate-400">{log.details}</td>
                        </tr>
                      ))}
                      {displayedLogs.length === 0 && (
                        <tr><td colSpan="5" className="p-8 text-center text-slate-500">Nenhum log de atividade encontrado.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
                {filteredLogs.length > visibleCount && (
                  <div className="p-4 flex justify-center border-t border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/30">
                    <Button 
                      variant="secondary" 
                      theme={theme} 
                      onClick={() => setVisibleCount(prev => prev + 50)}
                      icon={RefreshCw}
                    >
                      Carregar mais dados
                    </Button>
                  </div>
                )}
              </Card>
            </div>
          );
        }
        
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
