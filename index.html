        function VacationsView({ theme, basePath, appUser, employees, showToast, logAction, db, requestConfirm }) {
          const [activeSubTab, setActiveSubTab] = useState('atuais');
          const [searchTerm, setSearchTerm] = useState('');
          const [filterDepartment, setFilterDepartment] = useState('');
          const [filterUnit, setFilterUnit] = useState('');
          const [filterSector, setFilterSector] = useState('');
          const [filterStatus, setFilterStatus] = useState('');
          
          const today = new Date();
          const currentMonthStr = String(today.getMonth() + 1).padStart(2, '0');
          const currentYearStr = String(today.getFullYear());
          
          const [filterMonth, setFilterMonth] = useState(currentMonthStr);
          const [filterYear, setFilterYear] = useState(currentYearStr);

          const [visibleCount, setVisibleCount] = useState(50);
          const [localEdits, setLocalEdits] = useState({});
          
          const [dropdownState, setDropdownState] = useState(null);

          const canWrite = appUser?.permissions?.vacations?.write || appUser?.sector === 'Administração';

          // Listener inteligente: fecha o menu se rolar a página ou clicar fora
          useEffect(() => {
            const handleScroll = () => setDropdownState(null);
            const handleMouseDown = (e) => {
              if (e.target.closest('.vacations-dropdown-btn')) return;
              setDropdownState(null);
            };
            if (dropdownState) {
              window.addEventListener('scroll', handleScroll, true);
              document.addEventListener('mousedown', handleMouseDown);
            }
            return () => {
              window.removeEventListener('scroll', handleScroll, true);
              document.removeEventListener('mousedown', handleMouseDown);
            };
          }, [dropdownState]);

          const toggleDropdown = (e, uniqueId, field, currentVal, optionsList, renderLabel) => {
            e.preventDefault();
            e.stopPropagation();
            const id = `${uniqueId}-${field}`;
            
            if (dropdownState?.id === id) {
              setDropdownState(null);
              return;
            }
            
            const btnRect = e.currentTarget.getBoundingClientRect();
            const cardEl = e.currentTarget.closest('.vacations-table-card');
            if (cardEl) {
              const cardRect = cardEl.getBoundingClientRect();
              setDropdownState({
                id, uniqueId, field, currentVal, optionsList, renderLabel,
                top: btnRect.bottom - cardRect.top,
                left: btnRect.left - cardRect.left,
                width: btnRect.width
              });
            }
          };

          useEffect(() => {
            setVisibleCount(50);
          }, [activeSubTab, searchTerm, filterDepartment, filterUnit, filterSector, filterStatus, filterMonth, filterYear]);

          const activeEmployees = employees.filter(e => e.status !== 'Desligado' && e.employeeType !== 'Freelancer');

          const deptsList = [...new Set(activeEmployees.map(e => e.department).filter(Boolean))].sort();
          const unitsList = [...new Set(activeEmployees.map(e => e.unit).filter(Boolean))].sort();
          const sectorsList = [...new Set(activeEmployees.map(e => e.workSector).filter(Boolean))].sort();

          const monthOptions = [
            { value: 'all', label: 'Todos os Meses' },
            { value: '01', label: 'Janeiro' }, { value: '02', label: 'Fevereiro' }, { value: '03', label: 'Março' },
            { value: '04', label: 'Abril' }, { value: '05', label: 'Maio' }, { value: '06', label: 'Junho' },
            { value: '07', label: 'Julho' }, { value: '08', label: 'Agosto' }, { value: '09', label: 'Setembro' },
            { value: '10', label: 'Outubro' }, { value: '11', label: 'Novembro' }, { value: '12', label: 'Dezembro' }
          ];

          const yearOptions = [
            { value: 'all', label: 'Todos os Anos' },
            { value: String(today.getFullYear() - 1), label: String(today.getFullYear() - 1) },
            { value: currentYearStr, label: currentYearStr },
            { value: String(today.getFullYear() + 1), label: String(today.getFullYear() + 1) },
            { value: String(today.getFullYear() + 2), label: String(today.getFullYear() + 2) }
          ];

          const parseDate = (dStr) => {
            if (!dStr || dStr.length < 10) return null;
            const [d, m, y] = dStr.split('/');
            return new Date(y, m - 1, d);
          };

          const allCycles = [];
          activeEmployees.forEach(emp => {
            if (!emp.startDate) return;
            const startD = parseDate(emp.startDate);
            if (!startD || isNaN(startD.getTime())) return;

            let currentYear = startD.getFullYear();
            const currentTodayYear = today.getFullYear();
            
            let minDisplayYear = currentYear;
            if (emp.createdAt) {
                const createdYear = new Date(emp.createdAt).getFullYear();
                minDisplayYear = Math.max(currentYear, createdYear - 2); 
            } else {
                minDisplayYear = Math.max(currentYear, currentTodayYear - 2);
            }
            
            while (currentYear <= currentTodayYear + 1) {
              const cycleId = `${currentYear}-${currentYear+1}`;
              const dbData = emp.vacations?.[cycleId] || {};
              
              // Busca partes fracionadas vinculadas a este ciclo
              const partsKeys = Object.keys(emp.vacations || {}).filter(k => k.startsWith(`${cycleId}_p`));

              if (currentYear >= minDisplayYear || Object.keys(dbData).length > 0 || partsKeys.length > 0) {
                  const startAq = new Date(currentYear, startD.getMonth(), startD.getDate());
                  const endAq = new Date(currentYear + 1, startD.getMonth(), startD.getDate());
                  const canTake = new Date(currentYear + 1, startD.getMonth() + 1, startD.getDate());
                  const limit = new Date(currentYear + 2, startD.getMonth() + 1, startD.getDate());

                  const startAqStr = startAq.toLocaleDateString('pt-BR');
                  const endAqStr = endAq.toLocaleDateString('pt-BR');
                  const canTakeStr = canTake.toLocaleDateString('pt-BR');
                  const limitStr = limit.toLocaleDateString('pt-BR');

                  // Conta dias já utilizados
                  let usedDays = 0;
                  const parts = partsKeys.map(k => emp.vacations[k]);
                  
                  parts.forEach(p => {
                      const s = parseDate(p.startDate); const e = parseDate(p.endDate);
                      if (s && e) usedDays += Math.ceil((e.getTime() - s.getTime()) / 86400000) + 1;
                  });

                  let legacyPart = null;
                  if (dbData.confirmed && parts.length === 0 && dbData.startDate) {
                      const s = parseDate(dbData.startDate); const e = parseDate(dbData.endDate);
                      if (s && e) {
                          usedDays += Math.ceil((e.getTime() - s.getTime()) / 86400000) + 1;
                          legacyPart = { startDate: dbData.startDate, endDate: dbData.endDate, confirmedDate: dbData.confirmedDate };
                      }
                  }

                  const sold = dbData.sold || 'Não';
                  const soldDays = sold === 'Sim' ? Number(dbData.soldDays || 0) : 0;
                  const isSoldAll = sold === 'Sim' && soldDays === 30;
                  
                  const remainingDays = isSoldAll ? 0 : Math.max(0, 30 - soldDays - usedDays);
                  const isFullyConfirmed = dbData.confirmed || remainingDays === 0;

                  // 1. Gera linha para cada parte confirmada (Vai para o Histórico ou Atuais)
                  if (legacyPart) {
                      allCycles.push({
                          emp, cycleId, partIndex: 0, isPart: true,
                          startAqStr, endAqStr, canTakeStr, limitStr,
                          dbData: { ...dbData, ...legacyPart, confirmed: true },
                          partDays: usedDays
                      });
                  } else {
                      parts.forEach((p, idx) => {
                          const pDays = Math.ceil((parseDate(p.endDate).getTime() - parseDate(p.startDate).getTime()) / 86400000) + 1;
                          allCycles.push({
                              emp, cycleId, partIndex: idx + 1, isPart: true,
                              startAqStr, endAqStr, canTakeStr, limitStr,
                              dbData: { ...dbData, startDate: p.startDate, endDate: p.endDate, confirmedDate: p.confirmedDate, confirmed: true },
                              partDays: pDays
                          });
                      });
                  }

                  // 2. Se houver saldo, gera a linha de Programação (Aguardando Configuração)
                  if (!isFullyConfirmed) {
                      allCycles.push({
                          emp, cycleId, partIndex: -1, isPart: false,
                          startAqStr, endAqStr, canTakeStr, limitStr, remainingDays,
                          dbData 
                      });
                  } else if (isSoldAll && parts.length === 0 && !legacyPart) {
                      allCycles.push({
                          emp, cycleId, partIndex: 0, isPart: true, isSoldAll: true,
                          startAqStr, endAqStr, canTakeStr, limitStr,
                          dbData: { ...dbData, confirmed: true }
                      });
                  }
              }
              currentYear++;
            }
          });

          const handleLocalChange = (uniqueId, field, value) => {
            setLocalEdits(prev => ({
              ...prev,
              [uniqueId]: {
                ...(prev[uniqueId] || {}),
                [field]: value
              }
            }));
          };

          const getVal = (uniqueId, cycle, field, def = '') => {
            return localEdits[uniqueId]?.[field] !== undefined ? localEdits[uniqueId][field] : (cycle.dbData[field] || def);
          };

          const handleSaveCycle = async (empId, cycleId, uniqueId, isConfirming = false) => {
            if (!canWrite) return;
            
            const currentData = localEdits[uniqueId] || {};
            const vacationsObj = employees.find(e => e.id === empId)?.vacations || {};
            const existingDbData = vacationsObj[cycleId] || {};
            
            // Reavalia o consumo de dias para bloquear a programação indevida
            const partsKeys = Object.keys(vacationsObj).filter(k => k.startsWith(`${cycleId}_p`));
            let usedDays = 0;
            partsKeys.forEach(k => {
                const p = vacationsObj[k];
                const s = parseDate(p.startDate); const e = parseDate(p.endDate);
                if (s && e) usedDays += Math.ceil((e.getTime() - s.getTime()) / 86400000) + 1;
            });
            
            if (existingDbData.confirmed && partsKeys.length === 0 && existingDbData.startDate) {
                const s = parseDate(existingDbData.startDate); const e = parseDate(existingDbData.endDate);
                if (s && e) usedDays += Math.ceil((e.getTime() - s.getTime()) / 86400000) + 1;
            }

            const sold = currentData.sold !== undefined ? currentData.sold : (existingDbData.sold || 'Não');
            const soldDays = currentData.soldDays !== undefined ? currentData.soldDays : (existingDbData.soldDays || '');
            const numSoldDays = sold === 'Sim' ? Number(soldDays || 0) : 0;
            
            let remainingDays = 30 - numSoldDays - usedDays;

            let confirmedDate = existingDbData.confirmedDate || '';
            if (isConfirming && !existingDbData.confirmed) {
                 const todayObj = new Date();
                 confirmedDate = `${String(todayObj.getDate()).padStart(2, '0')}/${String(todayObj.getMonth() + 1).padStart(2, '0')}/${todayObj.getFullYear()}`;
            }

            const payloadMain = {
              preference: currentData.preference !== undefined ? currentData.preference : (existingDbData.preference || ''),
              sold,
              soldDays,
              observations: currentData.observations !== undefined ? currentData.observations : (existingDbData.observations || ''),
              status: currentData.status !== undefined ? currentData.status : (existingDbData.status || 'Aguardando'),
              startDate: currentData.startDate !== undefined ? currentData.startDate : (existingDbData.startDate || ''),
              endDate: currentData.endDate !== undefined ? currentData.endDate : (existingDbData.endDate || ''),
              confirmed: existingDbData.confirmed || false,
              confirmedDate: confirmedDate,
              lastModifiedBy: appUser.username
            };

            // NOVA LÓGICA DE BLOQUEIO: Impede de salvar ou configurar férias que ultrapassem o saldo
            if (payloadMain.startDate && payloadMain.endDate && !(payloadMain.sold === 'Sim' && String(payloadMain.soldDays) === '30')) {
                const s = parseDate(payloadMain.startDate);
                const e = parseDate(payloadMain.endDate);
                if (s && e && e >= s) {
                    const reqDays = Math.ceil((e.getTime() - s.getTime()) / 86400000) + 1;
                    if (reqDays > remainingDays) {
                        showToast(`Quantidade inválida: O período digitado (${reqDays} dias) excede o saldo que o colaborador possui (${remainingDays} dias).`, 'error');
                        return; // Bloqueia e impede de salvar
                    }
                } else if (s && e && e < s) {
                    showToast('A data de retorno deve ser posterior ou igual à data de início.', 'error');
                    return; // Bloqueia e impede de salvar
                }
            }

            let newPartKey = null;
            let newPartPayload = null;

            if (payloadMain.sold === 'Sim' && String(payloadMain.soldDays) === '30') {
                payloadMain.startDate = '';
                payloadMain.endDate = '';
                if (isConfirming) {
                    payloadMain.confirmed = true;
                    payloadMain.confirmedDate = new Date().toLocaleDateString('pt-BR');
                }
            } else if (isConfirming) {
                if (!payloadMain.startDate || !payloadMain.endDate) {
                    showToast('Preencha a data de Início e Retorno para confirmar.', 'error'); return;
                }
                const s = parseDate(payloadMain.startDate);
                const e = parseDate(payloadMain.endDate);
                
                if (s && e && e >= s) {
                    const reqDays = Math.ceil((e.getTime() - s.getTime()) / 86400000) + 1;
                    if (reqDays > remainingDays) {
                        showToast(`Quantidade de dias solicitada (${reqDays}) excede o saldo restante (${remainingDays}).`, 'error'); return;
                    }
                    
                    remainingDays -= reqDays;
                    
                    if (partsKeys.length === 0 && remainingDays === 0) {
                        // Consumiu tudo no primeiro lançamento
                        payloadMain.confirmed = true;
                        payloadMain.confirmedDate = new Date().toLocaleDateString('pt-BR');
                    } else {
                        // Parcial, cria uma entrada filha independente!
                        newPartKey = `${cycleId}_p${Date.now()}`;
                        newPartPayload = {
                            startDate: payloadMain.startDate,
                            endDate: payloadMain.endDate,
                            confirmed: true,
                            confirmedDate: new Date().toLocaleDateString('pt-BR'),
                            isPartialPart: true
                        };
                        payloadMain.startDate = '';
                        payloadMain.endDate = '';
                        if (remainingDays === 0) {
                            payloadMain.confirmed = true;
                        }
                    }
                } else {
                    showToast('Datas inválidas.', 'error'); return;
                }
            }

            const executeSave = async () => {
              try {
                let updates = {
                    [`vacations.${cycleId}`]: payloadMain,
                    lastModifiedBy: appUser.username
                };
                if (newPartKey && newPartPayload) {
                    updates[`vacations.${newPartKey}`] = newPartPayload;
                }

                await updateDoc(doc(db, `${basePath}/employees/${empId}`), updates);
                logAction(isConfirming ? 'Confirmação' : 'Atualização', 'Férias', `${isConfirming ? 'Confirmou' : 'Atualizou'} férias de ${employees.find(e=>e.id===empId)?.name} (Aquisitivo: ${cycleId})`);
                showToast(isConfirming ? 'Férias confirmadas e travadas com sucesso!' : 'Planejamento de férias salvo!');
                
                setLocalEdits(prev => {
                   const next = {...prev};
                   delete next[uniqueId];
                   return next;
                });
              } catch (err) {
                showToast('Erro ao salvar os dados de férias.', 'error');
              }
            };

            if (isConfirming) {
              requestConfirm('Tem certeza que deseja confirmar e travar as férias deste colaborador? Os dias programados passarão a ser descontados na aba de benefícios.', executeSave, 'Confirmar Férias', 'primary');
            } else {
              executeSave();
            }
          };

          const todayTime = new Date().setHours(0,0,0,0);
          
          let filteredCycles = allCycles.filter(c => {
             const startT = parseDate(c.dbData.startDate)?.getTime() || null;
             const endT = parseDate(c.dbData.endDate)?.getTime() || null;
             const isSoldAll = c.dbData.sold === 'Sim' && String(c.dbData.soldDays) === '30';
             
             let isCurrent = false;
             let isHistory = false;
             
             // Filtra de forma inteligente se a parte é histórica, atual ou futura
             if (c.isPart || c.isSoldAll) {
                 if (startT && endT) {
                   if (todayTime >= startT && todayTime <= endT) {
                       isCurrent = true;
                   } else if (todayTime > endT) {
                       isHistory = true; // Só move pro histórico se a data de hoje for MAIOR que o retorno
                   }
                 }
                 if (isSoldAll) isHistory = true;
             } else {
                 if (c.dbData.status === 'Finalizado') isHistory = true;
             }

             if (activeSubTab === 'atuais') return isCurrent;
             if (activeSubTab === 'historico') return isHistory;
             return !isCurrent && !isHistory;
          });

          filteredCycles = filteredCycles.filter(c => {
             const matchSearch = c.emp.name.toLowerCase().includes(searchTerm.toLowerCase());
             const matchDept = filterDepartment ? c.emp.department === filterDepartment : true;
             const matchUnit = filterUnit ? c.emp.unit === filterUnit : true;
             const matchSector = filterSector ? c.emp.workSector === filterSector : true;
             const matchStatus = filterStatus ? (c.dbData.status || 'Aguardando') === filterStatus : true;
             
             let matchMonth = true;
             let matchYear = true;

             if (activeSubTab === 'programacao' || activeSubTab === 'historico') {
                if (c.isSoldAll) {
                   if (c.dbData.confirmedDate) {
                       const [cD, cM, cY] = c.dbData.confirmedDate.split('/');
                       if (filterYear !== 'all') matchYear = (cY === filterYear);
                       if (filterMonth !== 'all') matchMonth = (cM === filterMonth);
                   } else {
                       const limitYear = c.limitStr.split('/')[2];
                       if (filterYear !== 'all') matchYear = (limitYear === filterYear);
                       matchMonth = true;
                   }
                } else if (c.isPart || c.dbData.startDate) {
                   const [sD, sM, sY] = c.dbData.startDate.split('/');
                   let eM = sM, eY = sY;
                   if (c.dbData.endDate) {
                       const eParts = c.dbData.endDate.split('/');
                       if (eParts.length === 3) { eM = eParts[1]; eY = eParts[2]; }
                   }
                   
                   let isInStart = true;
                   let isInEnd = true;
                   
                   if (filterYear !== 'all') {
                       isInStart = (sY === filterYear);
                       isInEnd = (eY === filterYear);
                   }
                   if (filterMonth !== 'all') {
                       isInStart = isInStart && (sM === filterMonth);
                       isInEnd = isInEnd && (eM === filterMonth);
                   }
                   
                   if (filterYear !== 'all' || filterMonth !== 'all') {
                       matchYear = isInStart || isInEnd;
                       matchMonth = isInStart || isInEnd;
                   }
                } else {
                   const limitYear = c.limitStr.split('/')[2];
                   if (filterYear !== 'all') {
                       matchYear = (limitYear === filterYear);
                   }
                   matchMonth = true;
                }
             }

             if (searchTerm.trim() !== '') {
                matchMonth = true;
                matchYear = true;
             }

             return matchSearch && matchDept && matchUnit && matchSector && matchStatus && matchMonth && matchYear;
          });

          const sortedList = filteredCycles.sort((a,b) => a.emp.name.localeCompare(b.emp.name));
          const displayedList = sortedList.slice(0, visibleCount);

          const handleExportCSV = () => {
            const headers = [
              'Colaborador', 'Departamento', 'Unidade', 'Setor', 'Admissão',
              'Período Aquisitivo', 'A partir de', 'Limite para Tirar', 
              'Programação (Início)', 'Programação (Retorno)',
              'Preferência de Mês', 'Vendeu Dias?', 'Qtd Dias Vendidos', 
              'Status', 'Observações'
            ];
            
            const rows = filteredCycles.map(c => {
              const uniqueId = `${c.emp.id}-${c.cycleId}-p${c.partIndex}`;
              const start = getVal(uniqueId, c, 'startDate');
              const end = getVal(uniqueId, c, 'endDate');
              const pref = getVal(uniqueId, c, 'preference');
              const sold = getVal(uniqueId, c, 'sold');
              const soldDays = getVal(uniqueId, c, 'soldDays');
              const status = getVal(uniqueId, c, 'status', 'Aguardando');
              const obs = getVal(uniqueId, c, 'observations');

              return [
                `"${c.emp.name || ''}"`,
                `"${c.emp.department || ''}"`,
                `"${c.emp.unit || ''}"`,
                `"${c.emp.workSector || ''}"`,
                `"${c.emp.startDate || ''}"`,
                `"${c.startAqStr} a ${c.endAqStr}"`,
                `"${c.canTakeStr}"`,
                `"${c.limitStr}"`,
                `"${start || ''}"`,
                `"${end || ''}"`,
                `"${pref || ''}"`,
                `"${sold || 'Não'}"`,
                `"${soldDays || ''}"`,
                `"${status}"`,
                `"${(obs || '').replace(/"/g, '""').replace(/\n/g, ' ')}"`
              ];
            });

            const csvContent = [headers.join(';'), ...rows.map(r => r.join(';'))].join('\n');
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a'); 
            link.href = URL.createObjectURL(blob); 
            link.download = `controle_ferias_${activeSubTab}.csv`; 
            link.click();
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Controle de Férias</h2>
                  <p className="text-slate-500 mt-1">Gerencie os períodos aquisitivos, vendas e programações de férias da equipe.</p>
                </div>
                <div className="flex flex-wrap gap-3 w-full md:w-auto">
                  <Button theme={theme} icon={Download} onClick={handleExportCSV} className="w-full md:w-auto">Exportar Planilha</Button>
                </div>
              </div>

              <div className="flex flex-col xl:flex-row justify-between items-start xl:items-end gap-4 mb-6">
                <div className="flex gap-2 p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl w-fit max-w-full overflow-x-auto">
                  <button onClick={() => setActiveSubTab('atuais')} className={`whitespace-nowrap px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'atuais' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Em Férias Atualmente</button>
                  <button onClick={() => setActiveSubTab('programacao')} className={`whitespace-nowrap px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'programacao' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Programação</button>
                  <button onClick={() => setActiveSubTab('historico')} className={`whitespace-nowrap px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'historico' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Histórico (Realizadas)</button>
                </div>
                
                {(activeSubTab === 'programacao' || activeSubTab === 'historico') && (
                  <div className="flex flex-col sm:flex-row items-end gap-3 w-full sm:w-auto">
                    <Select label="Mês (Início/Venda)" theme={theme} className="w-full sm:w-40 text-left" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} options={monthOptions} />
                    <Select label="Ano (Início/Venda)" theme={theme} className="w-full sm:w-32 text-left" value={filterYear} onChange={e => setFilterYear(e.target.value)} options={yearOptions} />
                  </div>
                )}
              </div>

              <Card className="p-4 md:p-6 relative z-30 mb-6">
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
                  <div className="flex flex-col gap-1 xl:col-span-2">
                    <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Buscar Colaborador</label>
                    <div className="relative">
                      <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 z-10 pointer-events-none" size={18} />
                      <input 
                        type="text" 
                        placeholder="Nome..." 
                        className={`w-full pl-10 pr-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm`}
                        value={searchTerm}
                        onChange={e => setSearchTerm(e.target.value)}
                      />
                    </div>
                  </div>
                  <Select label="Departamento" theme={theme} value={filterDepartment} onChange={e => setFilterDepartment(e.target.value)} options={[{value: '', label: 'Todos'}, ...deptsList.map(c => ({value: c, label: c}))]} />
                  <Select label="Unidade" theme={theme} value={filterUnit} onChange={e => setFilterUnit(e.target.value)} options={[{value: '', label: 'Todas'}, ...unitsList.map(u => ({value: u, label: u}))]} />
                  <Select label="Setor" theme={theme} value={filterSector} onChange={e => setFilterSector(e.target.value)} options={[{value: '', label: 'Todos'}, ...sectorsList.map(s => ({value: s, label: s}))]} />
                  <Select label="Status" theme={theme} value={filterStatus} onChange={e => setFilterStatus(e.target.value)} options={[{value: '', label: 'Todos'}, {value: 'Aguardando', label: 'Aguardando'}, {value: 'Aviso Entregue', label: 'Aviso Entregue'}, {value: 'Venda', label: 'Venda'}, {value: 'Próxima Programação', label: 'Próxima Programação'}]} />
                </div>
              </Card>

              <Card className="p-2 relative z-10 vacations-table-card">
                <div className="overflow-x-auto custom-scrollbar">
                  <table className="w-full text-left border-collapse min-w-[1200px]">
                    <thead>
                      <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                        <th className="p-3 font-medium min-w-[180px]">Colaborador</th>
                        <th className="p-3 font-medium min-w-[200px]">Prazos (Aquisitivo / Limite)</th>
                        <th className="p-3 font-medium min-w-[140px]">Programação de Datas</th>
                        <th className="p-3 font-medium min-w-[140px]">Preferência & Venda</th>
                        <th className="p-3 font-medium min-w-[180px]">Status / Observações</th>
                        {canWrite && <th className="p-3 font-medium text-center min-w-[150px]">Ações</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {displayedList.map(c => {
                        const uniqueId = `${c.emp.id}-${c.cycleId}-p${c.partIndex}`;
                        const confirmed = c.isPart; // Partes desdobradas já são confirmadas por natureza

                        const formatDt = (val) => {
                            let v = val.replace(/\D/g, '');
                            if (v.length > 8) v = v.slice(0, 8);
                            if (v.length > 4) return `${v.slice(0, 2)}/${v.slice(2, 4)}/${v.slice(4)}`;
                            if (v.length > 2) return `${v.slice(0, 2)}/${v.slice(2)}`;
                            return v;
                        };

                        const soldStr = getVal(uniqueId, c, 'sold');
                        const soldDaysStr = getVal(uniqueId, c, 'soldDays');
                        const isSoldAll = soldStr === 'Sim' && String(soldDaysStr) === '30';

                        const startStr = isSoldAll ? '' : getVal(uniqueId, c, 'startDate');
                        const endStr = isSoldAll ? '' : getVal(uniqueId, c, 'endDate');
                        
                        let vacationDays = null;
                        if (c.isPart && c.partDays) {
                            vacationDays = c.partDays;
                        } else if (startStr && startStr.length === 10 && endStr && endStr.length === 10) {
                            const [sd, sm, sy] = startStr.split('/');
                            const [ed, em, ey] = endStr.split('/');
                            const sDate = new Date(sy, sm - 1, sd);
                            const eDate = new Date(ey, em - 1, ed);
                            if (!isNaN(sDate.getTime()) && !isNaN(eDate.getTime()) && eDate >= sDate) {
                                const diffTime = eDate.getTime() - sDate.getTime();
                                vacationDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                            }
                        }

                        return (
                          <tr key={uniqueId} className={`border-b border-slate-100 dark:border-slate-800/50 transition-colors ${confirmed ? 'bg-slate-50/40 dark:bg-slate-800/20' : 'hover:bg-slate-50 dark:hover:bg-slate-800/30'}`}>
                            <td className="p-3 align-top">
                              <div className="font-bold text-slate-900 dark:text-white flex items-center gap-2 truncate">
                                {c.emp.name}
                              </div>
                              <div className="text-[10px] text-slate-500 mt-1">Admissão: <span className="font-medium text-slate-700 dark:text-slate-300">{c.emp.startDate}</span></div>
                              <div className="text-[10px] text-slate-500 flex flex-wrap gap-1 mt-1">
                                <span className="bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded border border-slate-200 dark:border-slate-700">{c.emp.department}</span>
                                <span className="bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded border border-slate-200 dark:border-slate-700">{c.emp.unit}</span>
                                <span className="bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded border border-slate-200 dark:border-slate-700">{c.emp.workSector}</span>
                              </div>
                              
                              <div className="flex flex-wrap items-center gap-2 mt-2">
                                {isSoldAll ? (
                                  <div className={`text-[10px] font-bold px-2 py-1 rounded-md border w-fit inline-flex items-center gap-1 ${confirmed ? 'bg-orange-100 text-orange-700 border-orange-200 dark:bg-orange-900/40 dark:text-orange-400 dark:border-orange-800' : 'bg-orange-50 text-orange-600 border-orange-200 dark:bg-orange-900/30 dark:text-orange-400 dark:border-orange-800'}`}>
                                    <DollarSign size={12} /> {confirmed && c.dbData.confirmedDate ? `Vendido em ${c.dbData.confirmedDate}` : 'Vendeu todos os dias'}
                                  </div>
                                ) : c.isPart && c.partDays > 0 && c.partDays < 30 ? (
                                  <div className={`text-[10px] font-bold px-2 py-1 rounded-md border w-fit inline-flex items-center gap-1 bg-purple-100 text-purple-700 border-purple-200 dark:bg-purple-900/40 dark:text-purple-400 dark:border-purple-800`}>
                                    <CalendarIcon size={12} /> Férias Parcial ({c.partDays} dias)
                                  </div>
                                ) : vacationDays !== null && (
                                  <div className={`text-[10px] font-bold px-2 py-1 rounded-md border w-fit inline-flex items-center gap-1 ${confirmed ? 'bg-emerald-100 text-emerald-700 border-emerald-200 dark:bg-emerald-900/40 dark:text-emerald-400 dark:border-emerald-800' : 'bg-blue-50 text-blue-600 border-blue-200 dark:bg-blue-900/30 dark:text-blue-400 dark:border-blue-800'}`}>
                                    <CalendarIcon size={12} /> {vacationDays} {vacationDays === 1 ? 'dia' : 'dias'} {confirmed ? 'confirmado(s)' : 'programado(s)'}
                                  </div>
                                )}
                                {!c.isPart && !isSoldAll && c.remainingDays !== undefined && c.remainingDays < 30 && c.remainingDays > 0 && (
                                  <div className="text-[10px] font-bold px-2 py-1 rounded-md border w-fit inline-flex items-center gap-1 bg-sky-100 text-sky-700 border-sky-200 dark:bg-sky-900/40 dark:text-sky-400 dark:border-sky-800">
                                    <CalendarIcon size={12} /> Saldo Restante: {c.remainingDays} dias
                                  </div>
                                )}
                              </div>
                            </td>
                            
                            <td className="p-3 align-top text-xs space-y-1.5">
                              <div>
                                <span className="block text-[10px] uppercase font-bold text-slate-400">Período Aquisitivo:</span>
                                <span className="font-medium text-slate-700 dark:text-slate-200">{c.startAqStr} a {c.endAqStr}</span>
                              </div>
                              <div>
                                <span className="block text-[10px] uppercase font-bold text-blue-500/80">Pode tirar a partir de:</span>
                                <span className="font-bold text-blue-600 dark:text-blue-400">{c.canTakeStr}</span>
                              </div>
                              <div>
                                <span className="block text-[10px] uppercase font-bold text-rose-500/80">Data Limite:</span>
                                <span className="font-bold text-rose-600 dark:text-rose-400">{c.limitStr}</span>
                              </div>
                            </td>

                            <td className="p-3 align-top space-y-2">
                               <div className="flex flex-col gap-2">
                                  <div className="w-[110px]">
                                    <label className="text-[10px] font-bold text-slate-500 ml-1">Início</label>
                                    <input 
                                      type="text" placeholder={isSoldAll ? "Desativado" : "DD/MM/AAAA"} disabled={confirmed || !canWrite || isSoldAll}
                                      className={`w-full px-2.5 py-1.5 text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg outline-none focus:ring-2 ${theme.ring} disabled:opacity-50`}
                                      value={startStr}
                                      onChange={e => handleLocalChange(uniqueId, 'startDate', formatDt(e.target.value))}
                                    />
                                  </div>
                                  <div className="w-[110px]">
                                    <label className="text-[10px] font-bold text-slate-500 ml-1">Retorno</label>
                                    <input 
                                      type="text" placeholder={isSoldAll ? "Desativado" : "DD/MM/AAAA"} disabled={confirmed || !canWrite || isSoldAll}
                                      className={`w-full px-2.5 py-1.5 text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg outline-none focus:ring-2 ${theme.ring} disabled:opacity-50`}
                                      value={endStr}
                                      onChange={e => handleLocalChange(uniqueId, 'endDate', formatDt(e.target.value))}
                                    />
                                  </div>
                               </div>
                            </td>

                            <td className="p-3 align-top space-y-2">
                               <div className="flex flex-col gap-1">
                                 <label className="text-[10px] font-bold text-slate-500 ml-1">Pref. de Mês</label>
                                 <input 
                                   type="text" placeholder="Ex: Janeiro..." disabled={confirmed || !canWrite}
                                   className={`w-full px-2.5 py-1.5 text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg outline-none focus:ring-2 ${theme.ring} disabled:opacity-50`}
                                   value={getVal(uniqueId, c, 'preference')}
                                   onChange={e => handleLocalChange(uniqueId, 'preference', e.target.value)}
                                 />
                               </div>

                               <div className="relative flex flex-col gap-1">
                                 <label className="text-[10px] font-bold text-slate-500 ml-1">Vender Dias?</label>
                                 <button 
                                   type="button"
                                   disabled={confirmed || !canWrite}
                                   onClick={(e) => toggleDropdown(e, uniqueId, 'sold', getVal(uniqueId, c, 'sold', 'Não'), ['Não', 'Sim'], (opt) => opt)}
                                   className={`vacations-dropdown-btn w-full px-2.5 py-1.5 text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white cursor-pointer disabled:opacity-50 pr-8 flex items-center justify-between shadow-sm`}
                                 >
                                   <span className="truncate">{getVal(uniqueId, c, 'sold', 'Não')}</span>
                                   <ChevronDown size={14} className={`absolute right-2.5 text-slate-400 transition-transform ${dropdownState?.id === `${uniqueId}-sold` ? 'rotate-180' : ''}`} />
                                 </button>
                               </div>

                               {getVal(uniqueId, c, 'sold') === 'Sim' && (
                                 <div className="flex flex-col gap-1 animate-in fade-in slide-in-from-top-1">
                                   <label className="text-[10px] font-bold text-amber-600 dark:text-amber-500 ml-1">Dias Vendidos</label>
                                   <input 
                                     type="number" placeholder="Ex: 10" disabled={confirmed || !canWrite}
                                     className={`w-full px-2.5 py-1.5 text-xs bg-amber-50 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-700/50 rounded-lg outline-none transition-all focus:ring-2 focus:border-transparent focus:ring-amber-500 text-amber-900 dark:text-amber-100 disabled:opacity-50`}
                                     value={getVal(uniqueId, c, 'soldDays')}
                                     onChange={e => handleLocalChange(uniqueId, 'soldDays', e.target.value)}
                                   />
                                 </div>
                               )}
                            </td>

                            <td className="p-3 align-top space-y-2">
                               <div className="relative flex flex-col gap-1">
                                 <label className="text-[10px] font-bold text-slate-500 ml-1">Status</label>
                                 <button 
                                   type="button"
                                   disabled={confirmed || !canWrite}
                                   onClick={(e) => toggleDropdown(e, uniqueId, 'status', getVal(uniqueId, c, 'status', 'Aguardando'), ['Aguardando', 'Aviso Entregue', 'Venda', 'Próxima Programação'], (opt) => opt)}
                                   className={`vacations-dropdown-btn w-full px-2.5 py-1.5 text-xs font-bold rounded-lg outline-none transition-all focus:ring-2 focus:border-transparent cursor-pointer disabled:opacity-50 pr-8 flex items-center justify-between border shadow-sm ${
                                     getVal(uniqueId, c, 'status', 'Aguardando') === 'Aguardando' ? 'bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 focus:ring-slate-500' :
                                     getVal(uniqueId, c, 'status', 'Aguardando') === 'Aviso Entregue' ? 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800 text-blue-700 dark:text-blue-400 focus:ring-blue-500' :
                                     getVal(uniqueId, c, 'status', 'Aguardando') === 'Próxima Programação' ? 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-400 focus:ring-emerald-500' :
                                     'bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-800 text-amber-700 dark:text-amber-400 focus:ring-amber-500'
                                   }`}
                                 >
                                   <span className="truncate">{getVal(uniqueId, c, 'status', 'Aguardando')}</span>
                                   <ChevronDown size={14} className={`absolute right-2.5 transition-transform opacity-60 ${dropdownState?.id === `${uniqueId}-status` ? 'rotate-180' : ''}`} />
                                 </button>
                               </div>

                               <div className="flex flex-col gap-1 mt-2">
                                 <label className="text-[10px] font-bold text-slate-500 ml-1">Observações</label>
                                 <textarea 
                                   placeholder="Detalhes adicionais..." disabled={confirmed || !canWrite} rows="2"
                                   className={`w-full px-2.5 py-1.5 text-[11px] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg outline-none focus:ring-2 ${theme.ring} resize-none disabled:opacity-50 custom-scrollbar`}
                                   value={getVal(uniqueId, c, 'observations')}
                                   onChange={e => handleLocalChange(uniqueId, 'observations', e.target.value)}
                                 />
                               </div>
                            </td>

                            {canWrite && (
                              <td className="p-3 align-middle text-center">
                                 <div className="flex flex-col justify-center gap-2 h-full">
                                   {confirmed ? (
                                     <div className="px-3 py-2 bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400 rounded-xl font-bold text-xs flex flex-col items-center justify-center gap-1 border border-emerald-200 dark:border-emerald-800">
                                       <CheckCircle size={16} /> Confirmado
                                     </div>
                                   ) : (
                                     <>
                                       <button 
                                         onClick={() => handleSaveCycle(c.emp.id, c.cycleId, uniqueId, false)}
                                         className={`w-full px-3 py-1.5 text-xs font-bold rounded-lg transition-colors bg-slate-200 text-slate-700 hover:bg-slate-300 dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600`}
                                       >
                                         Salvar Alterações
                                       </button>
                                       <button 
                                         onClick={() => handleSaveCycle(c.emp.id, c.cycleId, uniqueId, true)}
                                         className={`w-full px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${theme.bg} text-white hover:opacity-90 shadow-md`}
                                       >
                                         Confirmar Férias
                                       </button>
                                     </>
                                   )}
                                 </div>
                              </td>
                            )}
                          </tr>
                        );
                      })}
                      {displayedList.length === 0 && <tr><td colSpan={canWrite ? "6" : "5"} className="p-8 text-center text-slate-500 italic">Nenhum ciclo de férias encontrado nesta categoria.</td></tr>}
                    </tbody>
                  </table>
                </div>

                {dropdownState && (
                  <div 
                    className="absolute z-50 bg-white/90 dark:bg-slate-800/90 backdrop-blur-2xl border border-white/20 dark:border-slate-700 rounded-xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200"
                    style={{ top: dropdownState.top + 4, left: dropdownState.left, width: dropdownState.width }}
                    onMouseDown={(e) => e.stopPropagation()} 
                  >
                    <div className="p-1 space-y-0.5">
                      {dropdownState.optionsList.map(opt => (
                        <button
                          key={opt}
                          type="button"
                          onClick={(e) => {
                              e.stopPropagation();
                              handleLocalChange(dropdownState.uniqueId, dropdownState.field, opt);
                              setDropdownState(null);
                          }}
                          className={`w-full text-left px-3 py-2 text-xs rounded-lg transition-all duration-200 ${dropdownState.currentVal === opt ? `${theme.lightBg} ${theme.text} font-bold shadow-sm` : 'text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50 hover:pl-5'}`}
                        >
                          {dropdownState.renderLabel(opt)}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
                
                {sortedList.length > visibleCount && (
                  <div className="p-4 flex justify-center border-t border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/30 rounded-b-xl mt-2">
                    <Button variant="secondary" theme={theme} onClick={() => setVisibleCount(prev => prev + 50)} icon={RefreshCw}>
                      Carregar mais dados
                    </Button>
                  </div>
                )}
              </Card>
            </div>
          );
        }

        function CalendarView({ theme, appUser, events, showToast, logAction, requestConfirm }) {
          const [currentDate, setCurrentDate] = useState(new Date());
          const [selectedDateStr, setSelectedDateStr] = useState(null);
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isProcessing, setIsProcessing] = useState(false);
          const [formData, setFormData] = useState({ title: '', time: '', type: 'Lembrete', description: '' });

          const canWrite = appUser?.permissions?.calendar?.write;
          const canDelete = appUser?.permissions?.calendar?.delete;

          const EVENT_TYPES = {
            'Pagamento': { bg: 'bg-emerald-100 dark:bg-emerald-900/40', text: 'text-emerald-700 dark:text-emerald-400', border: 'border-emerald-200 dark:border-emerald-800' },
            'Fechamento': { bg: 'bg-blue-100 dark:bg-blue-900/40', text: 'text-blue-700 dark:text-blue-400', border: 'border-blue-200 dark:border-blue-800' },
            'Reunião': { bg: 'bg-purple-100 dark:bg-purple-900/40', text: 'text-purple-700 dark:text-purple-400', border: 'border-purple-200 dark:border-purple-800' },
            'Lembrete': { bg: 'bg-amber-100 dark:bg-amber-900/40', text: 'text-amber-700 dark:text-amber-400', border: 'border-amber-200 dark:border-amber-800' },
            'Feriado': { bg: 'bg-rose-100 dark:bg-rose-900/40', text: 'text-rose-700 dark:text-rose-400', border: 'border-rose-200 dark:border-rose-800' },
            'Especial': { bg: 'bg-yellow-100 dark:bg-yellow-900/40', text: 'text-yellow-700 dark:text-yellow-400', border: 'border-yellow-200 dark:border-yellow-800' }
          };

          const TIME_OPTIONS = [
            { value: '', label: 'Sem horário definido' },
            { value: '08:30', label: '08:30' },
            { value: '09:00', label: '09:00' },
            { value: '09:30', label: '09:30' },
            { value: '10:00', label: '10:00' },
            { value: '10:30', label: '10:30' },
            { value: '11:00', label: '11:00' },
            { value: '11:30', label: '11:30' },
            { value: '12:00', label: '12:00' },
            { value: '12:30', label: '12:30' },
            { value: '13:00', label: '13:00' },
            { value: '13:30', label: '13:30' },
            { value: '14:00', label: '14:00' },
            { value: '14:30', label: '14:30' },
            { value: '15:00', label: '15:00' },
            { value: '15:30', label: '15:30' },
            { value: '16:00', label: '16:00' },
            { value: '16:30', label: '16:30' },
            { value: '17:00', label: '17:00' },
            { value: '17:30', label: '17:30' }
          ];

          const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
          const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

          const year = currentDate.getFullYear();
          const month = currentDate.getMonth();
          const daysInMonth = getDaysInMonth(year, month);
          const firstDay = getFirstDayOfMonth(year, month);

          const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
          const dayNames = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

          const blanks = Array(firstDay).fill(null);
          const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);

          const formatStr = (y, m, d) => `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

          const today = new Date();
          const todayStr = formatStr(today.getFullYear(), today.getMonth() + 1, today.getDate());

          // --- LÓGICA DE FERIADOS DINÂMICOS NA AGENDA ---
          const getHolidays = (y, m) => {
            const easter = getEasterDate(y);
            const holidays = [];

            const add = (d, hMonth, title, type = 'Feriado') => {
              if (hMonth - 1 === m) {
                holidays.push({
                  id: `sys-hol-${d}-${hMonth}-${y}`,
                  date: formatStr(y, hMonth, d),
                  title,
                  time: '',
                  type,
                  description: type === 'Especial' ? 'Data comemorativa / Ponto facultativo' : 'Feriado Nacional ou Municipal (São Paulo)',
                  isHolidayItem: true
                });
              }
            };

            // Feriados Fixos
            add(1, 1, 'Confraternização Universal');
            add(25, 1, 'Aniversário de São Paulo');
            add(21, 4, 'Tiradentes');
            add(1, 5, 'Dia do Trabalhador');
            add(9, 7, 'Revolução Constitucionalista');
            add(7, 9, 'Independência do Brasil');
            add(12, 10, 'Nossa Sra. Aparecida');
            add(2, 11, 'Finados');
            add(15, 11, 'Proclamação da República');
            add(20, 11, 'Dia da Consciência Negra');
            add(25, 12, 'Natal');

            // Feriados Móveis
            const addMobile = (offsetDays, title, type = 'Feriado') => {
              const dObj = new Date(easter);
              dObj.setDate(dObj.getDate() + offsetDays);
              add(dObj.getDate(), dObj.getMonth() + 1, title, type);
            };

            addMobile(-48, 'Carnaval', 'Especial'); // Segunda-feira
            addMobile(-47, 'Carnaval', 'Especial'); // Terça-feira
            addMobile(-46, 'Quarta-feira de Cinzas', 'Especial');
            addMobile(-2, 'Paixão de Cristo');
            addMobile(0, 'Páscoa');
            addMobile(60, 'Corpus Christi');

            return holidays;
          };

          const monthHolidays = getHolidays(year, month);
          // ----------------------------------------------

          const handleNextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
          const handlePrevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
          
          const openDayModal = (d) => {
            setSelectedDateStr(formatStr(year, month + 1, d));
            setFormData({ title: '', time: '', type: 'Lembrete', description: '' });
            setIsModalOpen(true);
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite || isProcessing) return;
            setIsProcessing(true);
            try {
              await addDoc(collection(db, `${basePath}/events`), {
                date: selectedDateStr,
                title: formData.title,
                time: formData.time,
                type: formData.type,
                description: formData.description
              });
              logAction('Cadastro', 'Agenda', `Adicionou evento: ${formData.title} para ${selectedDateStr}`);
              showToast('Evento adicionado!');
              setFormData({ title: '', time: '', type: 'Lembrete', description: '' });
              setIsModalOpen(false);
            } catch (err) {
              showToast('Erro ao salvar evento.', 'error');
            } finally {
              setIsProcessing(false);
            }
          };

          const handleDelete = (id, title) => {
            if (!canDelete) return;
            requestConfirm('Excluir este evento?', async () => {
              try {
                await deleteDoc(doc(db, `${basePath}/events/${id}`));
                logAction('Exclusão', 'Agenda', `Removeu o evento: ${title}`);
                showToast('Evento removido.');
              } catch (err) {
                showToast('Erro ao remover.', 'error');
              }
            });
          };

          // Mescla Feriados do Sistema com Eventos do Banco de Dados
          const selectedSysHols = selectedDateStr ? monthHolidays.filter(h => h.date === selectedDateStr) : [];
          const selectedDbEvents = selectedDateStr ? events.filter(e => e.date === selectedDateStr) : [];
          const selectedDayEvents = [...selectedSysHols, ...selectedDbEvents].sort((a,b) => {
             if (a.isHolidayItem && !b.isHolidayItem) return -1;
             if (!a.isHolidayItem && b.isHolidayItem) return 1;
             return (a.time || '').localeCompare(b.time || '');
          });
          
          const selectedDateFormatted = selectedDateStr ? selectedDateStr.split('-').reverse().join('/') : '';

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Agenda Corporativa</h2>
                  <p className="text-slate-500 mt-1">Acompanhe pagamentos, fechamentos e datas importantes.</p>
                </div>
                <div className="flex items-center gap-3 bg-white/70 dark:bg-slate-800/70 p-1.5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                  <button onClick={handlePrevMonth} className="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                    <ChevronLeft size={20} />
                  </button>
                  <div className="w-40 text-center font-bold text-slate-800 dark:text-slate-100 uppercase tracking-wide text-sm">
                    {monthNames[month]} {year}
                  </div>
                  <button onClick={handleNextMonth} className="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                    <ChevronRight size={20} />
                  </button>
                </div>
              </div>

              <Card className="p-2 sm:p-4 md:p-6 w-full relative z-10">
                <div className="w-full pb-2">
                  <div className="grid grid-cols-7 gap-1 sm:gap-2 md:gap-4">
                    {dayNames.map(d => (
                      <div key={d} className="text-center text-[10px] sm:text-xs md:text-sm font-bold text-slate-500 uppercase tracking-wider pb-1">{d}</div>
                    ))}
                    {blanks.map((_, i) => (
                      <div key={`blank-${i}`} className="min-w-0 min-h-[60px] sm:min-h-[80px] md:min-h-[120px] rounded-xl sm:rounded-2xl bg-slate-50/50 dark:bg-slate-900/20 border border-transparent"></div>
                    ))}
                    {days.map(d => {
                      const dateStr = formatStr(year, month + 1, d);
                      const dbDayEvents = events.filter(e => e.date === dateStr);
                      const sysDayHols = monthHolidays.filter(h => h.date === dateStr);
                      const dayEvents = [...sysDayHols, ...dbDayEvents].sort((a,b) => {
                         if (a.isHolidayItem && !b.isHolidayItem) return -1;
                         if (!a.isHolidayItem && b.isHolidayItem) return 1;
                         return (a.time || '').localeCompare(b.time || '');
                      });
                      
                      const isToday = dateStr === todayStr;

                      return (
                        <div 
                          key={d} 
                          onClick={() => openDayModal(d)}
                          className={`min-w-0 min-h-[60px] sm:min-h-[80px] md:min-h-[120px] p-1 sm:p-1.5 md:p-3 rounded-xl sm:rounded-2xl border transition-all cursor-pointer flex flex-col group
                            ${isToday ? `border-${theme.main}-500 bg-${theme.main}-50 dark:bg-${theme.main}-900/20 shadow-md transform scale-[1.02]` : 'border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/30 hover:border-slate-300 dark:hover:border-slate-500 hover:bg-white dark:hover:bg-slate-800'}
                          `}
                        >
                          <div className={`text-right text-[10px] sm:text-sm md:text-base font-bold mb-0.5 sm:mb-1 md:mb-2 ${isToday ? `text-${theme.main}-600 dark:text-${theme.main}-400` : 'text-slate-700 dark:text-slate-300'}`}>
                            {d}
                          </div>
                          <div className="flex-1 flex flex-col gap-0.5 sm:gap-1 overflow-hidden min-w-0 w-full">
                            {dayEvents.slice(0, 3).map(ev => (
                              <div key={ev.id} className={`w-full text-[9px] sm:text-[10px] md:text-xs px-1 sm:px-1.5 py-0.5 rounded truncate font-medium border ${EVENT_TYPES[ev.type]?.bg} ${EVENT_TYPES[ev.type]?.text} ${EVENT_TYPES[ev.type]?.border}`} title={ev.title}>
                                {ev.time && <span className="hidden sm:inline mr-1 opacity-70">{ev.time}</span>}{ev.title}
                              </div>
                            ))}
                            {dayEvents.length > 3 && (
                              <div className="text-[9px] sm:text-[10px] text-center text-slate-500 font-medium pt-0.5">
                                +{dayEvents.length - 3} mais
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </Card>

              <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={`Agenda - ${selectedDateFormatted}`}>
                <div className="flex flex-col gap-6">
                  
                  <div className="space-y-3">
                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Eventos do Dia</h3>
                    {selectedDayEvents.length === 0 ? (
                      <p className="text-sm text-slate-500 italic p-4 text-center bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700">Nenhum compromisso marcado para este dia.</p>
                    ) : (
                      selectedDayEvents.map(ev => (
                        <div key={ev.id} className="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-sm flex items-start justify-between gap-4">
                          <div className="flex-1">
                            <div className="flex items-center gap-2 mb-1.5">
                              <span className={`text-[10px] px-2 py-0.5 rounded-md font-bold uppercase border ${EVENT_TYPES[ev.type]?.bg} ${EVENT_TYPES[ev.type]?.text} ${EVENT_TYPES[ev.type]?.border}`}>
                                {ev.type}
                              </span>
                              {ev.time && (
                                <span className="text-xs font-semibold text-slate-500 dark:text-slate-400 flex items-center gap-1">
                                  <Clock size={12} /> {ev.time}
                                </span>
                              )}
                            </div>
                            <h4 className="font-bold text-slate-800 dark:text-slate-100 text-base leading-tight">{ev.title}</h4>
                            {ev.description && <p className="text-sm text-slate-600 dark:text-slate-400 mt-1 whitespace-pre-wrap">{ev.description}</p>}
                          </div>
                          {canDelete && !ev.isHolidayItem && (
                            <button onClick={() => handleDelete(ev.id, ev.title)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-xl transition-colors" title="Excluir evento">
                              <Trash2 size={18} />
                            </button>
                          )}
                        </div>
                      ))
                    )}
                  </div>

                  {canWrite && (
