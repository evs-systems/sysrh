    <script>
        // 1. Função para desenhar e gerar o ícone em PNG dinamicamente (Resolve o problema do "S" genérico)
        function generatePngIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Desenha o fundo azul com cantos arredondados
            ctx.fillStyle = '#2563eb';
            const radius = size * 0.22;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fill();

            // Desenha o gráfico de linha (Activity) em branco no centro
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = size * 0.08;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(size * 0.15, size * 0.5);
            ctx.lineTo(size * 0.3, size * 0.5);
            ctx.lineTo(size * 0.45, size * 0.25);
            ctx.lineTo(size * 0.6, size * 0.8);
            ctx.lineTo(size * 0.75, size * 0.5);
            ctx.lineTo(size * 0.85, size * 0.5);
            ctx.stroke();

            // Retorna a imagem final no formato PNG (Base64)
            return canvas.toDataURL('image/png');
        }

        // Gera os ícones exigidos pelas especificações do PWA
        const icon192 = generatePngIcon(192);
        const icon512 = generatePngIcon(512);

        // 2. Injetar Apple Touch Icon (Para funcionar no iPhone/iPad)
        const appleIcon = document.createElement('link');
        appleIcon.rel = 'apple-touch-icon';
        appleIcon.href = icon192;
        document.head.appendChild(appleIcon);

        // 3. Gerar e Injetar o Arquivo Manifest Dinamicamente com os PNGs
            const isDark = localStorage.getItem('sysrh_darkMode') === 'true';
            const manifest = {
                name: "SysRH - Gestão Integrada",
                short_name: "SysRH",
                start_url: window.location.pathname,
                display: "standalone",
                background_color: isDark ? "#0f172a" : "#f8fafc",

                { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
            ]
        };
        
        const manifestData = "data:application/json;base64," + btoa(JSON.stringify(manifest));
        const linkManifest = document.createElement('link');
        linkManifest.rel = 'manifest';
        linkManifest.href = manifestData;
        document.head.appendChild(linkManifest);

        // 4. Garantir que a Meta Theme-Color existe para o React
        if (!document.getElementById('dynamic-theme-color')) {
            const extraMeta = document.createElement('meta');
            extraMeta.name = 'theme-color';
            extraMeta.id = 'dynamic-theme-color';
            extraMeta.content = isDark ? '#0f172a' : '#f8fafc';
            document.head.appendChild(extraMeta);
        }

        // 5. Gerar e Registrar o Service Worker
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', (e) => {
                    e.respondWith(fetch(e.request).catch(() => new Response('Dispositivo offline.')));
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(URL.createObjectURL(swBlob))
                    .catch(err => {

                        if (!window.location.href.startsWith('blob:')) {
                            console.log('Aviso do PWA:', err);

          </div>
        );

        const Input = ({ label, theme, className = "", ...props }) => (
          <div className={`flex flex-col gap-1 ${className}`}>
            <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">{label}</label>
            <input 
              className={`w-full px-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm disabled:opacity-50`}
              {...props} 
            />
          </div>
        );

        const Select = ({ label, theme, options, value, onChange, required, className = "", search, ...props }) => {
          const [isOpen, setIsOpen] = useState(false);
          const [searchTerm, setSearchTerm] = useState('');
          const selectRef = useRef(null);
          const selectedOption = options.find(opt => opt.value === value);

          const filteredOptions = search 
            ? options.filter(opt => (opt.label || '').toLowerCase().includes(searchTerm.toLowerCase()))
            : options;

          useEffect(() => {
            const handleClickOutside = (event) => {
              if (selectRef.current && !selectRef.current.contains(event.target)) {
                setIsOpen(false);
                if (search) setSearchTerm('');
              }
            };
            if (isOpen) document.addEventListener('mousedown', handleClickOutside);
            return () => document.removeEventListener('mousedown', handleClickOutside);
          }, [isOpen, search]);

          return (
            <div ref={selectRef} className={`flex flex-col gap-1 relative ${className}`}>
              <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">{label}</label>

              <div className="relative w-full">
                {/* Select nativo escondido atrás do botão, mas com o tamanho real para ancorar o balão de aviso perfeitamente */}
                <select
                  className="absolute inset-0 w-full h-full opacity-0 z-[-1]"
                  value={value}
                  onChange={onChange}
                  required={required}
                  onFocus={() => setIsOpen(true)}
                  tabIndex={-1}
                  {...props}
                >
                  <option value="" disabled></option>
                  {options.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                </select>

                <button
                  type="button"
                  onClick={() => setIsOpen(!isOpen)}
                  className={`w-full px-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${isOpen ? theme.ring + ' ring-2 border-transparent' : ''} text-left text-slate-900 dark:text-white backdrop-blur-sm flex items-center justify-between shadow-sm hover:bg-white/80 dark:hover:bg-slate-800/80`}
                >
                  <span className={!selectedOption ? 'text-slate-400' : 'truncate'}>
                    {selectedOption ? selectedOption.label : 'Selecione...'}
                  </span>
                  <ChevronDown size={18} className={`transition-transform duration-300 flex-shrink-0 ${isOpen ? 'rotate-180 text-slate-700 dark:text-slate-300' : 'text-slate-400'}`} />
                </button>
              </div>

              {isOpen && (
                <div className="absolute top-[100%] left-0 right-0 mt-2 z-50 bg-white/90 dark:bg-slate-800/90 backdrop-blur-2xl border border-white/20 dark:border-slate-700 rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                  {search && (
                    <div className="p-2 border-b border-slate-100 dark:border-slate-700">
                      <div className="relative">
                        <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                        <input 
                          type="text" 
                          autoFocus
                          placeholder="Buscar..." 
                          value={searchTerm}
                          onChange={(e) => setSearchTerm(e.target.value)}
                          className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg pl-8 pr-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-blue-500/50 text-slate-700 dark:text-slate-200"
                        />
                      </div>
                    </div>
                  )}
                  <div className="max-h-56 overflow-y-auto custom-scrollbar p-2 space-y-1">
                    {filteredOptions.map(opt => (
                      <button
                        key={opt.value}
                        type="button"
                        disabled={opt.disabled}
                        onClick={() => {
                          if (opt.disabled) return;
                          onChange({ target: { value: opt.value } });
                          setIsOpen(false);
                          if(search) setSearchTerm('');
                        }}
                        className={`w-full text-left px-4 py-2.5 rounded-xl transition-all duration-200 ${
                          opt.disabled ? 'opacity-50 cursor-not-allowed text-slate-400 bg-slate-50 dark:bg-slate-800/30' :
                          value === opt.value 
                            ? `${theme.lightBg} ${theme.text} font-semibold shadow-md` 
                            : 'text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50 hover:pl-5'
                        }`}
                      >
                        {opt.label}
                      </button>
                    ))}
                    {filteredOptions.length === 0 && <div className="px-4 py-2.5 text-sm text-slate-500 text-center">Nenhuma opção disponível ou encontrada</div>}
                  </div>
                </div>
              )}
            </div>
          );
        };

        const Button = ({ children, variant = "primary", theme, icon: Icon, loading = false, className = "", disabled, ...props }) => {
          const base = "inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl font-medium transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed";
          const variants = {
            primary: `${theme.bg} text-white shadow-lg ${theme.hover} hover:shadow-xl hover:-translate-y-0.5`,
            secondary: `bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-100 hover:bg-slate-300 dark:hover:bg-slate-600`,
            ghost: `bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300`,
            danger: `bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-200 dark:hover:bg-red-900/50`,
          };
          return (
            <button className={`${base} ${variants[variant]} ${className}`} disabled={disabled || loading} {...props}>
              {loading ? <Loader2 size={18} className="animate-spin" /> : (Icon && <Icon size={18} />)}
              {children}
            </button>
          );
        };

        const ProtectedData = ({ value, type = 'generic', className = '' }) => {
          const [isVisible, setIsVisible] = React.useState(false);
          if (!value) return <span className="text-slate-400 text-xs italic">N/A</span>;
          
          const masked = () => {
            if (type === 'cpf') return value.replace(/(\d{3})\.\d{3}\.(\d{3})-(\d{2})/, '$1.***.***-$3');
            if (type === 'rg') return value.replace(/^(.{2})(.+)(.{2})$/, '$1***$3');
            if (type === 'currency') return value.toString().replace(/(\d)[.,]\d{2}$/, (m, p1) => p1 + ',**');
            return '•••••••';
          };

          return (
            <span className={`inline-flex items-center gap-1.5 group ${className}`}>
              <span className="font-mono">{isVisible ? value : masked()}</span>
              <button
                type="button"
                onClick={(e) => { e.stopPropagation(); setIsVisible(v => !v); }}
                className="opacity-0 group-hover:opacity-100 transition-opacity text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 p-0.5 rounded"
                title={isVisible ? 'Ocultar' : 'Revelar dado'}
              >
                {isVisible
                  ? <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                  : <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                }
              </button>
            </span>
          );
        };

        const Modal = ({ isOpen, onClose, title, children, maxWidth = 'max-w-2xl' }) => {
          if (!isOpen) return null;
          return (
            <div className="fixed inset-0 z-50 flex items-start justify-center p-4 sm:p-6 overflow-y-auto custom-scrollbar">
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
              <div className={`relative bg-white/90 dark:bg-slate-800/90 backdrop-blur-2xl border border-white/20 dark:border-slate-700 rounded-3xl shadow-2xl w-full ${maxWidth} flex flex-col animate-in fade-in zoom-in-95 duration-200 my-auto`}>
                <div className="flex items-center justify-between p-6 border-b border-slate-200 dark:border-slate-700">
                  <h2 className="text-xl font-bold text-slate-800 dark:text-white">{title}</h2>
                  <button type="button" onClick={onClose} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-500">
                    <X size={20} />
                  </button>
                </div>
                <div className="p-6">
                  {children}
                </div>
              </div>
            </div>
          );
        };

        // --- MAIN APPLICATION COMPONENT ---
        function App() {
          const [user, setUser] = useState(null);
          const [appUser, setAppUser] = useState(null);
          const [loading, setLoading] = useState(true);
          
          // App State
          const [activeTab, setActiveTab] = useState(localStorage.getItem('sysrh_activeTab') || 'dashboard');
          
          // Inicialização imediata de estados baseada estritamente no LocalStorage
          const initialIsDark = localStorage.getItem('sysrh_darkMode') === 'true';
          
          const [isDarkMode, setIsDarkMode] = useState(initialIsDark);
          const [themeName, setThemeName] = useState(localStorage.getItem('sysrh_theme') || 'blue');
          const [wallpaper, setWallpaper] = useState(localStorage.getItem('sysrh_wallpaper') || 'none');
          const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const theme = THEMES[themeName];

          // Data State
          const [companies, setCompanies] = useState([]);
          const [commercialRooms, setCommercialRooms] = useState([]);
          const [employees, setEmployees] = useState([]);
          const [payments, setPayments] = useState([]);
          const [requests, setRequests] = useState([]);
          const [occurrences, setOccurrences] = useState([]);
          const [events, setEvents] = useState([]);
          const [systemUsers, setSystemUsers] = useState([]);
          const [logs, setLogs] = useState([]);

          // Gerencia a remoção do Splash Screen nativo
          useEffect(() => {
            if (!loading) {
              const splash = document.getElementById('initial-splash');
              if (splash) {
                splash.style.opacity = '0';
                splash.style.transition = 'opacity 0.5s ease';
                setTimeout(() => splash.remove(), 500);
              }
            }
          }, [loading]);

          // Persistência de Aba
          useEffect(() => {
            localStorage.setItem('sysrh_activeTab', activeTab);
          }, [activeTab]);
          
          // Notification State
          const [toast, setToast] = useState(null);

          // PWA In-App Document Viewer State
          const [inAppViewer, setInAppViewer] = useState({ isOpen: false, url: '', title: '' });

          // Confirmation Modal State (Agora suporta motivo obrigatório)
          const [confirmDialog, setConfirmDialog] = useState({ 
            isOpen: false, 
            message: '', 
            onConfirm: null, 
            confirmText: 'Excluir', 
            confirmVariant: 'danger',
            requireReason: false,
            tempReason: ''
          });

          // Login/Setup State
          const [authForm, setAuthForm] = useState({ username: '', password: '' });
          const [authError, setAuthError] = useState('');
          const [isLoggingIn, setIsLoggingIn] = useState(false);

          const showToast = (message, type = 'success') => {
            setToast({ message, type });
            setTimeout(() => setToast(null), 3000);
          };

          const requestConfirm = (message, onConfirm, confirmText = 'Excluir', confirmVariant = 'danger', requireReason = false) => {
            setConfirmDialog({ 
              isOpen: true, 
              message, 
              onConfirm, 
              confirmText, 
              confirmVariant,
              requireReason,
              tempReason: ''
            });
          };

          const handleMaskedView = (url, title = 'Documento Seguro') => {
            if (!url) return;
            
            // Base64 entra via link direto (navegador processa sem PWA wrapper)
            if (url.startsWith('data:')) {
                const a = document.createElement('a');
                a.href = url;
                a.download = title;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                return;
            }
            
            // Detecta se a URL apontará para um conteúdo que os navegadores renderizam no iFrame.
            // PDFs e Imagens podem ficar dentro do modal PWA para leitura.
            // Certificados (pfx, p12) ou Planilhas (xlsx, csv) não renderizam, vão gerar pop-up nativo de salvamento do SO.
            const urlLower = url.toLowerCase();
            const isRenderable = urlLower.includes('.pdf') || urlLower.includes('.jpg') || 
                                 urlLower.includes('.jpeg') || urlLower.includes('.png') || 
                                 urlLower.includes('.webp') || urlLower.includes('.gif') || 
                                 urlLower.includes('.txt') || url.startsWith('blob:');

            if (!isRenderable) {
                // Arquivos que disparam download forçado ganham um iFrame cego (invisível).
                // Isso impede a abertura de um modal inútil que não pode detectar "cancelamentos" do usuário
                showToast('Baixando arquivo...', 'info');
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = url;
                document.body.appendChild(iframe);
                // Prevenção de vazamento de memória após o navegador assumir o download
                setTimeout(() => document.body.removeChild(iframe), 30000); 
                return;
            }
            
            // Ativa o modal apenas para quem efetivamente tem renderização visual (sem sair do PWA)
            setInAppViewer({ isOpen: true, url, title });
          };

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
              setUser(currentUser);
              if (currentUser) {
                try {
                  const uDoc = await getDoc(doc(db, `${basePath}/systemUsers/${currentUser.uid}`));
                  if (uDoc.exists()) {
                    setAppUser({ id: currentUser.uid, ...uDoc.data() });
                  } else {
                    console.warn('Conta Firebase sem perfil no sistema. Acesso negado.');
                    showToast('Sua conta não está cadastrada no sistema. Contate o administrador.', 'error');
                    await signOut(auth);
                    setAppUser(null);
                  }
                } catch (error) {
                  console.error("Erro ao buscar perfil do usuário:", error);
                  showToast('Erro ao verificar suas permissões. Tente novamente.', 'error');
                  await signOut(auth);
                  setAppUser(null);
                }
              } else {
                setAppUser(null);
              }
              setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          // (Listener duplicado removido — correção de segurança)

          useEffect(() => {
            if (!user) return;

            const handleSnapError = (error) => {
              // Silencia o erro no console e na tela se for apenas bloqueio de permissão esperado
              if (error.code !== 'permission-denied') {
                console.error("Firestore snapshot error:", error);
              }
            };

            const unsubSystemUsers = onSnapshot(collection(db, `${basePath}/systemUsers`), 
              (snapshot) => { setSystemUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubCompanies = onSnapshot(collection(db, `${basePath}/companies`), 
              (snapshot) => { setCompanies(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubCommercialRooms = onSnapshot(collection(db, `${basePath}/commercialRooms`), 
              (snapshot) => { setCommercialRooms(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubEmployees = onSnapshot(collection(db, `${basePath}/employees`), 
              (snapshot) => { setEmployees(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubPayments = onSnapshot(collection(db, `${basePath}/payments`), 
              (snapshot) => { setPayments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubRequests = onSnapshot(collection(db, `${basePath}/requests`), 
              (snapshot) => { setRequests(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubOccurrences = onSnapshot(collection(db, `${basePath}/occurrences`), 
              (snapshot) => { setOccurrences(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubEvents = onSnapshot(collection(db, `${basePath}/events`), 
              (snapshot) => { setEvents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );
            const unsubLogs = onSnapshot(collection(db, `${basePath}/logs`), 
              (snapshot) => { setLogs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
              handleSnapError
            );

            return () => {
              unsubSystemUsers();
              unsubCompanies();
              unsubCommercialRooms();
              unsubEmployees();
              unsubPayments();
              unsubRequests();
              unsubOccurrences();
              unsubEvents();
              unsubLogs();
            };
          }, [user]);

          useEffect(() => {
            if (!appUser) return;
            const loadSettings = async () => {
              try {
                const settingsDoc = await getDoc(doc(db, `${basePath}/settings/${appUser.id}`));
                if (settingsDoc.exists()) {
                  const data = settingsDoc.data();
                  if (data.theme) {
                      setThemeName(data.theme);
                      localStorage.setItem('sysrh_theme', data.theme);
                  }
                  if (data.darkMode !== undefined) {
                      setIsDarkMode(data.darkMode);
                      localStorage.setItem('sysrh_darkMode', data.darkMode);
                  }
                  if (data.wallpaper !== undefined) {
                      setWallpaper(data.wallpaper);
                      localStorage.setItem('sysrh_wallpaper', data.wallpaper);
                  }
                }
              } catch (error) {
                console.error("Erro ao carregar configurações:", error);
              }
            };
            loadSettings();
          }, [appUser]);

          useEffect(() => {
            // Atualiza também a cor da barra de navegação/status do Safari e Android
            const metaTheme = document.getElementById('dynamic-theme-color');
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
              if (metaTheme) metaTheme.setAttribute('content', '#0f172a');
            } else {
              document.documentElement.classList.remove('dark');
              if (metaTheme) metaTheme.setAttribute('content', '#f8fafc');
            }
          }, [isDarkMode]);

          const saveSettings = async (newTheme, newDarkMode, newWallpaper) => {
            if (!appUser) return;
            
            // Atualiza visualmente na mesma hora
            setThemeName(newTheme);
            setIsDarkMode(newDarkMode);
            setWallpaper(newWallpaper);
            
            // Salva no LocalStorage para os próximos acessos serem instantâneos
            localStorage.setItem('sysrh_theme', newTheme);
            localStorage.setItem('sysrh_darkMode', newDarkMode);
            localStorage.setItem('sysrh_wallpaper', newWallpaper);

            try {
              // Sincroniza com o banco de dados para manter espelhado em outros dispositivos
              await setDoc(doc(db, `${basePath}/settings/${appUser.id}`), {
                theme: newTheme,
                darkMode: newDarkMode,
                wallpaper: newWallpaper
              });
            } catch (e) { console.error("Error saving settings", e); }
          };

          const logInteraction = async (action, module, details, specificUser = null) => {
            const u = specificUser || appUser;
            if (!u) return;
            try {
              await addDoc(collection(db, `${basePath}/logs`), {
                timestamp: new Date().toISOString(),
                userName: u.name || 'Desconhecido',
                userUsername: u.username || 'admin',
                action,
                module,
                details
              });
            } catch (e) { console.error("Erro ao registrar log", e); }
          };

          const handleLogin = async (e) => {
            e.preventDefault();
            setAuthError('');
            setIsLoggingIn(true);
            
            const email = authForm.username.toLowerCase() + '@sysrh.com';
            
            try {
              await signInWithEmailAndPassword(auth, email, authForm.password);
            } catch (err) {
              setAuthError('Usuário ou senha inválidos.');
              setIsLoggingIn(false);
            }
          };

          const handleLogout = async () => {
            await signOut(auth);
            setAppUser(null);
            setAuthForm({ ...authForm, password: '' });
            setIsLoggingIn(false);
          };

          const handleChangePassword = async (newPassword) => {
            try {
              if (!auth.currentUser) return;
              await updatePassword(auth.currentUser, newPassword);
              
              showToast('Senha atualizada com sucesso!', 'success');
              logInteraction('Atualização', 'Segurança', 'Alterou a própria senha de acesso');
            } catch (error) {
              console.error("Erro ao atualizar senha:", error);
              if (error.code === 'auth/requires-recent-login') {
                 showToast('Por segurança, saia do sistema e entre novamente para alterar a senha.', 'error');
              } else {
                 showToast('Erro ao alterar senha: ' + error.message, 'error');
              }
            }
          };

          // O loading inicial agora é controlado pelo HTML/CSS nativo em #root
          // para evitar flashes brancos. O React apenas assume o controle quando pronto.
          if (loading) return null;

          if (!appUser) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 p-4 relative">
                <Card className="w-full max-w-md p-8 animate-in zoom-in-95 duration-500 z-10">
                  <div className="flex justify-center mb-6">
                    <div className={`w-16 h-16 rounded-2xl flex items-center justify-center text-white shadow-lg ${theme.bg}`}>
                      <Lock size={32} />
                    </div>
                  </div>
                  <h2 className="text-2xl font-bold text-center mb-2">Acesso ao Sistema</h2>
                  <p className="text-slate-500 text-center mb-6 text-sm">Insira suas credenciais para continuar.</p>
                  
                  <form onSubmit={handleLogin} className="space-y-4">
                    <div className="flex flex-col gap-1">
                      <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Usuário</label>
                      <input 
                        type="text" 
                        required 
                        placeholder="ex: admin"
                        className={`w-full px-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm`}
                        value={authForm.username} 
                        onChange={e => setAuthForm({...authForm, username: e.target.value.toLowerCase().replace(/\s+/g, '')})} 
                      />
                    </div>
                    <Input label="Senha" type="password" theme={theme} required value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} />
                    {authError && <p className="text-red-500 text-sm font-medium text-center">{authError}</p>}

                    <Button theme={theme} className="w-full mt-2" type="submit" loading={isLoggingIn}>
                      {isLoggingIn ? 'Entrando...' : 'Entrar'}
                    </Button>
                  </form>
                </Card>
                
                <div className="absolute bottom-6 w-full text-center px-4">
                  <p className="text-sm font-medium text-slate-400 dark:text-slate-500">Desenvolvido pela equipe de tecnologia da informação.</p>
                </div>
              </div>
            );
          }

          const canAccess = (reqId) => {
            if (!reqId) return true;
            const perm = appUser?.permissions?.[reqId];
            if (perm !== undefined) return perm.read;

        function ChatWidget({ theme, basePath, appUser, systemUsers, db }) {
          const [isOpen, setIsOpen] = useState(false);
          const [activeChat, setActiveChat] = useState(null);
          const [messages, setMessages] = useState([]);
          const [inputText, setInputText] = useState('');
          const [chatTab, setChatTab] = useState('users');
          const [replyingTo, setReplyingTo] = useState(null);
          const [editingMsg, setEditingMsg] = useState(null);
          const [unreadChats, setUnreadChats] = useState({});
          const messagesEndRef = useRef(null);

          // Obtém os setores únicos para criar os grupos dinamicamente
          let sectors = Array.from(new Set(systemUsers.map(u => u.sector).filter(Boolean)));
          
          if (appUser?.sector !== 'Administração') {
            sectors = sectors.filter(s => s === appUser?.sector);
          }
          
          // Adiciona o grupo 'Geral' ao topo
          sectors.unshift('Geral');
          
          // Verifica se há pelo menos um chat não lido
          const hasUnreadTotal = Object.values(unreadChats).some(Boolean);

          useEffect(() => {
            if (messagesEndRef.current) {
              messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }
          }, [messages]);

          // Lógica global de notificações (Monitora as mensagens recebidas de todos)
          useEffect(() => {
            if (!appUser || !db || !systemUsers.length) return;
            const unsubs = [];
            
            const checkUnread = (chatId, snapshot) => {
                const lastRead = localStorage.getItem(`lastRead_${chatId}`) || 0;
                const hasNew = snapshot.docs.some(doc => {
                    const data = doc.data();
                    return data.senderId !== appUser.id && new Date(data.timestamp).getTime() > Number(lastRead);
                });
                setUnreadChats(prev => {
                    if (prev[chatId] === hasNew) return prev;
                    return { ...prev, [chatId]: hasNew };
                });
            };

            // Monitora o grupo Geral (Todos têm acesso)
            const generalChatId = `group_Geral`;
            unsubs.push(onSnapshot(collection(db, `chats/${generalChatId}/messages`), (snap) => checkUnread(generalChatId, snap)));

            // Monitora os grupos departamentais permitidos
            if (appUser.sector) {
              const accessibleSectors = appUser.sector === 'Administração' 
                  ? Array.from(new Set(systemUsers.map(u => u.sector).filter(Boolean)))
                  : [appUser.sector];

              accessibleSectors.forEach(sec => {
                 const groupChatId = `group_${sec}`;
                 unsubs.push(onSnapshot(collection(db, `chats/${groupChatId}/messages`), (snap) => checkUnread(groupChatId, snap)));
              });
            }

            // Monitora as mensagens diretas com outros usuários
            systemUsers.forEach(u => {
                if (u.id === appUser.id) return;
                const dmId = `direct_${[appUser.id, u.id].sort().join('_')}`;
                unsubs.push(onSnapshot(collection(db, `chats/${dmId}/messages`), (snap) => checkUnread(dmId, snap)));
            });

            return () => unsubs.forEach(u => u());
          }, [appUser, db, systemUsers]);

          // Limpa a notificação assim que o usuário abre o chat específico
          useEffect(() => {
            if (isOpen && activeChat) {
                localStorage.setItem(`lastRead_${activeChat.id}`, Date.now().toString());
                setUnreadChats(prev => {
                    if (!prev[activeChat.id]) return prev;
                    return { ...prev, [activeChat.id]: false };
                });
            }
          }, [isOpen, activeChat, messages]);

          // Monitora as mensagens apenas do chat que está aberto na tela
          useEffect(() => {
            if (!activeChat || !isOpen || !db) return;
            
            const chatPath = `chats/${activeChat.id}/messages`;
            
            const unsub = onSnapshot(
              collection(db, chatPath),
              (snapshot) => {
                const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                msgs.sort((a, b) => new Date(a.timestamp).getTime() - new Date(b.timestamp).getTime());
                setMessages(msgs);
                setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
              },
              (error) => {
                console.error("Erro ao carregar mensagens:", error);
              }
            );
            return () => unsub();
          }, [activeChat, isOpen, db]);

          const openDirectChat = (targetUser) => {
            if (!appUser || !targetUser) return;
            const id = [appUser.id, targetUser.id].sort().join('_');
            setActiveChat({ id: `direct_${id}`, name: targetUser.name, type: 'direct' });
          };

          const openGroupChat = (sector) => {
            setActiveChat({ id: `group_${sector.replace(/\s+/g, '_')}`, name: `Grupo: ${sector}`, type: 'group' });
          };

          const handleSend = async (e) => {
            e.preventDefault();
            if (!inputText.trim() || !appUser || !activeChat || !db) return;

            const chatPath = `chats/${activeChat.id}/messages`;

            try {
              if (editingMsg) {
                const docRef = doc(db, chatPath, editingMsg.id);
                await updateDoc(docRef, {
                  text: inputText,
                  isEdited: true
                });
                setEditingMsg(null);
              } else {
                await addDoc(collection(db, chatPath), {
                  senderId: appUser.id,
                  senderName: appUser.name,
                  text: inputText,
                  timestamp: new Date().toISOString(),
                  isEdited: false,
                  replyTo: replyingTo ? { id: replyingTo.id, text: replyingTo.text, senderName: replyingTo.senderName } : null
                });
                setReplyingTo(null);
              }
              setInputText('');
            } catch (err) {
              console.error("Erro ao enviar mensagem:", err);
              alert("Não foi possível enviar a mensagem. Verifique sua conexão ou permissões.");
            }
          };

          const startEdit = (msg) => {
            setEditingMsg(msg);
            setReplyingTo(null);
            setInputText(msg.text);
          };

          const startReply = (msg) => {
            setReplyingTo(msg);
            setEditingMsg(null);
            setInputText('');
          };

          // Função auxiliar para agrupar mensagens por data
          const formatDateHeader = (dateString) => {
            const msgDate = new Date(dateString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            msgDate.setHours(0, 0, 0, 0);
            today.setHours(0, 0, 0, 0);
            yesterday.setHours(0, 0, 0, 0);

            const diffTime = Math.abs(today - msgDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (msgDate.getTime() === today.getTime()) {
              return 'Hoje';
            } else if (msgDate.getTime() === yesterday.getTime()) {
              return 'Ontem';
            } else if (diffDays <= 7) {
              const diasSemana = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
              return diasSemana[msgDate.getDay()];
            } else {
              return msgDate.toLocaleDateString('pt-BR');
            }
          };

          // Agrupando mensagens
          const groupedMessages = [];
          let lastDateHeader = null;

          messages.forEach(msg => {
            const dateHeader = formatDateHeader(msg.timestamp);
            if (dateHeader !== lastDateHeader) {
              groupedMessages.push({ type: 'header', text: dateHeader, id: `header-${msg.id}` });
              lastDateHeader = dateHeader;
            }
            groupedMessages.push({ type: 'message', ...msg });
          });

          return (
            <>
              {/* Botão Flutuante com Notificação de Mensagem Não Lida */}
              <button 
                onClick={() => setIsOpen(!isOpen)}
                className={`fixed bottom-6 right-6 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-white z-[105] hover:scale-105 transition-transform duration-300 ${theme.bg}`}
                title="Chat Interno"
              >
                {isOpen ? <X size={24} /> : <MessageSquare size={24} />}
                {!isOpen && hasUnreadTotal && (
                  <span className="absolute top-0 right-0 w-4 h-4 bg-rose-500 border-2 border-white dark:border-slate-900 rounded-full animate-pulse shadow-sm"></span>
                )}
              </button>

              {/* Janela do Chat */}
              {isOpen && (
                <div className="fixed bottom-24 right-6 w-[360px] max-w-[calc(100vw-3rem)] h-[550px] max-h-[70vh] bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[105] flex flex-col overflow-hidden animate-in slide-in-from-bottom-10 duration-300">
                  
                  {/* Cabeçalho */}

                    <div className="flex-1 min-w-0">
                      <h3 className="font-bold text-base truncate">{activeChat ? activeChat.name : 'Chat Interno'}</h3>

                  {!activeChat ? (
                    <div className="flex-1 flex flex-col overflow-hidden">
                      <div className="flex bg-slate-50 dark:bg-slate-800/50 p-2 gap-2 border-b border-slate-200 dark:border-slate-700">
                        <button onClick={() => setChatTab('users')} className={`flex-1 py-1.5 text-sm font-medium rounded-lg transition-colors ${chatTab === 'users' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500'}`}>Usuários</button>
                        <button onClick={() => setChatTab('groups')} className={`flex-1 py-1.5 text-sm font-medium rounded-lg transition-colors ${chatTab === 'groups' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500'}`}>Grupos</button>

                      <div className="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                        
                        {/* Lista de Usuários com Indicador de Não Lida */}

                        {/* Lista de Grupos com Indicador de Não Lida */}
                        {chatTab === 'groups' && sectors.map(sector => {

                                  <p className={`font-medium text-sm truncate ${hasNewMsg ? 'text-slate-900 dark:text-white font-bold' : 'text-slate-800 dark:text-slate-100'}`}>Equipe: {sector}</p>
                                  <p className={`text-[10px] truncate ${hasNewMsg ? 'text-rose-500 font-semibold' : 'text-slate-500'}`}>Chat do setor</p>
                                </div>
                              </div>
                              {hasNewMsg && <div className="w-2.5 h-2.5 bg-rose-500 rounded-full shadow-sm flex-shrink-0 ml-2"></div>}

                      </div>
                    </div>
                  ) : (
                    <div className="flex-1 flex flex-col bg-slate-50/50 dark:bg-slate-900 overflow-hidden relative">
                      
                      {/* Lista de Mensagens */}
                      <div className="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4">
                        {groupedMessages.length === 0 && <p className="text-center text-xs text-slate-400 mt-10">Inicie a conversa!</p>}
                        {groupedMessages.map((item, index) => {

                          const msg = item;
                          const isMe = msg.senderId === appUser.id;
                          return (

                              <div className="flex items-center gap-2 max-w-[85%]">
                                {/* Ações lado Esquerdo (se for Minha mensagem) */}
                                {isMe && (

                                    <button type="button" onClick={() => startEdit(msg)} className="p-1.5 bg-white dark:bg-slate-800 rounded-full shadow-sm text-slate-500 hover:text-amber-500" title="Editar"><Edit2 size={12} /></button>
                                    <button type="button" onClick={() => startReply(msg)} className="p-1.5 bg-white dark:bg-slate-800 rounded-full shadow-sm text-slate-500 hover:text-blue-500" title="Responder"><Reply size={12} /></button>
                                  </div>
                                )}

                                {/* Balão da Mensagem */}
                                <div className={`relative p-3 rounded-2xl shadow-sm ${isMe ? `${theme.bg} text-white rounded-tr-sm` : 'bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 border border-slate-100 dark:border-slate-700 rounded-tl-sm'}`}>

                                  {msg.replyTo && (
                                    <div className={`mb-2 p-2 rounded-lg text-[11px] opacity-90 border-l-2 ${isMe ? 'bg-white/20 border-white' : 'bg-slate-100 dark:bg-slate-700/50 border-slate-400'}`}>
                                      <span className="font-bold block mb-0.5">{msg.replyTo.senderName}</span>
                                      <span className="truncate block max-w-full">{msg.replyTo.text}</span>
                                    </div>
                                  )}
                                  
                                  <p className="text-sm whitespace-pre-wrap break-words">{msg.text}</p>
                                  
                                  <div className={`text-[9px] mt-1.5 text-right ${isMe ? 'text-white/70' : 'text-slate-400 dark:text-slate-500'}`}>
                                    {new Date(msg.timestamp).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}
                                    {msg.isEdited && ' (editado)'}
                                  </div>
                                </div>

                                {/* Ações lado Direito (se NÃO for minha mensagem) */}
                                {!isMe && (
                                  <div className="opacity-0 group-hover:opacity-100 transition-opacity flex flex-col gap-1 shrink-0">
                                    <button type="button" onClick={() => startReply(msg)} className="p-1.5 bg-white dark:bg-slate-800 rounded-full shadow-sm text-slate-500 hover:text-blue-500" title="Responder"><Reply size={12} /></button>
                                  </div>
                                )}
                              </div>
                            </div>
                          );
                        })}
                        <div ref={messagesEndRef} />
                      </div>

                      {/* Rodapé: Input de Texto */}
                      <div className="p-3 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700">
                        {(replyingTo || editingMsg) && (
                          <div className="flex items-center justify-between bg-slate-100 dark:bg-slate-700/50 p-2 rounded-lg mb-2">
                            <div className="text-xs text-slate-600 dark:text-slate-300 truncate pr-2">
                              {replyingTo ? (
                                <><span className="font-bold">Respondendo {replyingTo.senderName}:</span> {replyingTo.text}</>
                              ) : (
                                <><span className="font-bold">Editando:</span> {editingMsg.text}</>
                              )}
                            </div>
                            <button type="button" onClick={() => { setReplyingTo(null); setEditingMsg(null); setInputText(''); }} className="text-slate-400 hover:text-rose-500">
                              <XCircle size={14} />
                            </button>
                          </div>
                        )}
                        
                        <form onSubmit={(e) => {
                          e.preventDefault();
                          handleSend(e);
                          const ta = e.target.querySelector('textarea');
                          if (ta) ta.style.height = '44px';
                        }} className="flex items-end gap-2 relative">
                          <textarea 
                            value={inputText}
                            onChange={(e) => {
                              setInputText(e.target.value);
                              e.target.style.height = '44px';
                              e.target.style.height = `${Math.min(e.target.scrollHeight, 120)}px`;
                            }}
                            placeholder={editingMsg ? "Edite sua mensagem..." : "Digite sua mensagem..."}
                            className={`flex-1 bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none resize-none custom-scrollbar min-h-[44px] max-h-[120px] transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-sm`}
                            rows={1}
                            onBlur={(e) => {
                              // Se ficou vazio, garante que volte pra 1 linha
                              if (!e.target.value.trim()) {
                                e.target.style.height = '44px';
                              }
                            }}
                            onKeyDown={e => {
                              if (e.key === 'Enter' && !e.shiftKey) {
                                e.preventDefault();
                                handleSend(e);
                                e.target.style.height = '44px';
                              }
                            }}
                          />
                          <button 
                            type="submit" 
                            disabled={!inputText.trim()}
                            className={`p-3 rounded-xl transition-all flex-shrink-0 ${inputText.trim() ? `${theme.bg} text-white shadow-md hover:-translate-y-0.5` : 'bg-slate-200 dark:bg-slate-700 text-slate-400 cursor-not-allowed'}`}
                          >
                            <Send size={18} className={inputText.trim() ? 'ml-0.5' : ''} />
                          </button>
                        </form>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </>
          );
        }

        function DashboardView({ theme, appUser, employees, payments, requests, occurrences, companies, events, commercialRooms }) {
          // Função inteligente para checar a matriz de permissões do usuário logado
          const checkAccess = (mod) => {
             if (appUser?.sector === 'Administração') return true;
             return appUser?.permissions?.[mod]?.read === true;
          };
          
          const showEmp = checkAccess('employees');
          const showPay = checkAccess('payments');
          const showDisc = checkAccess('requests');
          const showOcc = checkAccess('occurrences');
          const showVac = checkAccess('vacations');
          const showComp = checkAccess('companies'); // Permissão para ver certificados
          const showCal = checkAccess('calendar'); // Permissão para ver agenda

          const activeEmployees = employees.filter(e => e.status !== 'Desligado' && e.employeeType !== 'Freelancer');

          const todayDateObj = new Date();
          const currentDayStr = String(todayDateObj.getDate()).padStart(2, '0');
          const currentMonthStr = String(todayDateObj.getMonth() + 1).padStart(2, '0');
          const currentYear = todayDateObj.getFullYear();

          let monthOccurrences = 0;
          if (showOcc && occurrences) {
            monthOccurrences = occurrences.filter(o => {
              if (!o.date) return false;
              const parts = o.date.includes('/') ? o.date.split('/') : o.date.split('-');
              const m = parts.length === 3 ? (o.date.includes('/') ? parts[1] : parts[1]) : '';
              const y = parts.length === 3 ? (o.date.includes('/') ? parts[2] : parts[0]) : '';
              return m === currentMonthStr && y === String(currentYear);
            }).length;
          }

          // Renderiza os cards superiores apenas se o usuário tiver permissão daquela área
          const stats = [];
          if (showEmp) stats.push({ title: 'Total de Funcionários Ativos', value: activeEmployees.length, icon: Users, color: 'text-blue-500' });
          if (showPay) stats.push({ title: 'Total Pago (Mês)', value: formatCurrency(payments.reduce((acc, curr) => acc + Number(curr.amount), 0)), icon: DollarSign, color: 'text-emerald-500' });
          if (showDisc) stats.push({ title: 'Solicitações Ativas', value: requests.filter(d => d.status !== 'Finalizado').length, icon: FileText, color: 'text-amber-500' });
          if (showOcc) stats.push({ title: 'Ocorrências no Mês', value: monthOccurrences, icon: AlertTriangle, color: 'text-rose-500' });

          const estoqueCount = activeEmployees.filter(e => e.workSector === 'Estoque').length;
          const adminCount = activeEmployees.filter(e => e.workSector === 'Administrativo').length;

          const unitsCount = {
            EverSky: 0, Everest: 0, Bonway: 0, Perus: 0, Barueri: 0, Good: 0
          };
          
          activeEmployees.forEach(e => {
            if (e.unit && unitsCount[e.unit] !== undefined) {
              unitsCount[e.unit]++;
            } else if (e.unit) {
              unitsCount[e.unit] = (unitsCount[e.unit] || 0) + 1;
            }
          });

          // Lógica de Mensagens Motivacionais Diárias
          const motivationalMessages = [
            "O sucesso é a soma de pequenos esforços repetidos dia após dia.",
            "Acredite no seu potencial e faça acontecer!",
            "Grandes vitórias exigem grande dedicação. Vamos em frente!",
            "O trabalho em equipe divide as tarefas e multiplica o sucesso.",
            "A sua dedicação é a chave para o sucesso de todos nós.",
            "Não espere por oportunidades, crie-as!",
            "Um novo dia, uma nova chance de fazer a diferença.",
            "O seu esforço de hoje é o seu sucesso de amanhã.",
            "Juntos, transformamos desafios em grandes conquistas.",
            "A atitude é o que separa o sucesso do fracasso. Mantenha-se positivo!",
            "Nenhum obstáculo é grande demais quando confiamos na nossa equipe.",
            "A excelência não é um ato, mas um hábito.",
            "Valorize cada passo do processo, pois eles constroem o resultado final.",
            "Foco, determinação e muito trabalho em equipe: essa é a nossa receita.",
            "Sua energia e dedicação inspiram todos ao seu redor!"
          ];
          const dayOfYear = Math.floor((todayDateObj - new Date(currentYear, 0, 0)) / (1000 * 60 * 60 * 24));
          const dailyMessage = motivationalMessages[dayOfYear % motivationalMessages.length];

          const birthdaysToday = activeEmployees.filter(emp => {
            if (!emp.birthDate) return false;
            const [d, m] = emp.birthDate.split('/');
            return d === currentDayStr && m === currentMonthStr;
          });

          // Lógica para listar os eventos da Agenda do dia de hoje
          const todayStrYYYYMMDD = `${currentYear}-${currentMonthStr}-${currentDayStr}`;
          const todayEvents = (events || []).filter(e => e.date === todayStrYYYYMMDD).sort((a,b) => (a.time || '').localeCompare(b.time || ''));

          // Lógica de Datas Normalizada
          const normalizedToday = new Date(todayDateObj);
          normalizedToday.setHours(0,0,0,0);

          const parseBrDateToObj = (dateStr) => {
            if (!dateStr || !dateStr.includes('/')) return null;
            const [d, m, y] = dateStr.split('/');
            return new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
          };

          // Lógica para contratos a vencer
          const expiringContracts = activeEmployees.filter(emp => {
            if (emp.isContract === 'Sim' && emp.contractEndDate) {
              const endDate = parseBrDateToObj(emp.contractEndDate);
              if (!endDate) return false;
              const diffTime = endDate.getTime() - normalizedToday.getTime();
              const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
              emp._diffDays = diffDays;
              return diffDays <= 7 && diffDays >= -30;
            }
            return false;
          }).sort((a, b) => a._diffDays - b._diffDays);

          // Lógica para listar todos os estagiários ativos e calcular vencimento
          const activeInterns = employees.filter(emp => emp.status !== 'Desligado' && emp.isInternship === 'Sim').map(emp => {
            let diffDays = null;
            if (emp.internshipEndDate) {
              const endDate = parseBrDateToObj(emp.internshipEndDate);
              if (endDate) {
                diffDays = Math.ceil((endDate.getTime() - normalizedToday.getTime()) / (1000 * 60 * 60 * 24));
              }
            }
            return {
              ...emp,
              _diffDays: diffDays
            };
          }).sort((a, b) => {
            if (a._diffDays === null) return 1;
            if (b._diffDays === null) return -1;
            return a._diffDays - b._diffDays;
          });

          // Lógica para listar funcionários com empréstimos ativos
          const activeLoansList = [];
          activeEmployees.forEach(emp => {
            if (emp.hasLoans === 'Sim' && emp.loans && emp.loans.length > 0) {
              emp.loans.forEach((loan, idx) => {
                activeLoansList.push({
                  id: `${emp.id}-loan-${idx}`,
                  name: emp.name,
                  role: emp.role,
                  loanMonth: loan.loanMonth,
                  deadlineMonth: loan.deadlineMonth
                });
              });
            }
          });

          activeLoansList.sort((a, b) => {
            const parseMY = (my) => {
              if (!my) return 0;
              const [m, y] = my.split('/');
              return new Date(y, m - 1).getTime();
            };
            return parseMY(a.deadlineMonth) - parseMY(b.deadlineMonth);
          });

          // Lógica para listar férias (Atuais e Próximos 30 dias)
          const vacationsList = [];
          activeEmployees.forEach(emp => {
            if (emp.vacations) {
              Object.values(emp.vacations).forEach(vac => {
                if (vac.confirmed && vac.startDate && vac.endDate) {
                  const sDate = parseBrDateToObj(vac.startDate);
                  const eDate = parseBrDateToObj(vac.endDate);
                  if (sDate && eDate) {
                    const diffStart = Math.ceil((sDate.getTime() - normalizedToday.getTime()) / (1000 * 60 * 60 * 24));
                    const diffEnd = Math.ceil((eDate.getTime() - normalizedToday.getTime()) / (1000 * 60 * 60 * 24));

                    if (diffStart <= 0 && diffEnd >= 0) {
                      // Atualmente de férias
                      vacationsList.push({
                        id: `${emp.id}-vac-${vac.startDate}`,
                        name: emp.name,
                        role: emp.role,
                        startDate: vac.startDate,
                        endDate: vac.endDate,
                        type: 'current'
                      });
                    } else if (diffStart > 0 && diffStart <= 30) {
                      // Férias nos próximos 30 dias
                      vacationsList.push({
                        id: `${emp.id}-vac-${vac.startDate}`,
                        name: emp.name,
                        role: emp.role,
                        startDate: vac.startDate,
                        endDate: vac.endDate,
                        type: 'upcoming',
                        daysUntil: diffStart
                      });
                    }
                  }
                }
              });
            }
          });

          // Ordena férias: Atuais primeiro, depois as que estão mais próximas de acontecer
          vacationsList.sort((a, b) => {
            if (a.type === 'current' && b.type === 'upcoming') return -1;
            if (a.type === 'upcoming' && b.type === 'current') return 1;
            const dateA = parseBrDateToObj(a.startDate).getTime();
            const dateB = parseBrDateToObj(b.startDate).getTime();
            return dateA - dateB;
          });

          // NOVO: Lógica para certificados a vencer (Próximos 30 dias ou vencidos) - 100% Sincronizada com a Tabela de Empresas
          const expiringCertificates = [];
          if (companies && Array.isArray(companies)) {
            companies.forEach(comp => {
              // Garante que certs seja sempre um array válido para varredura
              let certs = [];
              if (comp.certificates && Array.isArray(comp.certificates) && comp.certificates.length > 0) {
                 certs = comp.certificates;
              } else if (comp.certModel) {
                 certs = [{ model: comp.certModel, expirationDate: comp.certExpirationDate }];
              }
              
              certs.forEach((cert, idx) => {
                if (cert && cert.model && cert.expirationDate) {
                  const dateStr = cert.expirationDate.trim();
                  
                  if (dateStr.length === 10) {
                      const [d, m, y] = dateStr.split('/');
                      const expDate = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
                      
                      if (!isNaN(expDate.getTime())) {
                        // Replica EXATAMENTE a mesma lógica usada para pintar de amarelo na tabela de Empresas
                        const limitDate = new Date(expDate);
                        limitDate.setDate(limitDate.getDate() - 30);

                        // Se a data de hoje for igual ou maior que a data limite (entrou no alerta de 30 dias ou venceu)
                        if (normalizedToday >= limitDate || normalizedToday > expDate) {
                            const diffTime = expDate.getTime() - normalizedToday.getTime();
                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            
                            expiringCertificates.push({
                              id: `${comp.id}-cert-${idx}`,
                              name: comp.name,
                              certModel: cert.model,
                              expirationDate: cert.expirationDate,
                              _diffDays: diffDays
                            });
                        }
                      }
                  }
                }
              });
            });
          }

                {showEmp && (

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[300px] overflow-y-auto custom-scrollbar pr-1">
                      {probationEmployees.map(emp => {

                        return (

                               </span>
