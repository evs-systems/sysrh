                      {probationEmployees.length === 0 && <p className="text-slate-500 text-sm text-center py-4 md:col-span-2">Nenhum colaborador em período de experiência.</p>}
                    </div>
                  </Card>
                )}
              </div>
            </div>
          );
        }

        // --- FUNÇÕES DE CÁLCULO DE FERIADOS (Nacionais e SP) ---
        const getEasterDate = (year) => {
            const f = Math.floor, G = year % 19, C = f(year / 100),
                H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
                I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
                J = (year + f(year / 4) + I + 2 - C + f(C / 4)) % 7,
                L = I - J, month = 3 + f((L + 40) / 44), day = L + 28 - 31 * f(month / 4);
            return new Date(year, month - 1, day);
        };

        const isHoliday = (dateObj) => {
            const d = dateObj.getDate();
            const m = dateObj.getMonth() + 1;
            const y = dateObj.getFullYear();
            
            // Feriados Fixos (Nacionais + SP)
            const fixed = ['1/1', '25/1', '21/4', '1/5', '9/7', '7/9', '12/10', '2/11', '15/11', '20/11', '25/12'];
            if (fixed.includes(`${d}/${m}`)) return true;

            // Feriados Móveis
            const easter = getEasterDate(y);
            const checkMobile = (offset) => {
                const temp = new Date(easter);
                temp.setDate(temp.getDate() + offset);
                return temp.getDate() === d && (temp.getMonth() + 1) === m;
            };
            
            // Sexta Santa (-2 dias), Corpus Christi (+60 dias)
            // (Carnaval removido, pois é ponto facultativo em SP)
            if (checkMobile(-2) || checkMobile(60)) return true;

            return false;
        };

        function BenefitsView({ theme, basePath, appUser, employees, showToast, logAction, db }) {
          const [activeSubTab, setActiveSubTab] = useState('transport');
          const [searchTerm, setSearchTerm] = useState('');
          const [filterCompany, setFilterCompany] = useState('');
          const [filterRole, setFilterRole] = useState('');
          const [filterUnit, setFilterUnit] = useState('');
          const [filterSector, setFilterSector] = useState('');
          const [filterStatus, setFilterStatus] = useState('');
          
          const [visibleCount, setVisibleCount] = useState(50);
          const [isPrinting, setIsPrinting] = useState(false);

          const canWrite = appUser?.permissions?.benefits?.write || appUser?.permissions?.employees?.write || appUser?.sector === 'Administração';

          // Controlo de Data para o Histórico (Filtro de Mês/Ano)
          const today = new Date();
          const currentMonthStr = String(today.getMonth() + 1).padStart(2, '0');
          const currentYearStr = String(today.getFullYear());
          
          const [filterMonth, setFilterMonth] = useState(currentMonthStr);
          const [filterYear, setFilterYear] = useState(currentYearStr);
          const monthKey = `${filterYear}-${filterMonth}`;

          // Repõe a contagem visível sempre que o utilizador muda de aba ou filtros
          useEffect(() => {
            setVisibleCount(50);
          }, [activeSubTab, searchTerm, filterCompany, filterRole, filterUnit, filterSector, filterStatus, filterMonth, filterYear]);

          const monthOptions = [
            { value: '01', label: 'Janeiro' }, { value: '02', label: 'Fevereiro' }, { value: '03', label: 'Março' },
            { value: '04', label: 'Abril' }, { value: '05', label: 'Maio' }, { value: '06', label: 'Junho' },
            { value: '07', label: 'Julho' }, { value: '08', label: 'Agosto' }, { value: '09', label: 'Setembro' },
            { value: '10', label: 'Outubro' }, { value: '11', label: 'Novembro' }, { value: '12', label: 'Dezembro' }
          ];

          const yearOptions = [
            { value: String(today.getFullYear() - 1), label: String(today.getFullYear() - 1) },
            { value: currentYearStr, label: currentYearStr },
            { value: String(today.getFullYear() + 1), label: String(today.getFullYear() + 1) }
          ];

          // Estado local para as faltas (VT, Combustível e Alimentação)
          const [localAbsences, setLocalAbsences] = useState({});
          const [originalAbsences, setOriginalAbsences] = useState({});

          const [localFuelAbsences, setLocalFuelAbsences] = useState({});
          const [originalFuelAbsences, setOriginalFuelAbsences] = useState({});

          const [localFoodAbsences, setLocalFoodAbsences] = useState({});
          const [originalFoodAbsences, setOriginalFoodAbsences] = useState({});

          // Estado local para as Premiações (Vale Alimentação)
          const [localFoodRewardEnabled, setLocalFoodRewardEnabled] = useState({});
          const [localFoodRewardValue, setLocalFoodRewardValue] = useState({});
          const [originalFoodRewards, setOriginalFoodRewards] = useState({});

          // Estados para os Modais de Pagamento
          const [vtPayModalOpen, setVtPayModalOpen] = useState(false);
          const [vtEmployeeToPay, setVtEmployeeToPay] = useState(null);
          const [vtPayForm, setVtPayForm] = useState([{ method: 'Site SpTrans', date: '', amount: '' }]);

          const [fuelPayModalOpen, setFuelPayModalOpen] = useState(false);
          const [fuelEmployeeToPay, setFuelEmployeeToPay] = useState(null);
          const [fuelPayDate, setFuelPayDate] = useState('');

          const [fuelBulkModalOpen, setFuelBulkModalOpen] = useState(false);
          const [fuelBulkSelected, setFuelBulkSelected] = useState([]);
          const [fuelBulkDate, setFuelBulkDate] = useState('');

          const [foodPayModalOpen, setFoodPayModalOpen] = useState(false);
          const [foodEmployeeToPay, setFoodEmployeeToPay] = useState(null);
          const [foodPayDate, setFoodPayDate] = useState('');

          const [foodBulkModalOpen, setFoodBulkModalOpen] = useState(false);
          const [foodBulkSelected, setFoodBulkSelected] = useState([]);
          const [foodBulkDate, setFoodBulkDate] = useState('');

          const [foodRewardBulkModalOpen, setFoodRewardBulkModalOpen] = useState(false);
          const [foodRewardBulkValue, setFoodRewardBulkValue] = useState('');

          const safeEmployees = Array.isArray(employees) ? employees : [];
          const activeEmployees = safeEmployees.filter(e => e.status !== 'Desligado' && e.employeeType !== 'Freelancer');

          useEffect(() => {
            const loadedAbsences = {};
            const loadedFuelAbsences = {};
            const loadedFoodAbsences = {};
            const loadedFoodRewardEnabled = {};
            const loadedFoodRewardValue = {};
            const loadedOriginalRewards = {};
            
            activeEmployees.forEach(emp => {
              if (emp.transportAbsences && emp.transportAbsences[monthKey] !== undefined) {
                loadedAbsences[emp.id] = emp.transportAbsences[monthKey];
              }
              if (emp.fuelAbsences && emp.fuelAbsences[monthKey] !== undefined) {
                loadedFuelAbsences[emp.id] = emp.fuelAbsences[monthKey];
              }
              if (emp.foodAbsences && emp.foodAbsences[monthKey] !== undefined) {
                loadedFoodAbsences[emp.id] = emp.foodAbsences[monthKey];
              }
              if (emp.foodRewards && emp.foodRewards[monthKey] !== undefined) {
                loadedFoodRewardEnabled[emp.id] = emp.foodRewards[monthKey].enabled || false;
                loadedFoodRewardValue[emp.id] = emp.foodRewards[monthKey].value || '';
                loadedOriginalRewards[emp.id] = emp.foodRewards[monthKey];
              }
            });
            setLocalAbsences(loadedAbsences);
            setOriginalAbsences(loadedAbsences);
            setLocalFuelAbsences(loadedFuelAbsences);
            setOriginalFuelAbsences(loadedFuelAbsences);
            setLocalFoodAbsences(loadedFoodAbsences);
            setOriginalFoodAbsences(loadedFoodAbsences);
            setLocalFoodRewardEnabled(loadedFoodRewardEnabled);
            setLocalFoodRewardValue(loadedFoodRewardValue);
            setOriginalFoodRewards(loadedOriginalRewards);
          }, [employees, monthKey]);

          const companiesList = [...new Set(activeEmployees.map(e => e.company).filter(Boolean))].sort();
          const roles = [...new Set(activeEmployees.map(e => e.role).filter(Boolean))].sort();
          const units = [...new Set(activeEmployees.map(e => e.unit).filter(Boolean))].sort();
          const sectors = [...new Set(activeEmployees.map(e => e.workSector).filter(Boolean))].sort();

          // Calcula os tipos de dias no mês
          const monthData = useMemo(() => {
            const y = parseInt(filterYear);
            const m = parseInt(filterMonth) - 1;
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            
            let baseMonToFri = 0;
            let allSats = 0;
            let escala1Sats = 0;
            let escala2Sats = 0;

            // Âncora matemática: 07/03/2026 foi um sábado da Escala 1
            const anchorSat = new Date(2026, 2, 7); 
            anchorSat.setHours(0,0,0,0);

            for (let d = 1; d <= daysInMonth; d++) {
              const date = new Date(y, m, d);
              date.setHours(0,0,0,0);
              const dayOfWeek = date.getDay();
              
              if (!isHoliday(date)) {
                if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                  baseMonToFri++;
                } else if (dayOfWeek === 6) {
                  allSats++;
                  const diffTime = date.getTime() - anchorSat.getTime();
                  const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                  const weeksDiff = Math.floor(diffDays / 7);
                  if (Math.abs(weeksDiff) % 2 === 0) escala1Sats++;
                  else escala2Sats++;
                }
              }
            }
            return { baseMonToFri, allSats, escala1Sats, escala2Sats };
          }, [filterYear, filterMonth]);

          // NOVO: Função para calcular os dias de férias no mês selecionado
          const getVacationData = (emp, yStr, mStr) => {
            let isFullMonthVacation = false;
            let isPartialVacation = false;
            let vacDiscount = 0;
            let tagText = '';

            const activeVacs = Object.values(emp.vacations || {}).filter(v => v.confirmed && v.startDate && v.endDate);
            if (activeVacs.length === 0) return { isFullMonthVacation, isPartialVacation, vacDiscount, tagText };

            const mYear = parseInt(yStr);
            const mMonth = parseInt(mStr) - 1;
            const daysInMonth = new Date(mYear, mMonth + 1, 0).getDate();
            let totalWorkingDaysThisMonth = 0;
            let vacationWorkingDaysThisMonth = 0;

            const anchorSat = new Date(2026, 2, 7);
            anchorSat.setHours(0,0,0,0);

            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(mYear, mMonth, d);
                date.setHours(0,0,0,0);
                const time = date.getTime();

                let isWorkingDay = false;
                if (!isHoliday(date)) {
                    const dayOfWeek = date.getDay();
                    if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                        isWorkingDay = true;
                    } else if (dayOfWeek === 6) {
                        if (emp.saturdayShift === 'Todos os sábados') isWorkingDay = true;
                        else if (emp.saturdayShift === 'Sábados alternados') {
                            const diffTime = time - anchorSat.getTime();
                            const diffDays = Math.round(diffTime / 86400000);
                            const weeksDiff = Math.floor(diffDays / 7);
                            if (Math.abs(weeksDiff) % 2 === 0 && emp.saturdayShiftTeam?.includes('Escala 1')) isWorkingDay = true;
                            else if (Math.abs(weeksDiff) % 2 !== 0 && emp.saturdayShiftTeam?.includes('Escala 2')) isWorkingDay = true;
                        }
                    }
                }

                if (isWorkingDay) {
                    totalWorkingDaysThisMonth++;
                    const inVacation = activeVacs.some(v => {
                        const sParts = v.startDate.split('/');
                        const eParts = v.endDate.split('/');
                        if (sParts.length !== 3 || eParts.length !== 3) return false;
                        const s = new Date(sParts[2], sParts[1]-1, sParts[0]).getTime();
                        const eD = new Date(eParts[2], eParts[1]-1, eParts[0]).getTime();
                        return time >= s && time <= eD;
                    });
                    if (inVacation) {
                        vacationWorkingDaysThisMonth++;
                    }
                }
            }

            if (totalWorkingDaysThisMonth > 0) {
                if (vacationWorkingDaysThisMonth === totalWorkingDaysThisMonth) {
                    isFullMonthVacation = true;
                    tagText = 'Férias (Mês Completo)';
                } else if (vacationWorkingDaysThisMonth > 0) {
                    isPartialVacation = true;
                    vacDiscount = vacationWorkingDaysThisMonth;
                    tagText = `Férias Parcial (-${vacDiscount} dias úteis)`;
                }
            }

            return { isFullMonthVacation, isPartialVacation, vacDiscount, tagText };
          };

          // Aplicação dos Filtros
          let filteredEmps = activeEmployees;
          if (searchTerm) filteredEmps = filteredEmps.filter(e => (e.name || '').toLowerCase().includes(searchTerm.toLowerCase()));
          if (filterCompany) filteredEmps = filteredEmps.filter(e => e.company === filterCompany);
          if (filterRole) filteredEmps = filteredEmps.filter(e => e.role === filterRole);
          if (filterUnit) filteredEmps = filteredEmps.filter(e => e.unit === filterUnit);
          if (filterSector) filteredEmps = filteredEmps.filter(e => e.workSector === filterSector);

          let currentList = [];
          let totalValue = 0;

          if (activeSubTab === 'transport') {
            currentList = filteredEmps.filter(e => e.transportVoucher === 'Sim').map(e => {
              const vacData = getVacationData(e, filterYear, filterMonth);
              let empBusinessDays = monthData.baseMonToFri;
              if (e.saturdayShift === 'Todos os sábados') empBusinessDays += monthData.allSats;
              else if (e.saturdayShift === 'Sábados alternados') {
                  if (e.saturdayShiftTeam?.includes('Escala 1')) empBusinessDays += monthData.escala1Sats;
                  else if (e.saturdayShiftTeam?.includes('Escala 2')) empBusinessDays += monthData.escala2Sats;
              }

              if (vacData.isFullMonthVacation) empBusinessDays = 0;
              else if (vacData.isPartialVacation) empBusinessDays -= vacData.vacDiscount;

              let dailyTotal = (e.transportCards || []).reduce((acc, c) => acc + (Number(c.valuePerDay) || 0), 0);
              const empAbsences = Number(localAbsences[e.id]) || 0;
              const payableDays = Math.max(0, empBusinessDays - empAbsences);
              
              let parsedCards = (e.transportCards || []).map((c, i) => {
                  const cardTotal = (Number(c.valuePerDay) || 0) * payableDays;
                  return { name: c.name || `Cartão ${i+1}`, valuePerDay: Number(c.valuePerDay) || 0, total: cardTotal };
              });

              let cardDetails = parsedCards.map(c => `${c.name}: ${formatCurrency(c.valuePerDay)}/dia`).join(' | ');
              
              const monthPaymentInfo = e.transportPayments?.[monthKey];
              const paidAmount = (monthPaymentInfo?.details || []).reduce((sum, item) => sum + Number(item.amount || 0), 0);
              
              let calcTotal = 0;

              if (monthPaymentInfo && monthPaymentInfo.lockedTotal !== undefined) {
                 calcTotal = monthPaymentInfo.lockedTotal;
                 dailyTotal = monthPaymentInfo.lockedDailyTotal;
                 cardDetails = monthPaymentInfo.lockedCardDetails || cardDetails;
                 empBusinessDays = monthPaymentInfo.lockedBusinessDays || empBusinessDays;
                 parsedCards = monthPaymentInfo.lockedParsedCards || parsedCards;
              } else if (monthPaymentInfo && monthPaymentInfo.status === 'Pago') {
                 calcTotal = paidAmount > 0 ? paidAmount : (dailyTotal * payableDays);
              } else {
                 calcTotal = dailyTotal * payableDays;
              }

              totalValue += calcTotal;
              
              const remainingAmount = Math.max(0, calcTotal - paidAmount);
              let isPaid = false; let isPartial = false;

              if (monthPaymentInfo) {
                  if (paidAmount >= (calcTotal - 0.01) && calcTotal > 0) isPaid = true;
                  else if (paidAmount > 0 && paidAmount < calcTotal) isPartial = true;
                  else if (monthPaymentInfo.status === 'Pago') isPaid = true; 
              }

              return { 
                ...e, 
                _benefitValue: calcTotal, 
                _dailyTotal: dailyTotal, 
                _cardDetails: cardDetails, 
                _parsedCards: parsedCards,
                _empAbsences: empAbsences, 
                _empBusinessDays: empBusinessDays,
                _isPaid: isPaid,
                _isPartial: isPartial,
                _paidAmount: paidAmount,
                _remainingAmount: remainingAmount,
                _paymentDetails: monthPaymentInfo,
                _vacData: vacData
              };
            });
          } else if (activeSubTab === 'health') {
            currentList = filteredEmps.filter(e => e.healthInsurance === 'Sim').map(e => {
              const vacData = getVacationData(e, filterYear, filterMonth);
              let val = (Number(e.healthInsuranceValue) || 0) + (e.hasDependents === 'Sim' ? (Number(e.dependentsValue) || 0) : 0);
              if (vacData.isFullMonthVacation) val = 0;
              totalValue += val;
              return { ...e, _benefitValue: val, _details: e.hasDependents === 'Sim' ? `${e.dependentsCount || 0} dependente(s)` : 'Sem dependentes', _vacData: vacData };
            });
          } else if (activeSubTab === 'fuel') {
            currentList = filteredEmps.filter(e => e.fuelAllowance === 'Sim').map(e => {
              const vacData = getVacationData(e, filterYear, filterMonth);
              let empBusinessDays = monthData.baseMonToFri;
              if (e.saturdayShift === 'Todos os sábados') empBusinessDays += monthData.allSats;
              else if (e.saturdayShift === 'Sábados alternados') {
                  if (e.saturdayShiftTeam?.includes('Escala 1')) empBusinessDays += monthData.escala1Sats;
                  else if (e.saturdayShiftTeam?.includes('Escala 2')) empBusinessDays += monthData.escala2Sats;
              }

              if (vacData.isFullMonthVacation) empBusinessDays = 0;
              else if (vacData.isPartialVacation) empBusinessDays -= vacData.vacDiscount;

              let dailyTotal = Number(e.fuelAllowanceValue) || 0;
              const empAbsences = Number(localFuelAbsences[e.id]) || 0;
              const payableDays = Math.max(0, empBusinessDays - empAbsences);
              
              const monthPaymentInfo = e.fuelPayments?.[monthKey];
              let calcTotal = 0;

              if (monthPaymentInfo && monthPaymentInfo.lockedTotal !== undefined) {
                 calcTotal = monthPaymentInfo.lockedTotal;
                 dailyTotal = monthPaymentInfo.lockedDailyTotal;
                 empBusinessDays = monthPaymentInfo.lockedBusinessDays || empBusinessDays;
              } else {
                 calcTotal = dailyTotal * payableDays;
              }

              totalValue += calcTotal;
              const isPaid = monthPaymentInfo?.status === 'Pago';

              return { 
                ...e, 
                _benefitValue: calcTotal, 
                _dailyTotal: dailyTotal, 
                _empAbsences: empAbsences, 
                _empBusinessDays: empBusinessDays,
                _isPaid: isPaid,
                _paymentDetails: monthPaymentInfo,
                _vacData: vacData
              };
            });
          } else if (activeSubTab === 'food') {
            currentList = filteredEmps.filter(e => e.foodVoucher === 'Sim').map(e => {
              const vacData = getVacationData(e, filterYear, filterMonth);
              let empBusinessDays = monthData.baseMonToFri;
              if (e.saturdayShift === 'Todos os sábados') empBusinessDays += monthData.allSats;
              else if (e.saturdayShift === 'Sábados alternados') {
                  if (e.saturdayShiftTeam?.includes('Escala 1')) empBusinessDays += monthData.escala1Sats;
                  else if (e.saturdayShiftTeam?.includes('Escala 2')) empBusinessDays += monthData.escala2Sats;
              }

              if (vacData.isFullMonthVacation) empBusinessDays = 0;
              else if (vacData.isPartialVacation) empBusinessDays -= vacData.vacDiscount;

              let dailyTotal = Number(e.foodVoucherValue) || 0;
              const empAbsences = Number(localFoodAbsences[e.id]) || 0;
              const payableDays = Math.max(0, empBusinessDays - empAbsences);
              
              const empRewardEnabled = localFoodRewardEnabled[e.id] || false;
              const empRewardValue = Number(localFoodRewardValue[e.id]) || 0;
              let rewardTotal = empRewardEnabled ? empRewardValue : 0;
              let vaTotal = dailyTotal * payableDays;

              const monthPaymentInfo = e.foodPayments?.[monthKey];
              let calcTotal = 0;

              if (monthPaymentInfo && monthPaymentInfo.lockedTotal !== undefined) {
                 calcTotal = monthPaymentInfo.lockedTotal;
                 dailyTotal = monthPaymentInfo.lockedDailyTotal;
                 empBusinessDays = monthPaymentInfo.lockedBusinessDays || empBusinessDays;
                 vaTotal = monthPaymentInfo.lockedVaTotal !== undefined ? monthPaymentInfo.lockedVaTotal : calcTotal;
                 rewardTotal = monthPaymentInfo.lockedRewardTotal !== undefined ? monthPaymentInfo.lockedRewardTotal : 0;
              } else {
                 calcTotal = vaTotal + rewardTotal;
              }

              totalValue += calcTotal;
              const isPaid = monthPaymentInfo?.status === 'Pago';

              return { 
                ...e, 
                _benefitValue: calcTotal, 
                _vaTotal: vaTotal,
                _rewardTotal: rewardTotal,
                _dailyTotal: dailyTotal, 
                _empAbsences: empAbsences, 
                _empBusinessDays: empBusinessDays,
                _isPaid: isPaid,
                _paymentDetails: monthPaymentInfo,
                _vacData: vacData
              };
            });
          }

          if (filterStatus) {
            currentList = currentList.filter(e => {
                const status = e._isPaid ? 'Pago' : (e._isPartial ? 'Parcial' : 'Pendente');
                return status === filterStatus;
            });
          }

          // ====== CÁLCULO DE TOTAIS POR MÉTODO DE PAGAMENTO ======
          let paymentMethodTotals = {};
          if (activeSubTab === 'transport') {
             currentList.forEach(emp => {
                if (emp._paymentDetails && emp._paymentDetails.details) {
                   emp._paymentDetails.details.forEach(payment => {
                      const method = payment.method || 'Outro';
                      const amount = Number(payment.amount) || 0;
                      if (!paymentMethodTotals[method]) {
                         paymentMethodTotals[method] = 0;
                      }
                      paymentMethodTotals[method] += amount;
                   });
                }
             });
          }

          // Salvar Faltas de VT, Combustível e Alimentação
          const handleAbsenceBlur = async (empId, empName) => {
            if (!canWrite || !db) return;
            const val = Number(localAbsences[empId]) || 0;
            const origVal = Number(originalAbsences[empId]) || 0;
            if (val === origVal) return;

            try {
              const docRef = doc(db, `${basePath}/employees/${empId}`);
