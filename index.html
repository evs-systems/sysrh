                      label="Valor (R$)" type="text" theme={theme} required 
                      value={editFormData.amount ? new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2 }).format(editFormData.amount) : ''} 
                      onChange={e => {
                        let val = e.target.value.replace(/\D/g, '');
                        if (!val) return setEditFormData({...editFormData, amount: ''});
                        setEditFormData({...editFormData, amount: (Number(val) / 100).toFixed(2)});
                      }} 
                    />
                    <Select 
                      label="Conta Empresa?" theme={theme} required value={editFormData.mandatoryCompanyAccount} 
                      onChange={e => setEditFormData({...editFormData, mandatoryCompanyAccount: e.target.value})}
                      options={[ {value: 'Sim', label: 'Sim'}, {value: 'Não', label: 'Não'} ]} 
                    />
                    <Select 
                      label="Recorrente?" theme={theme} required value={editFormData.isRecurring} 
                      onChange={e => setEditFormData({...editFormData, isRecurring: e.target.value})}
                      options={[ {value: 'Não', label: 'Não'}, {value: 'Sim', label: 'Sim'} ]} 
                    />
                  </div>

                  {editFormData.category !== 'employee' && editFormData.type === 'Pagamento' && (
                    <div className="space-y-4 p-4 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50/50 dark:bg-slate-800/30 animate-in fade-in slide-in-from-top-2">
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <Input label="Banco" theme={theme} value={editFormData.bankName} onChange={e => setEditFormData({...editFormData, bankName: e.target.value})} />
                        <Input label="Agência" theme={theme} value={editFormData.agency} onChange={e => setEditFormData({...editFormData, agency: e.target.value.replace(/\D/g, '')})} />
                        <Input label="Conta" theme={theme} value={editFormData.account} onChange={e => setEditFormData({...editFormData, account: e.target.value.replace(/\D/g, '')})} />
                      </div>
                      <div className="grid grid-cols-1 gap-4">
                        <Input label="Chave Pix" theme={theme} value={editFormData.pixKey} onChange={e => setEditFormData({...editFormData, pixKey: e.target.value})} />
                      </div>
                    </div>
                  )}

                  <Input label="Descrição / Referência" theme={theme} value={editFormData.description} onChange={e => setEditFormData({...editFormData, description: e.target.value})} />
                  
                  <div className="pt-6 flex justify-end gap-3 border-t border-slate-200 dark:border-slate-700">
                    <Button variant="ghost" theme={theme} type="button" onClick={() => setIsEditModalOpen(false)}>Cancelar</Button>
                    <Button variant="primary" theme={theme} type="submit">Salvar Alterações</Button>
                  </div>
                </form>
              </Modal>

              <Modal isOpen={payModalOpen} onClose={() => setPayModalOpen(false)} title="Finalizar Pagamento">
                {paymentToProcess && (
                  <form onSubmit={confirmPayment} className="space-y-6">
                    
                    {(!paymentToProcess.mandatoryCompanyAccount || paymentToProcess.mandatoryCompanyAccount === 'Sim') && (
                      <div className="p-4 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/50 rounded-xl flex items-center gap-3 text-amber-800 dark:text-amber-400 animate-in slide-in-from-top-2">
                        <AlertTriangle size={24} className="flex-shrink-0" />
                        <p className="text-sm font-medium">Atenção: Este pagamento exige uso <strong>obrigatório</strong> da conta bancária da empresa {activeEmployeeToPay ? `(${activeEmployeeToPay.company})` : ''}.</p>
                      </div>
                    )}

                    <div className="p-4 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800/50 rounded-2xl flex flex-col items-center text-center">
                      <span className="text-sm font-medium text-emerald-800 dark:text-emerald-400">Valor a Liberar</span>
                      <span className="text-3xl font-black text-emerald-600 dark:text-emerald-400 my-1">{formatCurrency(paymentToProcess.amount)}</span>
                      <span className="text-sm text-emerald-700 dark:text-emerald-500">
                        {paymentToProcess.category !== 'employee' ? paymentToProcess.payeeName : (activeEmployeeToPay?.name || 'Funcionário Deletado')} • {paymentToProcess.type}
                      </span>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl">
                        <span className="block text-xs font-bold text-slate-500 uppercase mb-2">Origem (Sua Empresa)</span>
                        <div className="font-medium text-slate-800 dark:text-slate-200">{paymentToProcess?.category !== 'employee' ? (paymentToProcess.company || 'Livre') : (activeEmployeeToPay?.company || 'Livre')}</div>
                        <div className="text-xs text-slate-500">{paymentToProcess?.category !== 'employee' ? '-' : (activeEmployeeToPay?.cnpj || '-')}</div>
                      </div>
                      <div className="p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl">
                        <span className="block text-xs font-bold text-slate-500 uppercase mb-2">Destino ({paymentToProcess.category !== 'employee' ? 'Beneficiário' : 'Conta do Funcionário'})</span>
                        {paymentToProcess.category !== 'employee' ? (
                          <>
                            {paymentToProcess.type === 'Pagamento' ? (
                              <div className="text-sm space-y-2">
                                {(paymentToProcess.bankName || paymentToProcess.agency || paymentToProcess.account) && (
                                  <div>
                                    <div><span className="text-xs text-slate-500">Banco: </span><span className="font-medium text-slate-800 dark:text-slate-200">{paymentToProcess.bankName || '-'}</span></div>
                                    <div><span className="text-xs text-slate-500">Ag: </span><span className="font-medium text-slate-800 dark:text-slate-200">{paymentToProcess.agency || '-'}</span> <span className="text-xs text-slate-500 ml-2">Cc: </span><span className="font-medium text-slate-800 dark:text-slate-200">{paymentToProcess.account || '-'}</span></div>
                                  </div>
                                )}
                                {paymentToProcess.pixKey && (
                                  <div>
                                    <span className="text-xs text-slate-500">Chave Pix: </span>
                                    <span className="font-medium text-slate-800 dark:text-slate-200">{paymentToProcess.pixKey}</span>
                                  </div>
                                )}
                                {!paymentToProcess.bankName && !paymentToProcess.pixKey && (
                                    <div className="text-sm text-slate-500 italic">Nenhum dado bancário informado</div>
                                )}
                              </div>
                            ) : (
                              <div className="text-sm text-slate-500 italic">Dados de pagamento na fatura/boleto</div>
                            )}
                          </>
                        ) : (
                          <>
                            {activeEmployeeToPay?.pixKey ? (
                              <div className="mb-1">
                                <span className="text-xs text-slate-500">Pix ({activeEmployeeToPay.pixType}): </span>
                                <span className="font-medium text-slate-800 dark:text-slate-200">{activeEmployeeToPay.pixKey}</span>
                              </div>
                            ) : null}
                            {(activeEmployeeToPay?.bankName || activeEmployeeToPay?.agency || activeEmployeeToPay?.account) ? (
                              <div className="text-sm">
                                <div><span className="text-xs text-slate-500">Banco: </span><span className="font-medium text-slate-800 dark:text-slate-200">{activeEmployeeToPay.bankName || '-'}</span></div>
                                <div><span className="text-xs text-slate-500">Ag: </span><span className="font-medium text-slate-800 dark:text-slate-200">{activeEmployeeToPay.agency || '-'}</span> <span className="text-xs text-slate-500 ml-2">Cc: </span><span className="font-medium text-slate-800 dark:text-slate-200">{activeEmployeeToPay.account || '-'}</span></div>
                              </div>
                            ) : (!activeEmployeeToPay?.pixKey && <div className="text-sm text-slate-500 italic">Dados bancários não preenchidos</div>)}
                          </>
                        )}
                      </div>
                    </div>

                    <div className="space-y-4">
                      <Input 
                        label="Banco Utilizado para o Pagamento" 
                        placeholder="Ex: Itaú, Bradesco, Nubank..." 
                        theme={theme} 
                        required 
                        value={payData.bank} 
                        onChange={e => setPayData({...payData, bank: e.target.value})} 
                      />
                      
                      <div className="flex flex-col gap-1">
                        <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Anexar Comprovante do Banco (Imagem/PDF)</label>
                        <div className={`relative flex items-center justify-center w-full p-6 border-2 border-dashed rounded-2xl transition-colors ${payData.fileName ? 'border-emerald-500 bg-emerald-50/50 dark:bg-emerald-900/10' : 'border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800/50'}`}>
                          <input 
                            type="file" 
                            accept="image/*,application/pdf"
                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                            onChange={handleFileUpload}
                          />
                          <div className="text-center flex flex-col items-center pointer-events-none">
                            {payData.fileName ? (
                              <>
                                <FileCheck size={32} className="text-emerald-500 mb-2" />
                                <span className="text-sm font-medium text-emerald-700 dark:text-emerald-400">{payData.fileName}</span>
                                <span className="text-xs text-emerald-600 dark:text-emerald-500 mt-1">Clique para trocar de arquivo</span>
                              </>
                            ) : (
                              <>
                                <FileText size={32} className="text-slate-400 mb-2" />
                                <span className="text-sm font-medium text-slate-600 dark:text-slate-300">Clique ou arraste o arquivo aqui</span>
                                <span className="text-xs text-slate-500 mt-1">Arquivos suportados: PNG, JPG, PDF (Máx 5MB)</span>
                              </>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                    
                    <div className="pt-4 flex justify-end gap-3 border-t border-slate-200 dark:border-slate-700">
                      <Button variant="ghost" theme={theme} type="button" onClick={() => setPayModalOpen(false)}>Cancelar</Button>
                      <Button variant="primary" theme={theme} type="submit" icon={CheckCircle}>Confirmar Pagamento Realizado</Button>
                    </div>
                  </form>
                )}
              </Modal>
            </div>
          );
        }

        function RequestsView({ theme, basePath, appUser, employees, requests, showToast, logAction, requestConfirm }) {
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isProcessing, setIsProcessing] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [activeSubTab, setActiveSubTab] = useState('ativas');
          const [formData, setFormData] = useState({ employeeId: '', type: 'Adiantamento', status: 'A fazer', date: '', description: '' });

          const canWrite = appUser?.permissions?.requests?.write;
          const canDelete = appUser?.permissions?.requests?.delete;

          const STATUS_COLORS = {
            'A fazer': 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300 border-slate-200 dark:border-slate-700',
            'Em andamento': 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400 border-blue-200 dark:border-blue-800',
            'Aguardando Autorização': 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-400 border-amber-200 dark:border-amber-800',
            'Finalizado': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400 border-emerald-200 dark:border-emerald-800'
          };

          const parseDate = (d) => {
            if (!d) return 0;
            if (d.includes('/')) {
              const [day, month, year] = d.split('/');
              return new Date(`${year}-${month}-${day}T00:00:00`).getTime();
            }
            return new Date(`${d}T00:00:00`).getTime();
          };

          const openModal = (disc = null) => {
            if (!canWrite) return;
            if (disc) {
              setEditingId(disc.id);
              setFormData({
                employeeId: disc.employeeId || '',
                type: disc.type || 'Adiantamento',
                status: disc.status || 'A fazer',
                date: disc.date || '',
                description: disc.description || ''
              });
            } else {
              setEditingId(null);
              setFormData({ employeeId: '', type: 'Adiantamento', status: 'A fazer', date: '', description: '' });
            }
            setIsModalOpen(true);
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite || isProcessing) return;
            setIsProcessing(true);
            const emp = employees.find(e => e.id === formData.employeeId);
            try {
              if (editingId) {
                await updateDoc(doc(db, `${basePath}/requests/${editingId}`), formData);
                logAction('Atualização', 'Solicitações', `Atualizou a solicitação de ${formData.type} para ${emp?.name || 'Desconhecido'}`);
                showToast('Solicitação atualizada!');
              } else {
                await addDoc(collection(db, `${basePath}/requests`), formData);
                logAction('Cadastro', 'Solicitações', `Registrou solicitação de ${formData.type} para ${emp?.name || 'Desconhecido'}`);
                showToast('Solicitação registrada!');
              }
              setIsModalOpen(false);
            } catch (err) {
              showToast('Erro ao salvar.', 'error');
            } finally {
              setIsProcessing(false);
            }
          };

          const handleDelete = (id, type) => {
            if (!canDelete) return;
            requestConfirm(`Tem certeza que deseja excluir esta solicitação (${type})?`, async () => {
              try {
                await deleteDoc(doc(db, `${basePath}/requests/${id}`));
                logAction('Exclusão', 'Solicitações', `Removeu a solicitação: ${type}`);
                showToast('Solicitação removida.');
              } catch (err) {
                showToast('Erro ao remover solicitação.', 'error');
              }
            });
          };

          const activeRequests = requests.filter(d => d.status !== 'Finalizado');
          const finishedRequests = requests.filter(d => d.status === 'Finalizado');
          const currentList = activeSubTab === 'ativas' ? activeRequests : finishedRequests;

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Solicitações</h2>
                  <p className="text-slate-500 mt-1">Registro e acompanhamento de solicitações dos colaboradores.</p>
                </div>
                {canWrite && <Button theme={theme} icon={Plus} onClick={() => openModal()}>Nova Solicitação</Button>}
              </div>

              <div className="flex gap-2 p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl w-fit max-w-full mb-6 overflow-x-auto custom-scrollbar">
                <button onClick={() => setActiveSubTab('ativas')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'ativas' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Em Andamento <span className="ml-1 opacity-60">({activeRequests.length})</span></button>
                <button onClick={() => setActiveSubTab('finalizadas')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'finalizadas' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Finalizados <span className="ml-1 opacity-60">({finishedRequests.length})</span></button>
              </div>

              <Card className="overflow-hidden">
                <div className="overflow-x-auto custom-scrollbar">
                  <table className="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                      <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                        <th className="p-4 font-medium">Data</th>
                        <th className="p-4 font-medium">Funcionário</th>
                        <th className="p-4 font-medium">Tipo</th>
                        <th className="p-4 font-medium">Status</th>
                        <th className="p-4 font-medium w-1/3">Motivo / Descrição</th>
                        {(canWrite || canDelete) && <th className="p-4 font-medium text-right">Ações</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {currentList.sort((a,b) => parseDate(b.date) - parseDate(a.date)).map(disc => {
                        const emp = employees.find(e => e.id === disc.employeeId);
                        const isHighlight = disc.type === 'Desligamento' || disc.type === 'Adiantamento';
                        const isFinished = disc.status === 'Finalizado';
                        
                        return (
                          <tr key={disc.id} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
                            <td className="p-4 text-sm whitespace-nowrap">{formatDate(disc.date)}</td>
                            <td className="p-4 font-medium">{emp?.name || 'Deletado'}</td>
                            <td className="p-4">
                              <span className={`px-3 py-1 rounded-full text-xs font-medium border whitespace-nowrap ${isHighlight ? 'bg-amber-50 text-amber-600 border-amber-200 dark:bg-amber-900/20 dark:border-amber-800' : 'bg-blue-50 text-blue-600 border-blue-200 dark:bg-blue-900/20 dark:border-blue-800'}`}>
                                {disc.type}
                              </span>
                            </td>
                            <td className="p-4">
                              <span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase border whitespace-nowrap ${STATUS_COLORS[disc.status || 'A fazer']}`}>
                                {disc.status || 'A fazer'}
                              </span>
                            </td>
                            <td className="p-4 text-sm text-slate-600 dark:text-slate-300 max-w-[300px] truncate" title={disc.description}>{disc.description}</td>
                            {(canWrite || canDelete) && (
                              <td className="p-4 text-right space-x-2 whitespace-nowrap">
                                {canWrite && !isFinished && (
                                  <button onClick={() => openModal(disc)} className="p-2 rounded-lg text-slate-500 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors" title="Editar Solicitação">
                                    <Edit2 size={18} />
                                  </button>
                                )}
                                {canDelete && (
                                  <button onClick={() => handleDelete(disc.id, disc.type)} className="p-2 rounded-lg text-slate-500 hover:text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-colors" title="Excluir Solicitação">
                                    <Trash2 size={18} />
                                  </button>
                                )}
                              </td>
                            )}
                          </tr>
                        );
                      })}
                      {currentList.length === 0 && <tr><td colSpan={(canWrite || canDelete) ? "6" : "5"} className="p-8 text-center text-slate-500">Nenhuma solicitação encontrada nesta aba.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </Card>

              <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={editingId ? 'Editar Solicitação' : 'Registrar Solicitação'}>
                <form onSubmit={handleSave} className="space-y-4">
                  <Select 
                    label="Funcionário" theme={theme} required search value={formData.employeeId} 
                    onChange={e => setFormData({...formData, employeeId: e.target.value})}
                    options={[...employees].sort((a,b) => (a.name||'').localeCompare(b.name||'')).map(e => ({ value: e.id, label: e.name }))} 
                  />
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <Select 
                      label="Tipo" theme={theme} required value={formData.type} 
                      onChange={e => setFormData({...formData, type: e.target.value})}
                      options={[ 
                        {value: 'Adiantamento', label: 'Adiantamento'}, 
                        {value: 'Desligamento', label: 'Desligamento'}, 
                        {value: 'Convenio Médico', label: 'Convenio Médico'}, 
                        {value: 'Vale Combustível', label: 'Vale Combustível'}, 
                        {value: 'Vale Transporte', label: 'Vale Transporte'}, 
                        {value: 'Outra', label: 'Outra'} 
                      ]} 
                    />
                    <Select 
                      label="Status" theme={theme} required value={formData.status} 
                      onChange={e => setFormData({...formData, status: e.target.value})}
                      options={[ 
                        {value: 'A fazer', label: 'A fazer'}, 
                        {value: 'Em andamento', label: 'Em andamento'}, 
                        {value: 'Aguardando Autorização', label: 'Aguardando Autorização'}, 
                        {value: 'Finalizado', label: 'Finalizado'} 
                      ]} 
                    />
                    <Input 
                      label="Data" type="text" placeholder="DD/MM/AAAA" theme={theme} required 
                      value={formData.date} 
                      onChange={e => {
                        let val = e.target.value.replace(/\D/g, ''); 
                        if (val.length > 8) val = val.slice(0, 8);
                        let formattedDate = val;
                        if (val.length > 4) formattedDate = `${val.slice(0, 2)}/${val.slice(2, 4)}/${val.slice(4)}`;
                        else if (val.length > 2) formattedDate = `${val.slice(0, 2)}/${val.slice(2)}`;
                        setFormData({...formData, date: formattedDate});
                      }} 
                    />
                  </div>
                  <div className="flex flex-col gap-1">
                    <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Descrição / Detalhes</label>
                    <textarea 
                      required
                      rows="3"
                      className={`w-full px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none transition-all ${theme.ring} focus:ring-2 focus:border-transparent text-slate-900 dark:text-white backdrop-blur-sm`}
                      value={formData.description}
                      onChange={e => setFormData({...formData, description: e.target.value})}
                    />
                  </div>
                  
                  <div className="pt-6 flex justify-end gap-3 border-t border-slate-200 dark:border-slate-700">
                    <Button variant="ghost" theme={theme} type="button" onClick={() => setIsModalOpen(false)} disabled={isProcessing}>Cancelar</Button>
                    <Button variant="primary" theme={theme} type="submit" loading={isProcessing}>{editingId ? 'Atualizar' : 'Salvar'}</Button>
                  </div>
                </form>
              </Modal>
            </div>
          );
        }

        function OccurrencesView({ theme, basePath, appUser, employees, occurrences, showToast, logAction, requestConfirm }) {
          const [activeSubTab, setActiveSubTab] = useState('registros');
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isProcessing, setIsProcessing] = useState(false);
          
          const currentMonthStr = String(new Date().getMonth() + 1).padStart(2, '0');
          const currentYearStr = String(new Date().getFullYear());

          const [tab1FilterMonth, setTab1FilterMonth] = useState(currentMonthStr);
          const [tab1FilterYear, setTab1FilterYear] = useState(currentYearStr);

          const [tab2FilterMonth, setTab2FilterMonth] = useState(currentMonthStr);
          const [tab2FilterYear, setTab2FilterYear] = useState(currentYearStr);
          const [tab2SearchName, setTab2SearchName] = useState('');
          const [tab2Sector, setTab2Sector] = useState('all');
          const [tab2Penalty, setTab2Penalty] = useState('all');
          const [tab2Reason, setTab2Reason] = useState('all');
          
          const defaultDate = new Date().toISOString().split('T')[0].split('-').reverse().join('/');
          const [formData, setFormData] = useState({ date: defaultDate, employeeId: '', reason: 'Falta', type: '', reference: '' });

          const handleDateChange = (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 2) v = v.substring(0,2) + '/' + v.substring(2);
            if (v.length > 5) v = v.substring(0,5) + '/' + v.substring(5,9);
            setFormData({...formData, date: v});
          };

          const parseDt = (dt) => {
             if(!dt) return 0;
             if(dt.includes('/')) {
                const parts = dt.split('/');
                return new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00`).getTime();
             }
             return new Date(`${dt}T00:00:00`).getTime();
          };

          const renderDate = (d) => {
             if(!d) return '';
             if(d.includes('-')) return d.split('-').reverse().join('/');
             return d;
          };

          const canWrite = appUser?.permissions?.occurrences?.write ?? (appUser?.sector === 'Administração');
          const canDelete = appUser?.permissions?.occurrences?.delete ?? (appUser?.sector === 'Administração');

          const PUNITIVE_TYPES = [
            'Verbal',
            '1ª Escrita',
            '2ª Escrita',
            '3ª Escrita',
            '1ª Suspensão',
            '2ª Suspensão',
            '3ª Suspensão'
          ];
          const REASONS = ['Falta', 'Atraso', 'Atraso/Falta'];

          const activeEmployees = employees.filter(e => e.status !== 'Desligado' && e.employeeType !== 'Freelancer');
          const SECTORS = [...new Set(activeEmployees.map(e => e.workSector).filter(Boolean))];

          const getEmployeeMaxWarningIndex = (empId) => {
            if (!empId) return -1;
            const empOccurrences = occurrences.filter(o => o.employeeId === empId);
            let maxIndex = -1;
            empOccurrences.forEach(o => {
              const idx = PUNITIVE_TYPES.indexOf(o.type);
              if (idx > maxIndex) maxIndex = idx;
            });
            return maxIndex;
          };

          const getTypeOptionsSafe = (empId) => {
            if (!empId) return [];
            const maxIdx = getEmployeeMaxWarningIndex(empId);
            return PUNITIVE_TYPES.map((type, idx) => {
              let dis = false;
              if (maxIdx === PUNITIVE_TYPES.length - 1) {
                dis = idx < maxIdx; 
              } else {
                dis = idx <= maxIdx; 
              }
              return { value: type, label: type, disabled: dis };
            });
          };

          const lastWarningStr = (empId) => {
            const maxIdx = getEmployeeMaxWarningIndex(empId);
            if (maxIdx === -1) return "Nenhuma infração registrada no sistema.";
            const empOccurrences = occurrences.filter(o => o.employeeId === empId).sort((a,b) => parseDt(b.date) - parseDt(a.date));
            const lastOcc = empOccurrences[0];
            if (!lastOcc) return "Nenhuma infração registrada no sistema.";
            return `Última Infração: ${lastOcc.type} (${lastOcc.reason}) em ${renderDate(lastOcc.date)}.`;
          };

          const handleEmployeeChange = (e) => {
            const empId = e.target.value;
            const maxIdx = getEmployeeMaxWarningIndex(empId);
            let nextType = '';
            if (maxIdx < PUNITIVE_TYPES.length - 1) {
              nextType = PUNITIVE_TYPES[maxIdx + 1];
            } else {
              nextType = PUNITIVE_TYPES[maxIdx];
            }
            setFormData(prev => ({ ...prev, employeeId: empId, type: nextType }));
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite || isProcessing) return;
            if (!formData.employeeId || !formData.type) {
                showToast('Selecione o colaborador e um tipo de penalidade válido.', 'error');
                return;
            }
            setIsProcessing(true);
            try {
              let empData = activeEmployees.find(e => e.id === formData.employeeId);
              await addDoc(collection(db, `${basePath}/occurrences`), {
                ...formData,
                employeeName: empData?.name || 'Desconhecido',
                timestamp: new Date().toISOString()
              });
              showToast('Ocorrência registrada com sucesso!', 'success');
              logAction('Cadastro', 'Ocorrências', `Registrou ${formData.type} para ${empData?.name}`);
              setFormData({ date: defaultDate, employeeId: '', reason: 'Falta', type: '', reference: '' });
              setIsModalOpen(false);
            } catch (err) {
              showToast('Erro ao salvar ocorrência.', 'error');
            } finally {
              setIsProcessing(false);
            }
          };

          const handleDelete = (id, typeName, empName) => {
            if (!canDelete) return;
            requestConfirm(`Tem certeza que deseja excluir a ocorrência: ${typeName} de ${empName}?`, async (reasonValue) => {
              try {
                await deleteDoc(doc(db, `${basePath}/occurrences/${id}`));
                showToast('Ocorrência removida.', 'success');
                logAction('Exclusão', 'Ocorrências', `Removeu ocorrência de ${empName}. Motivo: ${reasonValue}`);
              } catch (e) {
                showToast('Erro ao remover.', 'error');
              }
            }, 'Excluir', 'danger', true);
          };

          const monthOptions = [
            { value: 'all', label: 'Todos os Meses' },
            { value: '01', label: 'Janeiro' }, { value: '02', label: 'Fevereiro' },
            { value: '03', label: 'Março' }, { value: '04', label: 'Abril' },
            { value: '05', label: 'Maio' }, { value: '06', label: 'Junho' },
            { value: '07', label: 'Julho' }, { value: '08', label: 'Agosto' },
            { value: '09', label: 'Setembro' }, { value: '10', label: 'Outubro' },
            { value: '11', label: 'Novembro' }, { value: '12', label: 'Dezembro' }
          ];
          
          const yearOptions = [
            { value: 'all', label: 'Todos os Anos' },
            { value: currentYearStr, label: currentYearStr },
            ...[...new Set(occurrences.map(o => o.date?.substring(0, 4) || ''))].filter(Boolean).filter(y => y !== currentYearStr).sort().reverse().map(y => ({ value: y, label: y }))
          ];

          const tab1Filtered = occurrences.filter(o => {
            if (!o.date) return false;
            const parts = o.date.includes('/') ? o.date.split('/') : o.date.split('-');
            const y = parts.length === 3 ? (o.date.includes('/') ? parts[2] : parts[0]) : '';
            const m = parts.length === 3 ? (o.date.includes('/') ? parts[1] : parts[1]) : '';
            const matchMonth = tab1FilterMonth === 'all' || m === tab1FilterMonth;
            const matchYear = tab1FilterYear === 'all' || y === tab1FilterYear;
            return matchMonth && matchYear;
          }).sort((a,b) => parseDt(b.date) - parseDt(a.date));

          const tab2Filtered = occurrences.filter(o => {
            if (!o.date) return false;
            const parts = o.date.includes('/') ? o.date.split('/') : o.date.split('-');
            const y = parts.length === 3 ? (o.date.includes('/') ? parts[2] : parts[0]) : '';
            const m = parts.length === 3 ? (o.date.includes('/') ? parts[1] : parts[1]) : '';
            
            const matchMonth = tab2FilterMonth === 'all' || m === tab2FilterMonth;
            const matchYear = tab2FilterYear === 'all' || y === tab2FilterYear;
            
            const empObj = employees.find(e => e.id === o.employeeId);
            const empSector = empObj ? empObj.workSector : '';
            const empNameVal = o.employeeName || (empObj ? empObj.name : '');
            
            const matchName = tab2SearchName.length === 0 || empNameVal.toLowerCase().includes(tab2SearchName.toLowerCase());
            const matchPenalty = tab2Penalty === 'all' || o.type === tab2Penalty;
            const matchReason = tab2Reason === 'all' || o.reason === tab2Reason;
            const matchSector = tab2Sector === 'all' || empSector === tab2Sector;

            return matchMonth && matchYear && matchName && matchPenalty && matchReason && matchSector;
          }).sort((a, b) => parseDt(b.date) - parseDt(a.date));

          const reportSummary = Object.values(tab2Filtered.reduce((acc, curr) => {
             const empObj = employees.find(e => e.id === curr.employeeId);
             const resolvedName = curr.employeeName || (empObj ? empObj.name : 'Desconhecido');
             if (!acc[curr.employeeId]) acc[curr.employeeId] = { id: curr.employeeId, name: resolvedName, count: 0, occurrences: [] };
             acc[curr.employeeId].count += 1;
             acc[curr.employeeId].occurrences.push(curr);
             return acc;
          }, {})).sort((a,b) => b.count - a.count);

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                <div>
                  <h2 className="text-3xl font-bold tracking-tight">Ocorrências</h2>
                  <p className="text-slate-500 mt-1">Registro e controle de advertências e suspensões</p>
                </div>
                {canWrite && <Button theme={theme} icon={Plus} onClick={() => setIsModalOpen(true)}>Novo Registro</Button>}
              </div>

              <div className="flex gap-2 p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl w-fit max-w-full mb-6 overflow-x-auto custom-scrollbar">
                <button onClick={() => setActiveSubTab('registros')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'registros' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Registros</button>
                <button onClick={() => setActiveSubTab('relatorio')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeSubTab === 'relatorio' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Relatório Mensal</button>
              </div>

              {activeSubTab === 'registros' && (
                <div className="space-y-6">
                  <div className="flex flex-wrap gap-4 mb-4 p-1">
                    <div className="w-48 relative focus-within:z-10">
                      <Select theme={theme} value={tab1FilterMonth} onChange={e => setTab1FilterMonth(e.target.value)} options={monthOptions} label="Filtrar por Mês" />
                    </div>
                    <div className="w-48 relative focus-within:z-10">
                      <Select theme={theme} value={tab1FilterYear} onChange={e => setTab1FilterYear(e.target.value)} options={yearOptions} label="Filtrar por Ano" />
                    </div>
                  </div>
                  
                  <Card className="overflow-hidden">
                    <div className="overflow-x-auto custom-scrollbar">
                      <table className="w-full text-left border-collapse min-w-[800px]">
                        <thead>
                          <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">
                            <th className="p-4 font-medium">Data</th>
                            <th className="p-4 font-medium">Funcionário</th>
                            <th className="p-4 font-medium">Penalidade</th>
                            <th className="p-4 font-medium w-1/3">Motivo</th>
                            {(canWrite || canDelete) && <th className="p-4 font-medium text-right">Ações</th>}
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                          {tab1Filtered.map(occ => {
                            const empObj = employees.find(e => e.id === occ.employeeId);
                            const sectorTag = empObj ? empObj.workSector : '';
                            return (
                              <tr key={occ.id} className="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                                <td className="p-4 text-sm font-medium">{renderDate(occ.date)}</td>
                                <td className="p-4 text-sm font-medium">
                                  {occ.employeeName || (empObj ? empObj.name : '')}
                                  {sectorTag && <span className="ml-2 px-2 py-0.5 bg-slate-100 dark:bg-slate-700 text-xs rounded-md text-slate-500">{sectorTag}</span>}
                                </td>
                                <td className="p-4">
                                  <span className={`px-3 py-1 rounded-full text-xs font-semibold bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400 border border-rose-200 dark:border-rose-800`}>
                                    {occ.type}
                                  </span>
                                </td>
                                <td className="p-4 text-sm text-slate-600 dark:text-slate-300">
                                  {occ.reason}
                                  {occ.reference && <div className="text-[10px] text-slate-400 mt-1 font-medium">Ref: {occ.reference}</div>}
                                </td>
                                {(canWrite || canDelete) && (
                                  <td className="p-4 text-right">
                                    {canDelete && (
                                      <button onClick={() => handleDelete(occ.id, occ.type, occ.employeeName)} className="p-2 rounded-lg text-slate-500 hover:text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-colors" title="Excluir Ocorrência">
                                        <Trash2 size={18} />
                                      </button>
                                    )}
                                  </td>
                                )}
                              </tr>
                            );
                          })}
                          {tab1Filtered.length === 0 && (
                            <tr><td colSpan={(canWrite || canDelete) ? "5" : "4"} className="p-8 text-center text-slate-500">Nenhum registro para as datas selecionadas.</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </Card>
                </div>
              )}

              {activeSubTab === 'relatorio' && (
                <div className="space-y-6">
                  <Card className="p-6 overflow-visible relative z-20 shadow-md">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 xl:grid-cols-6 gap-4">
                      <div className="xl:col-span-2 relative focus-within:z-10">
                         <Input label="Buscar Usuário" type="text" placeholder="Nome do colaborador..." theme={theme} value={tab2SearchName} onChange={e => setTab2SearchName(e.target.value)} />
                      </div>
                      <div className="relative focus-within:z-10">
                        <Select theme={theme} value={tab2FilterMonth} onChange={e => setTab2FilterMonth(e.target.value)} options={monthOptions} label="Mês" />
                      </div>
                      <div className="relative focus-within:z-10">
                        <Select theme={theme} value={tab2FilterYear} onChange={e => setTab2FilterYear(e.target.value)} options={yearOptions} label="Ano" />
                      </div>
                      <div className="relative focus-within:z-10">
                        <Select theme={theme} value={tab2Sector} onChange={e => setTab2Sector(e.target.value)} options={[{value:'all',label:'Todos Setores'}, ...SECTORS.map(s => ({value:s,label:s}))]} label="Setor" />
                      </div>
                      <div className="xl:col-span-2 relative focus-within:z-10">
                        <Select theme={theme} value={tab2Penalty} onChange={e => setTab2Penalty(e.target.value)} options={[{value:'all',label:'Todas'}, ...PUNITIVE_TYPES.map(p => ({value:p,label:p}))]} label="Penalidade" />
                      </div>
                      <div className="xl:col-span-3 relative focus-within:z-10">
                        <Select theme={theme} value={tab2Reason} onChange={e => setTab2Reason(e.target.value)} options={[{value:'all',label:'Todos'}, ...REASONS.map(r => ({value:r,label:r}))]} label="Motivo" />
                      </div>
                    </div>
                  </Card>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 relative w-full mb-6">
                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                      <h3 className="text-slate-500 text-sm font-medium mb-1">Total de Advertências</h3>
                      <p className={`text-3xl font-bold ${theme.text}`}>{tab2Filtered.length}</p>
                    </div>
                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                      <h3 className="text-slate-500 text-sm font-medium mb-1">Colaboradores Penalizados</h3>
                      <p className={`text-3xl font-bold text-amber-500`}>{reportSummary.length}</p>
                    </div>
                  </div>

                  <Card className="p-6 shadow-md min-w-0">
                    <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                       Geral por Colaborador
                    </h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-sm whitespace-nowrap">
                        <thead className="bg-slate-50 dark:bg-slate-800/50 text-slate-500">
                          <tr>
                            <th className="p-4 font-medium rounded-l-lg">Colaborador</th>
                            <th className="p-4 font-medium text-center">Quant. Ocorrências</th>
                            <th className="p-4 font-medium">Histórico Recente</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                           {reportSummary.map(report => (
                             <tr key={report.id} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                               <td className="p-4 font-medium">{report.name}</td>
                               <td className="p-4 text-center">
                                 <span className="bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400 font-bold px-3 py-1 rounded-full">{report.count}</span>
                               </td>
                               <td className="p-4 text-xs text-slate-500">
                                  {report.occurrences.map(o => `${o.type} (${renderDate(o.date)})`).join(', ')}
                               </td>
                             </tr>
                           ))}
                           {reportSummary.length === 0 && (
                             <tr><td colSpan="3" className="p-8 text-center text-slate-500">Nenhum registro encontrado para este período.</td></tr>
                           )}
                        </tbody>
                      </table>
                    </div>
                  </Card>
                </div>
              )}

              <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="Registrar Ocorrência">
                <form onSubmit={handleSave} className="space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <Input label="Data da Aplicação" type="text" placeholder="DD/MM/AAAA" maxLength="10" theme={theme} required value={formData.date} onChange={handleDateChange} />
                    <Select 
                      label="Colaborador" className="z-50" theme={theme} required search 
                      value={formData.employeeId} 
                      onChange={handleEmployeeChange}
                      options={[...activeEmployees].sort((a,b) => (a.name||'').localeCompare(b.name||'')).map(e => ({ value: e.id, label: e.name }))}
                    />
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <Select 
                      label="Penalidade" className="z-40" theme={theme} required 
                      value={formData.type} 
                      onChange={e => setFormData({...formData, type: e.target.value})}
                      options={getTypeOptionsSafe(formData.employeeId)}
                      disabled={!formData.employeeId}
                    />
                    <Select 
                      label="Motivo" className="z-30" theme={theme} required 
                      value={formData.reason} 
                      onChange={e => setFormData({...formData, reason: e.target.value})}
                      options={REASONS.map(r => ({ value: r, label: r }))} 
                    />
                  </div>
                  
                  <Input 
                    label="Referência da Infração (Dias ou ocorrências geradoras)" 
                    theme={theme} required
                    value={formData.reference || ''} 
                    onChange={e => setFormData({...formData, reference: e.target.value})} 
                    placeholder="Ex: Falta injustificada do dia 12/04 / Atrasos dos dias 10 e 11" 
                  />
                  
                  {formData.employeeId && (
                    <div className="bg-slate-50 dark:bg-slate-800/50 p-3 rounded-lg border border-slate-200 dark:border-slate-700 mt-2 flex items-center gap-2">
                       <History size={16} className="text-slate-400 flex-shrink-0" />
                       <p className="text-xs text-slate-500 dark:text-slate-400">{lastWarningStr(formData.employeeId)}</p>
                    </div>
                  )}

                  <div className="pt-4 flex justify-end gap-3 border-t border-slate-200 dark:border-slate-700">
                    <Button variant="ghost" theme={theme} type="button" onClick={() => setIsModalOpen(false)} disabled={isProcessing}>Cancelar</Button>
                    {canWrite && <Button variant="primary" theme={theme} type="submit" loading={isProcessing}>Registrar</Button>}
                  </div>
                </form>
              </Modal>
            </div>
          );
        }

        function SystemUsersView({ theme, basePath, systemUsers, showToast, logAction, firebaseConfig, requestConfirm, appUser }) {
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isProcessing, setIsProcessing] = useState(false);
          const [editingId, setEditingId] = useState(null);

          const canWrite = appUser?.permissions?.systemUsers?.write ?? (appUser?.sector === 'Administração');
          const canDelete = appUser?.permissions?.systemUsers?.delete ?? (appUser?.sector === 'Administração');

          const MODULES = [
            { id: 'calendar', label: 'Agenda' },
            { id: 'reports', label: 'Relatórios' },
            { id: 'vacations', label: 'Férias' },
            { id: 'benefits', label: 'Benefícios' },
            { id: 'companies', label: 'Empresas' },
            { id: 'employees', label: 'Colaboradores' },
            { id: 'payments', label: 'Pagamentos' },
            { id: 'requests', label: 'Solicitações' },
            { id: 'occurrences', label: 'Ocorrências' },
            { id: 'systemUsers', label: 'Usuários' },
            { id: 'logs', label: 'Histórico de Logs' }
          ];

          const DEFAULT_PERMISSIONS = {
            'Administração': { 
              calendar: { read: true, write: true, delete: true },
              reports: { read: true, write: false, delete: false },
              vacations: { read: true, write: true, delete: true },
              benefits: { read: true, write: true, delete: true },
              companies: { read: true, write: true, delete: true },
              employees: { read: true, write: true, delete: true }, 
              payments: { read: true, write: true, delete: true }, 
              requests: { read: true, write: true, delete: true },
              occurrences: { read: true, write: true, delete: true },
              systemUsers: { read: true, write: true, delete: true },
              logs: { read: true, write: false, delete: false }
            },
            'RH': { 
              calendar: { read: true, write: true, delete: false },
              reports: { read: true, write: false, delete: false },
              vacations: { read: true, write: true, delete: false },
              benefits: { read: true, write: true, delete: false },
              companies: { read: true, write: false, delete: false },
              employees: { read: true, write: true, delete: false }, 
              payments: { read: true, write: false, delete: false }, 
              requests: { read: true, write: true, delete: false },
              occurrences: { read: true, write: true, delete: false },
              systemUsers: { read: false, write: false, delete: false },
              logs: { read: false, write: false, delete: false }
            },
            'Financeiro': { 
              calendar: { read: true, write: true, delete: false },
              reports: { read: true, write: false, delete: false },
              vacations: { read: false, write: false, delete: false },
              benefits: { read: true, write: false, delete: false },
              companies: { read: true, write: false, delete: false },
              employees: { read: true, write: false, delete: false }, 
              payments: { read: true, write: true, delete: false }, 
              requests: { read: true, write: false, delete: false },
              occurrences: { read: false, write: false, delete: false },
              systemUsers: { read: false, write: false, delete: false },
              logs: { read: false, write: false, delete: false }
            },
          };

          const emptyForm = {
            name: '', 
            username: '', 
            password: '',
            sector: 'RH',
            permissions: DEFAULT_PERMISSIONS['RH']
          };

          const [formData, setFormData] = useState(emptyForm);

          const openModal = (u = null) => {
            if (!canWrite) return;
            if (u) {
              setEditingId(u.id);
              setFormData(u);
            } else {
              setEditingId(null);
              setFormData(emptyForm);
            }
            setIsModalOpen(true);
          };

          const handleSectorChange = (newSector) => {
            setFormData(prev => ({
              ...prev,
              sector: newSector,
              permissions: DEFAULT_PERMISSIONS[newSector] || prev.permissions
            }));
          };

          const handlePermissionChange = (modId, type) => {
            setFormData(prev => {
              const currentVal = prev.permissions[modId]?.[type] || false;
              const newPerms = { ...prev.permissions };
              newPerms[modId] = { ...(newPerms[modId] || {}), [type]: !currentVal };

              if (type === 'write' && !currentVal) newPerms[modId].read = true;
              if (type === 'delete' && !currentVal) {
                newPerms[modId].read = true;
                newPerms[modId].write = true;
              }
              
              if (type === 'read' && currentVal) {
                newPerms[modId].write = false;
                newPerms[modId].delete = false;
              }
              if (type === 'write' && currentVal) {
                newPerms[modId].delete = false;
              }

              return { ...prev, permissions: newPerms };
            });
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (!canWrite || isProcessing) return;
            setIsProcessing(true);
            try {
              if (editingId) {
                await updateDoc(doc(db, `${basePath}/systemUsers/${editingId}`), formData);
                logAction('Atualização', 'Usuários', `Atualizou os acessos de ${formData.username}`);
                showToast('Usuário atualizado com sucesso!');
              } else {
                const secondaryApp = initializeApp(firebaseConfig, `SecondaryApp_${Date.now()}`);
                const secondaryAuth = getAuth(secondaryApp);
                const email = formData.username.toLowerCase() + '@sysrh.com';
                
                const cred = await createUserWithEmailAndPassword(secondaryAuth, email, formData.password);
                await signOut(secondaryAuth);
                await deleteApp(secondaryApp);
                
                await setDoc(doc(db, `${basePath}/systemUsers/${cred.user.uid}`), {
                  name: formData.name,
                  username: formData.username,
                  sector: formData.sector,
                  permissions: formData.permissions

        function LogsView({ theme, basePath, logs }) {
          const todayDate = new Date();
          
          const [filterType, setFilterType] = useState('dia');
          const [filterDay, setFilterDay] = useState(todayDate.toLocaleDateString('pt-BR'));
          const [filterMonth, setFilterMonth] = useState(String(todayDate.getMonth() + 1).padStart(2, '0'));
          const [filterYear, setFilterYear] = useState(String(todayDate.getFullYear()));
          
          const [filterAction, setFilterAction] = useState('');
          const [searchTerm, setSearchTerm] = useState('');
          const [visibleCount, setVisibleCount] = useState(50);

          // Repõe a contagem visível sempre que o utilizador faz uma nova pesquisa ou altera filtros
          useEffect(() => {
            setVisibleCount(50);
          }, [filterType, filterDay, filterMonth, filterYear, filterAction, searchTerm]);

          const getPartsFromISO = (iso) => {
            if (!iso) return null;
            const d = new Date(iso);
            if (isNaN(d.getTime())) return null;
            return {
              d: String(d.getDate()).padStart(2, '0'),
              m: String(d.getMonth() + 1).padStart(2, '0'),
              y: String(d.getFullYear())
            };
          };

          const monthOptions = [
            { value: '01', label: 'Janeiro' }, { value: '02', label: 'Fevereiro' }, { value: '03', label: 'Março' },
            { value: '04', label: 'Abril' }, { value: '05', label: 'Maio' }, { value: '06', label: 'Junho' },
            { value: '07', label: 'Julho' }, { value: '08', label: 'Agosto' }, { value: '09', label: 'Setembro' },
            { value: '10', label: 'Outubro' }, { value: '11', label: 'Novembro' }, { value: '12', label: 'Dezembro' }
          ];

          const yearOptions = useMemo(() => {
            const years = new Set([String(todayDate.getFullYear())]);
            logs.forEach(l => {
              if (l.timestamp) years.add(getPartsFromISO(l.timestamp)?.y);
            });
            return Array.from(years).filter(Boolean).sort((a,b) => b.localeCompare(a)).map(y => ({value: y, label: y}));
          }, [logs]);

          const actionOptions = useMemo(() => {
            const actions = new Set(logs.map(l => l.action).filter(Boolean));
            return [{value: '', label: 'Todas as Ações'}, ...Array.from(actions).sort().map(a => ({value: a, label: a}))];
          }, [logs]);

          const matchesFilter = (dateParts) => {
            if (!dateParts) return false;
            if (filterType === 'dia') {
              return `${dateParts.d}/${dateParts.m}/${dateParts.y}` === filterDay;
            } else if (filterType === 'mes') {
              return dateParts.m === filterMonth && dateParts.y === filterYear;
            } else if (filterType === 'ano') {
              return dateParts.y === filterYear;
            }
            return false;
          };

          const filteredLogs = logs
            .filter(log => {
               const dateParts = getPartsFromISO(log.timestamp);
               const matchDate = matchesFilter(dateParts);
               const matchAction = filterAction ? log.action === filterAction : true;
               const matchSearch = searchTerm ? (
                  log.userName?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                  log.module?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                  log.action?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                  log.details?.toLowerCase().includes(searchTerm.toLowerCase())
               ) : true;
               
               return matchDate && matchAction && matchSearch;
            })
            .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

          const displayedLogs = filteredLogs.slice(0, visibleCount);

          const formatLogTime = (isoString) => {
            const d = new Date(isoString);
            return d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <header className="mb-8">
                <h2 className="text-3xl font-bold tracking-tight">Histórico de Logs</h2>
                <p className="text-slate-500 mt-1">Registro de atividades e interações no sistema.</p>
              </header>

              <Card className="p-4 md:p-6 relative z-30">
                <div className="flex flex-col md:flex-row items-end gap-4">
                  <Select 
                    label="Visualizar por" theme={theme} className="w-full md:w-48"
                    value={filterType} 
                    onChange={e => {
                      const val = e.target.value;
                      setFilterType(val);
                      
                      // Restaura sempre para a data atual ao trocar de filtro
                      const now = new Date();
                      if (val === 'mes') {
                        setFilterMonth(String(now.getMonth() + 1).padStart(2, '0'));
                        setFilterYear(String(now.getFullYear()));
                      } else if (val === 'ano') {
                        setFilterYear(String(now.getFullYear()));
                      } else if (val === 'dia') {
                        setFilterDay(now.toLocaleDateString('pt-BR'));
                      }
                    }}
                    options={[ {value: 'dia', label: 'Dia Específico'}, {value: 'mes', label: 'Mês'}, {value: 'ano', label: 'Ano'} ]} 
                  />
                  
                  {filterType === 'dia' && (
                    <Input 
                      label="Data Desejada" placeholder="DD/MM/AAAA" theme={theme} className="w-full md:w-48"
                      value={filterDay} onChange={e => setFilterDay(formatDateInput(e.target.value))} 
                    />
                  )}

                  {filterType === 'mes' && (
                    <Select 
                      label="Selecione o Mês" theme={theme} className="w-full md:w-48"
                      value={filterMonth} onChange={e => setFilterMonth(e.target.value)}
                      options={monthOptions} 
                    />
                  )}

                  {(filterType === 'mes' || filterType === 'ano') && (
                    <Select 
                      label="Selecione o Ano" theme={theme} className="w-full md:w-48"
                      value={filterYear} onChange={e => setFilterYear(e.target.value)}
                      options={yearOptions} 
                    />
                  )}
                </div>
              </Card>

              <Card className="p-2 flex flex-col relative z-20">
                <div className="p-4 border-b border-slate-200 dark:border-slate-700 flex flex-col md:flex-row items-start md:items-end gap-4">
                  <div className="flex-1 w-full relative">
                    <label className="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1 mb-1 block">Buscar Registro</label>
                    <div className="relative">
                      <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 z-10 pointer-events-none" size={18} />
                      <input 
                        type="text" 
                        placeholder="Buscar por usuário, módulo ou detalhes..." 
                        className={`w-full pl-10 pr-4 py-2.5 bg-slate-100 dark:bg-slate-900/50 rounded-xl outline-none border border-slate-200 dark:border-slate-700 transition-all focus:ring-2 focus:border-transparent dark:text-white ${theme.ring}`}
                        value={searchTerm}
                        onChange={e => setSearchTerm(e.target.value)}
                      />
                    </div>
                  </div>
                  <Select 
                    label="Tipo de Ação" theme={theme} className="w-full md:w-64"
                    value={filterAction} onChange={e => setFilterAction(e.target.value)}
                    options={actionOptions}
                  />
                  <div className="text-sm text-slate-500 hidden xl:block pb-2">
                    A exibir {displayedLogs.length} de {filteredLogs.length} registos
                  </div>
                </div>
                <div className="overflow-x-auto max-h-[600px] custom-scrollbar flex-1">
                  <table className="w-full text-left border-collapse">
                    <thead className="sticky top-0 bg-slate-50/90 dark:bg-slate-800/90 backdrop-blur-sm z-10 shadow-sm">
                      <tr className="border-b border-slate-200 dark:border-slate-700 text-sm text-slate-500">
                        <th className="p-4 font-medium">Data / Hora</th>
                        <th className="p-4 font-medium">Usuário</th>
                        <th className="p-4 font-medium">Módulo</th>
                        <th className="p-4 font-medium">Ação</th>
                        <th className="p-4 font-medium">Detalhes</th>
                      </tr>
                    </thead>
                    <tbody>
                      {displayedLogs.map(log => (
                        <tr key={log.id} className="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                          <td className="p-4 text-sm font-medium whitespace-nowrap">{formatLogTime(log.timestamp)}</td>
                          <td className="p-4">
                            <div className="flex flex-col">
                              <span className="font-medium text-sm">{log.userName}</span>
                              <span className="text-xs text-slate-500">@{log.userUsername}</span>
                            </div>
                          </td>
                          <td className="p-4 text-sm font-medium">{log.module}</td>
                          <td className="p-4">
                            <span className={`px-2 py-1 rounded-md text-xs font-medium whitespace-nowrap inline-block ${
                              log.action === 'Exclusão' ? 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400' :
                              log.action === 'Atualização' ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400' :
                              log.action === 'Cadastro' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400' :
                              'bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-300'
                            }`}>
                              {log.action}
                            </span>
                          </td>
                          <td className="p-4 text-sm text-slate-600 dark:text-slate-400">{log.details}</td>
                        </tr>
                      ))}
                      {displayedLogs.length === 0 && (
                        <tr><td colSpan="5" className="p-8 text-center text-slate-500">Nenhum log de atividade encontrado para o período/filtro selecionado.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
                {filteredLogs.length > visibleCount && (
                  <div className="p-4 flex justify-center border-t border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/30">
                    <Button 
                      variant="secondary" 
                      theme={theme} 
                      onClick={() => setVisibleCount(prev => prev + 50)}
                      icon={RefreshCw}
                    >
                      Carregar mais dados
                    </Button>
                  </div>
                )}
              </Card>
            </div>
          );
        }
        
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
